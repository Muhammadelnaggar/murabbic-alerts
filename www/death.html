<!-- death.html — تسجيل نفوق -->
<!DOCTYPE html>
<html lang="ar" dir="rtl" data-page="death">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>النفوق — مُرَبِّيك</title>

  <link rel="stylesheet" href="css/forms.css" />
  <script type="module" src="js/forms-init.js"></script>


</head>

<body>
 <header>
  <div class="mbk-head">
    <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">
    <div class="mbk-center">
      <div class="mbk-page-title">تسجيل نفوق</div>
      <div class="mbk-app-name">مُرَبِّيك</div>
    </div>
    <a class="mbk-back" href="add-event.html">رجوع</a>
  </div>
</header>

     

<main class="mbk-form">
  <div id="info" class="infobar"></div>

  <form id="deathForm" data-event="نفوق">
    <section class="mbk-card">
      <div class="field">
        <label for="animalNumber">رقم الحيوان</label>
      <input id="animalNumber" data-field="animalNumber" />
      </div>

      <div class="field">
        <label for="eventDate">تاريخ النفوق</label>
       <input id="eventDate" data-field="eventDate" type="date" />
      </div>

     <div class="field">
  <label for="reasonInput">سبب محتمل</label>
  <input
    id="reasonInput"
    data-field="reason"
    list="deathReasonsList"
    placeholder="اكتب السبب المحتمل"
    autocomplete="off"
  />
  <datalist id="deathReasonsList"></datalist>
</div>

      <div id="otherWrap" class="field" style="display:none">
        <label for="reasonOther">اكتب السبب</label>
        <input id="reasonOther" placeholder="اكتب السبب هنا" />
      </div>

      <div class="field">
        <label for="notes">ملاحظات</label>
       <textarea id="notes" data-field="notes" rows="3" placeholder="اختياري"></textarea>
      </div>
    </section>
<div class="btn-row">
      <button class="save-btn" id="saveBtn" type="submit" form="deathForm">تسجيل الحدث</button>
      <a class="open-card" href="dashboard.html">لوحة التحكم</a>
    </div>
      </form>
  </main>

<script type="module">
  import { db, auth, ensureAuth } from "/js/firebase-config.js";
 import {
  collection, addDoc, serverTimestamp,
  updateDoc, getDocs, query, where, limit,
  doc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const $ = (id) => document.getElementById(id);

  const form = $("deathForm");
  const info = $("info");
 const reasonInput = $("reasonInput");
const reasonsList = $("deathReasonsList");

function msg(text, ok = false){
  if (!info) return;
  info.className = ok ? "infobar ok" : "infobar err";
  info.textContent = text;
  info.style.display = "block";
  info.scrollIntoView({ behavior:"smooth", block:"start" });
}

  const p = new URLSearchParams(location.search);

  const num = (
    p.get("number") ||
    p.get("animalNumber") ||
    p.get("animalId") ||
    p.get("id") ||
    localStorage.getItem("lastAnimalNumber") ||
    localStorage.getItem("lastAnimalId") ||
    localStorage.getItem("currentAnimalNumber") ||
    ""
  ).toString().trim();

  const dt = (
    p.get("date") ||
    p.get("eventDate") ||
    localStorage.getItem("lastEventDate") ||
    new Date().toISOString().slice(0,10)
  ).toString().slice(0,10);

  $("animalNumber").value = num;
  $("eventDate").value = dt;
(async () => {
  try {
    await ensureAuth();
    const uid = auth.currentUser?.uid;
    if (uid) await loadUserDeathReasons(uid);
  } catch (e) {
    console.error("loadUserDeathReasons failed", e);
  }
})();
 function getReason(){
  return (reasonInput?.value || "").trim();
}

function normalizeReasonKey(text){
  return String(text || "")
    .trim()
    .toLowerCase()
    .replace(/\s+/g, " ");
}

async function loadUserDeathReasons(uid){
  if (!uid || !reasonsList) return;

  reasonsList.innerHTML = "";

  const snap = await getDocs(query(
    collection(db, "death_reasons"),
    where("userId", "==", uid)
  ));

  const items = [];
  snap.forEach((d) => {
    const data = d.data() || {};
    const label = String(data.label || "").trim();
    if (label) items.push(label);
  });

  items
    .sort((a, b) => a.localeCompare(b, "ar"))
    .forEach((label) => {
      const opt = document.createElement("option");
      opt.value = label;
      reasonsList.appendChild(opt);
    });
}

async function saveUserDeathReason(uid, label){
  const clean = String(label || "").trim();
  if (!uid || !clean) return;

  const key = `${uid}__${normalizeReasonKey(clean)}`;

  await setDoc(doc(db, "death_reasons", key), {
    userId: uid,
    label: clean,
    updatedAt: serverTimestamp()
  }, { merge: true });
}
  form?.addEventListener("mbk:valid", async () => {
    try {
      await ensureAuth();
      const uid = auth.currentUser?.uid;
      if (!uid) throw new Error("NO_AUTH");

      const animalNumber = ($("animalNumber")?.value || "").toString().trim();
      const eventDate = ($("eventDate")?.value || "").slice(0,10);
      const reason = getReason();
      const notes = ($("notes")?.value || "").trim();

      let snap = await getDocs(query(
        collection(db, "animals"),
        where("userId", "==", uid),
        where("number", "==", animalNumber),
        limit(1)
      ));

      if (snap.empty) {
        snap = await getDocs(query(
          collection(db, "animals"),
          where("userId", "==", uid),
          where("animalNumber", "==", animalNumber),
          limit(1)
        ));
      }

      if (snap.empty) {
        msg("❌ رقم الحيوان غير موجود.", false);
        return;
      }

      const animalRef = snap.docs[0].ref;

await addDoc(collection(db, "events"), {
  animalNumber,
  animalId: animalNumber,
  type: "نفوق",
  eventType: "نفوق",
  eventDate,
  reason,
  notes,
  userId: uid,
  source: "/death.html",
  createdAt: serverTimestamp()
});
if (reason) {
  await saveUserDeathReason(uid, reason);
}
await updateDoc(animalRef, {
  archived: true,
  status: "inactive",
  eventType: "نفوق",
  deathDate: eventDate,
  deathReason: reason || null,
  updatedAt: serverTimestamp()
});

localStorage.setItem("lastAnimalNumber", animalNumber);
localStorage.setItem("lastEventDate", eventDate);

msg("✅ تم تسجيل النفوق بنجاح", true);
const saveBtn = document.getElementById("saveBtn");
saveBtn?.setAttribute("disabled", "disabled");
if (saveBtn) saveBtn.style.opacity = ".7";
    } catch (e) {
      console.error(e);
      msg("❌ فشل في الحفظ.", false);
    }
  });
</script>
 
</body>
</html>
