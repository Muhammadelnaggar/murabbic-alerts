<!-- death.html — تسجيل نفوق -->
<!DOCTYPE html>
<html lang="ar" dir="rtl" data-page="death">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>النفوق — مُرَبِّيك</title>

  <link rel="stylesheet" href="css/forms.css" />
  <script type="module" src="js/forms-init.js"></script>

  <style>
    :root{
      --green:#0ea05a;
      --green-dark:#0b7f47;
      --cream:#f7faf7;
      --card:#ffffff;
      --border:#c5e1a5;
      --text:#0f172a;
      --muted:#64748b;
      --danger:#b91c1c;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:22px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      background:#eef6ef;
      color:var(--text);
      font-family:"Cairo","Segoe UI",Tahoma,Arial,sans-serif;
    }

    body{
      min-height:100vh;
      padding-bottom:110px;
    }

    .mbk-head{
      position:sticky;
      top:0;
      z-index:20;
      background:rgba(255,255,255,.97);
      backdrop-filter:blur(8px);
      border-bottom:1px solid #e5e7eb;
    }

    .mbk-head-inner{
      max-width:520px;
      margin:0 auto;
      min-height:72px;
      padding:12px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .mbk-head-side{
      width:72px;
      display:flex;
      align-items:center;
    }

    .mbk-head-side.end{
      justify-content:flex-end;
    }

    .mbk-back{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:42px;
      height:42px;
      border-radius:12px;
      text-decoration:none;
      color:var(--green-dark);
      border:1px solid #d7e7d7;
      background:#fff;
      font-size:15px;
      font-weight:800;
      padding:0 12px;
    }

    .mbk-brand{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      min-width:0;
      text-align:center;
    }

    .mbk-brand img{
      width:34px;
      height:34px;
      object-fit:contain;
      opacity:.6;
      flex:0 0 auto;
    }

    .mbk-brand-text{
      min-width:0;
    }

    .mbk-brand-text h1{
      margin:0;
      font-size:26px;
      line-height:1.1;
      font-weight:900;
      color:#111827;
    }

    .mbk-brand-text .sub{
      margin-top:2px;
      font-size:13px;
      color:#6b7280;
      font-weight:700;
    }

    .page-wrap{
      max-width:520px;
      margin:0 auto;
      padding:14px 14px 24px;
    }

    .infobar{
      display:none;
      margin:0 0 12px;
      padding:12px 14px;
      border-radius:14px;
      font-size:14px;
      font-weight:800;
      border:1px solid transparent;
      background:#fff;
      box-shadow:0 4px 14px rgba(15,23,42,.04);
    }

    .infobar.ok{
      display:block;
      color:#166534;
      background:#ecfdf3;
      border-color:#bbf7d0;
    }

    .infobar.err{
      display:block;
      color:#991b1b;
      background:#fef2f2;
      border-color:#fecaca;
    }

    .mbk-card{
      background:var(--card);
      border:1px solid #dbe6db;
      border-radius:30px;
      box-shadow:var(--shadow);
      padding:18px 18px 20px;
    }

    .field{
      margin-bottom:18px;
    }

    .field:last-child{
      margin-bottom:0;
    }

    .field label{
      display:block;
      margin:0 0 10px;
      font-size:18px;
      font-weight:900;
      color:#0f172a;
    }

    .field input,
    .field select,
    .field textarea{
      width:100%;
      border:2px solid #d7dde5;
      border-radius:22px;
      background:#fff;
      color:#0f172a;
      font-size:18px;
      padding:16px 18px;
      outline:none;
      box-shadow:none;
      transition:.18s ease;
      font-family:inherit;
    }

    .field textarea{
      min-height:140px;
      resize:vertical;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus{
      border-color:var(--green);
      box-shadow:0 0 0 4px rgba(14,160,90,.10);
    }

    .field input[readonly]{
      background:#f8fafc;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:16px;
    }

    .btn{
      appearance:none;
      border:none;
      border-radius:22px;
      min-height:62px;
      padding:14px 18px;
      font-family:inherit;
      font-size:20px;
      font-weight:900;
      cursor:pointer;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      transition:transform .08s ease, opacity .18s ease, background .18s ease;
    }

    .btn:active{
      transform:scale(.985);
    }

    .btn-save{
      background:var(--green);
      color:#fff;
      box-shadow:0 10px 22px rgba(14,160,90,.22);
    }

    .btn-save:hover{
      background:var(--green-dark);
    }

    .btn-dash{
      background:#fff;
      color:var(--green-dark);
      border:2px solid #bfe3c8;
    }

    .btn-dash:hover{
      background:#f6fff8;
    }
header{
  position:sticky;
  top:0;
  z-index:30;
  background:#fff;
  border-bottom:1px solid #e5e7eb;
}

.mbk-head{
  max-width:520px;
  margin:0 auto;
  min-height:72px;
  padding:12px 16px;
  display:grid;
  grid-template-columns:56px 1fr 56px;
  align-items:center;
  gap:10px;
}

.mbk-logo{
  width:38px;
  height:38px;
  object-fit:contain;
  opacity:.6;
}

.mbk-center{
  text-align:center;
  min-width:0;
}

.mbk-page-title{
  font-size:24px;
  font-weight:900;
  line-height:1.1;
  color:#111827;
}

.mbk-app-name{
  margin-top:2px;
  font-size:13px;
  font-weight:800;
  color:#6b7280;
}

.mbk-back{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:56px;
  height:42px;
  border-radius:12px;
  text-decoration:none;
  color:var(--green-dark);
  border:1px solid #d7e7d7;
  background:#fff;
  font-size:15px;
  font-weight:800;
  padding:0 12px;
}

.bottom-bar{
  position:fixed;
  right:0;
  left:0;
  bottom:0;
  z-index:40;
  background:#fff;
  border-top:1px solid #e5e7eb;
  box-shadow:0 -6px 18px rgba(15,23,42,.06);
  padding:14px 12px calc(14px + env(safe-area-inset-bottom));
}

.bottom-bar{
  max-width:520px;
  margin:0 auto;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.bottom-btn{
  min-height:54px;
  border:none;
  border-radius:16px;
  font-family:inherit;
  font-size:18px;
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  cursor:pointer;
}

.bottom-btn.primary{
  background:var(--green);
  color:#fff;
}

.bottom-btn.secondary{
  background:#f3f4f6;
  color:#111827;
}
    @media (max-width:420px){
      .mbk-page-title{font-size:22px}
      .bottom-btn{font-size:17px; min-height:52px}
      .field label{font-size:16px}
      .field input,
      .field select,
      .field textarea{font-size:16px}
    }
  </style>
</head>

<body>
 <header>
  <div class="mbk-head">
    <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">
    <div class="mbk-center">
      <div class="mbk-page-title">تسجيل نفوق</div>
      <div class="mbk-app-name">مُرَبِّيك</div>
    </div>
    <a class="mbk-back" href="add-event.html">رجوع</a>
  </div>
</header>

     

 <main class="page-wrap">
  <form id="deathForm" data-event="نفوق">
    <div id="info" class="infobar"></div>

    <section class="mbk-card">
      <div class="field">
        <label for="animalNumber">رقم الحيوان</label>
      <input id="animalNumber" data-field="animalNumber" />
      </div>

      <div class="field">
        <label for="eventDate">تاريخ النفوق</label>
       <input id="eventDate" data-field="eventDate" type="date" />
      </div>

     <div class="field">
  <label for="reasonInput">سبب محتمل</label>
  <input
    id="reasonInput"
    data-field="reason"
    list="deathReasonsList"
    placeholder="اكتب السبب المحتمل"
    autocomplete="off"
  />
  <datalist id="deathReasonsList"></datalist>
</div>

      <div id="otherWrap" class="field" style="display:none">
        <label for="reasonOther">اكتب السبب</label>
        <input id="reasonOther" placeholder="اكتب السبب هنا" />
      </div>

      <div class="field">
        <label for="notes">ملاحظات</label>
       <textarea id="notes" data-field="notes" rows="3" placeholder="اختياري"></textarea>
      </div>
    </section>

      </form>
  </main>

<script type="module">
  import { db, auth, ensureAuth } from "/js/firebase-config.js";
 import {
  collection, addDoc, serverTimestamp,
  updateDoc, getDocs, query, where, limit,
  doc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const $ = (id) => document.getElementById(id);

  const form = $("deathForm");
  const info = $("info");
 const reasonInput = $("reasonInput");
const reasonsList = $("deathReasonsList");

function msg(text, ok = false){
  if (!info) return;
  info.className = ok ? "infobar ok" : "infobar err";
  info.textContent = text;
  info.style.display = "block";
  info.scrollIntoView({ behavior:"smooth", block:"start" });
}

  const p = new URLSearchParams(location.search);

  const num = (
    p.get("number") ||
    p.get("animalNumber") ||
    p.get("animalId") ||
    p.get("id") ||
    localStorage.getItem("lastAnimalNumber") ||
    localStorage.getItem("lastAnimalId") ||
    localStorage.getItem("currentAnimalNumber") ||
    ""
  ).toString().trim();

  const dt = (
    p.get("date") ||
    p.get("eventDate") ||
    localStorage.getItem("lastEventDate") ||
    new Date().toISOString().slice(0,10)
  ).toString().slice(0,10);

  $("animalNumber").value = num;
  $("eventDate").value = dt;
(async () => {
  try {
    await ensureAuth();
    const uid = auth.currentUser?.uid;
    if (uid) await loadUserDeathReasons(uid);
  } catch (e) {
    console.error("loadUserDeathReasons failed", e);
  }
})();
 function getReason(){
  return (reasonInput?.value || "").trim();
}

function normalizeReasonKey(text){
  return String(text || "")
    .trim()
    .toLowerCase()
    .replace(/\s+/g, " ");
}

async function loadUserDeathReasons(uid){
  if (!uid || !reasonsList) return;

  reasonsList.innerHTML = "";

  const snap = await getDocs(query(
    collection(db, "death_reasons"),
    where("userId", "==", uid)
  ));

  const items = [];
  snap.forEach((d) => {
    const data = d.data() || {};
    const label = String(data.label || "").trim();
    if (label) items.push(label);
  });

  items
    .sort((a, b) => a.localeCompare(b, "ar"))
    .forEach((label) => {
      const opt = document.createElement("option");
      opt.value = label;
      reasonsList.appendChild(opt);
    });
}

async function saveUserDeathReason(uid, label){
  const clean = String(label || "").trim();
  if (!uid || !clean) return;

  const key = `${uid}__${normalizeReasonKey(clean)}`;

  await setDoc(doc(db, "death_reasons", key), {
    userId: uid,
    label: clean,
    updatedAt: serverTimestamp()
  }, { merge: true });
}
  form?.addEventListener("mbk:valid", async () => {
    try {
      await ensureAuth();
      const uid = auth.currentUser?.uid;
      if (!uid) throw new Error("NO_AUTH");

      const animalNumber = ($("animalNumber")?.value || "").toString().trim();
      const eventDate = ($("eventDate")?.value || "").slice(0,10);
      const reason = getReason();
      const notes = ($("notes")?.value || "").trim();

      let snap = await getDocs(query(
        collection(db, "animals"),
        where("userId", "==", uid),
        where("number", "==", animalNumber),
        limit(1)
      ));

      if (snap.empty) {
        snap = await getDocs(query(
          collection(db, "animals"),
          where("userId", "==", uid),
          where("animalNumber", "==", animalNumber),
          limit(1)
        ));
      }

      if (snap.empty) {
        msg("❌ رقم الحيوان غير موجود.", false);
        return;
      }

      const animalRef = snap.docs[0].ref;

await addDoc(collection(db, "events"), {
  animalNumber,
  animalId: animalNumber,
  type: "نفوق",
  eventType: "نفوق",
  eventDate,
  reason,
  notes,
  userId: uid,
  source: "/death.html",
  createdAt: serverTimestamp()
});
if (reason) {
  await saveUserDeathReason(uid, reason);
}
await updateDoc(animalRef, {
  archived: true,
  status: "inactive",
  eventType: "نفوق",
  deathDate: eventDate,
  deathReason: reason || null,
  updatedAt: serverTimestamp()
});

localStorage.setItem("lastAnimalNumber", animalNumber);
localStorage.setItem("lastEventDate", eventDate);

msg("✅ تم تسجيل النفوق بنجاح", true);
const saveBtn = document.getElementById("saveBtn");
saveBtn?.setAttribute("disabled", "disabled");
if (saveBtn) saveBtn.style.opacity = ".7";
    } catch (e) {
      console.error(e);
      msg("❌ فشل في الحفظ.", false);
    }
  });
</script>
  <div class="bottom-bar">
  <a class="bottom-btn secondary" href="dashboard.html">لوحة التحكم</a>
  <button class="bottom-btn primary" id="saveBtn" type="submit" form="deathForm">حفظ النفوق</button>
</div>
</body>
</html>
