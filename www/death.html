<!-- death.html — تسجيل نفوق -->
<!DOCTYPE html>
<html lang="ar" dir="rtl" data-page="death">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>النفوق — مُرَبِّيك</title>

  <link rel="stylesheet" href="css/forms.css" />
  <script type="module" src="js/forms-init.js"></script>

  <style>
    :root{
      --green:#0ea05a;
      --green-dark:#0b7f47;
      --cream:#f7faf7;
      --card:#ffffff;
      --border:#c5e1a5;
      --text:#0f172a;
      --muted:#64748b;
      --danger:#b91c1c;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:22px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      background:#eef6ef;
      color:var(--text);
      font-family:"Cairo","Segoe UI",Tahoma,Arial,sans-serif;
    }

    body{
      min-height:100vh;
      padding-bottom:110px;
    }

    .mbk-head{
      position:sticky;
      top:0;
      z-index:20;
      background:rgba(255,255,255,.97);
      backdrop-filter:blur(8px);
      border-bottom:1px solid #e5e7eb;
    }

    .mbk-head-inner{
      max-width:520px;
      margin:0 auto;
      min-height:72px;
      padding:12px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .mbk-head-side{
      width:72px;
      display:flex;
      align-items:center;
    }

    .mbk-head-side.end{
      justify-content:flex-end;
    }

    .mbk-back{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:42px;
      height:42px;
      border-radius:12px;
      text-decoration:none;
      color:var(--green-dark);
      border:1px solid #d7e7d7;
      background:#fff;
      font-size:15px;
      font-weight:800;
      padding:0 12px;
    }

    .mbk-brand{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      min-width:0;
      text-align:center;
    }

    .mbk-brand img{
      width:34px;
      height:34px;
      object-fit:contain;
      opacity:.6;
      flex:0 0 auto;
    }

    .mbk-brand-text{
      min-width:0;
    }

    .mbk-brand-text h1{
      margin:0;
      font-size:26px;
      line-height:1.1;
      font-weight:900;
      color:#111827;
    }

    .mbk-brand-text .sub{
      margin-top:2px;
      font-size:13px;
      color:#6b7280;
      font-weight:700;
    }

    .page-wrap{
      max-width:520px;
      margin:0 auto;
      padding:14px 14px 24px;
    }

    .infobar{
      display:none;
      margin:0 0 12px;
      padding:12px 14px;
      border-radius:14px;
      font-size:14px;
      font-weight:800;
      border:1px solid transparent;
      background:#fff;
      box-shadow:0 4px 14px rgba(15,23,42,.04);
    }

    .infobar.ok{
      display:block;
      color:#166534;
      background:#ecfdf3;
      border-color:#bbf7d0;
    }

    .infobar.err{
      display:block;
      color:#991b1b;
      background:#fef2f2;
      border-color:#fecaca;
    }

    .mbk-card{
      background:var(--card);
      border:1px solid #dbe6db;
      border-radius:30px;
      box-shadow:var(--shadow);
      padding:18px 18px 20px;
    }

    .field{
      margin-bottom:18px;
    }

    .field:last-child{
      margin-bottom:0;
    }

    .field label{
      display:block;
      margin:0 0 10px;
      font-size:18px;
      font-weight:900;
      color:#0f172a;
    }

    .field input,
    .field select,
    .field textarea{
      width:100%;
      border:2px solid #d7dde5;
      border-radius:22px;
      background:#fff;
      color:#0f172a;
      font-size:18px;
      padding:16px 18px;
      outline:none;
      box-shadow:none;
      transition:.18s ease;
      font-family:inherit;
    }

    .field textarea{
      min-height:140px;
      resize:vertical;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus{
      border-color:var(--green);
      box-shadow:0 0 0 4px rgba(14,160,90,.10);
    }

    .field input[readonly]{
      background:#f8fafc;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:16px;
    }

    .btn{
      appearance:none;
      border:none;
      border-radius:22px;
      min-height:62px;
      padding:14px 18px;
      font-family:inherit;
      font-size:20px;
      font-weight:900;
      cursor:pointer;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      transition:transform .08s ease, opacity .18s ease, background .18s ease;
    }

    .btn:active{
      transform:scale(.985);
    }

    .btn-save{
      background:var(--green);
      color:#fff;
      box-shadow:0 10px 22px rgba(14,160,90,.22);
    }

    .btn-save:hover{
      background:var(--green-dark);
    }

    .btn-dash{
      background:#fff;
      color:var(--green-dark);
      border:2px solid #bfe3c8;
    }

    .btn-dash:hover{
      background:#f6fff8;
    }

    @media (max-width:420px){
      .mbk-brand-text h1{font-size:22px}
      .actions{grid-template-columns:1fr 1fr}
      .btn{font-size:18px; min-height:58px}
      .field label{font-size:16px}
      .field input,
      .field select,
      .field textarea{font-size:16px}
    }
  </style>
</head>

<body>
  <header class="mbk-head">
    <div class="mbk-head-inner">
      <div class="mbk-head-side">
        <a class="mbk-back" href="add-event.html">رجوع</a>
      </div>

      <div class="mbk-brand">
        <div class="mbk-brand-text">
          <h1>النفوق</h1>
          <div class="sub">مُرَبِّيك</div>
        </div>
        <img src="images/logo.png" alt="شعار مُرَبِّيك">
      </div>

      <div class="mbk-head-side end"></div>
    </div>
  </header>

  <main class="page-wrap">
    <div id="info" class="infobar"></div>

    <section class="mbk-card">
      <div class="field">
        <label for="animalNumber">رقم الحيوان</label>
        <input id="animalNumber" readonly />
      </div>

      <div class="field">
        <label for="eventDate">تاريخ النفوق</label>
        <input id="eventDate" type="date" />
      </div>

      <div class="field">
        <label for="reasonSelect">سبب محتمل</label>
        <select id="reasonSelect">
          <option value="">— اختر سببًا —</option>
          <option value="مرض تنفسي">مرض تنفسي</option>
          <option value="مرض هضمي/إسهال شديد">مرض هضمي/إسهال شديد</option>
          <option value="التهاب ضرع/تسمم دموي">التهاب ضرع/تسمم دموي</option>
          <option value="حمى اللبن/نقص كالسيوم">حمى اللبن/نقص كالسيوم</option>
          <option value="كيتوزيس/اضطراب أيضي">كيتوزيس/اضطراب أيضي</option>
          <option value="نفوق أثناء/بعد الولادة">نفوق أثناء/بعد الولادة</option>
          <option value="حادث/إصابة/كسر">حادث/إصابة/كسر</option>
          <option value="تسمم/تغذية">تسمم/تغذية</option>
          <option value="طفيليات/حمى">طفيليات/حمى</option>
          <option value="مجهول">مجهول</option>
          <option value="أخرى">أخرى (اكتب)</option>
        </select>
      </div>

      <div id="otherWrap" class="field" style="display:none">
        <label for="reasonOther">اكتب السبب</label>
        <input id="reasonOther" placeholder="اكتب السبب هنا" />
      </div>

      <div class="field">
        <label for="notes">ملاحظات</label>
        <textarea id="notes" rows="3" placeholder="اختياري"></textarea>
      </div>
    </section>

    <div class="actions">
      <button id="saveBtn" class="btn btn-save" data-validate="true" type="button">✅ حفظ النفوق</button>
      <a class="btn btn-dash" href="dashboard.html">لوحة التحكم</a>
    </div>
  </main>

  <script type="module">
    import { db, auth, ensureAuth } from "/js/firebase-config.js";
    import {
      collection, addDoc, serverTimestamp,
      updateDoc, getDocs, query, where, limit
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const $ = (id) => document.getElementById(id);
    const info = $("info");
    const btn  = $("saveBtn");

    function msg(t, ok=false){
      info.className = "infobar " + (ok ? "ok" : "err");
      info.textContent = t;
    }

    const p = new URLSearchParams(location.search);
    const num = (
      p.get("number") ||
      p.get("animalNumber") ||
      p.get("animalId") ||
      p.get("id") ||
      localStorage.getItem("lastAnimalNumber") ||
      localStorage.getItem("lastAnimalId") ||
      localStorage.getItem("currentAnimalNumber") ||
      ""
    ).toString().trim();

    const dt = (
      p.get("date") ||
      p.get("eventDate") ||
      localStorage.getItem("lastEventDate") ||
      new Date().toISOString().slice(0,10)
    ).toString().slice(0,10);

    $("animalNumber").value = num;
    $("eventDate").value = dt;

    const reasonSelect = $("reasonSelect");
    const otherWrap = $("otherWrap");

    reasonSelect.addEventListener("change", () => {
      otherWrap.style.display = (reasonSelect.value === "أخرى") ? "block" : "none";
    });

    function getReason(){
      const v = (reasonSelect.value || "").trim();
      if (v === "أخرى") return ($("reasonOther").value || "").trim();
      return v;
    }

    btn.onclick = async () => {
      try {
        await ensureAuth();
        const uid = auth.currentUser?.uid;
        if (!uid) throw new Error("NO_AUTH");
        if (!num) { msg("⚠️ لم يتم تمرير رقم الحيوان.", false); return; }

        const eventDate = ($("eventDate").value || dt).slice(0,10);
        const reason = getReason();

        const payload = {
          animalNumber: String(num),
          animalId: String(num),
          type: "نفوق",
          eventType: "نفوق",
          eventDate,
          reason,
          notes: ($("notes").value || "").trim(),
          userId: uid,
          source: "/death.html",
          createdAt: serverTimestamp()
        };

        await addDoc(collection(db, "events"), payload);

        const snap = await getDocs(query(
          collection(db, "animals"),
          where("userId", "==", uid),
          where("number", "==", String(num)),
          limit(1)
        ));

        if (snap.empty) {
          msg("❌ الحيوان غير موجود في الحيوانات.", false);
          return;
        }

        const animalRef = snap.docs[0].ref;

        await updateDoc(animalRef, {
          archived: true,
          status: "نافق",
          deathDate: eventDate,
          deathReason: reason || null,
          updatedAt: serverTimestamp()
        });

        msg("تم تسجيل النفوق وأرشفة الحيوان ✅", true);

        localStorage.setItem("lastAnimalNumber", String(num));
        localStorage.setItem("lastEventDate", eventDate);

        setTimeout(() => location.href = "dashboard.html", 900);

      } catch (e) {
        console.error(e);
        msg("❌ فشل في الحفظ.", false);
      }
    };
  </script>
</body>
</html>
