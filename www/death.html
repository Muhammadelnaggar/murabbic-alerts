<!-- death.html — تسجيل نفوق -->
<!DOCTYPE html>
<html lang="ar" dir="rtl" data-page="death">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>النفوق — مُرَبِّيك</title>

  <link rel="stylesheet" href="css/forms.css" />


</head>

<body>
 <header>
  <div class="mbk-head">
    <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">
    <div class="mbk-center">
      <div class="mbk-page-title">تسجيل نفوق</div>
      <div class="mbk-app-name">مُرَبِّيك</div>
    </div>
    <a class="mbk-back" href="add-event.html">رجوع</a>
  </div>
</header>

     

<main class="mbk-form">
  <div id="info" class="infobar"></div>

  <form id="deathForm" data-event="نفوق">
    <section class="mbk-card">
      <div class="field">
        <label for="animalNumber">رقم الحيوان</label>
      <input id="animalNumber" data-field="animalNumber" />
      </div>

      <div class="field">
        <label for="eventDate">تاريخ النفوق</label>
       <input id="eventDate" data-field="eventDate" type="date" />
      </div>

     <div class="field">
  <label for="reasonInput">سبب محتمل</label>
  <input
    id="reasonInput"
    data-field="reason"
    list="deathReasonsList"
    placeholder="اكتب السبب المحتمل"
    autocomplete="off"
  />
  <datalist id="deathReasonsList"></datalist>
</div>

      <div id="otherWrap" class="field" style="display:none">
        <label for="reasonOther">اكتب السبب</label>
        <input id="reasonOther" placeholder="اكتب السبب هنا" />
      </div>

      <div class="field">
        <label for="notes">ملاحظات</label>
       <textarea id="notes" data-field="notes" rows="3" placeholder="اختياري"></textarea>
      </div>
    </section>
<div class="actions-bar">
  <button class="save" id="saveBtn" type="submit" form="deathForm">تسجيل النفوق</button>
  <button class="ghost" id="dashboardBtn" type="button">لوحة التحكم</button>
</div>
      </form>
  </main>

<script>
  const $ = (id) => document.getElementById(id);

  const form = $("deathForm");
  const info = $("info");
  const reasonInput = $("reasonInput");
  const reasonsList = $("deathReasonsList");
  const saveBtn = $("saveBtn");

  let deathGateAllowed = false;

  function getUid() {
    return String(
      localStorage.getItem("userId") ||
      localStorage.getItem("uid") ||
      localStorage.getItem("tenantId") ||
      ""
    ).trim();
  }

  function msg(text, type = "info") {
    if (!info) return;

    const cls =
      type === "success" ? "success" :
      type === "error" ? "error" :
      type === "warning" ? "warning" :
      "info";

    info.className = `infobar mbk-infobar show ${cls}`;
    info.textContent = text;
    info.style.display = "block";

    try { info.scrollIntoView({ behavior: "smooth", block: "start" }); } catch (_) {}
  }

  function getReason() {
    return String(reasonInput?.value || "").trim();
  }

  function initFromUrl() {
    const p = new URLSearchParams(location.search);

    const num = (
      p.get("number") ||
      p.get("animalNumber") ||
      p.get("animalId") ||
      p.get("id") ||
      localStorage.getItem("lastAnimalNumber") ||
      localStorage.getItem("lastAnimalId") ||
      localStorage.getItem("currentAnimalNumber") ||
      ""
    ).toString().trim();

    const dt = (
      p.get("date") ||
      p.get("eventDate") ||
      localStorage.getItem("lastEventDate") ||
      new Date().toISOString().slice(0,10)
    ).toString().slice(0,10);

    $("animalNumber").value = num;
    $("eventDate").value = dt;
  }

  async function loadDeathReasons() {
    const uid = getUid();
    if (!uid || !reasonsList) return;

    try {
      const r = await fetch("/api/death-reasons/options", {
        method: "GET",
        headers: { "X-User-Id": uid }
      });

      const data = await r.json().catch(() => null);
      const items = Array.isArray(data?.reasons) ? data.reasons : [];

      reasonsList.innerHTML = "";

      items.forEach((label) => {
        const opt = document.createElement("option");
        opt.value = String(label || "").trim();
        reasonsList.appendChild(opt);
      });
    } catch (e) {
      console.error("loadDeathReasons failed", e);
    }
  }

  async function runDeathGate() {
    const uid = getUid();
    const animalNumber = String($("animalNumber")?.value || "").trim();

    deathGateAllowed = false;
    if (saveBtn) saveBtn.disabled = true;

    if (!uid) {
      msg("❌ لم يتم العثور على المستخدم. سجّل الدخول مرة أخرى.", "error");
      return false;
    }

    if (!animalNumber) {
      msg("❌ رقم الحيوان مطلوب.", "error");
      return false;
    }

    try {
      msg("جارِ التحقق من الحيوان...", "info");

      const r = await fetch("/api/animals/archive/gate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-User-Id": uid
        },
        body: JSON.stringify({
          animalNumber,
          archiveReason: "death"
        })
      });

      const data = await r.json().catch(() => null);

      if (!r.ok || data?.allowed !== true) {
        msg(data?.message || "❌ لا يمكن تسجيل نفوق لهذا الحيوان.", "error");
        return false;
      }

      deathGateAllowed = true;
      if (saveBtn) saveBtn.disabled = false;

      msg(data.message || "✅ الحيوان مؤهل لتسجيل النفوق.", "success");
      return true;

    } catch (e) {
      console.error("death gate failed", e);
      msg("❌ فشل الاتصال بالسيرفر أثناء التحقق من الحيوان.", "error");
      return false;
    }
  }

  async function saveDeath() {
    const uid = getUid();

    if (!deathGateAllowed) {
      msg("❌ لا يمكن الحفظ قبل نجاح التحقق من الحيوان.", "error");
      return;
    }

    const payload = {
      animalNumber: String($("animalNumber")?.value || "").trim(),
      eventDate: String($("eventDate")?.value || "").slice(0,10),
      archiveReason: "death",
      reason: getReason(),
      deathReason: getReason(),
      notes: String($("notes")?.value || "").trim()
    };

    try {
      if (!uid) {
        msg("❌ لم يتم العثور على المستخدم. سجّل الدخول مرة أخرى.", "error");
        return;
      }

      if (saveBtn) {
        saveBtn.disabled = true;
        saveBtn.textContent = "جارِ الأرشفة...";
      }

      msg("جارِ أرشفة الحيوان بعد النفوق...", "info");

      const r = await fetch("/api/animals/archive", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-User-Id": uid
        },
        body: JSON.stringify(payload)
      });

      const data = await r.json().catch(() => null);

      if (!r.ok || data?.ok !== true) {
        msg(data?.message || "❌ فشل أرشفة الحيوان بعد النفوق.", "error");
        if (saveBtn) {
          saveBtn.disabled = false;
          saveBtn.textContent = "تسجيل النفوق";
        }
        return;
      }

      localStorage.setItem("lastAnimalNumber", payload.animalNumber);
      localStorage.setItem("lastEventDate", payload.eventDate);

      msg(data.message || "✅ تم أرشفة الحيوان وأحداثه بعد النفوق.", "success");

      setTimeout(() => {
        location.href = "add-event.html";
      }, 900);

    } catch (e) {
      console.error("save death failed", e);
      msg("❌ فشل الاتصال بالسيرفر أثناء أرشفة النفوق.", "error");
      if (saveBtn) {
        saveBtn.disabled = false;
        saveBtn.textContent = "تسجيل النفوق";
      }
    }
  }

  initFromUrl();
  loadDeathReasons();
  runDeathGate();

  form?.addEventListener("submit", (e) => {
    e.preventDefault();
    saveDeath();
  });
  $("dashboardBtn")?.addEventListener("click", () => {
  location.href = "dashboard.html";
});
</script>
 
</body>
</html>
