<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="stylesheet" href="css/forms.css">
  <title>تسجيل التحصين</title>
  <style>
  /* ===== Header Style (ONE VERSION) ===== */
  .mbk-head-vax{
    max-width: 780px;
    margin: 10px auto 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
  }
  .mbk-right,
  .mbk-left{
    width: 64px;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .mbk-center{
    text-align: center;
    flex: 1;
    line-height: 1.05;
  }
  .mbk-page-title{
    color:#000;
    font-weight: 900;
    font-size: 20px;
  }
  .mbk-brand{
    color:#0ea05a;
    font-weight: 900;
    font-size: 15px;
    margin-top: 3px;
  }
  .mbk-logo-vax{
    width: 56px;
    height: 56px;
    object-fit: contain;
  }
  .mbk-back-pill{
    width: 44px;
    height: 44px;
    border-radius: 999px;
    background: #fff;
    border: 2px solid #0ea05a;
    color: #0b7f47;
    font-weight: 900;
    font-size: 13px;
    cursor: pointer;
  }

  /* ===== Bottom Bar (Murabbik) ===== */
  .mbk-bottombar{
    position: fixed;
    left: 0; right: 0; bottom: 0;
    background: rgba(255,255,255,.96);
    border-top: 1px solid #e2e8f0;
    padding: 10px 12px;
    z-index: 20;
  }
  .mbk-bottombar-wrap{
    max-width: 520px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
  }
  .mbk-btn{
    flex: 1;
    appearance: none;
    border-radius: 12px;
    padding: 12px 14px;
    font-weight: 900;
    font-size: 16px;
    cursor: pointer;
  }
  .mbk-btn-primary{
    border: 0;
    background: #0ea05a;
    color: #fff;
  }
  .mbk-btn-ghost{
    background: #fff;
    border: 2px solid #0ea05a;
    color: #0b7f47;
  }

  /* ===== Center everything between header & bottom bar ===== */
  .mbk-main{
    max-width: 520px;
    margin: 0 auto;
    padding: 0 12px 92px; /* مساحة تحت عشان الشريط السفلي ما يغطيش المحتوى */
    box-sizing: border-box;
  }

  /* ===== Dose White Container ===== */
  .dose-container{
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    padding: 14px 12px;
    margin-top: 6px;
    box-shadow: 0 2px 6px rgba(0,0,0,.04);
  }
  .radio-group{
    display: flex;
    gap: 18px;
    align-items: center;
    justify-content: center;
  }
  .radio-group label{
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 700;
    cursor: pointer;
  }
  .radio-group input[type="radio"]{
    accent-color: #0ea05a;
  }

  /* ===== Bulk (Mobile First) ===== */
  .bulk-box{
    background:#fff;
    border:1px solid #e2e8f0;
    border-radius:14px;
    padding:12px;
    margin-top:8px;
  }
  .bulk-tools{
    display:grid;
    grid-template-columns: 1fr auto auto;
    gap:8px;
    align-items:center;
    margin-top:8px;
  }
  #bulkSearch{
    width:100%;
    padding:10px 12px;
    border:1px solid #cbd5e1;
    border-radius:12px;
    font-size:16px;
    box-sizing:border-box;
  }
  .bulk-list{
    margin-top:10px;
    max-height: 220px;
    overflow:auto;
    border:1px solid #e2e8f0;
    border-radius:12px;
    padding:6px;
  }
  .bulk-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:10px 10px;
    border-radius:10px;
    border:1px solid transparent;
    cursor:pointer;
    user-select:none;
  }
  .bulk-item:hover{ border-color:#cfe7d8; background:#f7faf7; }
  .bulk-item input{ width:18px; height:18px; accent-color:#0ea05a; }
  .bulk-num{ font-weight:900; color:#0f172a; }
  .bulk-hint{ margin-top:8px; font-size:12px; color:#64748b; text-align:center; }

  /* ===== Entry Mode Pills ===== */
  .mode-container{
    background:#fff;
    border:1px solid #e2e8f0;
    border-radius:14px;
    padding:10px;
    margin-top:6px;
    box-shadow: 0 2px 6px rgba(0,0,0,.04);
  }
  .mode-pills{
    display:flex;
    justify-content:center;
    gap:12px;
  }
  .mode-pills .pill{
    padding:8px 22px;
    border-radius:999px;
    border:2px solid #0ea05a;
    font-weight:900;
    cursor:pointer;
    color:#0b7f47;
    transition:all .2s ease;
    user-select:none;
  }
  #modeSingle:checked + label,
  #modeBulk:checked + label{
    background:#0ea05a;
    color:#fff;
  }
  </style>
</head>

<body>
  <header class="mbk-head-vax">
    <div class="mbk-right">
      <button type="button" id="backToEventsBtn" class="mbk-back-pill">رجوع</button>
    </div>

    <div class="mbk-center">
      <div class="mbk-page-title">تسجيل التحصين</div>
      <div class="mbk-brand">مُرَبِّيك</div>
    </div>

    <div class="mbk-left">
      <img src="/images/logo.png" class="mbk-logo-vax" alt="مُرَبِّيك">
    </div>
  </header>

  <main class="mbk-main">
    <div class="context">
      <span id="ctxAnimal" class="pill">الحيوان: غير محدد</span>
      <span id="ctxDate" class="pill">التاريخ: —</span>
    </div>

    <div class="card">
      <form id="vaccinationForm" data-event="تحصين" novalidate>
        <div class="row row-2">
          <div>
            <label for="animalNumber">رقم الحيوان</label>

            <div class="mode-container">
              <div class="mode-pills">
                <input type="radio" id="modeSingle" name="entryMode" value="single" checked hidden>
                <label for="modeSingle" class="pill">فردي</label>

                <input type="radio" id="modeBulk" name="entryMode" value="bulk" hidden>
                <label for="modeBulk" class="pill">جماعي</label>
              </div>
            </div>

            <div id="bulkBox" class="bulk-box" style="display:none;">
              <label>اختيار الحيوانات (جماعي)</label>

<div id="bulkList" class="bulk-list" role="listbox" aria-label="قائمة الحيوانات"></div>

<div class="bulk-hint">الأرقام مرسلة من صفحة الأحداث.</div>
            </div>

            <input id="animalNumber" data-field="animalNumber" type="text" placeholder="مثال: 105"/>
          </div>

          <div>
            <label for="eventDate">التاريخ</label>
            <input id="eventDate" data-field="eventDate" type="date"/>
          </div>
        </div>

        <div class="row">
          <div>
            <label for="vaccine">نوع التحصين</label>
            <select id="vaccine" data-field="vaccine">
              <option value="" selected disabled>اختر نوع التحصين</option>
              <option value="الحمى القلاعية (FMD)">الحمى القلاعية (FMD)</option>
              <option value="الجلد العقدي (LSD)">الجلد العقدي (LSD)</option>
              <option value="التسمم المعوي (Clostridial)">التسمم المعوي (Clostridial)</option>
              <option value="البروسيلا (Brucella)">البروسيلا (Brucella)</option>
              <option value="IBR">IBR</option>
              <option value="BVD">BVD</option>
              <option value="الجمرة الخبيثة (Anthrax)">الجمرة الخبيثة (Anthrax)</option>
              <option value="الباستريلا/التهاب رئوي (HS/Pasteurella)">الباستريلا/التهاب رئوي (HS/Pasteurella)</option>
            </select>
          </div>
        </div>

       <label>نوع الجرعة</label>
<div class="dose-container">
  <div class="radio-group">
    <label>
      <input type="radio" name="doseType" data-field="doseType" value="prime"/>
      تأسيس لأول مرة
    </label>
    <label>
      <input type="radio" name="doseType" data-field="doseType" value="periodic"/>
      جرعة دورية (متابعة)
    </label>
  </div>
</div>

       
      </form>
    </div>
  </main>

  <div class="mbk-bottombar">
    <div class="mbk-bottombar-wrap">
      <button id="saveBtn" class="mbk-btn mbk-btn-primary" type="submit" form="vaccinationForm">💾 تسجيل التحصين</button>
      <button id="dashBtn" class="mbk-btn mbk-btn-ghost" type="button">لوحة التحكم</button>
    </div>
  </div>

 <script>
  // ============================================================
  // Murabbik Vaccination — Server-only page
  // لا Firebase — لا forms-init — لا form-rules — لا حفظ من المتصفح
  // ============================================================

  const ctxAnimal  = document.getElementById("ctxAnimal");
  const ctxDate    = document.getElementById("ctxDate");
  const form       = document.getElementById("vaccinationForm");
  const animalNumberEl = document.getElementById("animalNumber");
  const eventDateEl = document.getElementById("eventDate");
  const vaccineEl  = document.getElementById("vaccine");
  const saveBtn    = document.getElementById("saveBtn");
  const dashBtn    = document.getElementById("dashBtn");
 

  const bulkBox       = document.getElementById("bulkBox");
  const bulkList      = document.getElementById("bulkList");
  const bulkSelected = new Set();
  let bulkAllNumbers = [];
  let bulkHasData = false;
  let bulkLoading = false;
   let lastGateAllowed = false;

  function getUid() {
    try {
      return String(
        localStorage.getItem("userId") ||
        localStorage.getItem("uid") ||
        localStorage.getItem("tenantId") ||
        ""
      ).trim();
    } catch (_) {
      return "";
    }
  }

  function apiBase() {
    try {
      return String(
        window.API_BASE ||
        localStorage.getItem("API_BASE") ||
        ""
      ).replace(/\/$/, "");
    } catch (_) {
      return "";
    }
  }

  function apiUrl(path) {
    const base = apiBase();
    return base ? `${base}${path}` : path;
  }

  function msg(text, type = "warning") {
    let bar =
      document.getElementById("mbk-infobar") ||
      document.getElementById("sysbar") ||
      document.getElementById("infobar") ||
      document.querySelector(".infobar");

    if (!bar) {
      bar = document.createElement("div");
      bar.id = "mbk-infobar";
      bar.className = "infobar mbk-infobar";
      bar.style.display = "none";

      const main = document.querySelector(".mbk-main");
      if (main) {
        main.insertBefore(bar, main.firstChild);
      } else {
        document.body.insertBefore(bar, document.body.firstChild);
      }
    }

    const cls =
      type === "success" ? "success" :
      type === "error" ? "error" :
      type === "info" ? "info" :
      "warning";

    bar.className = `infobar mbk-infobar show ${cls}`;
    bar.style.display = "block";
    bar.textContent = String(text || "");

    try {
      bar.scrollIntoView({ behavior: "smooth", block: "start" });
    } catch (_) {}
  }

 function showWarn(t) {
  const text = String(t || "").trim();
  if (!text) return;
  msg(text, "info");
}

function clearWarn() {
  // لا توجد رسالة أسفل الفورم؛ كل الرسائل في الـ Infobar
}
  function todayLocal() {
    const d = new Date();
    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    return d.toISOString().slice(0, 10);
  }

  function normalizeDigits(raw) {
    const map = {
      "٠":"0","١":"1","٢":"2","٣":"3","٤":"4","٥":"5","٦":"6","٧":"7","٨":"8","٩":"9",
      "۰":"0","۱":"1","۲":"2","۳":"3","۴":"4","۵":"5","۶":"6","۷":"7","۸":"8","۹":"9"
    };

    return String(raw || "")
      .trim()
      .replace(/[٠-٩۰-۹]/g, d => map[d] || d);
  }

  function parseNumbers(raw) {
    const s = normalizeDigits(raw);
    const arr = s.match(/\d+/g) || [];
    return [...new Set(
      arr.map(x => String(x || "").replace(/\D/g, "")).filter(Boolean)
    )];
  }

  function getDoseType() {
    return document.querySelector('input[name="doseType"]:checked')?.value || "";
  }

  function getMode() {
    return document.querySelector('input[name="entryMode"]:checked')?.value || "single";
  }

  function getSelectedNumbers() {
    if (getMode() === "bulk") {
      return [...bulkSelected].map(String).filter(Boolean);
    }

    return parseNumbers(animalNumberEl?.value || "");
  }

  function updateContext() {
    const nums = getSelectedNumbers();
    const first = nums[0] || animalNumberEl?.value || "";
    const dt = String(eventDateEl?.value || "").trim();

    if (ctxAnimal) {
      ctxAnimal.textContent =
        getMode() === "bulk"
          ? `الحيوانات: ${nums.length || 0}`
          : `الحيوان: ${String(first || "").trim() || "غير محدد"}`;
    }

    if (ctxDate) {
      try {
        ctxDate.textContent = dt
          ? `التاريخ: ${new Date(dt).toLocaleDateString("ar-EG")}`
          : "التاريخ: —";
      } catch (_) {
        ctxDate.textContent = `التاريخ: ${dt || "—"}`;
      }
    }
  }
async function postJson(path, body) {
  const uid = getUid();

  const r = await fetch(apiUrl(path), {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-User-Id": uid
    },
    body: JSON.stringify(body || {})
  });

  const data = await r.json().catch(() => ({
    ok: false,
    message: "تعذّر قراءة رد السيرفر."
  }));

  if (!r.ok && data.ok !== true) {
    data.ok = false;
  }

  return data;
}

  function collectPayload() {
    const numbers = getSelectedNumbers();
    const eventDate = String(eventDateEl?.value || "").trim().slice(0, 10);
    const vaccine = String(vaccineEl?.value || "").trim();
    const doseType = getDoseType();

    return {
      animalNumbers: numbers,
      animalNumber: numbers.join(","),
      eventDate,
      date: eventDate,
      vaccine,
      doseType
    };
  }
function renderServerResult(result = {}) {
  const accepted = Array.isArray(result.accepted)
    ? result.accepted
    : (Array.isArray(result.saved) ? result.saved : []);

  const rejected = Array.isArray(result.rejected) ? result.rejected : [];

  const acceptedNums = accepted
    .map(x => String(x.animalNumber || "").trim())
    .filter(Boolean);

  const rejectedRows = rejected
    .map(x => {
      const n = String(x.animalNumber || "").trim();
      const reason = String(x.reason || "مرفوض").trim();
      return n ? `${n} — ${reason}` : reason;
    })
    .filter(Boolean);

  const lines = [];

  if (acceptedNums.length) {
    lines.push(`✅ المقبول (${acceptedNums.length}): ${acceptedNums.join("، ")}`);
  }

  if (rejectedRows.length) {
    lines.push(`❌ المرفوض (${rejectedRows.length}):\n${rejectedRows.join("\n")}`);
  }

  showWarn(lines.join("\n\n"));
}
  async function submitVaccination(ev) {
    ev.preventDefault();
    clearWarn();

    const payload = collectPayload();
   

    try {
      saveBtn.disabled = true;
      msg("جارِ التحقق من التحصين…", "info");

      const gate = await postJson("/api/vaccination/gate", payload);

if (!gate.ok || !gate.allowed) {
  lastGateAllowed = false;

  msg(gate.message || "تعذّر عرض رد السيرفر.", "error");
  renderServerResult(gate);

  if (saveBtn) saveBtn.disabled = true;
  return;
}
      const acceptedNumbers = Array.isArray(gate.accepted)
        ? gate.accepted.map(x => String(x.animalNumber || "").trim()).filter(Boolean)
        : [];
      renderServerResult(gate);
      if (!acceptedNumbers.length) {
        msg("❌ لا يوجد أي رقم صالح لتسجيل التحصين.", "error");
        return;
      }

      const savePayload = {
        ...payload,
        animalNumbers: acceptedNumbers,
        accepted: gate.accepted || []
      };

      msg("جارِ حفظ التحصين…", "info");

      const saved = await postJson("/api/vaccination/save", savePayload);

if (!saved.ok) {
  msg(saved.message || "تعذّر حفظ التحصين.", "error");
  renderServerResult(saved);
  return;
}

      const successMsg =
  saved.message ||
  `✅ تم حفظ التحصين بنجاح لعدد ${saved.savedCount || acceptedNumbers.length}.`;

msg(successMsg, "success");
renderServerResult(saved);
      const firstNumber =
        saved?.saved?.[0]?.animalNumber ||
        acceptedNumbers[0] ||
        "";

      if (firstNumber && acceptedNumbers.length === 1) {
        setTimeout(() => {
          location.href = `event-list.html?number=${encodeURIComponent(firstNumber)}`;
        }, 900);
      }

    } catch (err) {
      console.error("vaccination server-only save failed:", err);
      msg("تعذّر الاتصال بالسيرفر أثناء حفظ التحصين.", "error");
} finally {
  if (lastGateAllowed) {
    saveBtn.disabled = false;
  }
}
  }
async function runServerGate(reason = "page_load") {
  clearWarn();

  const payload = collectPayload();

  // الصفحة لا تقرر. فقط لا ترسل Gate ناقص بلا رقم أو تاريخ.
  if (!payload.animalNumbers.length && !payload.eventDate && !payload.vaccine && !payload.doseType) {
  return;
}

  try {
    if (saveBtn) saveBtn.disabled = true;

    msg("جارِ التحقق من بيانات التحصين…", "info");

    const gate = await postJson("/api/vaccination/gate", payload);

   if (!gate.ok || !gate.allowed) {
  lastGateAllowed = false;

  msg(gate.message || "تعذّر عرض رد السيرفر.", "error");
  renderServerResult(gate);

  if (saveBtn) saveBtn.disabled = true;
  return;
}

    lastGateAllowed = true;
    if (saveBtn) saveBtn.disabled = false;

    msg(gate.message || "✅ مسموح بتسجيل التحصين.", "success");
    renderServerResult(gate);

  } catch (err) {
    console.error("vaccination gate failed:", err);

    lastGateAllowed = false;
    if (saveBtn) saveBtn.disabled = true;
    msg("تعذّر التحقق من بيانات التحصين من السيرفر.", "error");
  }
}
  function applyModeUI() {
    const isBulk = getMode() === "bulk";

    if (bulkBox) bulkBox.style.display = isBulk ? "block" : "none";
    if (animalNumberEl) {
      animalNumberEl.disabled = isBulk;
      animalNumberEl.readOnly = false;
    }

    renderBulkList();
    updateContext();
  }

function renderBulkList() {
  if (!bulkList) return;

  const list = [...bulkSelected].map(String).filter(Boolean);

  bulkList.innerHTML = "";

  for (const num of list) {
    const row = document.createElement("div");
    row.className = "bulk-item";
    row.setAttribute("role", "option");

    const left = document.createElement("div");
    left.className = "bulk-num";
    left.textContent = num;

    row.appendChild(left);
    bulkList.appendChild(row);
  }
}
  function hydrate() {
    const qp = new URLSearchParams(location.search);

const rawNumberParam =
  qp.get("number") ||
  qp.get("animalNumber") ||
  qp.get("animalId") ||
  "";

const dt = qp.get("date") || qp.get("eventDate") || todayLocal();

const entryMode = String(
  qp.get("entryMode") ||
  qp.get("mode") ||
  ""
).toLowerCase();

const numbersFromUrl =
  qp.get("numbers") ||
  qp.get("animalNumbers") ||
  (entryMode === "bulk" ? rawNumberParam : "") ||
  "";

const numberFromUrl =
  numbersFromUrl
    ? ""
    : (rawNumberParam || localStorage.getItem("lastAnimalId") || "");
    const vaccine = String(qp.get("vaccine") || "").trim();
    const doseType = String(qp.get("doseType") || "").toLowerCase();

    if (entryMode === "bulk" || numbersFromUrl) {
      const r = document.getElementById("modeBulk");
      if (r) r.checked = true;
    } else {
      const r = document.getElementById("modeSingle");
      if (r) r.checked = true;
    }

    if (eventDateEl) eventDateEl.value = dt;

    if (vaccineEl && vaccine) {
      const found = [...vaccineEl.options].some(o => o.value === vaccine);
      if (found) vaccineEl.value = vaccine;
    }

    if (doseType === "prime" || doseType === "periodic") {
      const r = document.querySelector(`input[name="doseType"][value="${doseType}"]`);
      if (r) r.checked = true;
    }

    if (numbersFromUrl) {
      for (const n of parseNumbers(numbersFromUrl)) {
        bulkSelected.add(n);
      }
    }

    if (animalNumberEl && !numbersFromUrl) {
      animalNumberEl.value = parseNumbers(numberFromUrl)[0] || "";
    }

   applyModeUI();
   updateContext();
   runServerGate("page_load");
  }

  dashBtn?.addEventListener("click", () => {
    location.href = "dashboard.html";
  });

  form?.addEventListener("submit", submitVaccination);

 animalNumberEl?.addEventListener("input", () => {
  updateContext();
  runServerGate("animal_change");
});

 eventDateEl?.addEventListener("input", () => {
  updateContext();
  runServerGate("date_change");
});
vaccineEl?.addEventListener("change", () => {
  runServerGate("vaccine_change");
});
  document.querySelectorAll('input[name="entryMode"]').forEach(r => {
    r.addEventListener("change", applyModeUI);
  });



  const backBtn = document.getElementById("backToEventsBtn");
  backBtn?.addEventListener("click", () => {
    const nums = getSelectedNumbers();
    const id = nums[0] || "";
    const dt = String(eventDateEl?.value || "").trim() || todayLocal();
    location.href = `add-event.html?number=${encodeURIComponent(id)}&date=${encodeURIComponent(dt)}`;
  });

  hydrate();
</script>
</body>
</html>
