<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="stylesheet" href="css/forms.css">
  <title>تسجيل التحصين</title>
  
</head>

<body>
 <header class="mbk-top">
  <div class="mbk-head">
    <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">

    <div class="mbk-title">
      <div class="mbk-page">تسجيل التحصين</div>
      <div class="mbk-app">مُرَبِّيك</div>
    </div>

    <a id="backToEventsBtn" class="mbk-back" href="add-event.html" aria-label="رجوع">رجوع</a>
  </div>
</header>

  <main class="mbk-main">
    <div class="context">
      <span id="ctxAnimal" class="pill">الحيوان: غير محدد</span>
      <span id="ctxDate" class="pill">التاريخ: —</span>
    </div>

    <div class="card">
      <form id="vaccinationForm" data-event="تحصين" novalidate>

        <section
          id="programChoiceSection"
          class="mbk-vax-program"
          aria-labelledby="programChoiceTitle"
        >
          <div class="mbk-vax-program-head">
            <h2 id="programChoiceTitle" class="mbk-vax-program-title">
              كيف تريد إدارة تحصينات مزرعتك؟
            </h2>

            <p class="mbk-vax-program-subtitle">
              هل لديك برنامج تحصين للمزرعة أم تستخدم برنامج مُرَبِّيك الخبير؟
            </p>
          </div>

          <div class="mbk-vax-program-options">

            <label class="mbk-vax-program-option">
              <input
                type="radio"
                name="programMode"
                data-field="programMode"
                value="farm"
              />

              <span class="mbk-vax-program-option-body">
                <span class="mbk-vax-program-option-kicker">
                  لدي برنامج جاهز
                </span>

                <strong class="mbk-vax-program-option-title">
                  استخدام برنامج المزرعة
                </strong>

                <span class="mbk-vax-program-option-text">
                  سجّل البرنامج الذي تعتمد عليه مزرعتك، وسيتابع مُرَبِّيك مواعيده بالتنبيهات الذكية دون تغيير البرنامج.
                </span>

                <span class="mbk-vax-program-option-action">
                  اختيار برنامج المزرعة
                </span>
              </span>
            </label>

            <label class="mbk-vax-program-option">
              <input
                type="radio"
                name="programMode"
                data-field="programMode"
                value="murabbik_default"
              />

              <span class="mbk-vax-program-option-body">
                <span class="mbk-vax-program-option-kicker">
                  أحتاج إلى الدعم
                </span>

                <strong class="mbk-vax-program-option-title">
                  استخدام برنامج مُرَبِّيك الخبير
                </strong>

                <span class="mbk-vax-program-option-text">
                  يجهّز السيرفر برنامج مُرَبِّيك العلمي الافتراضي للقطيع، ويتابع الجرعات والمواعيد والتنبيهات.
                </span>

                <span class="mbk-vax-program-option-action">
                  استخدام برنامج مُرَبِّيك
                </span>
              </span>
            </label>

          </div>

          <div
            id="programSelectionStatus"
            class="form-hint mbk-vax-program-status"
            aria-live="polite"
          >
            اختر البرنامج الذي ستُدار عليه تحصينات المزرعة.
          </div>

          <div
            id="programCurrentCard"
            class="mbk-vax-program-current hidden-block"
            aria-live="polite"
          >
            <span class="mbk-vax-program-current-label">
              برنامج التحصينات الحالي
            </span>

            <strong
              id="programCurrentName"
              class="mbk-vax-program-current-name"
            >
              —
            </strong>

            <p
              id="programCurrentMessage"
              class="mbk-vax-program-current-message"
            ></p>
          </div>
        </section>

        <div class="row row-2">
          <div>
            <label for="animalNumber">رقم الحيوان</label>

           

<div id="bulkBox" class="hidden-block">
  <label>الأرقام الجماعية</label>

  <div id="bulkList" class="steps-list" role="listbox" aria-label="قائمة الحيوانات"></div>

  <div class="form-hint">الأرقام مرسلة من صفحة الأحداث.</div>
</div>
            <input id="animalNumber" data-field="animalNumber" type="text" placeholder="مثال: 105"/>
          </div>

          <div>
            <label for="eventDate">التاريخ</label>
            <input id="eventDate" data-field="eventDate" type="date"/>
          </div>
        </div>

        <div class="row">
          <div>
            <label for="vaccine">نوع التحصين</label>
            <select id="vaccine" data-field="vaccine">
              <option value="" selected disabled>اختر نوع التحصين</option>
              <option value="الحمى القلاعية (FMD)">الحمى القلاعية (FMD)</option>
              <option value="الجلد العقدي (LSD)">الجلد العقدي (LSD)</option>
              <option value="التسمم المعوي (Clostridial)">التسمم المعوي (Clostridial)</option>
              <option value="البروسيلا (Brucella)">البروسيلا (Brucella)</option>
              <option value="IBR">IBR</option>
              <option value="BVD">BVD</option>
              <option value="الجمرة الخبيثة (Anthrax)">الجمرة الخبيثة (Anthrax)</option>
              <option value="الباستريلا/التهاب رئوي (HS/Pasteurella)">الباستريلا/التهاب رئوي (HS/Pasteurella)</option>
            </select>
          </div>
        </div>

<fieldset>
  <legend>نوع الجرعة</legend>
  <div class="radio-group">
    <label>
      <input type="radio" name="doseType" data-field="doseType" value="prime"/>
      تأسيس لأول مرة
    </label>
    <label>
      <input type="radio" name="doseType" data-field="doseType" value="periodic"/>
      جرعة دورية (متابعة)
    </label>
  </div>
</fieldset>

       
      </form>
    </div>
  </main>

 <div class="actions-bar">
  <button id="saveBtn" class="save" type="submit" form="vaccinationForm">💾 تسجيل التحصين</button>
  <button id="dashBtn" class="ghost" type="button">لوحة التحكم</button>
</div>
 

 <script>
  // ============================================================
  // Murabbik Vaccination — Server-only page
  // لا Firebase — لا forms-init — لا form-rules — لا حفظ من المتصفح
  // ============================================================

  const ctxAnimal  = document.getElementById("ctxAnimal");
  const ctxDate    = document.getElementById("ctxDate");
  const form       = document.getElementById("vaccinationForm");
  const animalNumberEl = document.getElementById("animalNumber");
  const eventDateEl = document.getElementById("eventDate");
  const vaccineEl  = document.getElementById("vaccine");
  const saveBtn    = document.getElementById("saveBtn");
  const dashBtn    = document.getElementById("dashBtn");

  const programSelectionStatus =
    document.getElementById("programSelectionStatus");

  const programCurrentCard =
    document.getElementById("programCurrentCard");

  const programCurrentName =
    document.getElementById("programCurrentName");

  const programCurrentMessage =
    document.getElementById("programCurrentMessage");
 

  const bulkBox       = document.getElementById("bulkBox");
  const bulkList      = document.getElementById("bulkList");
  const bulkSelected = new Set();
  let pageMode = "single";
  let lastGateAllowed = false;

  function msg(text, type = "warning") {
    let bar =
      document.getElementById("mbk-infobar") ||
      document.getElementById("sysbar") ||
      document.getElementById("infobar") ||
      document.querySelector(".infobar");

    if (!bar) {
      bar = document.createElement("div");
      bar.id = "mbk-infobar";
      bar.className = "infobar mbk-infobar";
      bar.style.display = "none";

      const main = document.querySelector(".mbk-main");
      if (main) {
        main.insertBefore(bar, main.firstChild);
      } else {
        document.body.insertBefore(bar, document.body.firstChild);
      }
    }

    const cls =
      type === "success" ? "success" :
      type === "error" ? "error" :
      type === "info" ? "info" :
      "warning";

    bar.className = `infobar mbk-infobar show ${cls}`;
    bar.style.display = "block";
    bar.textContent = String(text || "");

    try {
      bar.scrollIntoView({ behavior: "smooth", block: "start" });
    } catch (_) {}
  }

 function showWarn(t) {
  const text = String(t || "").trim();
  if (!text) return;

  let bar =
    document.getElementById("mbk-infobar") ||
    document.getElementById("sysbar") ||
    document.getElementById("infobar") ||
    document.querySelector(".infobar");

  if (!bar) {
    msg(text, "info");
    return;
  }

  const old = String(bar.textContent || "").trim();
  bar.textContent = old ? `${old}\n\n${text}` : text;
  bar.style.whiteSpace = "pre-line";
  bar.style.display = "block";
}

function clearWarn() {
  // لا توجد رسالة أسفل الفورم؛ كل الرسائل في الـ Infobar
}
  function todayLocal() {
    const d = new Date();
    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    return d.toISOString().slice(0, 10);
  }

  function normalizeDigits(raw) {
    const map = {
      "٠":"0","١":"1","٢":"2","٣":"3","٤":"4","٥":"5","٦":"6","٧":"7","٨":"8","٩":"9",
      "۰":"0","۱":"1","۲":"2","۳":"3","۴":"4","۵":"5","۶":"6","۷":"7","۸":"8","۹":"9"
    };

    return String(raw || "")
      .trim()
      .replace(/[٠-٩۰-۹]/g, d => map[d] || d);
  }

  function parseNumbers(raw) {
    const s = normalizeDigits(raw);
    const arr = s.match(/\d+/g) || [];
    return [...new Set(
      arr.map(x => String(x || "").replace(/\D/g, "")).filter(Boolean)
    )];
  }

  function getDoseType() {
    return document.querySelector('input[name="doseType"]:checked')?.value || "";
  }
   function getProgramMode() {
    return document.querySelector(
      'input[name="programMode"]:checked'
    )?.value || "";
  }

  function renderProgramChoice() {
    const mode = getProgramMode();

    document
      .querySelectorAll(".mbk-vax-program-option")
      .forEach(option => {
        const input = option.querySelector(
          'input[name="programMode"]'
        );

        option.classList.toggle(
          "is-selected",
          Boolean(input?.checked)
        );
      });

    if (!programSelectionStatus) return;

    if (mode === "farm") {
      programSelectionStatus.textContent =
        "تم اختيار برنامج المزرعة. سيعرض السيرفر البرنامج المسجل أو خطوات إدخاله.";
      return;
    }

    if (mode === "murabbik_default") {
      programSelectionStatus.textContent =
        "تم اختيار برنامج مُرَبِّيك الخبير. سيعرض السيرفر البرنامج الافتراضي المعتمد للقطيع.";
      return;
    }

    programSelectionStatus.textContent =
      "اختر البرنامج الذي ستُدار عليه تحصينات المزرعة.";
  }

  function renderProgramContext(result = {}) {
    const context =
      result?.programContext &&
      typeof result.programContext === "object"
        ? result.programContext
        : null;

    if (!context) return;

    const serverMode = String(
      context.programMode ||
      context.mode ||
      ""
    ).trim();

    if (
      serverMode === "farm" ||
      serverMode === "murabbik_default"
    ) {
      const radio = document.querySelector(
        `input[name="programMode"][value="${serverMode}"]`
      );

      if (radio) radio.checked = true;
    }

    const programLabel = String(
      context.programLabel ||
      context.label ||
      ""
    ).trim();

    const programMessage = String(
      context.message ||
      ""
    ).trim();

    if (programCurrentName) {
      programCurrentName.textContent = programLabel || "—";
    }

    if (programCurrentMessage) {
      programCurrentMessage.textContent = programMessage;
    }

    if (programCurrentCard) {
      programCurrentCard.classList.toggle(
        "hidden-block",
        !programLabel && !programMessage
      );
    }

    renderProgramChoice();
  }
 function getMode() {
  return pageMode;
}

  function getSelectedNumbers() {
    if (getMode() === "bulk") {
      return [...bulkSelected].map(String).filter(Boolean);
    }

    return parseNumbers(animalNumberEl?.value || "");
  }

  function updateContext() {
    const nums = getSelectedNumbers();
    const first = nums[0] || animalNumberEl?.value || "";
    const dt = String(eventDateEl?.value || "").trim();

   if (ctxAnimal) {
  ctxAnimal.textContent =
    getMode() === "bulk"
      ? `عدد الحيوانات: ${nums.length || 0}`
      : `رقم الحيوان: ${String(first || "").trim() || "غير محدد"}`;
}

    if (ctxDate) {
      try {
       ctxDate.textContent = dt
  ? `تاريخ التحصين: ${new Date(dt).toLocaleDateString("ar-EG")}`
  : "تاريخ التحصين: —";
      } catch (_) {
        ctxDate.textContent = `تاريخ التحصين: ${dt || "—"}`;
      }
    }
  }
async function postJson(path, body) {
  const r = await fetch(path, {
    method: "POST",
    credentials: "same-origin",
    cache: "no-store",
    headers: {
      "Content-Type": "application/json",
      "Accept": "application/json"
    },
    body: JSON.stringify(body || {})
  });

  const data = await r.json().catch(() => ({
    ok: false,
    message: "تعذّر قراءة رد السيرفر."
  }));

  if (r.status === 401 || data?.error === "auth_required") {
    return {
      ok: false,
      allowed: false,
      error: "auth_required",
      message: data?.message || "❌ سجّل الدخول أولًا.",
      accepted: [],
      rejected: []
    };
  }

  if (!r.ok && data.ok !== true) {
    data.ok = false;
  }

  return data;
}

  function collectPayload() {
    const numbers = getSelectedNumbers();
    const eventDate = String(eventDateEl?.value || "").trim().slice(0, 10);
     const vaccine = String(vaccineEl?.value || "").trim();
    const doseType = getDoseType();
    const programMode = getProgramMode();

    return {
      animalNumbers: numbers,
      animalNumber: numbers.join(","),
      eventDate,
      date: eventDate,
      vaccine,
      doseType,
      programMode
    };
  }
function renderServerResult(result = {}) {
  const accepted = Array.isArray(result.accepted)
    ? result.accepted
    : (Array.isArray(result.saved) ? result.saved : []);

  const rejected = Array.isArray(result.rejected) ? result.rejected : [];

  const acceptedNums = accepted
    .map(x => String(x.animalNumber || "").trim())
    .filter(Boolean);

  const rejectedRows = rejected
    .map(x => {
      const n = String(x.animalNumber || "").trim();
      const reason = String(x.reason || "مرفوض").trim();
      return n ? `${n} — ${reason}` : reason;
    })
    .filter(Boolean);

  const lines = [];

  if (acceptedNums.length) {
    lines.push(`✅ المقبول (${acceptedNums.length}): ${acceptedNums.join("، ")}`);
  }

  if (rejectedRows.length) {
    lines.push(`❌ المرفوض (${rejectedRows.length}):\n${rejectedRows.join("\n")}`);
  }

  showWarn(lines.join("\n\n"));
}
  async function submitVaccination(ev) {
    ev.preventDefault();
    clearWarn();

    const payload = collectPayload();
   

    try {
      saveBtn.disabled = true;
      msg("جارِ التحقق من التحصين…", "info");

      const gate = await postJson("/api/vaccination/gate", payload);

      renderProgramContext(gate);

if (!gate.ok || !gate.allowed) {
  lastGateAllowed = false;

  if (gate.silent === true) {
    const bar =
      document.getElementById("mbk-infobar") ||
      document.getElementById("sysbar") ||
      document.getElementById("infobar") ||
      document.querySelector(".infobar");

    if (bar) {
      bar.className = "infobar mbk-infobar";
      bar.style.display = "none";
      bar.textContent = "";
    }

    renderServerResult(gate);

    if (saveBtn) saveBtn.disabled = true;
    return;
  }

  msg(gate.message || "تعذّر عرض رد السيرفر.", "error");
  renderServerResult(gate);

  if (saveBtn) saveBtn.disabled = true;
  return;
}
      const acceptedNumbers = Array.isArray(gate.accepted)
        ? gate.accepted.map(x => String(x.animalNumber || "").trim()).filter(Boolean)
        : [];
      renderServerResult(gate);
      if (!acceptedNumbers.length) {
        msg("❌ لا يوجد أي رقم صالح لتسجيل التحصين.", "error");
        return;
      }

      const savePayload = {
        ...payload,
        animalNumbers: acceptedNumbers,
        accepted: gate.accepted || []
      };

      msg("جارِ حفظ التحصين…", "info");

      const saved = await postJson("/api/vaccination/save", savePayload);

      renderProgramContext(saved);

if (!saved.ok) {
  msg(saved.message || "تعذّر حفظ التحصين.", "error");
  renderServerResult(saved);
  return;
}

      const successMsg =
  saved.message ||
  `✅ تم حفظ التحصين بنجاح لعدد ${saved.savedCount || acceptedNumbers.length}.`;

msg(successMsg, "success");
renderServerResult(saved);
      const firstNumber =
        saved?.saved?.[0]?.animalNumber ||
        acceptedNumbers[0] ||
        "";

      if (firstNumber && acceptedNumbers.length === 1) {
        setTimeout(() => {
          location.href = `event-list.html?number=${encodeURIComponent(firstNumber)}`;
        }, 900);
      }

    } catch (err) {
      console.error("vaccination server-only save failed:", err);
      msg("تعذّر الاتصال بالسيرفر أثناء حفظ التحصين.", "error");
} finally {
  if (lastGateAllowed) {
    saveBtn.disabled = false;
  }
}
  }
async function runServerGate(reason = "page_load") {
  clearWarn();

  const payload = collectPayload();

  // الصفحة لا تقرر. فقط لا ترسل Gate ناقص بلا رقم أو تاريخ.
    if (
    !payload.animalNumbers.length &&
    !payload.eventDate &&
    !payload.vaccine &&
    !payload.doseType &&
    !payload.programMode
  ) {
    return;
  }

  try {
    if (saveBtn) saveBtn.disabled = true;

    msg("جارِ التحقق من بيانات التحصين…", "info");

    const gate = await postJson("/api/vaccination/gate", payload);

    renderProgramContext(gate);

if (!gate.ok || !gate.allowed) {
  lastGateAllowed = false;

  if (gate.silent === true) {
    const bar =
      document.getElementById("mbk-infobar") ||
      document.getElementById("sysbar") ||
      document.getElementById("infobar") ||
      document.querySelector(".infobar");

    if (bar) {
      bar.className = "infobar mbk-infobar";
      bar.style.display = "none";
      bar.textContent = "";
    }

    renderServerResult(gate);

    if (saveBtn) saveBtn.disabled = true;
    return;
  }

  msg(gate.message || "تعذّر عرض رد السيرفر.", "error");
  renderServerResult(gate);

  if (saveBtn) saveBtn.disabled = true;
  return;
}

    lastGateAllowed = true;
    if (saveBtn) saveBtn.disabled = false;

    msg(gate.message || "✅ مسموح بتسجيل التحصين.", "success");
    renderServerResult(gate);

  } catch (err) {
    console.error("vaccination gate failed:", err);

    lastGateAllowed = false;
    if (saveBtn) saveBtn.disabled = true;
    msg("تعذّر التحقق من بيانات التحصين من السيرفر.", "error");
  }
}
  function applyModeUI() {
    const isBulk = getMode() === "bulk";

    if (bulkBox) bulkBox.classList.toggle("hidden-block", !isBulk);
    if (animalNumberEl) {
      animalNumberEl.disabled = isBulk;
      animalNumberEl.readOnly = false;
    }

    renderBulkList();
    updateContext();
  }

function renderBulkList() {
  if (!bulkList) return;

  const list = [...bulkSelected].map(String).filter(Boolean);

  bulkList.innerHTML = "";

  for (const num of list) {
    const row = document.createElement("div");
   row.className = "step-item";
    row.setAttribute("role", "option");

    const left = document.createElement("div");
    left.className = "name";
    left.textContent = num;

    row.appendChild(left);
    bulkList.appendChild(row);
  }
}
  function hydrate() {
    const qp = new URLSearchParams(location.search);

const rawNumberParam =
  qp.get("number") ||
  qp.get("animalNumber") ||
  qp.get("animalId") ||
  "";

const dt = qp.get("date") || qp.get("eventDate") || todayLocal();

const entryMode = String(
  qp.get("entryMode") ||
  qp.get("mode") ||
  ""
).toLowerCase();

const numbersFromUrl =
  qp.get("numbers") ||
  qp.get("animalNumbers") ||
  (entryMode === "bulk" ? rawNumberParam : "") ||
  "";

const numberFromUrl =
  numbersFromUrl
    ? ""
    : rawNumberParam;
    const vaccine = String(qp.get("vaccine") || "").trim();
    const doseType = String(qp.get("doseType") || "").toLowerCase();

   pageMode = (entryMode === "bulk" || numbersFromUrl) ? "bulk" : "single";

    if (eventDateEl) eventDateEl.value = dt;

    if (vaccineEl && vaccine) {
      const found = [...vaccineEl.options].some(o => o.value === vaccine);
      if (found) vaccineEl.value = vaccine;
    }

    if (doseType === "prime" || doseType === "periodic") {
      const r = document.querySelector(`input[name="doseType"][value="${doseType}"]`);
      if (r) r.checked = true;
    }

    if (numbersFromUrl) {
      for (const n of parseNumbers(numbersFromUrl)) {
        bulkSelected.add(n);
      }
    }

    if (animalNumberEl && !numbersFromUrl) {
      animalNumberEl.value = parseNumbers(numberFromUrl)[0] || "";
    }

   applyModeUI();
   updateContext();
   renderProgramChoice();
   runServerGate("page_load");
  }

  dashBtn?.addEventListener("click", () => {
    location.href = "dashboard.html";
  });

  form?.addEventListener("submit", submitVaccination);

 animalNumberEl?.addEventListener("input", () => {
  updateContext();
  runServerGate("animal_change");
});

 eventDateEl?.addEventListener("input", () => {
  updateContext();
  runServerGate("date_change");
});
vaccineEl?.addEventListener("change", () => {
  runServerGate("vaccine_change");
});

document
  .querySelectorAll('input[name="programMode"]')
  .forEach(input => {
    input.addEventListener("change", () => {
      renderProgramChoice();
      runServerGate("program_change");
    });
  });

 const backBtn = document.getElementById("backToEventsBtn");
backBtn?.addEventListener("click", () => {
  location.href = "add-event.html";
});

  hydrate();
</script>
</body>
</html>
