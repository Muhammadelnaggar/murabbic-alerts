<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>إضافة حيوان</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/forms.css">
  <script type="module" src="js/forms-init.js"></script>
  <style>
    
    body{
  padding-bottom:96px;
}
    .toast{display:none;position:relative;padding:12px 14px 12px 48px;border-radius:14px;background:#ecfdf5;border:1px solid #10b98133;color:#065f46;font-weight:700;box-shadow:0 8px 24px rgba(16,185,129,.15);margin-bottom:10px}
    .toast.show{display:block;animation:toast-pop .25s ease-out}
    .toast .icon{position:absolute;inset-inline-start:12px;top:50%;transform:translateY(-50%);width:22px;height:22px}
    .toast .bar{position:absolute;left:8px;right:8px;bottom:6px;height:3px;background:#d1fae5;border-radius:999px;overflow:hidden}
    .toast .bar span{display:block;height:100%;width:100%;background:#10b981;animation:toast-shrink 1.6s linear forwards}
    @keyframes toast-pop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
    @keyframes toast-shrink{from{width:100%}to{width:0%}}
    #msg.toast.show { display: block; }
    /* === Popup رسالة وسط الصفحة === */
.mbk-popup{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.25);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 99999;
}


.mbk-popup-content{
  background: #ffffff;
  padding: 20px 25px;
  border-radius: 14px;
  box-shadow: 0 6px 30px rgba(0,0,0,0.15);
  font-size: 17px;
  font-weight: bold;
  text-align: center;
  max-width: 80%;
  line-height: 1.6;
  border-inline-start: 6px solid #2e7d32;
}

.mbk-popup-success{
  border-inline-start-color: #2e7d32;
  color: #2e7d32;
}

.mbk-popup-error{
  border-inline-start-color: #c62828;
  color: #c62828;
}
.entry-type-box{
  display:flex;
  align-items:flex-end;
  justify-content:flex-start;
  gap:0;
  margin:8px 0 18px;
  padding:0;
  border-bottom:1px solid #e5e7eb;
}

.entry-tab{
  appearance:none;
  border:none;
  background:transparent;
  color:#6b7280;
  font-family:'Cairo',system-ui,sans-serif;
  font-size:15px;
  font-weight:800;
  padding:10px 14px 14px;
  margin:0;
  min-height:auto;
  border-radius:0;
  cursor:pointer;
  box-shadow:none;
  position:relative;

  width:auto !important;
  min-width:unset !important;
  max-width:none !important;
  flex:0 0 auto !important;
  display:inline-flex !important;
  align-items:center;
  justify-content:center;
}

.entry-tab:hover{
  background:transparent;
  color:#111827;
  transform:none;
  box-shadow:none;
}

.entry-tab:active{
  transform:none;
}

.entry-tab.active{
  background:transparent;
  color:#0e9f57;
  border:none;
  box-shadow:none;
}

.entry-tab.active::after{
  content:"";
  position:absolute;
  right:0;
  left:0;
  bottom:-1px;
  height:3px;
  border-radius:999px 999px 0 0;
  background:#0e9f57;
}

.entry-tab:focus-visible{
  outline:none;
  color:#111827;
  box-shadow:none;
}

@media (max-width:640px){
  .entry-type-box{
    overflow-x:auto;
    scrollbar-width:none;
  }

  .entry-type-box::-webkit-scrollbar{
    display:none;
  }

  .entry-tab{
    font-size:14px;
    padding:10px 12px 12px;
  }
}
  
.preview-wrap{
  display:block;
  width:100%;
  overflow-x:auto;
  overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  border:1px solid #e5e7eb;
  border-radius:14px;
  background:#fff;
  margin-top:12px;
}

.preview-wrap table{
  width:max-content;
  min-width:1200px;
  border-collapse:collapse;
  font-size:14px;
}

.preview-wrap th,
.preview-wrap td{
  white-space:nowrap;
  padding:10px 12px;
  border-bottom:1px solid #eef2f7;
  text-align:right;
}

.preview-wrap thead th{
  position:sticky;
  top:0;
  background:#f8fafc;
  z-index:1;
  font-weight:800;
}
.mbk-page-bottom-bar{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:9998;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px 12px calc(10px + env(safe-area-inset-bottom));
  background:#ffffff;
  border-top:1px solid #e5e7eb;
  box-shadow:0 -6px 20px rgba(15,23,42,.06);
}

.mbk-bottom-btn{
  appearance:none;
  min-height:50px;
  border-radius:14px;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Cairo',system-ui,sans-serif;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
  transition:transform .12s ease, box-shadow .18s ease, background .18s ease, color .18s ease;
}

.mbk-bottom-btn:active{
  transform:scale(.985);
}

.mbk-bottom-btn-primary{
  border:none;
  background:#16a34a;
  color:#fff;
  box-shadow:0 8px 18px rgba(22,163,74,.18);
}

.mbk-bottom-btn-ghost{
  border:1px solid #dbe4dc;
  background:#fff;
  color:#0f172a;
  box-shadow:0 4px 12px rgba(15,23,42,.05);
}

@media (max-width:640px){
  .mbk-page-bottom-bar{
    grid-template-columns:1fr 1fr;
    gap:8px;
  }

 .mbk-bottom-btn{
  min-height:48px;
  font-size:14px;
}
.btn-row{
  margin-top:14px;
  }
}
  </style>

</head>
<body>
  <script type="module">
  import { protectPage, lockBackButton } from "/js/nav-guard.js";
  protectPage();
  lockBackButton();
</script>
 <header class="mbk-head">
  <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">
  <div class="mbk-center">
    <div class="mbk-title">إضافة حيوان جديد</div>
    <div class="mbk-sub">مُرَبِّيك</div>
  </div>
</header>
 <main class="mbk-main">
  <form id="animalForm" class="mbk-form">
    <div id="msg"></div>
<div id="entryTypeBox" class="entry-type-box">
  <button type="button" id="btnMothers" class="entry-tab active">أمهات</button>
  <button type="button" id="btnFollowers" class="entry-tab">توابع</button>
  <button type="button" id="btnImport" class="entry-tab">استيراد</button>
</div>

<input type="hidden" id="entryType" value="mothers" data-field="entryType" />

<div id="sharedAnimalFields">
  <label for="animalNumber">رقم الحيوان:</label>
  <input type="text" id="animalNumber" required data-field="animalNumber" />

  <label for="animalType">نوع الحيوان:</label>
  <select id="animalType" required data-field="animalType">
    <option value="">اختر النوع</option>
    <option value="بقرة">بقرة</option>
    <option value="جاموسة">جاموسة</option>
  </select>

  <label for="breed">السلالة:</label>
  <select id="breed" required data-field="breed">
    <option value="">اختر السلالة</option>
  </select>

  <label for="birthDate">تاريخ الميلاد (اختياري):</label>
  <input type="date" id="birthDate" data-field="birthDate" />
</div>

<div id="mothersFields">
<label for="productionStatus">الحالة الإنتاجية:</label>
<select id="productionStatus" required data-field="productionStatus">      <option value="">اختر الحالة</option>
      <option value="حلاب">حلاب</option>
      <option value="جاف">جاف</option>
    </select>

    <div id="milkField" style="display:none;">
      <label for="dailyMilk">إنتاج اللبن اليومي (لتر):</label>
<input type="number" id="dailyMilk" placeholder="اكتب كمية اللبن" data-field="dailyMilk" />    </div>

    <label for="reproductiveStatus">الحالة التناسلية:</label>
  <select id="reproductiveStatus" required data-field="reproductiveStatus">
     <option value="">اختر الحالة</option>
      <option value="حديث الولادة">حديث الولادة</option>
      <option value="ملقحة">ملقحة</option>
      <option value="عشار">عشار</option>
      <option value="مفتوحة">مفتوحة</option>
      <option value="إجهاض">إجهاض</option>
    </select>

    <!-- جديد -->
  <label for="servicesCount">عدد مرات التلقيح (الموسم الحالي):</label>
<input type="number" id="servicesCount" min="0" placeholder="0" data-field="servicesCount" />
<label for="lactationNumber">رقم موسم الحليب الحالي:</label>
<input type="number" id="lactationNumber" min="0" placeholder="مثال: 3" data-field="lactationNumber" />
<label for="lastCalvingDate">تاريخ آخر ولادة:</label>
<input type="date" id="lastCalvingDate" data-field="lastCalvingDate" />
    <!-- DIM -->
    <label for="daysInMilk">عدد أيام الحليب (DIM):</label>
<input type="number" id="daysInMilk" readonly disabled placeholder="يُحسب تلقائيًا" data-field="daysInMilk" />
    <!-- أيام الحمل (للجاف) -->
    <div id="pregnancyBox" style="display:none;">
      <label for="pregnancyDays">عدد أيام الحمل:</label>
<input type="number" id="pregnancyDays" readonly disabled placeholder="يُحسب تلقائيًا" data-field="pregnancyDays" />    </div>

    <div id="inseminationField" style="display:none;">
      <label for="lastInseminationDate">تاريخ آخر تلقيح:</label>
<input type="date" id="lastInseminationDate" data-field="lastInseminationDate" />    </div>
    <div id="sireField" style="display:none;">
  <label for="sireNumber">رقم الطلوقة:</label>
<input type="text" id="sireNumber" placeholder="اكتب رقم الطلوقة" data-field="sireNumber" />
    </div>
      </div>
    <div id="followersFields" class="hidden-block">
  <label for="followerSex">الجنس:</label>
<select id="followerSex" data-field="followerSex">
  <option value="">اختر الجنس</option>
    <option value="أنثى">أنثى</option>
    <option value="ذكر">ذكر</option>
  </select>

  <label for="followerStatus">الحالة الحالية:</label>
<select id="followerStatus" data-field="followerStatus">
  <option value="">اختر الحالة</option>
  </select>

  <label for="damNumber">رقم الأم:</label>
<input type="text" id="damNumber" placeholder="اكتب رقم الأم" data-field="damNumber" />
  <div id="weaningField" class="hidden-block">
    <label for="weaningDate">تاريخ الفطام:</label>
<input type="date" id="weaningDate" data-field="weaningDate" />  </div>

  <div id="followerInseminationField" class="hidden-block">
    <label for="followerLastInseminationDate">تاريخ آخر تلقيح:</label>
<input type="date" id="followerLastInseminationDate" data-field="followerLastInseminationDate" />
    <label for="followerServicesCount">عدد مرات التلقيح:</label>
<input type="number" id="followerServicesCount" min="0" placeholder="0" data-field="followerServicesCount" />
    <label for="followerSireNumber">رقم الطلوقة:</label>
<input type="text" id="followerSireNumber" placeholder="اكتب رقم الطلوقة" data-field="followerSireNumber" />  </div>

  <div id="followerPregnancyBox" class="hidden-block">
    <label for="followerPregnancyDays">عدد أيام الحمل:</label>
<input type="number" id="followerPregnancyDays" readonly disabled placeholder="يُحسب تلقائيًا" data-field="followerPregnancyDays" />  </div>
</div>
    <div id="importFields" class="hidden-block">
  <label for="importKind">نوع الاستيراد:</label>
  <select id="importKind">
    <option value="mothers">أمهات</option>
    <option value="followers">توابع</option>
  </select>

  <label for="importFile">ملف الاستيراد:</label>
  <input type="file" id="importFile" accept=".csv,.txt,.xlsx,.xls" />

  <div class="hint">
    ارفع ملف القطيع كما هو، ثم راجع المعاينة قبل الحفظ.
  </div>

<div class="btn-row">
 <button type="button" id="previewImportBtn" class="mbk-bottom-btn mbk-bottom-btn-ghost">معاينة الملف</button>
</div>

  <div id="importMsg" class="toast"></div>

  <div class="preview-wrap hidden-block" id="importPreviewWrap">
    <table>
     <thead>
  <tr>
    <th>رقم الحيوان</th>
    <th>النوع</th>
    <th>السلالة</th>
    <th>تاريخ الميلاد</th>
    <th>الحالة الإنتاجية</th>
    <th>اللبن</th>
    <th>الحالة التناسلية</th>
    <th>مرات التلقيح</th>
    <th>الموسم</th>
    <th>رقم الطلوقة</th>
    <th>آخر ولادة</th>
    <th>آخر تلقيح</th>
    <th>DIM</th>
  </tr>
</thead>
      <tbody id="importPreviewRows"></tbody>
    </table>
  </div>
</div>
 <div id="pageBottomBar" class="mbk-page-bottom-bar">
  <button type="submit" id="primaryActionBtn" class="mbk-bottom-btn mbk-bottom-btn-primary">📥 تسجيل الحيوان</button>
  <button type="button" id="dashboardBtn" class="mbk-bottom-btn mbk-bottom-btn-ghost">لوحة التحكم</button>
</div>
    <div id="popupBox" class="mbk-popup">
  <div class="mbk-popup-content" id="popupContent"></div>
</div>

   </form>
</main>

  <!-- واجهة النموذج (سلالات/حسابات تلقائية) -->
  <script>
    (function(){
      const animalTypeEl = document.getElementById('animalType');
      const breedEl = document.getElementById('breed');
      const productionEl = document.getElementById('productionStatus');
      const milkField = document.getElementById('milkField');
      const dailyMilk = document.getElementById('dailyMilk');
      const reproductiveEl = document.getElementById('reproductiveStatus');
      const inseminationField = document.getElementById('inseminationField');
      const lastInseminationDate = document.getElementById('lastInseminationDate');
      const sireField = document.getElementById('sireField');
      const sireNumber = document.getElementById('sireNumber');
      const lastCalvingDate = document.getElementById('lastCalvingDate');
      const daysInMilk = document.getElementById('daysInMilk');
      const pregnancyBox = document.getElementById('pregnancyBox');
      const pregnancyDays = document.getElementById('pregnancyDays');
const entryType = document.getElementById('entryType');
const btnMothers = document.getElementById('btnMothers');
const btnFollowers = document.getElementById('btnFollowers');
const btnImport = document.getElementById('btnImport');
const sharedAnimalFields = document.getElementById('sharedAnimalFields');
const mothersFields = document.getElementById('mothersFields');
const followersFields = document.getElementById('followersFields');
const importFields = document.getElementById('importFields');
const primaryActionBtn = document.getElementById('primaryActionBtn');
const dashboardBtn = document.getElementById('dashboardBtn');
const followerSex = document.getElementById('followerSex');
const followerStatus = document.getElementById('followerStatus');
const damNumber = document.getElementById('damNumber');
const weaningField = document.getElementById('weaningField');
const weaningDate = document.getElementById('weaningDate');
const followerInseminationField = document.getElementById('followerInseminationField');
const followerLastInseminationDate = document.getElementById('followerLastInseminationDate');
const followerServicesCount = document.getElementById('followerServicesCount');
const followerSireNumber = document.getElementById('followerSireNumber');
const followerPregnancyBox = document.getElementById('followerPregnancyBox');
const followerPregnancyDays = document.getElementById('followerPregnancyDays');      
      const cowBreeds = ["خليط","هولشتاين","جيرسي","مونبليار","سيمينتال","أخرى"];
      const buffaloBreeds = ["مصري","هجين إيطالي","هجين هندي"];

      function updateBreedOptionsLocal(){
        const type = animalTypeEl.value;
        const breeds = (type === "بقرة") ? cowBreeds : (type === "جاموسة") ? buffaloBreeds : [];
        breedEl.innerHTML = '<option value="">اختر السلالة</option>' + breeds.map(b=>`<option value="${b}">${b}</option>`).join('');
      }

      function toggleMilkFieldLocal(){
        const show = (productionEl.value === "حلاب");
        milkField.style.display = show ? "block" : "none";
        dailyMilk.required = show; if(!show) dailyMilk.value = "";
        toggleMilkVsPregnancy();
      }

 function toggleInseminationFieldLocal(){
  const val = reproductiveEl.value;
  const showByRep = (val === "ملقحة" || val === "عشار" || val === "مفتوحة");
  const showByProd = (productionEl.value === "جاف");
  const show = showByRep || showByProd;

  inseminationField.style.display = show ? "block" : "none";
  lastInseminationDate.required = (val === "ملقحة" || val === "عشار" || productionEl.value === "جاف");
  if(!show){ lastInseminationDate.value = ""; }

  const showSire = (val === "ملقحة" || val === "عشار");
  sireField.style.display = showSire ? "block" : "none";
  sireNumber.required = showSire;
  if(!showSire){ sireNumber.value = ""; }
}

      function toggleCalvingForLactation(){
  const mothersMode = (entryType.value === "mothers");
  if (!mothersMode){
    lastCalvingDate.value = "";
    lastCalvingDate.disabled = true;
    lastCalvingDate.required = false;
    daysInMilk.value = "";
    daysInMilk.disabled = true;
    return;
  }

  lastCalvingDate.disabled = false;
  lastCalvingDate.required = true;

  if (productionEl.value === "جاف"){
    daysInMilk.value = "";
    daysInMilk.disabled = true;
  } else {
    daysInMilk.disabled = false;
  }
}

      function computeDIM(){
        if (productionEl.value === "جاف") { daysInMilk.value=""; return; }
        const calv = lastCalvingDate.value;
        if (!calv){ daysInMilk.value = ""; return; }
        const d0 = new Date(calv), d1 = new Date();
        d0.setHours(0,0,0,0); d1.setHours(0,0,0,0);
        const diff = Math.max(0, Math.round((d1-d0)/86400000));
        daysInMilk.value = String(diff);
      }

      function computePregnancy(){
        if (productionEl.value !== "جاف"){ pregnancyDays.value=""; return; }
        const ins = lastInseminationDate.value;
        if (!ins){ pregnancyDays.value=""; return; }
        const d0 = new Date(ins), d1 = new Date();
        d0.setHours(0,0,0,0); d1.setHours(0,0,0,0);
        const diff = Math.max(0, Math.round((d1-d0)/86400000));
        pregnancyDays.value = String(diff);
      }

      function toggleMilkVsPregnancy(){
        const isDry = (productionEl.value === "جاف");
        if (isDry){
          daysInMilk.value = "";
          daysInMilk.disabled = true;
          pregnancyBox.style.display = "block";
          pregnancyDays.disabled = false;
          computePregnancy();
        }else{
          pregnancyBox.style.display = "none";
          pregnancyDays.value = "";
          pregnancyDays.disabled = true;
            daysInMilk.disabled = false;
            computeDIM();
          }
        }
     function updateFollowerStatusOptions(){
  const sex = followerSex.value;
  const femaleOptions = ["رضيع","فطام","نامي","تحت التلقيح","ملقح","عشار"];
  const maleOptions = ["رضيع","فطام","نامي"];
  const list = sex === "ذكر" ? maleOptions : sex === "أنثى" ? femaleOptions : [];

  followerStatus.innerHTML =
    '<option value="">اختر الحالة</option>' +
    list.map(v => `<option value="${v}">${v}</option>`).join('');
}

function computeFollowerPregnancy(){
  if (followerStatus.value !== "عشار"){
    followerPregnancyDays.value = "";
    return;
  }
  const ins = followerLastInseminationDate.value;
  if (!ins){
    followerPregnancyDays.value = "";
    return;
  }
  const d0 = new Date(ins), d1 = new Date();
  d0.setHours(0,0,0,0);
  d1.setHours(0,0,0,0);
  const diff = Math.max(0, Math.round((d1 - d0) / 86400000));
  followerPregnancyDays.value = String(diff);
}

function toggleFollowerFields(){
  const st = followerStatus.value;

  const showWeaning = (st === "فطام");
  weaningField.classList.toggle('hidden-block', !showWeaning);
  weaningDate.required = (entryType.value === "followers" && showWeaning);

  const showInsemination = (st === "ملقح" || st === "عشار");
  followerInseminationField.classList.toggle('hidden-block', !showInsemination);
  followerLastInseminationDate.required = (entryType.value === "followers" && showInsemination);

  const showPregnancy = (st === "عشار");
  followerPregnancyBox.classList.toggle('hidden-block', !showPregnancy);

  if (!showWeaning){
    weaningDate.value = "";
  }

  if (!showInsemination){
    followerLastInseminationDate.value = "";
    followerServicesCount.value = "";
    followerSireNumber.value = "";
  }

  if (!showPregnancy){
    followerPregnancyDays.value = "";
  } else {
    computeFollowerPregnancy();
  }
}


 function setEntryMode(mode){
  entryType.value = mode;

 const mothers = (mode === "mothers");
const followers = (mode === "followers");
const importing = (mode === "import");

sharedAnimalFields.classList.toggle('hidden-block', importing);
mothersFields.classList.toggle('hidden-block', !mothers);
followersFields.classList.toggle('hidden-block', !followers);
importFields.classList.toggle('hidden-block', !importing);
primaryActionBtn.textContent = importing ? 'حفظ الاستيراد' : '📥 تسجيل الحيوان';

  btnMothers.classList.toggle('active', mothers);
  btnFollowers.classList.toggle('active', followers);
  btnImport.classList.toggle('active', importing);

const sharedRequiredIds = [
  'animalNumber',
  'animalType',
  'breed'
];

const motherRequiredIds = [
  'productionStatus',
  'reproductiveStatus'
];

const followerRequiredIds = [
  'followerSex',
  'followerStatus',
  'damNumber'
];

sharedRequiredIds.forEach(id => {
  const el = document.getElementById(id);
  if (el) el.required = !importing;
});

motherRequiredIds.forEach(id => {
  const el = document.getElementById(id);
  if (el) el.required = mothers;
});

followerRequiredIds.forEach(id => {
  const el = document.getElementById(id);
  if (el) el.required = followers;
});
  followerRequiredIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.required = followers;
  });

  if (weaningDate) {
    weaningDate.required = (followers && followerStatus.value === "فطام");

function renderPreview(rows) {

  function splitCsvLine(line) {
    const out = [];
    let cur = "";
    let inQuotes = false;

    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      const next = line[i + 1];

      if (ch === '"') {
        if (inQuotes && next === '"') {
          cur += '"';
          i++;
        } else {
          inQuotes = !inQuotes;
        }
      } else if (ch === "," && !inQuotes) {
        out.push(cur.trim());
        cur = "";
      } else {
        cur += ch;
      }
    }

    out.push(cur.trim());
    return out;
  }

  function parseCsvText(text) {
    const lines = String(text || "")
      .split(/\r?\n/)
      .map(s => s.trim())
      .filter(Boolean);

    if (!lines.length) return [];

    const headers = splitCsvLine(lines[0]);

    return lines.slice(1).map(line => {
      const vals = splitCsvLine(line);
      const row = {};
      headers.forEach((h, i) => row[h] = vals[i] ?? "");
      return row;
    });
  }

  function normalizeRowsFromSheet(rows) {
    if (!Array.isArray(rows) || !rows.length) return [];

    return rows
      .map(r => {
        const clean = {};
        Object.keys(r || {}).forEach(k => {
          const key = String(k || "").trim();
          if (!key) return;
          clean[key] = r[k] == null ? "" : String(r[k]).trim();
        });
        return clean;
      })
      .filter(r => Object.keys(r).length > 0);
  }

  async function parseImportFile(file) {
    const name = String(file?.name || "").toLowerCase();

    if (name.endsWith(".csv") || name.endsWith(".txt")) {
      const text = await file.text();
      return parseCsvText(text);
    }

    if (name.endsWith(".xlsx") || name.endsWith(".xls")) {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: "array" });

      const firstSheetName = wb.SheetNames?.[0];
      if (!firstSheetName) return [];

      const sheet = wb.Sheets[firstSheetName];
      if (!sheet) return [];

      const jsonRows = XLSX.utils.sheet_to_json(sheet, {
        defval: "",
        raw: false
      });

      return normalizeRowsFromSheet(jsonRows);
    }

    return [];
  }

  previewBtn?.addEventListener("click", async () => {
    try {
      clearPreview();

      const file = importFileEl?.files?.[0];
      if (!file) {
        showImportMsg("اختر ملف الاستيراد أولاً", false);
        return;
      }

      const rows = await parseImportFile(file);

      if (!rows.length) {
        showImportMsg("الملف فارغ أو غير مقروء", false);
        return;
      }

      const headers = Object.keys(rows[0] || {});
      const profile = detectBestProfile(headers);

      if (!profile) {
        showImportMsg("لم يتعرف مُرَبِّيك على نوع ملف التصدير", false);
        return;
      }

      const preview = buildPreviewRows(rows, profile);
      renderPreview(preview);

      showImportMsg(`تم التعرف على الملف كنمط ${profile.label} ومعاينة ${preview.length} سجل`, true);

      window.__IMPORT_PREVIEW__ = preview;
      window.__IMPORT_PROFILE__ = profile;
    } catch (err) {
      console.error(err);
      showImportMsg("حدث خطأ أثناء قراءة ملف الاستيراد", false);
    }
  });
</script>
