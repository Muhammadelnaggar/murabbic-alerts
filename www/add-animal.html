  <style>
    

    .toast{display:none;position:relative;padding:12px 14px 12px 48px;border-radius:14px;background:#ecfdf5;border:1px solid #10b98133;color:#065f46;font-weight:700;box-shadow:0 8px 24px rgba(16,185,129,.15);margin-bottom:10px}
    .toast.show{display:block;animation:toast-pop .25s ease-out}
    .toast .icon{position:absolute;inset-inline-start:12px;top:50%;transform:translateY(-50%);width:22px;height:22px}
    .toast .bar{position:absolute;left:8px;right:8px;bottom:6px;height:3px;background:#d1fae5;border-radius:999px;overflow:hidden}
    .toast .bar span{display:block;height:100%;width:100%;background:#10b981;animation:toast-shrink 1.6s linear forwards}
    @keyframes toast-pop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
    @keyframes toast-shrink{from{width:100%}to{width:0%}}
    #msg.toast.show { display: block; }

}

  <!-- واجهة النموذج (سلالات/حسابات تلقائية) -->
  <script>
    (function(){
      const animalTypeEl = document.getElementById('animalType');
      const breedEl = document.getElementById('breed');
      const productionEl = document.getElementById('productionStatus');
      const milkField = document.getElementById('milkField');
      const dailyMilk = document.getElementById('dailyMilk');
      const reproductiveEl = document.getElementById('reproductiveStatus');
      const inseminationField = document.getElementById('inseminationField');
      const lastInseminationDate = document.getElementById('lastInseminationDate');
      const sireField = document.getElementById('sireField');
      const sireNumber = document.getElementById('sireNumber');
      const lastCalvingDate = document.getElementById('lastCalvingDate');
      const daysInMilk = document.getElementById('daysInMilk');
      const pregnancyBox = document.getElementById('pregnancyBox');
      const pregnancyDays = document.getElementById('pregnancyDays');
      const entryType = document.getElementById('entryType');
const btnMothers = document.getElementById('btnMothers');
const btnFollowers = document.getElementById('btnFollowers');
const mothersFields = document.getElementById('mothersFields');
const followersFields = document.getElementById('followersFields');
const followerSex = document.getElementById('followerSex');
const followerStatus = document.getElementById('followerStatus');
const damNumber = document.getElementById('damNumber');
const weaningField = document.getElementById('weaningField');
const weaningDate = document.getElementById('weaningDate');
const followerInseminationField = document.getElementById('followerInseminationField');
const followerLastInseminationDate = document.getElementById('followerLastInseminationDate');
const followerServicesCount = document.getElementById('followerServicesCount');
const followerSireNumber = document.getElementById('followerSireNumber');
const followerPregnancyBox = document.getElementById('followerPregnancyBox');
const followerPregnancyDays = document.getElementById('followerPregnancyDays');      
      const cowBreeds = ["خليط","هولشتاين","جيرسي","مونبليار","سيمينتال","أخرى"];
      const buffaloBreeds = ["مصري","هجين إيطالي","هجين هندي"];

      function updateBreedOptionsLocal(){
        const type = animalTypeEl.value;
        const breeds = (type === "بقرة") ? cowBreeds : (type === "جاموسة") ? buffaloBreeds : [];
        breedEl.innerHTML = '<option value="">اختر السلالة</option>' + breeds.map(b=>`<option value="${b}">${b}</option>`).join('');
      }

      function toggleMilkFieldLocal(){
        const show = (productionEl.value === "حلاب");
        milkField.style.display = show ? "block" : "none";
        dailyMilk.required = show; if(!show) dailyMilk.value = "";
        toggleMilkVsPregnancy();
      }

 function toggleInseminationFieldLocal(){
  const val = reproductiveEl.value;
  const showByRep = (val === "ملقحة" || val === "عشار" || val === "مفتوحة");
  const showByProd = (productionEl.value === "جاف");
  const show = showByRep || showByProd;

  inseminationField.style.display = show ? "block" : "none";
  lastInseminationDate.required = (val === "ملقحة" || val === "عشار" || productionEl.value === "جاف");
  if(!show){ lastInseminationDate.value = ""; }

  const showSire = (val === "ملقحة" || val === "عشار");
  sireField.style.display = showSire ? "block" : "none";
  sireNumber.required = showSire;
  if(!showSire){ sireNumber.value = ""; }
}

      function toggleCalvingForLactation(){
  const mothersMode = (entryType.value === "mothers");
  if (!mothersMode){
    lastCalvingDate.value = "";
    lastCalvingDate.disabled = true;
    lastCalvingDate.required = false;
    daysInMilk.value = "";
    daysInMilk.disabled = true;
    return;
  }

  lastCalvingDate.disabled = false;
  lastCalvingDate.required = true;

  if (productionEl.value === "جاف"){
    daysInMilk.value = "";
    daysInMilk.disabled = true;
  } else {
    daysInMilk.disabled = false;
  }
}

      function computeDIM(){
        if (productionEl.value === "جاف") { daysInMilk.value=""; return; }
        const calv = lastCalvingDate.value;
        if (!calv){ daysInMilk.value = ""; return; }
        const d0 = new Date(calv), d1 = new Date();
        d0.setHours(0,0,0,0); d1.setHours(0,0,0,0);
        const diff = Math.max(0, Math.round((d1-d0)/86400000));
        daysInMilk.value = String(diff);
      }

      function computePregnancy(){
        if (productionEl.value !== "جاف"){ pregnancyDays.value=""; return; }
        const ins = lastInseminationDate.value;
        if (!ins){ pregnancyDays.value=""; return; }
        const d0 = new Date(ins), d1 = new Date();
        d0.setHours(0,0,0,0); d1.setHours(0,0,0,0);
        const diff = Math.max(0, Math.round((d1-d0)/86400000));
        pregnancyDays.value = String(diff);
      }

      function toggleMilkVsPregnancy(){
        const isDry = (productionEl.value === "جاف");
        if (isDry){
          daysInMilk.value = "";
          daysInMilk.disabled = true;
          pregnancyBox.style.display = "block";
          pregnancyDays.disabled = false;
          computePregnancy();
        }else{
          pregnancyBox.style.display = "none";
          pregnancyDays.value = "";
          pregnancyDays.disabled = true;
            daysInMilk.disabled = false;
            computeDIM();
          }
        }
     function updateFollowerStatusOptions(){
  const sex = followerSex.value;
  const femaleOptions = ["رضيع","فطام","نامي","تحت التلقيح","ملقح","عشار"];
  const maleOptions = ["رضيع","فطام","نامي"];
  const list = sex === "ذكر" ? maleOptions : sex === "أنثى" ? femaleOptions : [];

  followerStatus.innerHTML =
    '<option value="">اختر الحالة</option>' +
    list.map(v => `<option value="${v}">${v}</option>`).join('');
}

function computeFollowerPregnancy(){
  if (followerStatus.value !== "عشار"){
    followerPregnancyDays.value = "";
    return;
  }
  const ins = followerLastInseminationDate.value;
  if (!ins){
    followerPregnancyDays.value = "";
    return;
  }
  const d0 = new Date(ins), d1 = new Date();
  d0.setHours(0,0,0,0);
  d1.setHours(0,0,0,0);
  const diff = Math.max(0, Math.round((d1 - d0) / 86400000));
  followerPregnancyDays.value = String(diff);
}

function toggleFollowerFields(){
  const st = followerStatus.value;

  const showWeaning = (st === "فطام");
  weaningField.classList.toggle('hidden-block', !showWeaning);
  weaningDate.required = (entryType.value === "followers" && showWeaning);

  const showInsemination = (st === "ملقح" || st === "عشار");
  followerInseminationField.classList.toggle('hidden-block', !showInsemination);
  followerLastInseminationDate.required = (entryType.value === "followers" && showInsemination);

  const showPregnancy = (st === "عشار");
  followerPregnancyBox.classList.toggle('hidden-block', !showPregnancy);

  if (!showWeaning){
    weaningDate.value = "";
  }

  if (!showInsemination){
    followerLastInseminationDate.value = "";
    followerServicesCount.value = "";
    followerSireNumber.value = "";
  }

  if (!showPregnancy){
    followerPregnancyDays.value = "";
  } else {
    computeFollowerPregnancy();
  }
}
function setEntryMode(mode){
  entryType.value = mode;

  const mothers = (mode === "mothers");
  mothersFields.classList.toggle('hidden-block', !mothers);
  followersFields.classList.toggle('hidden-block', mothers);

  btnMothers.classList.toggle('active', mothers);
  btnFollowers.classList.toggle('active', !mothers);

  const motherRequiredIds = [
    'productionStatus',
    'reproductiveStatus'
  ];

  const followerRequiredIds = [
    'followerSex',
    'followerStatus',
    'damNumber'
  ];

  motherRequiredIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.required = mothers;
  });

  followerRequiredIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.required = !mothers;
  });

  if (weaningDate) {
    weaningDate.required = (!mothers && followerStatus.value === "فطام");
  }

  if (followerLastInseminationDate) {
    followerLastInseminationDate.required = (!mothers && (followerStatus.value === "ملقح" || followerStatus.value === "عشار"));
  }

  toggleCalvingForLactation();
  toggleMilkFieldLocal();
  toggleInseminationFieldLocal();
}
      ['change','input'].forEach(e=>animalTypeEl.addEventListener(e,updateBreedOptionsLocal));
      ['change','input'].forEach(e=>productionEl.addEventListener(e,()=>{toggleMilkFieldLocal();toggleInseminationFieldLocal();}));
      ['change','input'].forEach(e=>reproductiveEl.addEventListener(e,toggleInseminationFieldLocal));
      ['change','input'].forEach(e=>lastCalvingDate.addEventListener(e,computeDIM));
      ['change','input'].forEach(e=>lastInseminationDate.addEventListener(e,computePregnancy));
     
     btnMothers.addEventListener('click', ()=> setEntryMode('mothers'));
     btnFollowers.addEventListener('click', ()=> setEntryMode('followers'));
      followerSex.addEventListener('change', ()=>{
  updateFollowerStatusOptions();
  toggleFollowerFields();
});

followerStatus.addEventListener('change', toggleFollowerFields);
followerLastInseminationDate.addEventListener('change', computeFollowerPregnancy);
followerLastInseminationDate.addEventListener('input', computeFollowerPregnancy);
 document.addEventListener('DOMContentLoaded', ()=>{
  updateBreedOptionsLocal();
  toggleCalvingForLactation();
  toggleMilkFieldLocal();
  toggleInseminationFieldLocal();
  toggleMilkVsPregnancy();
  computeDIM();
  computePregnancy();
  setEntryMode('mothers');
  updateFollowerStatusOptions();
  toggleFollowerFields(); 
});

      window.__mbkUI = { updateBreedOptions: updateBreedOptionsLocal, toggleMilkField: toggleMilkFieldLocal, toggleInseminationField: toggleInseminationFieldLocal, computeDIM, computePregnancy, toggleCalvingForLactation };
    })();
  </script>

  <script>
    if (localStorage.getItem('SMART_ON') === null) localStorage.setItem('SMART_ON','1');
    (function () {
      window.dataLayer = window.dataLayer || [];
      window.__sentEvents = window.__sentEvents || new Set();
      window.t = window.t || { event: function (name, props){ try{
        props = props || {};
        if (name === 'page_view'){
          var key = 'pv:' + (props.page || location.pathname);
          if (window.__sentEvents.has(key)) return;
          window.__sentEvents.add(key);
        }
        dataLayer.push({event:name, ts:Date.now(), ...props});
      }catch{}}};
      t.event('page_view', { page: location.pathname });

    window.flashOK = function(text, ms = 1600){
      const box = document.getElementById('msg');
      if (!box) return;
      box.className = 'toast show';
      box.style.display = 'block';
      box.innerHTML = `
        <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="10" stroke="#10b981" stroke-width="2"></circle>
          <path d="M7 12l3 3 7-7" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
        <div>${text}</div>
        <div class="bar"><span></span></div>
      `;
      setTimeout(()=>{ box.className = 'toast'; box.style.display = 'none'; box.innerHTML = ''; }, ms + 80);
    };
  </script>

  <!-- حفظ في فايرستور تحت حساب المستخدم الحالي فقط -->
<script type="module">
  import { db } from "./js/firebase-config.js";
  import { collection, addDoc, serverTimestamp, query, where, limit, getDocs }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const auth = getAuth();
  let CURRENT_UID = null;

  onAuthStateChanged(auth, (u) => {
    if (!u) {
      location.href = "login.html?next=add-animal.html";
    } else {
      CURRENT_UID = u.uid;
      localStorage.setItem("userId", CURRENT_UID);
    }
  });

  const form   = document.getElementById("animalForm");
  const msgDiv = document.getElementById("msg");
  const $ = (id)=>document.getElementById(id);
  const DASHBOARD_URL = "dashboard.html";
  const todayLocal = ()=>{ const d=new Date(); d.setMinutes(d.getMinutes()-d.getTimezoneOffset()); return d.toISOString().slice(0,10); };
  const setMsg = (t, ok=false) => { showPopup(t, ok); };

  // رجوع ذكي
  let __hasAnimals = null;
  window.addEventListener("DOMContentLoaded", async () => {
    history.pushState({page:"add-animal"}, "", location.href);
    if (CURRENT_UID){
      try {
        const s0 = await getDocs(query(collection(db,"animals"), where("ownerUid","==",CURRENT_UID), limit(1)));
        __hasAnimals = !s0.empty;
      } catch {}
    }
    window.addEventListener("popstate", () => {
      if (__hasAnimals === false){
        alert("أنت مستخدم جديد — يجب إضافة أول حيوان قبل الرجوع.");
        history.pushState({page:"add-animal"}, "", location.href);
      } else {
        location.href = DASHBOARD_URL;
      }
    });
    document.getElementById("cancelLink")?.addEventListener("click",(e)=>{
      e.preventDefault();
      if (__hasAnimals === false){ alert("أنت مستخدم جديد — يجب إضافة أول حيوان قبل الرجوع."); return; }
      location.href = DASHBOARD_URL;
    });
  });

  const normAnimaltype = (ar)=>{
    const s=String(ar||"").trim().toLowerCase();
    if (s==="cow" || ar==="بقرة") return "cow";
    if (s==="buffalo" || ar==="جاموسة") return "buffalo";
    return "cow";
  };
function showPopup(msg, ok=true){
  const box = document.getElementById("popupBox");
  const content = document.getElementById("popupContent");

  content.textContent = msg;
  content.className = "mbk-popup-content " + (ok ? "mbk-popup-success" : "mbk-popup-error");

  box.style.display = "flex";

  setTimeout(() => { box.style.display = "none"; }, 1800);
}

form.addEventListener("mbk:valid", async (e)=>{
 const formData = e.detail?.formData || {};
msgDiv.style.display = "none";

  if (!CURRENT_UID){
    setMsg("فضلاً سجّل الدخول أولاً.", false);
    return;
  }

  const numberStr = String(formData.animalNumber || "").trim();
const entryTypeVal = String(formData.entryType || "mothers").trim();

const followerSexVal = String(formData.followerSex || "").trim();
const followerStatusVal = String(formData.followerStatus || "").trim();
const damNumberVal = String(formData.damNumber || "").trim() || null;
const weaningDateVal = String(formData.weaningDate || "").trim() || null;
const followerLastInseminationVal = String(formData.followerLastInseminationDate || "").trim() || null;
const followerServicesCountVal = Number(formData.followerServicesCount || 0);
const followerSireNumberVal = String(formData.followerSireNumber || "").trim() || null;
const followerPregnancyDaysVal = Number(formData.followerPregnancyDays || 0);

const animalTypeAr = String(formData.animalType || "").trim();
const breed = String(formData.breed || "").trim();
const productionStatus = String(formData.productionStatus || "").trim();
const dailyMilkVal = String(formData.dailyMilk || "").trim();
const reproductiveStatus = String(formData.reproductiveStatus || "").trim();
const servicesCount = Number(formData.servicesCount || 0);
const lactationNumber = Number(formData.lactationNumber || 0);
const birthDate = String(formData.birthDate || "").trim() || null;
const lastCalvingDate = String(formData.lastCalvingDate || "").trim();
const lastInseminationInp = String(formData.lastInseminationDate || "").trim() || null;
const sireNumberInp = String(formData.sireNumber || "").trim() || null;
const daysInMilkVal = Number(formData.daysInMilk || 0);

  try{
    // 🔍 منع تكرار نفس الرقم لنفس المستخدم فقط
    const key = `${CURRENT_UID}#${numberStr}`;
    // ✅ لا يوجد تكرار لهذا المستخدم → احفظ الحيوان
const payload = (entryTypeVal === "mothers")
  ? {
      ownerUid: CURRENT_UID,
      userId: CURRENT_UID,
      userId_number: key,
      entryType: "mothers",

      number: numberStr,
      animalNumber: Number(numberStr),
      animaltype: normAnimaltype(animalTypeAr),
      animalTypeAr,
      breed,

      productionStatus,
      dailyMilk: productionStatus === "حلاب" ? Number(dailyMilkVal || 0) : null,
      reproductiveStatus,
      servicesCount,
      lactationNumber,
      birthDate,
      lastCalvingDate: lactationNumber > 0 ? (lastCalvingDate || null) : null,

      lastInseminationDate:
        (reproductiveStatus === "ملقحة" || reproductiveStatus === "عشار" || productionStatus === "جاف" || reproductiveStatus === "مفتوحة")
          ? (lastInseminationInp || null) : null,

      sireNumber:
        (reproductiveStatus === "ملقحة" || reproductiveStatus === "عشار")
          ? (sireNumberInp || null) : null,

      daysInMilk: productionStatus === "جاف" ? null : (daysInMilkVal || null),
      createdAt: serverTimestamp(),
      
    }
: {
      ownerUid: CURRENT_UID,
      userId: CURRENT_UID,
      userId_number: key,
      entryType: "followers",

      calfNumber: numberStr,
      number: numberStr,
      animalNumber: Number(numberStr),

      species: animalTypeAr === "بقرة" ? "أبقار" : "جاموس",
      animaltype: normAnimaltype(animalTypeAr),
      animalTypeAr,
      breed,

      sex: followerSexVal,
      status: followerStatusVal,
      followerStatus: followerStatusVal,

      birthDate,
      damNumber: damNumberVal,
      weaningDate: followerStatusVal === "فطام" ? weaningDateVal : null,

      lastInseminationDate:
        (followerStatusVal === "ملقح" || followerStatusVal === "عشار")
          ? (followerLastInseminationVal || null) : null,

      servicesCount:
        (followerStatusVal === "ملقح" || followerStatusVal === "عشار")
          ? followerServicesCountVal : 0,

      sireNumber:
        (followerStatusVal === "ملقح" || followerStatusVal === "عشار")
          ? (followerSireNumberVal || null) : null,

      pregnancyDays:
        (followerStatusVal === "عشار")
          ? (followerPregnancyDaysVal || null) : null,

      createdAt: serverTimestamp()
    };
  

const targetCollection = (entryTypeVal === "followers") ? "calves" : "animals";
const ref = await addDoc(collection(db, targetCollection), payload);
  showPopup("تم تسجيل الحيوان بنجاح ✅", true);

  localStorage.setItem("currentAnimalId", ref.id);
localStorage.setItem("currentAnimalNumber", numberStr);
const d = todayLocal();

setTimeout(()=>{
  location.href = `add-event.html?animalId=${encodeURIComponent(ref.id)}&number=${encodeURIComponent(numberStr)}&date=${encodeURIComponent(d)}`;
}, 1200);
  }catch(err){
    console.error(err);
    setMsg("حدث خطأ أثناء تسجيل الحيوان. تأكد من الصلاحيات والاتصال.", false);
  }
});
