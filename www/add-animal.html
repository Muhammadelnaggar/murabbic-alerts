<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>إضافة حيوان</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/forms.css">
 
 
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
</head>
<body class="add-animal-page">
 
 <header class="mbk-head">
  <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">
  <div class="mbk-center">
    <div class="mbk-title">إضافة حيوان جديد</div>
    <div class="mbk-sub">مُرَبِّيك</div>
  </div>
</header>
 <main class="mbk-main">
 <form id="animalForm" class="mbk-form" novalidate>
    <div id="msg"></div>
   <div id="addAnimalInfoBar" class="mbk-infobar" style="display:none;"></div>
<div id="entryTypeBox" class="entry-type-box">
  <button type="button" id="btnMothers" class="entry-tab active">أمهات</button>
  <button type="button" id="btnFollowers" class="entry-tab">توابع</button>
  <button type="button" id="btnImport" class="entry-tab">استيراد</button>
</div>

<input type="hidden" id="entryType" value="mothers" data-field="entryType" />

<div id="sharedAnimalFields">
  <label for="animalNumber">رقم الحيوان:</label>
 <input type="text" id="animalNumber" data-field="animalNumber" />

  <label for="animalType">نوع الحيوان:</label>
  <select id="animalType" required data-field="animalType">
    <option value="">اختر النوع</option>
    <option value="بقرة">بقرة</option>
    <option value="جاموسة">جاموسة</option>
  </select>

  <label for="breed">السلالة:</label>
  <select id="breed" required data-field="breed">
    <option value="">اختر السلالة</option>
  </select>

  <label for="birthDate">تاريخ الميلاد (اختياري):</label>
  <input type="date" id="birthDate" data-field="birthDate" />
</div>

<div id="mothersFields">
<label for="productionStatus">الحالة الإنتاجية:</label>
<select id="productionStatus" required data-field="productionStatus">      <option value="">اختر الحالة</option>
      <option value="حلاب">حلاب</option>
      <option value="جاف">جاف</option>
    </select>

    <div id="milkField" style="display:none;">
      <label for="dailyMilk">إنتاج اللبن اليومي (لتر):</label>
<input type="number" id="dailyMilk" placeholder="اكتب كمية اللبن" data-field="dailyMilk" />    </div>

    <label for="reproductiveStatus">الحالة التناسلية:</label>
  <select id="reproductiveStatus" required data-field="reproductiveStatus">
     <option value="">اختر الحالة</option>
      <option value="حديث الولادة">حديث الولادة</option>
      <option value="ملقحة">ملقحة</option>
      <option value="عشار">عشار</option>
      <option value="مفتوحة">مفتوحة</option>
      <option value="إجهاض">إجهاض</option>
    </select>

    <!-- جديد -->
  <label for="servicesCount">عدد مرات التلقيح (الموسم الحالي):</label>
<input type="number" id="servicesCount" min="0" placeholder="0" data-field="servicesCount" />
<label for="lactationNumber">رقم موسم الحليب الحالي:</label>
<input type="number" id="lactationNumber" min="0" placeholder="مثال: 3" data-field="lactationNumber" />
<label for="lastCalvingDate">تاريخ آخر ولادة:</label>
<input type="date" id="lastCalvingDate" data-field="lastCalvingDate" />
    <!-- DIM -->
    <label for="daysInMilk">عدد أيام الحليب (DIM):</label>
<input type="number" id="daysInMilk" readonly disabled placeholder="يُحسب تلقائيًا" data-field="daysInMilk" />
    <!-- أيام الحمل (للجاف) -->
    <div id="pregnancyBox" style="display:none;">
      <label for="pregnancyDays">عدد أيام الحمل:</label>
<input type="number" id="pregnancyDays" readonly disabled placeholder="يُحسب تلقائيًا" data-field="pregnancyDays" />    </div>

    <div id="inseminationField" style="display:none;">
      <label for="lastInseminationDate">تاريخ آخر تلقيح:</label>
<input type="date" id="lastInseminationDate" data-field="lastInseminationDate" />    </div>
    <div id="sireField" style="display:none;">
  <label for="sireNumber">رقم الطلوقة:</label>
<input type="text" id="sireNumber" placeholder="اكتب رقم الطلوقة" data-field="sireNumber" />
    </div>
      </div>
    <div id="followersFields" class="hidden-block">
  <label for="followerSex">الجنس:</label>
<select id="followerSex" data-field="followerSex">
  <option value="">اختر الجنس</option>
    <option value="أنثى">أنثى</option>
    <option value="ذكر">ذكر</option>
  </select>

  <label for="followerStatus">الحالة الحالية:</label>
<select id="followerStatus" data-field="followerStatus">
  <option value="">اختر الحالة</option>
  </select>

  <label for="damNumber">رقم الأم:</label>
<input type="text" id="damNumber" placeholder="اكتب رقم الأم" data-field="damNumber" />
  <div id="weaningField" class="hidden-block">
    <label for="weaningDate">تاريخ الفطام:</label>
<input type="date" id="weaningDate" data-field="weaningDate" />  </div>

  <div id="followerInseminationField" class="hidden-block">
    <label for="followerLastInseminationDate">تاريخ آخر تلقيح:</label>
<input type="date" id="followerLastInseminationDate" data-field="followerLastInseminationDate" />
    <label for="followerServicesCount">عدد مرات التلقيح:</label>
<input type="number" id="followerServicesCount" min="0" placeholder="0" data-field="followerServicesCount" />
    <label for="followerSireNumber">رقم الطلوقة:</label>
<input type="text" id="followerSireNumber" placeholder="اكتب رقم الطلوقة" data-field="followerSireNumber" />  </div>

  <div id="followerPregnancyBox" class="hidden-block">
    <label for="followerPregnancyDays">عدد أيام الحمل:</label>
<input type="number" id="followerPregnancyDays" readonly disabled placeholder="يُحسب تلقائيًا" data-field="followerPregnancyDays" />  </div>
</div>
    <div id="importFields" class="hidden-block">
  <label for="importKind">نوع الاستيراد:</label>
  <select id="importKind">
    <option value="mothers">أمهات</option>
    <option value="followers">توابع</option>
  </select>

  <label for="importFile">ملف الاستيراد:</label>
  <input type="file" id="importFile" accept=".csv,.txt,.xlsx,.xls" />

  <div class="hint">
    ارفع ملف القطيع كما هو، ثم راجع المعاينة قبل الحفظ.
  </div>

<div class="btn-row">
 <button type="button" id="previewImportBtn" class="mbk-bottom-btn mbk-bottom-btn-ghost">معاينة الملف</button>
</div>

  <div id="importMsg" class="toast"></div>

  <div class="preview-wrap hidden-block" id="importPreviewWrap">
    <table>
     <thead>
  <tr>
    <th>السطر</th>
    <th>رقم الحيوان</th>
    <th>رقم الأم</th>
    <th>النوع</th>
    <th>السلالة</th>
    <th>تاريخ الميلاد</th>
    <th>الجنس</th>
    <th>الحالة</th>
    <th>تاريخ الفطام</th>
    <th>آخر تلقيح</th>
    <th>مرات التلقيح</th>
    <th>رقم الطلوقة</th>
    <th>النتيجة</th>
    <th>الملاحظة</th>
  </tr>
</thead>
      <tbody id="importPreviewRows"></tbody>
    </table>
  </div>
</div>
 <div id="pageBottomBar" class="mbk-page-bottom-bar">
  <button type="submit" id="primaryActionBtn" class="mbk-bottom-btn mbk-bottom-btn-primary">📥 تسجيل الحيوان</button>
  <button type="button" id="dashboardBtn" class="mbk-bottom-btn mbk-bottom-btn-ghost">لوحة التحكم</button>
</div>
    <div id="popupBox" class="mbk-popup">
  <div class="mbk-popup-content" id="popupContent"></div>
</div>

   </form>
</main>

<!-- واجهة النموذج فقط: إظهار/إخفاء الحقول بدون تحقق أو حساب -->
<script>
(function(){
  const $ = (id) => document.getElementById(id);

  const animalTypeEl = $("animalType");
  const breedEl = $("breed");
  const productionEl = $("productionStatus");
  const reproductiveEl = $("reproductiveStatus");

  const entryType = $("entryType");
  const btnMothers = $("btnMothers");
  const btnFollowers = $("btnFollowers");
  const btnImport = $("btnImport");

  const sharedAnimalFields = $("sharedAnimalFields");
  const mothersFields = $("mothersFields");
  const followersFields = $("followersFields");
  const importFields = $("importFields");
  const primaryActionBtn = $("primaryActionBtn");
  const dashboardBtn = $("dashboardBtn");

  const milkField = $("milkField");
  const inseminationField = $("inseminationField");
  const sireField = $("sireField");
  const pregnancyBox = $("pregnancyBox");

  const followerSex = $("followerSex");
  const followerStatus = $("followerStatus");
  const weaningField = $("weaningField");
  const followerInseminationField = $("followerInseminationField");
  const followerPregnancyBox = $("followerPregnancyBox");

  const cowBreeds = ["خليط","هولشتاين","جيرسي","مونبليار","سيمينتال","أخرى"];
  const buffaloBreeds = ["مصري","هجين إيطالي","هجين هندي"];

  function updateBreedOptionsLocal(){
    if (!animalTypeEl || !breedEl) return;

    const type = animalTypeEl.value;
    const breeds =
      type === "بقرة" ? cowBreeds :
      type === "جاموسة" ? buffaloBreeds :
      [];

    const current = breedEl.value;

    breedEl.innerHTML =
      '<option value="">اختر السلالة</option>' +
      breeds.map(b => `<option value="${b}">${b}</option>`).join("");

    if (breeds.includes(current)) {
      breedEl.value = current;
    }
  }

  function toggleMotherFields(){
    const prod = productionEl?.value || "";
    const repro = reproductiveEl?.value || "";

    if (milkField) {
      milkField.style.display = prod === "حلاب" ? "block" : "none";
    }

    const showInsemination =
      repro === "ملقحة" ||
      repro === "عشار" ||
      repro === "مفتوحة" ||
      prod === "جاف";

    if (inseminationField) {
      inseminationField.style.display = showInsemination ? "block" : "none";
    }

    if (sireField) {
      sireField.style.display =
        (repro === "ملقحة" || repro === "عشار") ? "block" : "none";
    }

    if (pregnancyBox) {
      pregnancyBox.style.display = prod === "جاف" ? "block" : "none";
    }
  }

  function updateFollowerStatusOptions(){
    if (!followerSex || !followerStatus) return;

    const sex = followerSex.value;
    const current = followerStatus.value;

    const femaleOptions = ["رضيع","فطام","نامي","تحت التلقيح","ملقح","عشار"];
    const maleOptions = ["رضيع","فطام","نامي"];

    const list =
      sex === "ذكر" ? maleOptions :
      sex === "أنثى" ? femaleOptions :
      [];

    followerStatus.innerHTML =
      '<option value="">اختر الحالة</option>' +
      list.map(v => `<option value="${v}">${v}</option>`).join("");

    if (list.includes(current)) {
      followerStatus.value = current;
    }
  }

  function toggleFollowerFields(){
    const st = followerStatus?.value || "";

    if (weaningField) {
      weaningField.classList.toggle("hidden-block", st !== "فطام");
    }

    if (followerInseminationField) {
      followerInseminationField.classList.toggle(
        "hidden-block",
        !(st === "ملقح" || st === "عشار")
      );
    }

    if (followerPregnancyBox) {
      followerPregnancyBox.classList.toggle("hidden-block", st !== "عشار");
    }
  }

  function setSectionEnabled(root, enabled){
    if (!root) return;

    root.querySelectorAll("input, select, textarea, button").forEach((el) => {
      if (el.id === "previewImportBtn") return;
      el.disabled = !enabled;
    });
  }

  function setEntryMode(mode){
    if (!entryType) return;

    entryType.value = mode;

    const mothers = mode === "mothers";
    const followers = mode === "followers";
    const importing = mode === "import";

    sharedAnimalFields?.classList.toggle("hidden-block", importing);
    mothersFields?.classList.toggle("hidden-block", !mothers);
    followersFields?.classList.toggle("hidden-block", !followers);
    importFields?.classList.toggle("hidden-block", !importing);

    setSectionEnabled(sharedAnimalFields, !importing);
    setSectionEnabled(mothersFields, mothers);
    setSectionEnabled(followersFields, followers);
    setSectionEnabled(importFields, importing);

    if (entryType) entryType.disabled = false;

    if (primaryActionBtn) {
      primaryActionBtn.textContent = importing ? "حفظ الاستيراد" : "📥 تسجيل الحيوان";
      primaryActionBtn.disabled = false;
    }

    btnMothers?.classList.toggle("active", mothers);
    btnFollowers?.classList.toggle("active", followers);
    btnImport?.classList.toggle("active", importing);

    toggleMotherFields();
    updateFollowerStatusOptions();
    toggleFollowerFields();

    const msgBox = $("msg");
    if (msgBox) {
      msgBox.className = "";
      msgBox.style.display = "none";
      msgBox.innerHTML = "";
    }
  }

  animalTypeEl?.addEventListener("change", updateBreedOptionsLocal);
  productionEl?.addEventListener("change", toggleMotherFields);
  reproductiveEl?.addEventListener("change", toggleMotherFields);

  btnMothers?.addEventListener("click", () => setEntryMode("mothers"));
  btnFollowers?.addEventListener("click", () => setEntryMode("followers"));
  btnImport?.addEventListener("click", () => setEntryMode("import"));

  followerSex?.addEventListener("change", () => {
    updateFollowerStatusOptions();
    toggleFollowerFields();
  });

  followerStatus?.addEventListener("change", toggleFollowerFields);

  dashboardBtn?.addEventListener("click", () => {
    location.href = "dashboard.html";
  });

  document.addEventListener("DOMContentLoaded", () => {
    updateBreedOptionsLocal();
    setEntryMode("mothers");
  });

  window.__mbkUI = {
    updateBreedOptions: updateBreedOptionsLocal,
    toggleMotherFields,
    toggleFollowerFields,
    setEntryMode
  };
})();
</script>

<!-- حفظ مباشر عبر السيرفر فقط: لا forms-init ولا Firebase ولا mbk:valid -->
<script>
(function(){
  const form = document.getElementById("animalForm");
  const msgDiv = document.getElementById("msg");
  const infoBar = document.getElementById("addAnimalInfoBar");
  const primaryActionBtn = document.getElementById("primaryActionBtn");

  if (!form) return;

  function getUidDirect(){
    return String(
      localStorage.getItem("userId") ||
      localStorage.getItem("uid") ||
      localStorage.getItem("tenantId") ||
      ""
    ).trim();
  }

function showServerMessage(text, ok){
  const msg = String(text || "").trim() || (ok ? "✅ تم بنجاح" : "تعذّر تنفيذ العملية.");

  if (infoBar) {
    infoBar.style.display = "block";
    infoBar.className = ok
      ? "mbk-infobar status-ok"
      : "mbk-infobar status-error";
    infoBar.textContent = msg;

    try { infoBar.scrollIntoView({ behavior:"smooth", block:"center" }); } catch(_){}
    return;
  }

  if (!msgDiv) {
    alert(msg);
    return;
  }

  msgDiv.className = "toast show";
  msgDiv.style.display = "block";
  msgDiv.textContent = msg;
}
  function collectFormData(){
    const out = {};

    form.querySelectorAll("[data-field]").forEach((el) => {
      const key = el.getAttribute("data-field");
      if (!key) return;
      if (el.disabled) return;

      if (el.type === "checkbox") {
        out[key] = !!el.checked;
        return;
      }

      out[key] = String(el.value ?? "").trim();
    });

    return out;
  }

  async function postToServer(path, payload){
    const uid = getUidDirect();

    if (!uid) {
      return {
        status: 400,
        data: {
          ok: false,
          message: "لم يتم العثور على معرف المستخدم. سجّل الدخول مرة أخرى."
        }
      };
    }

    const r = await fetch(path, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-User-Id": uid
      },
      body: JSON.stringify(payload || {})
    });

    const data = await r.json().catch(() => ({
      ok: false,
      message: "تعذّر قراءة رد السيرفر."
    }));

    return { status: r.status, data };
  }
async function getFromServer(path){
  const uid = getUidDirect();

  if (!uid) {
    return {
      status: 400,
      data: {
        ok: false,
        message: "لم يتم العثور على معرف المستخدم. سجّل الدخول مرة أخرى."
      }
    };
  }

  const r = await fetch(path, {
    method: "GET",
    headers: {
      "X-User-Id": uid
    }
  });

  const data = await r.json().catch(() => ({
    ok: false,
    message: "تعذّر قراءة رد السيرفر."
  }));

  return { status: r.status, data };
}

let numberCheckTimer = null;
let lastCheckedNumber = "";

function setNumberCheckMessage(text, ok){
  showServerMessage(text, ok);
}

function watchAnimalNumberAvailability(){
  const numberEl = document.getElementById("animalNumber");
  if (!numberEl) return;

  numberEl.addEventListener("input", () => {
    clearTimeout(numberCheckTimer);

    const n = String(numberEl.value || "").trim();

    if (!n) {
      lastCheckedNumber = "";
      return;
    }

    numberCheckTimer = setTimeout(async () => {
      try {
        if (n === lastCheckedNumber) return;
        lastCheckedNumber = n;

        const result = await getFromServer(
          "/api/add-animal/check-number?number=" + encodeURIComponent(n)
        );

        const data = result.data || {};

        if (!data.ok) {
          setNumberCheckMessage(data.message || "تعذّر التحقق من الرقم الآن.", false);
          return;
        }

        setNumberCheckMessage(
          data.message || (data.available ? "✅ الرقم متاح للتسجيل." : "⚠️ الرقم موجود بالفعل."),
          !!data.available
        );

      } catch (err) {
        console.warn("animal number check failed:", err);
        setNumberCheckMessage("تعذّر التحقق من الرقم الآن.", false);
      }
    }, 350);
  });
}

watchAnimalNumberAvailability();
  function getImportFilePayload(){
  return window.__IMPORT_FILE_PAYLOAD__ || null;
}
function setValue(id, value){
  const el = document.getElementById(id);
  if (!el) return;
  el.value = value === null || value === undefined ? "" : String(value);
}

let previewTimer = null;

async function refreshServerPreview(){
  clearTimeout(previewTimer);

  previewTimer = setTimeout(async () => {
    try {
      const formData = collectFormData();

      const result = await postToServer("/api/add-animal/preview", { formData });
      const data = result.data || {};

      if (!data.ok) return;

      setValue("daysInMilk", data.daysInMilk);
      setValue("pregnancyDays", data.pregnancyDays);
      setValue("followerPregnancyDays", data.followerPregnancyDays);

    } catch (err) {
      console.warn("add animal preview failed:", err);
    }
  }, 250);
}

[
  "productionStatus",
  "reproductiveStatus",
  "lastCalvingDate",
  "lastInseminationDate",
  "followerStatus",
  "followerLastInseminationDate"
].forEach((id) => {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener("change", refreshServerPreview);
  el.addEventListener("input", refreshServerPreview);
});
  form.addEventListener("submit", async function(e){
    e.preventDefault();

    const formData = collectFormData();
    const entryType = String(formData.entryType || document.getElementById("entryType")?.value || "").trim();

    const isImport = entryType === "import";

    try {
      if (primaryActionBtn) primaryActionBtn.disabled = true;

      showServerMessage("جارِ إرسال البيانات للسيرفر…", true);

     const result = isImport
  ? await postToServer("/api/add-animal/import", {
      importKind: String(document.getElementById("importKind")?.value || "mothers").trim(),
      ...(getImportFilePayload() || {})
    })
  : await postToServer("/api/add-animal/save", { formData });

      const data = result.data || {};

      if (!data.ok) {
        showServerMessage(data.message || "تعذّر تسجيل الحيوان.", false);
        console.warn("add-animal server rejected:", result.status, data);
        return;
      }

      showServerMessage(data.message || "✅ تم تسجيل الحيوان بنجاح", true);

      setTimeout(() => {
        if (data.redirectUrl) {
          location.href = data.redirectUrl;
          return;
        }

        if (data.animalNumber) {
          location.href = "add-event.html?number=" + encodeURIComponent(data.animalNumber);
          return;
        }

        location.href = "dashboard.html";
      }, 900);

    } catch (err) {
      console.error("add-animal direct server request failed:", err);
      showServerMessage("تعذّر الاتصال بالسيرفر أثناء تسجيل الحيوان.", false);

    } finally {
      if (primaryActionBtn) primaryActionBtn.disabled = false;
    }
  });
})();
</script>
 <script>
(function(){
  const importFileEl = document.getElementById("importFile");
  const previewBtn = document.getElementById("previewImportBtn");
  const importMsg = document.getElementById("importMsg");
  const previewWrap = document.getElementById("importPreviewWrap");
  const previewRows = document.getElementById("importPreviewRows");

  function showImportMsg(text, ok = true) {
    if (!importMsg) return;
    importMsg.className = "toast show";
    importMsg.style.display = "block";
    importMsg.innerHTML = `<div>${String(text || "")}</div>`;
    importMsg.style.background = ok ? "#ecfdf5" : "#ffebee";
    importMsg.style.color = ok ? "#065f46" : "#b71c1c";
    importMsg.style.border = ok ? "1px solid #10b98133" : "1px solid #ef9a9a";
  }

  function fileToBase64(file){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(String(reader.result || ""));
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

 function getUidDirect(){
  return String(
    localStorage.getItem("userId") ||
    localStorage.getItem("uid") ||
    localStorage.getItem("tenantId") ||
    ""
  ).trim();
}

async function previewImportOnServer(payload){
  const uid = getUidDirect();

  if (!uid) {
    return {
      status: 400,
      data: {
        ok: false,
        message: "لم يتم العثور على معرف المستخدم. سجّل الدخول مرة أخرى.",
        rows: []
      }
    };
  }

  const r = await fetch("/api/add-animal/import-preview", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-User-Id": uid
    },
    body: JSON.stringify(payload || {})
  });

  const data = await r.json().catch(() => ({
    ok: false,
    message: "تعذّر قراءة رد السيرفر.",
    rows: []
  }));

  return { status: r.status, data };
}

function renderServerPreview(rows){
  if (!previewRows || !previewWrap) return;

  const list = Array.isArray(rows) ? rows : [];

  if (!list.length) {
    previewRows.innerHTML = `
      <tr>
        <td colspan="14">لا توجد صفوف للعرض.</td>
      </tr>
    `;
    previewWrap.classList.remove("hidden-block");
    return;
  }

  previewRows.innerHTML = list.map(r => {
    const x = r.data || {};
    const state = r.ok ? "جاهز" : "مرفوض";

return `
  <tr>
    <td>${r.row || ""}</td>
    <td>${r.animalNumber || ""}</td>
    <td>${x.damNumber || ""}</td>
    <td>${x.animalType || ""}</td>
    <td>${x.breed || ""}</td>
    <td>${x.birthDate || ""}</td>
    <td>${x.followerSex || ""}</td>
    <td>${x.followerStatus || x.productionStatus || ""}</td>
    <td>${x.weaningDate || ""}</td>
    <td>${x.followerLastInseminationDate || x.lastInseminationDate || ""}</td>
    <td>${x.followerServicesCount || x.servicesCount || ""}</td>
    <td>${x.followerSireNumber || x.sireNumber || ""}</td>
    <td>${state}</td>
    <td>${r.message || ""}</td>
  </tr>
`;
  }).join("");

  previewWrap.classList.remove("hidden-block");
}

  previewBtn?.addEventListener("click", async () => {
    try {
      const file = importFileEl?.files?.[0];

      window.__IMPORT_FILE_PAYLOAD__ = null;

      if (previewRows) previewRows.innerHTML = "";
      if (previewWrap) previewWrap.classList.add("hidden-block");

      if (!file) {
        showImportMsg("اختر ملف الاستيراد أولاً", false);
        return;
      }

      const name = String(file.name || "").toLowerCase();
      const allowed =
        name.endsWith(".csv") ||
        name.endsWith(".txt") ||
        name.endsWith(".xlsx") ||
        name.endsWith(".xls");

      if (!allowed) {
        showImportMsg("صيغة الملف غير مدعومة.", false);
        return;
      }

      const fileBase64 = await fileToBase64(file);

      window.__IMPORT_FILE_PAYLOAD__ = {
        fileName: file.name,
        fileBase64
      };

      showImportMsg("جارِ معاينة الملف من السيرفر…", true);

const importKind = String(document.getElementById("importKind")?.value || "mothers").trim();

const result = await previewImportOnServer({
  importKind,
  fileName: file.name,
  fileBase64
});

const data = result.data || {};
window.__IMPORT_LAST_PREVIEW__ = data;
renderServerPreview(data.rows || []);
showImportMsg(data.message || "تمت معاينة الملف من السيرفر.", !!data.ok);
    } catch (err) {
      console.error(err);
      window.__IMPORT_FILE_PAYLOAD__ = null;
      showImportMsg("حدث خطأ أثناء تجهيز ملف الاستيراد", false);
    }
  });
})();
</script>
</body>
</html>
