<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>إضافة حيوان</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/forms.css">

  <style>
    
    body{
  padding-bottom:96px;
}
    .toast{display:none;position:relative;padding:12px 14px 12px 48px;border-radius:14px;background:#ecfdf5;border:1px solid #10b98133;color:#065f46;font-weight:700;box-shadow:0 8px 24px rgba(16,185,129,.15);margin-bottom:10px}
    .toast.show{display:block;animation:toast-pop .25s ease-out}
    .toast .icon{position:absolute;inset-inline-start:12px;top:50%;transform:translateY(-50%);width:22px;height:22px}
    .toast .bar{position:absolute;left:8px;right:8px;bottom:6px;height:3px;background:#d1fae5;border-radius:999px;overflow:hidden}
    .toast .bar span{display:block;height:100%;width:100%;background:#10b981;animation:toast-shrink 1.6s linear forwards}
    @keyframes toast-pop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
    @keyframes toast-shrink{from{width:100%}to{width:0%}}
    #msg.toast.show { display: block; }
    /* === Popup رسالة وسط الصفحة === */
.mbk-popup{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.25);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 99999;
}


.mbk-popup-content{
  background: #ffffff;
  padding: 20px 25px;
  border-radius: 14px;
  box-shadow: 0 6px 30px rgba(0,0,0,0.15);
  font-size: 17px;
  font-weight: bold;
  text-align: center;
  max-width: 80%;
  line-height: 1.6;
  border-inline-start: 6px solid #2e7d32;
}

.mbk-popup-success{
  border-inline-start-color: #2e7d32;
  color: #2e7d32;
}

.mbk-popup-error{
  border-inline-start-color: #c62828;
  color: #c62828;
}
.entry-type-box{
  display:flex;
  align-items:flex-end;
  justify-content:flex-start;
  gap:0;
  margin:8px 0 18px;
  padding:0;
  border-bottom:1px solid #e5e7eb;
}

.entry-tab{
  appearance:none;
  border:none;
  background:transparent;
  color:#6b7280;
  font-family:'Cairo',system-ui,sans-serif;
  font-size:15px;
  font-weight:800;
  padding:10px 14px 14px;
  margin:0;
  min-height:auto;
  border-radius:0;
  cursor:pointer;
  box-shadow:none;
  position:relative;

  width:auto !important;
  min-width:unset !important;
  max-width:none !important;
  flex:0 0 auto !important;
  display:inline-flex !important;
  align-items:center;
  justify-content:center;
}

.entry-tab:hover{
  background:transparent;
  color:#111827;
  transform:none;
  box-shadow:none;
}

.entry-tab:active{
  transform:none;
}

.entry-tab.active{
  background:transparent;
  color:#0e9f57;
  border:none;
  box-shadow:none;
}

.entry-tab.active::after{
  content:"";
  position:absolute;
  right:0;
  left:0;
  bottom:-1px;
  height:3px;
  border-radius:999px 999px 0 0;
  background:#0e9f57;
}

.entry-tab:focus-visible{
  outline:none;
  color:#111827;
  box-shadow:none;
}

@media (max-width:640px){
  .entry-type-box{
    overflow-x:auto;
    scrollbar-width:none;
  }

  .entry-type-box::-webkit-scrollbar{
    display:none;
  }

  .entry-tab{
    font-size:14px;
    padding:10px 12px 12px;
  }
}
  
.preview-wrap{
  display:block;
  width:100%;
  overflow-x:auto;
  overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  border:1px solid #e5e7eb;
  border-radius:14px;
  background:#fff;
  margin-top:12px;
}

.preview-wrap table{
  width:max-content;
  min-width:1200px;
  border-collapse:collapse;
  font-size:14px;
}

.preview-wrap th,
.preview-wrap td{
  white-space:nowrap;
  padding:10px 12px;
  border-bottom:1px solid #eef2f7;
  text-align:right;
}

.preview-wrap thead th{
  position:sticky;
  top:0;
  background:#f8fafc;
  z-index:1;
  font-weight:800;
}
.mbk-page-bottom-bar{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:9998;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px 12px calc(10px + env(safe-area-inset-bottom));
  background:#ffffff;
  border-top:1px solid #e5e7eb;
  box-shadow:0 -6px 20px rgba(15,23,42,.06);
}

.mbk-bottom-btn{
  appearance:none;
  min-height:50px;
  border-radius:14px;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Cairo',system-ui,sans-serif;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
  transition:transform .12s ease, box-shadow .18s ease, background .18s ease, color .18s ease;
}

.mbk-bottom-btn:active{
  transform:scale(.985);
}

.mbk-bottom-btn-primary{
  border:none;
  background:#16a34a;
  color:#fff;
  box-shadow:0 8px 18px rgba(22,163,74,.18);
}

.mbk-bottom-btn-ghost{
  border:1px solid #dbe4dc;
  background:#fff;
  color:#0f172a;
  box-shadow:0 4px 12px rgba(15,23,42,.05);
}

@media (max-width:640px){
  .mbk-page-bottom-bar{
    grid-template-columns:1fr 1fr;
    gap:8px;
  }

 .mbk-bottom-btn{
  min-height:48px;
  font-size:14px;
}
.btn-row{
  margin-top:14px;
  }
}

 <header class="mbk-head">

   <div id="milkField">

   <div id="inseminationField">

<input type="date" id="lastInseminationDate" data-field="lastInseminationDate" />    </div>
    <div id="sireField">

<input type="text" id="sireNumber" placeholder="اكتب رقم الطلوقة" data-field="sireNumber" />

    <div id="followersFields" class="hidden-block">

<select id="followerSex" data-field="followerSex">

<select id="followerStatus" data-field="followerStatus">

  <label for="damNumber">رقم الأم:</label>
<input type="text" id="damNumber" placeholder="اكتب رقم الأم" data-field="damNumber" />
  <div id="weaningField" class="hidden-block">
    <label for="weaningDate">تاريخ الفطام:</label>
<input type="date" id="weaningDate" data-field="weaningDate" />  </div>

<input type="date" id="followerLastInseminationDate" data-field="followerLastInseminationDate" />

<input type="number" id="followerServicesCount" min="0" placeholder="0" data-field="followerServicesCount" />

<input type="text" id="followerSireNumber" placeholder="اكتب رقم الطلوقة" data-field="followerSireNumber" />  </div>

<div class="btn-row">
 <button type="button" id="previewImportBtn" class="mbk-bottom-btn mbk-bottom-btn-ghost">معاينة الملف</button>
</div>

  <div id="importMsg" class="toast"></div>

  <div class="preview-wrap hidden-block" id="importPreviewWrap">

     <thead>

<th>رقم الحيوان</th>

 <div id="pageBottomBar" class="mbk-page-bottom-bar">

 <script>
  (function(){
    const entryType = document.getElementById('entryType');
    const btnMothers = document.getElementById('btnMothers');
    const btnFollowers = document.getElementById('btnFollowers');
    const btnImport = document.getElementById('btnImport');

    const sharedAnimalFields = document.getElementById('sharedAnimalFields');
    const mothersFields = document.getElementById('mothersFields');
    const followersFields = document.getElementById('followersFields');
    const importFields = document.getElementById('importFields');
    const primaryActionBtn = document.getElementById('primaryActionBtn');

    function setEntryMode(mode){
      entryType.value = mode;

      const mothers = mode === 'mothers';
      const followers = mode === 'followers';
      const importing = mode === 'import';

      sharedAnimalFields.classList.toggle('hidden-block', importing);
      mothersFields.classList.toggle('hidden-block', !mothers);
      followersFields.classList.toggle('hidden-block', !followers);
      importFields.classList.toggle('hidden-block', !importing);

      btnMothers.classList.toggle('active', mothers);
      btnFollowers.classList.toggle('active', followers);
      btnImport.classList.toggle('active', importing);

      primaryActionBtn.textContent = importing ? 'حفظ الاستيراد' : '📥 تسجيل الحيوان';
    }

    btnMothers?.addEventListener('click', () => setEntryMode('mothers'));
    btnFollowers?.addEventListener('click', () => setEntryMode('followers'));
    btnImport?.addEventListener('click', () => setEntryMode('import'));

    document.addEventListener('DOMContentLoaded', () => {
      setEntryMode('mothers');
    });
  })();
</script>
 

<script>
  const form = document.getElementById("animalForm");
  form.noValidate = true;
  const msgDiv = document.getElementById("msg");

  const bar = window.ensureInfoBar ? window.ensureInfoBar(form) : null;

  const showCentral = (msg, type = "success") =>
    window.showMsg
      ? window.showMsg(bar, msg, type)
      : showPopup(msg, type !== "error");

  const DASHBOARD_URL = "dashboard.html";

  function getCurrentUid(){
    return (
      window.mbk?.userId ||
      localStorage.getItem("userId") ||
      localStorage.getItem("uid") ||
      localStorage.getItem("tenantId") ||
      ""
    ).trim();
  }

  function todayLocal(){
    const d = new Date();
    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    return d.toISOString().slice(0, 10);
  }

  function setMsg(text, ok = false){
    showCentral(text, ok ? "success" : "error");
  }

  function showPopup(msg, ok = true){
    const box = document.getElementById("popupBox");
    const content = document.getElementById("popupContent");
    if (!box || !content) return;

    content.textContent = msg;
    content.className = "mbk-popup-content " + (ok ? "mbk-popup-success" : "mbk-popup-error");
    box.style.display = "flex";

    setTimeout(() => {
      box.style.display = "none";
    }, 1800);
  }

  async function postAddAnimalApi(url, body){
    const uid = getCurrentUid();

    if (!uid) {
      throw new Error("userId_required");
    }

    const r = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json",
        "X-User-Id": uid
      },
      cache: "no-store",
      body: JSON.stringify(body || {})
    });

    const j = await r.json().catch(() => null);

    if (!r.ok || !j || j.ok === false) {
      const msg = j?.message || "حدث خطأ أثناء تنفيذ العملية.";
      const err = new Error(msg);
      err.response = j;
      throw err;
    }

    return j;
  }
function fillSelectOptions(selectId, items, placeholder = "اختر"){
  const el = document.getElementById(selectId);
  if (!el) return;

  const currentValue = el.value || "";

  el.innerHTML = `<option value="">${placeholder}</option>`;

  (Array.isArray(items) ? items : []).forEach(item => {
    const opt = document.createElement("option");
    opt.value = item.value || "";
    opt.textContent = item.label || item.value || "";
    el.appendChild(opt);
  });

  if (currentValue && Array.from(el.options).some(opt => opt.value === currentValue)) {
    el.value = currentValue;
  }
}

async function loadAddAnimalOptions(){
  const uid = getCurrentUid();

  if (!uid) {
    throw new Error("userId_required");
  }

 const animalType = document.getElementById("animalType")?.value || "";
const qs = new URLSearchParams();

if (animalType) {
  qs.set("animalType", animalType);
}

const url = "/api/add-animal/options" + (qs.toString() ? "?" + qs.toString() : "");

const r = await fetch(url, {
    method: "GET",
    headers: {
      "Accept": "application/json",
      "X-User-Id": uid
    },
    cache: "no-store"
  });

  const res = await r.json().catch(() => null);

  if (!r.ok || !res || res.ok === false) {
    throw new Error(res?.message || "تعذّر تحميل اختيارات صفحة إضافة الحيوان.");
  }

  fillSelectOptions("animalType", res.animalTypes, "اختر النوع");
  fillSelectOptions("breed", res.breeds, "اختر السلالة");
  fillSelectOptions("productionStatus", res.productionStatuses, "اختر الحالة");
  fillSelectOptions("reproductiveStatus", res.reproductiveStatuses, "اختر الحالة");
  fillSelectOptions("followerSex", res.followerSexes, "اختر الجنس");
  fillSelectOptions("followerStatus", res.followerStatuses, "اختر الحالة");
}
window.addEventListener("DOMContentLoaded", () => {
  history.pushState({ page: "add-animal" }, "", location.href);

  loadAddAnimalOptions().catch(err => {
    console.error(err);
    setMsg("تعذّر تحميل اختيارات صفحة إضافة الحيوان من السيرفر.", false);
  });

  document.getElementById("animalType")?.addEventListener("change", () => {
  fillSelectOptions("breed", [], "اختر السلالة");

  loadAddAnimalOptions().catch(err => {
    console.error(err);
    setMsg("تعذّر تحميل السلالات من السيرفر.", false);
  });
});

  document.getElementById("dashboardBtn")?.addEventListener("click", () => {
    location.href = DASHBOARD_URL;
  });

  window.addEventListener("popstate", () => {
    location.href = DASHBOARD_URL;
  });

  document.getElementById("cancelLink")?.addEventListener("click", (e) => {
    e.preventDefault();
    location.href = DASHBOARD_URL;
  });
});

function collectAddAnimalFormData(){
  const out = {};

  document.querySelectorAll("[data-field]").forEach(el => {
    if (!el || !el.dataset || !el.dataset.field) return;
    out[el.dataset.field] = el.value ?? "";
  });

  return out;
}
  form.addEventListener("submit", async (e) => {
  e.preventDefault();
    try {
      if (msgDiv) msgDiv.style.display = "none";

      const entryType = String(document.getElementById("entryType")?.value || "").trim();

      if (entryType === "import") {
        const preview = window.__IMPORT_PREVIEW__ || [];
        const profile = window.__IMPORT_PROFILE__ || null;
        const importKind = String(document.getElementById("importKind")?.value || "mothers").trim();

        if (!preview.length) {
          setMsg("راجع الملف أولًا قبل الحفظ.", false);
          return;
        }

        const res = await postAddAnimalApi("/api/add-animal/import-save", {
          importKind,
          profileKey: profile?.key || "",
          rows: preview
        });

        showCentral(res.message || "✅ تم حفظ الاستيراد بنجاح", "success");

        setTimeout(() => {
          location.href = res.redirectUrl || "dashboard.html";
        }, 1200);

        return;
      }

     const formData = collectAddAnimalFormData();

      const res = await postAddAnimalApi("/api/add-animal/save", {
        formData
      });

      showCentral(res.message || "✅ تم تسجيل الحيوان بنجاح", "success");

      localStorage.setItem("currentAnimalId", res.animalId || "");
      localStorage.setItem("currentAnimalNumber", res.animalNumber || res.number || "");

      setTimeout(() => {
        location.href =
          res.redirectUrl ||
          `add-event.html?number=${encodeURIComponent(res.animalNumber || res.number || "")}&date=${encodeURIComponent(todayLocal())}`;
      }, 1200);

    } catch (err) {
      console.error(err);

      const msg =
        err?.response?.message ||
        err?.message ||
        "حدث خطأ أثناء تسجيل الحيوان.";

      setMsg(msg, false);
    }
  });
</script>

 <script>
  const importFileEl = document.getElementById("importFile");
  const previewBtn = document.getElementById("previewImportBtn");
  const importMsg = document.getElementById("importMsg");
  const previewWrap = document.getElementById("importPreviewWrap");
  const previewRows = document.getElementById("importPreviewRows");

  function showImportMsg(text, ok = true) {
    if (!importMsg) return;
    importMsg.className = "toast show";
    importMsg.style.display = "block";
    importMsg.innerHTML = `<div>${text}</div>`;
  }

  function clearPreview() {
    if (previewRows) previewRows.innerHTML = "";
    if (previewWrap) previewWrap.classList.add("hidden-block");
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();

      reader.onload = () => resolve(String(reader.result || ""));
      reader.onerror = () => reject(reader.error || new Error("file_read_failed"));

      reader.readAsDataURL(file);
    });
  }

  function renderServerPreview(rows) {
    if (!previewRows || !previewWrap) return;

    const list = Array.isArray(rows) ? rows : [];

    previewRows.innerHTML = list.map(r => {
      const x = r.row || {};
      const status = r.status || "";
      const reason = r.reason || "";

      return `
        <tr>
          <td>${r.number || x.animalNumber || ""}</td>
          <td>${x.animalType || ""}</td>
          <td>${x.breed || ""}</td>
          <td>${x.birthDate || ""}</td>
          <td>${x.productionStatus || ""}</td>
          <td>${x.dailyMilk || ""}</td>
          <td>${x.reproductiveStatus || ""}</td>
          <td>${x.servicesCount || ""}</td>
          <td>${x.lactationNumber || ""}</td>
          <td>${x.sireNumber || ""}</td>
          <td>${x.lastCalvingDate || ""}</td>
          <td>${x.lastInseminationDate || ""}</td>
          <td>${status}</td>
          <td>${reason}</td>
        </tr>
      `;
    }).join("");

    previewWrap.classList.remove("hidden-block");
  }

  previewBtn?.addEventListener("click", async () => {
    try {
      clearPreview();

      const file = importFileEl?.files?.[0];

      if (!file) {
        showImportMsg("اختر ملف الاستيراد أولًا", false);
        return;
      }

      const fileBase64 = await fileToBase64(file);
      const importKind = String(document.getElementById("importKind")?.value || "mothers").trim();

      const res = await postAddAnimalApi("/api/add-animal/import-preview", {
        importKind,
        fileName: file.name,
        fileBase64
      });

      window.__IMPORT_PREVIEW__ = Array.isArray(res.rows) ? res.rows : [];
      window.__IMPORT_PROFILE__ = { key: "server_file_import", label: "استيراد من السيرفر" };

      renderServerPreview(window.__IMPORT_PREVIEW__);

      showImportMsg(
        res.message || `تمت معاينة ${window.__IMPORT_PREVIEW__.length} سجل من السيرفر`,
        true
      );

    } catch (err) {
      console.error(err);

      showImportMsg(
        err?.response?.message || err?.message || "حدث خطأ أثناء معاينة ملف الاستيراد.",
        false
      );
    }
  });
</script>
</body>
</html>
