<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>

  <title>التجفيف — مُرَبِّيك</title>

  <!-- ✅ Murabbik global styles + central validation/gate -->
  <link rel="stylesheet" href="css/forms.css">
  


  <style>
    /* ✅ Header (Murabbik standard) */
    header{
      position: sticky;
      top: 0;
      z-index: 20;
      background: #fff;
      border-bottom: 1px solid var(--border, #e2e8f0);
    }
    .mbk-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:10px 12px;
    }
    .mbk-logo{
      width:auto;
      height:48px;
      object-fit:contain;
      opacity:.95;
      flex-shrink:0;
    }
    .mbk-center{
      flex:1;
      text-align:center;
      line-height:1.2;
    }
    .mbk-page-title{
      font-size:18px;
      font-weight:900;
      color: var(--ink, #0f172a);
    }
    .mbk-app-name{
      font-size:13px;
      font-weight:800;
      color: var(--brand-600, #0b7f47);
      opacity:.9;
    }
    .mbk-back{
      width:42px;
      height:42px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      font-weight:900;
      color: var(--brand-600, #0b7f47);
      border:2px solid var(--brand-600, #0b7f47);
      background:#fff;
      flex-shrink:0;
    }

    /* ✅ Page layout uses forms.css tokens */
    .wrap{
      max-width:520px;
      margin:12px auto 24px;
      padding:0 12px;
    }
    .mbk-card{
      background:#fff;
      border:1px solid var(--border, #e2e8f0);
      border-radius:16px;
      padding:14px;
      box-shadow:0 1px 0 rgba(15,23,42,.04);
    }
    .field{ margin-bottom:12px; }

    /* ✅ option-group chips (Murabbik style) */
    .option-group{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:8px;
      margin-bottom:8px;
    }
    .option-group label{
      display:flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--border, #e2e8f0);
      background:#fff;
      cursor:pointer;
      font-weight:800;
      font-size:14px;
    }
/* ✅ RADIO / OPTION GROUP — واضح ومتناسق (بدون :has) */
.option-group{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
}

.option-group label{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  border:none;
  background:none;
  cursor:pointer;
  font-weight:800;
  font-size:14px;
}
.radio-container{
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f8fafc;
  border-radius:14px;
  padding:10px 8px;
  margin-top:8px;
  margin-bottom:10px;
}
/* نخفي الراديو الافتراضي ونرسم دائرة واضحة */
.option-group input[type="radio"]{
  appearance:none;
  -webkit-appearance:none;
  width:12px;
  height:12px;
  border-radius:50%;
  border:1.8px solid #cbd5e1;
  background:#fff;
  position:relative;
  cursor:pointer;
}
.option-group input[type="radio"]:checked{
  border-color:#0ea05a;
}

.option-group input[type="radio"]:checked::after{
  content:"";
  position:absolute;
  inset:2.5px;
  border-radius:50%;
  background:#0ea05a;
}

.option-group label:active{ transform:scale(.99); }

    /* ✅ Bottom actions (Murabbik style) */
    .btn-row{
      position: sticky;
      bottom: 10px;
      background: #fff;
      padding: 10px;
      border: 1px solid var(--border, #e2e8f0);
      border-radius: 16px;
      display:flex;
      gap:10px;
      margin-top:14px;
    }
    .btn-row .save-btn,
    .btn-row .open-card{
      flex:1;
      width:auto;
      border-radius:14px;
      padding:12px 14px;
      font-weight:900;
      font-size:16px;
      cursor:pointer;
    }
    .btn-row .save-btn{
      background: var(--brand, #0ea05a);
      color:#fff;
      border:0;
    }
    .btn-row .open-card{
      background:#fff !important;
      color: var(--brand-600, #0b7f47) !important;
      border:2px solid var(--brand-600, #0b7f47) !important;
    }

    /* ✅ keep infobar clean */
    #info.infobar{ display:none; }
  </style>
</head>

<body>
  <!-- ✅ Murabbik Standard Header -->
  <header>
    <div class="mbk-head">
      <a class="mbk-back" href="add-event.html" title="رجوع">رجوع</a>

      <div class="mbk-center">
        <div class="mbk-page-title">التجفيف</div>
        <div class="mbk-app-name">مُرَبِّيك</div>
      </div>

      <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">
    </div>
  </header>

 <div class="wrap">
  <!-- ✅ Infobar (سيستخدمه showMsg) -->
  <div id="info" class="infobar"></div>

  <form id="dryOffForm" class="mbk-card" data-event="تجفيف">

    <div class="field">
      <label for="animalNumber">رقم الحيوان</label>
      <input type="text" id="animalNumber" data-field="animalNumber" required />
    </div>

    <div class="field">
      <label for="eventDate">تاريخ التجفيف</label>
      <input type="date" id="eventDate" data-field="eventDate" required />
    </div>

    <div class="field">
      <label for="gestationDays">أيام الحمل (محسوبة تلقائيًا)</label>
      <input type="number" id="gestationDays" data-field="gestationDays" required readonly />
    </div>

   <div class="field">
  <label for="reason">سبب التجفيف (يُحدد تلقائيًا)</label>
  <input type="text" id="reason" data-field="reason" readonly required />
</div>


    <div class="field">
      <label>تأكيد الحمل</label>
      <div class="radio-container"> 
        <div class="option-group"> 
        <label><input type="radio" data-field="pregnancyStatus" name="pregnancyStatus" value="عشار" required /> عشار</label>
        <label><input type="radio" data-field="pregnancyStatus" name="pregnancyStatus" value="فارغة" required /> فارغة</label>
      </div>
    </div>
  </div>

    <div class="field">
      <label>تم استخدام محاقن التجفيف؟</label>
      <div class="radio-container"> 
        <div class="option-group">   
        <label><input type="radio" data-field="usedDryingAntibiotics" name="usedDryingAntibiotics" value="نعم" required /> نعم</label>
        <label><input type="radio" data-field="usedDryingAntibiotics" name="usedDryingAntibiotics" value="لا" required /> لا</label>
      </div>
    </div>
  </div>

    <!-- ✅ Bottom actions -->
    <div class="btn-row">
      <button class="save-btn" type="submit">حفظ التجفيف</button>
      <button class="open-card" id="openCowCard" type="button">فتح بطاقة الحيوان</button>
    </div>

  </form>
</div>

 <script>
  const form = document.getElementById("dryOffForm");

  const animalEl = document.getElementById("animalNumber");
  const dateEl = document.getElementById("eventDate");
  const gestEl = document.getElementById("gestationDays");
  const reasonEl = document.getElementById("reason");
  const info = document.getElementById("info");
  const openCardBtn = document.getElementById("openCowCard");

  let acceptedRows = [];
  let rejectedRows = [];
  let gateOk = false;
  let gateTimer = null;

  function getUid() {
    try {
      return String(
        localStorage.getItem("userId") ||
        localStorage.getItem("uid") ||
        localStorage.getItem("tenantId") ||
        ""
      ).trim();
    } catch (_) {
      return "";
    }
  }

  function apiBase() {
    try {
      return String(
        window.API_BASE ||
        localStorage.getItem("API_BASE") ||
        ""
      ).replace(/\/$/, "");
    } catch (_) {
      return "";
    }
  }

  function apiUrl(path) {
    const base = apiBase();
    return base ? `${base}${path}` : path;
  }

  function todayYYYYMMDD() {
    const d = new Date();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${d.getFullYear()}-${m}-${day}`;
  }

  function escapeHtml(s) {
    return String(s ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function showMsg(msg, type = "info") {
    if (!info) return;

    const cls =
      type === "error" ? "error" :
      type === "success" ? "success" :
      type === "warning" ? "warning" :
      "info";

    info.style.display = "block";
    info.className = `infobar mbk-infobar show ${cls}`;
    info.innerHTML = `
      <div style="white-space:pre-line;font-weight:900;font-size:16px;line-height:1.7">
        ${escapeHtml(msg)}
      </div>
    `;

    try {
      info.scrollIntoView({ behavior: "smooth", block: "start" });
    } catch (_) {}
  }

  function normalizeDigits(s) {
    const map = {
      "٠":"0","١":"1","٢":"2","٣":"3","٤":"4","٥":"5","٦":"6","٧":"7","٨":"8","٩":"9",
      "۰":"0","۱":"1","۲":"2","۳":"3","۴":"4","۵":"5","۶":"6","۷":"7","۸":"8","۹":"9"
    };

    return String(s || "")
      .replace(/[٠-٩۰-۹]/g, d => map[d] || d);
  }

  function splitNumbers(raw) {
    return [...new Set(
      normalizeDigits(raw)
        .split(/[\s,،;]+/g)
        .map(x => x.trim())
        .filter(Boolean)
    )];
  }

  function selectedRadio(name) {
    return form.querySelector(`input[name="${name}"]:checked`)?.value || "";
  }

  function setButtonLoading(isLoading) {
    const btn = form.querySelector('button[type="submit"]');
    if (!btn) return;

    btn.disabled = !!isLoading;
    btn.textContent = isLoading ? "جارِ الحفظ..." : "حفظ التجفيف";
  }

  function resetGateResult() {
    acceptedRows = [];
    rejectedRows = [];
    gateOk = false;
    gestEl.value = "";
    reasonEl.value = "";
  }

function renderGateResult(data) {
  acceptedRows = Array.isArray(data?.accepted) ? data.accepted : [];
  rejectedRows = Array.isArray(data?.rejected) ? data.rejected : [];
  gateOk = acceptedRows.length > 0;

  if (acceptedRows.length === 1) {
    const row = acceptedRows[0];
    gestEl.value = row.gestationDays ?? "";
    reasonEl.value = row.reason || "";
  } else if (acceptedRows.length > 1) {
    gestEl.value = "";
    reasonEl.value = "تجفيف جماعي";
  } else {
    gestEl.value = "";
    reasonEl.value = "";
  }

  if (!acceptedRows.length && rejectedRows.length === 1) {
    const r = rejectedRows[0] || {};
    showMsg(r.reason || data?.message || "❌ الحيوان غير مؤهل لتسجيل التجفيف.", "error");
    return;
  }

  if (acceptedRows.length === 1 && !rejectedRows.length) {
    const row = acceptedRows[0];
    showMsg(`✅ الحيوان مؤهل لتسجيل التجفيف.\n${row.animalNumber} — ${row.reason} — ${row.gestationDays} يوم`, "success");
    return;
  }

  let msg = `نتيجة التحقق:\nالمؤهل: ${acceptedRows.length}\nغير المؤهل: ${rejectedRows.length}`;

  if (acceptedRows.length) {
    msg += "\n\n✅ المؤهل:";
    msg += "\n" + acceptedRows
      .map(r => `${r.animalNumber} — ${r.reason} — ${r.gestationDays} يوم`)
      .join("\n");
  }

  if (rejectedRows.length) {
    msg += "\n\n❌ غير المؤهل:";
    msg += "\n" + rejectedRows
      .map(r => `${r.animalNumber || "-"} — ${r.reason || "غير مؤهل"}`)
      .join("\n");
  }

  showMsg(msg, gateOk ? "success" : "error");
}
  async function runDryOffGate({ silent = false } = {}) {
    const uid = getUid();
    const animalNumbers = animalEl.value.trim();
    const eventDate = dateEl.value;

    resetGateResult();

    if (!uid) {
      if (!silent) showMsg("❌ لم يتم العثور على المستخدم. سجّل الدخول مرة أخرى.", "error");
      return false;
    }

    if (!animalNumbers || !eventDate) {
      if (!silent) showMsg("أدخل رقم الحيوان وتاريخ التجفيف أولًا.", "warning");
      return false;
    }

    try {
      if (!silent) showMsg("جارِ التحقق من أهلية التجفيف...", "info");

      const r = await fetch(apiUrl("/api/dry-off/gate"), {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-User-Id": uid
        },
        body: JSON.stringify({
          animalNumbers,
          eventDate
        })
      });

      const data = await r.json().catch(() => null);

      if (!data || data.ok !== true || data.allowed !== true) {
        renderGateResult(data || {
          message: "❌ الحيوان غير مؤهل لتسجيل التجفيف.",
          accepted: [],
          rejected: []
        });
        return false;
      }

      renderGateResult(data);
      return true;

    } catch (err) {
      console.error("dry-off gate failed:", err);
      showMsg("❌ تعذّر التحقق من أهلية التجفيف الآن.", "error");
      return false;
    }
  }

  function scheduleGate() {
    clearTimeout(gateTimer);
    gateTimer = setTimeout(() => {
      runDryOffGate({ silent: true });
    }, 450);
  }

  async function saveDryOff() {
    const uid = getUid();
    const eventDate = dateEl.value;
    const pregnancyStatus = selectedRadio("pregnancyStatus");
    const usedDryingAntibiotics = selectedRadio("usedDryingAntibiotics");

    if (!uid) {
      showMsg("❌ لم يتم العثور على المستخدم. سجّل الدخول مرة أخرى.", "error");
      return;
    }

    if (!eventDate) {
      showMsg("❌ تاريخ التجفيف مطلوب.", "error");
      return;
    }

    if (!pregnancyStatus) {
      showMsg("❌ تأكيد الحمل مطلوب.", "error");
      return;
    }

    if (!usedDryingAntibiotics) {
      showMsg("❌ حدد هل تم استخدام محاقن التجفيف.", "error");
      return;
    }

    if (!gateOk || !acceptedRows.length) {
      const ok = await runDryOffGate({ silent: false });
      if (!ok) return;
    }

    try {
      setButtonLoading(true);
      showMsg("جارِ حفظ التجفيف...", "info");

      const r = await fetch(apiUrl("/api/dry-off/save"), {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-User-Id": uid
        },
        body: JSON.stringify({
          eventDate,
          pregnancyStatus,
          usedDryingAntibiotics,
          accepted: acceptedRows,
          tz: Intl.DateTimeFormat().resolvedOptions().timeZone || "UTC"
        })
      });

      const data = await r.json().catch(() => null);

      if (!data || data.ok !== true) {
        const msg = data?.message || "❌ لم يتم حفظ التجفيف.";
        const rejected = Array.isArray(data?.rejected) && data.rejected.length
          ? "\n\n" + data.rejected.map(x => `❌ ${x.animalNumber || "-"} — ${x.reason || ""}`).join("\n")
          : "";

        showMsg(msg + rejected, "error");
        setButtonLoading(false);
        return;
      }

      let msg = data.message || "✅ تم حفظ التجفيف بنجاح.";

      if (Array.isArray(data.rejected) && data.rejected.length) {
        msg += "\n\nلم تُحفظ:";
        msg += "\n" + data.rejected.map(x => `❌ ${x.animalNumber || "-"} — ${x.reason || ""}`).join("\n");
      }

      showMsg(msg, "success");

      try {
        const first = data?.saved?.[0]?.animalNumber || acceptedRows?.[0]?.animalNumber || "";
        if (first) localStorage.setItem("lastAnimalId", first);
      } catch (_) {}

      setTimeout(() => {
        if (data.redirectUrl) {
          location.href = data.redirectUrl;
          return;
        }

        const first = data?.saved?.[0]?.animalNumber || acceptedRows?.[0]?.animalNumber || "";
        if (first) {
          location.href = `event-list.html?number=${encodeURIComponent(first)}`;
        } else {
          location.href = "dashboard.html";
        }
      }, 900);

    } catch (err) {
      console.error("dry-off save failed:", err);
      showMsg("❌ فشل الاتصال بالسيرفر أثناء حفظ التجفيف.", "error");
      setButtonLoading(false);
    }
  }

  window.addEventListener("load", () => {
    const qp = new URLSearchParams(location.search);
    const qpNum = qp.get("number") || qp.get("animalNumber") || qp.get("animalId") || "";
    const stored = localStorage.getItem("lastAnimalId") || "";

    const startNumber = qpNum || stored || "";
    if (startNumber) {
      animalEl.value = startNumber;
    }

    if (!dateEl.value) {
      dateEl.value = todayYYYYMMDD();
    }

    if (animalEl.value && dateEl.value) {
      runDryOffGate({ silent: true });
    }
  });

  animalEl.addEventListener("input", scheduleGate);
  dateEl.addEventListener("change", scheduleGate);

  openCardBtn?.addEventListener("click", () => {
    const first = splitNumbers(animalEl.value)[0] || "";
    if (!first) return;
    location.href = `/cow-card.html?number=${encodeURIComponent(first)}`;
  });

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    saveDryOff();
  });
</script>
</body>
</html>
