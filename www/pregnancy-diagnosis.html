<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>تشخيص الحمل — مُرَبِّك</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="stylesheet" href="css/forms.css">
 

</head>
<body>

<div id="mbkPopup"></div>
<header>
  <div class="mbk-head">
    <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">
    <div class="mbk-center">
      <div class="mbk-page-title">تشخيص الحمل</div>
      <div class="mbk-app-name">مُرَبِّيك</div>
    </div>
    <a class="mbk-back" href="add-event.html">رجوع</a>
  </div>
</header>
  <div id="gateBox" class="infobar mbk-infobar" style="display:none; max-width:430px; margin:10px auto 12px;"></div>
<main class="mbk-form">
  <section class="mbk-card">
   <form id="diagnosisForm" data-event="تشخيص حمل" autocomplete="off">
      <label for="animalNumber">رقم الحيوان</label>
     <input type="text" id="animalNumber" name="animalNumber" data-field="animalNumber">

      <label for="eventDate">تاريخ التشخيص</label>
      <input type="date" id="eventDate" name="eventDate" data-field="eventDate">
     
      <fieldset>
<legend>تشخيص الحمل</legend>

<div style="margin-bottom:12px">
  <div class="sub-title">نوع الفحص</div>
  <div class="radio-group" id="checkTypeGroup">
    <label>
     <input type="radio" name="checkType" data-field="checkType" value="initial_pregnancy_diagnosis">
      تشخيص حمل أولي
    </label>
    <label>
      <input type="radio" name="checkType" data-field="checkType" value="pregnancy_confirmation_120">
      تأكيد حمل 120 يوم
    </label>
  </div>
</div>

<div class="row">
          <div>
            <div class="sub-title">طريقة التشخيص</div>
            <div class="radio-group" id="methodGroup">
           <label><input type="radio" name="method" data-field="method" value="ultrasound"> سونار</label>
             <label><input type="radio" name="method" data-field="method" value="manual"> يدوي</label>
            </div>
          </div>

          <div>
            <div class="sub-title">النتيجة</div>
            <div class="radio-group" id="resultGroup">
            <label><input type="radio" name="result" data-field="result" value="عشار"> <span id="positiveResultLabel">عشار</span></label>
            <label><input type="radio" name="result" data-field="result" value="فارغة"> <span id="negativeResultLabel">فارغة</span></label>
            </div>
          </div>
        </div>
 </fieldset>

<div id="bulkResultBox" class="preview-scroll" style="display:none; margin-top:14px;">
  <div class="sub-title" id="bulkResultTitle">نتيجة كل حيوان</div>
  <div style="font-size:13px; color:#555; margin-bottom:8px; line-height:1.7;">
    في التسجيل الجماعي اختر نتيجة مستقلة لكل رقم.
  </div>
  <div id="bulkResultRows"></div>
</div>

      <label for="vet">اسم الطبيب البيطري (اختياري)</label>
      <input type="text" id="vet" name="vet" data-field="vet">

    <div class="actions-bar">
  <button type="submit" id="saveBtn" class="save">تسجيل التشخيص</button>
</div>
    </form>
    </section>
</main>

<script type="module">
  // MURABBIK_STATUS: UI_ONLY | pregnancy-diagnosis.html | server-side gate/save pending via forms-init

  const qp = new URLSearchParams(location.search);

 const animalFromURL =
  qp.get("numbers") ||
  qp.get("animalNumbers") ||
  qp.get("animalNumber") ||
  qp.get("number") ||
  qp.get("animalId") ||
  "";
  const dateFromURL =
    qp.get("date") ||
    qp.get("eventDate") ||
    "";
  const animalEl = document.getElementById("animalNumber");
  const dateEl = document.getElementById("eventDate");

  if (animalEl) {
    animalEl.value = String(animalFromURL || "").trim();
  }

  if (dateEl) {
    dateEl.value = dateFromURL || new Date().toISOString().slice(0, 10);
  }
  const checkTypeFromURL =
  qp.get("checkType") ||
  qp.get("pregnancyCheckType") ||
  "";

if (checkTypeFromURL) {
  document.querySelectorAll('input[name="checkType"]').forEach(el => {
    if (el.value === checkTypeFromURL) {
      el.checked = true;
    }
  });
}
function parseNumbers(raw) {
  const map = {
    "٠": "0","١": "1","٢": "2","٣": "3","٤": "4","٥": "5","٦": "6","٧": "7","٨": "8","٩": "9",
    "۰": "0","۱": "1","۲": "2","۳": "3","۴": "4","۵": "5","۶": "6","۷": "7","۸": "8","۹": "9"
  };

  const s = String(raw || "").replace(/[٠-٩۰-۹]/g, d => map[d] || d);
  return [...new Set((s.match(/\d+/g) || []).map(x => x.trim()).filter(Boolean))];
}
const bulkResultState = new Map();
  let serverAcceptedNumbers = null;

function resetServerAcceptedNumbers() {
  serverAcceptedNumbers = null;
}

function escHtml(v) {
  return String(v ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function bulkPositiveLabel() {
  return currentCheckType() === "pregnancy_confirmation_120"
    ? "مؤكد عشار"
    : "عشار";
}

function bulkNegativeLabel() {
  return currentCheckType() === "pregnancy_confirmation_120"
    ? "غير عشار / فقد أجنة"
    : "فارغة";
}

function syncBulkResultStateFromDom() {
  document.querySelectorAll('input[data-bulk-result="1"]:checked').forEach(el => {
    const n = String(el.dataset.number || "").trim();
    const v = String(el.value || "").trim();
    if (n && v) bulkResultState.set(n, v);
  });
}

function bulkResultsForNumbers(nums = []) {
  syncBulkResultStateFromDom();

  return nums
    .map(n => ({
      animalNumber: String(n || "").trim(),
      result: String(bulkResultState.get(String(n || "").trim()) || "").trim()
    }))
    .filter(x => x.animalNumber && x.result);
}

function missingBulkResultNumbers(nums = []) {
  syncBulkResultStateFromDom();

  return nums.filter(n => !String(bulkResultState.get(String(n || "").trim()) || "").trim());
}

function renderBulkResultTable() {
const input = document.getElementById("animalNumber");
const originalNums = parseNumbers(input?.value || "");
const isBulk = originalNums.length > 1 || qp.get("mode") === "bulk";

const nums = isBulk && Array.isArray(serverAcceptedNumbers)
  ? serverAcceptedNumbers
  : originalNums;

const box = document.getElementById("bulkResultBox");
const rows = document.getElementById("bulkResultRows");
const resultGroup = document.getElementById("resultGroup");
const resultBlock = resultGroup?.closest("div");

  if (resultBlock) {
    resultBlock.style.display = isBulk ? "none" : "";
  }

  if (!box || !rows) return;

  if (!isBulk) {
    box.style.display = "none";
    rows.innerHTML = "";
    return;
  }

  const allowed = new Set(nums);
  for (const key of [...bulkResultState.keys()]) {
    if (!allowed.has(key)) bulkResultState.delete(key);
  }

  box.style.display = "block";
  if (isBulk && !Array.isArray(serverAcceptedNumbers)) {
  rows.innerHTML = `
    <div style="padding:12px;border:1px dashed #bbb;border-radius:12px;background:#fff;text-align:center;font-weight:900;line-height:1.7">
      سيظهر جدول الحيوانات المؤهلة بعد التحقق من السيرفر.
    </div>
  `;
  return;
}

  const posLabel = bulkPositiveLabel();
  const negLabel = bulkNegativeLabel();

  rows.innerHTML = `
    <div style="display:grid; gap:8px;">
      ${nums.map(n => {
        const current = String(bulkResultState.get(n) || "").trim();

        return `
          <div style="display:grid; grid-template-columns:80px 1fr; gap:8px; align-items:center; padding:10px; border:1px solid #ddd; border-radius:14px; background:#fff;">
            <div style="font-weight:900; text-align:center;">${escHtml(n)}</div>
            <div class="radio-group" style="margin:0;">
              <label>
                <input type="radio" data-bulk-result="1" data-number="${escHtml(n)}" name="bulkResult_${escHtml(n)}" value="عشار" ${current === "عشار" ? "checked" : ""}>
                ${escHtml(posLabel)}
              </label>
              <label>
                <input type="radio" data-bulk-result="1" data-number="${escHtml(n)}" name="bulkResult_${escHtml(n)}" value="فارغة" ${current === "فارغة" ? "checked" : ""}>
                ${escHtml(negLabel)}
              </label>
            </div>
          </div>
        `;
      }).join("")}
    </div>
  `;

  rows.querySelectorAll('input[data-bulk-result="1"]').forEach(el => {
    el.addEventListener("change", () => {
      const n = String(el.dataset.number || "").trim();
      const v = String(el.value || "").trim();
      if (n && v) bulkResultState.set(n, v);
     
    });
  });
}
function showMsg(msg, type = "info") {
  let bar =
    document.getElementById("mbk-infobar") ||
    document.getElementById("sysbar");

  if (!bar) {
    bar = document.createElement("div");
    bar.id = "mbk-infobar";
    bar.className = "infobar mbk-infobar";
    const form = document.getElementById("diagnosisForm");
    form?.prepend(bar);
  }

  bar.style.display = "block";
  bar.className = "infobar mbk-infobar show " + (
    type === "error" ? "error" :
    type === "success" ? "success" :
    "info"
  );

  bar.innerHTML = `
    <div style="white-space:pre-line;font-weight:900;font-size:17px;line-height:1.7;text-align:center">
      ${String(msg || "").replace(/</g, "&lt;").replace(/>/g, "&gt;")}
    </div>
  `;

  try { bar.scrollIntoView({ behavior: "smooth", block: "start" }); } catch (_) {}
}

function readRadio(form, name) {
  return String(form.querySelector(`input[name="${name}"]:checked`)?.value || "").trim();
}
function currentCheckType(form = document.getElementById("diagnosisForm")) {
  return readRadio(form, "checkType");
}

function applyCheckTypeUI() {
  const form = document.getElementById("diagnosisForm");
  if (!form) return;

  const isConfirmation120 = currentCheckType(form) === "pregnancy_confirmation_120";

  const positiveLabel = document.getElementById("positiveResultLabel");
  const negativeLabel = document.getElementById("negativeResultLabel");
  const saveBtn = document.getElementById("saveBtn");

  if (positiveLabel) {
    positiveLabel.textContent = isConfirmation120 ? "مؤكد عشار" : "عشار";
  }

  if (negativeLabel) {
    negativeLabel.textContent = isConfirmation120 ? "غير عشار / فقد أجنة" : "فارغة";
  }

  if (saveBtn) {
    saveBtn.textContent = isConfirmation120 ? "تسجيل تأكيد الحمل" : "تسجيل التشخيص";
  }
 renderBulkResultTable();
}
function collectPayload(form) {
  const animalNumber = String(document.getElementById("animalNumber")?.value || "").trim();
  const eventDate = String(document.getElementById("eventDate")?.value || "").trim();
  const vet = String(document.getElementById("vet")?.value || "").trim();
  const checkType = currentCheckType(form);

  const nums = parseNumbers(animalNumber);
  const isBulk = nums.length > 1 || qp.get("mode") === "bulk";
  const bulkResults = isBulk ? bulkResultsForNumbers(nums) : [];
  const singleResult = readRadio(form, "result");
  const firstBulkResult = bulkResults[0]?.result || "";

  return {
    animalNumber,
    animalNumbers: animalNumber,
    number: animalNumber,
    numbers: animalNumber,
    eventDate,
    checkType,
    pregnancyCheckType: checkType,
    method: readRadio(form, "method"),
    result: isBulk ? firstBulkResult : singleResult,
    bulkResults,
    resultsByAnimal: bulkResults,
    vet
  };
}
  async function sessionPostJson(endpoint, payload) {
  const r = await fetch(endpoint, {
    method: "POST",
    credentials: "same-origin",
    cache: "no-store",
    headers: {
      "Content-Type": "application/json",
      "Accept": "application/json"
    },
    body: JSON.stringify(payload || {})
  });

  const data = await r.json().catch(() => ({
    ok: false,
    message: ""
  }));

  if (r.status === 401 || data?.error === "auth_required") {
    return {
      r,
      data: {
        ok: false,
        message: data?.message || "❌ سجّل الدخول أولًا.",
        error: "auth_required"
      },
      authRequired: true
    };
  }

  return { r, data, authRequired: false };
}
let gateTimer = null;
let lastGateKey = "";

function showGate(msg, type = "info") {
  const box = document.getElementById("gateBox");
  if (!box) return;

  box.style.display = "block";
  box.className = "infobar mbk-infobar show " + (
    type === "error" ? "error" :
    type === "success" ? "success" :
    type === "warn" ? "warning" :
    "info"
  );

box.innerHTML = `
  <div style="display:grid;gap:10px;text-align:center">
    <div style="white-space:pre-line;font-weight:900;font-size:15px;line-height:1.7">
      ${String(msg || "").replace(/</g, "&lt;").replace(/>/g, "&gt;")}
    </div>

    <button type="button" id="gateOkBtn"
      style="width:auto;min-width:110px;margin:0 auto;padding:8px 16px;border-radius:999px;border:2px solid #0b7f47;background:#fff;color:#0b7f47;font-weight:900;cursor:pointer">
      حسنًا
    </button>
  </div>
`;

box.querySelector("#gateOkBtn")?.addEventListener("click", () => {
  box.style.display = "none";
});
}

function compactReason(reason) {
  return String(reason || "")
    .replace(/^❌\s*/, "")
    .replace(/\s+/g, " ")
    .trim();
}
function applyAcceptedNumbers(data, originalNums) {
  const acceptedNums = Array.isArray(data.accepted)
    ? data.accepted.map(x => String(x.animalNumber || "").trim()).filter(Boolean)
    : [];

  const isBulk = Array.isArray(originalNums) && originalNums.length > 1;
  if (!isBulk) return;

  serverAcceptedNumbers = acceptedNums;

  const allowed = new Set(acceptedNums);

  for (const key of [...bulkResultState.keys()]) {
    if (!allowed.has(key)) {
      bulkResultState.delete(key);
    }
  }

  renderBulkResultTable();
}
function renderGateResult(data, nums) {
  const msg = String(data?.message || data?.error || "").trim();
  const msgClean = compactReason(msg);

  const rejectedItems = Array.isArray(data?.rejected) ? data.rejected : [];

  const rejectedLines = rejectedItems
    .slice(0, 12)
    .map(x => {
      const n = String(x.animalNumber || "").trim();
      const reason = compactReason(x.reason || "");
      if (!reason) return "";
      if (reason === msgClean) return "";
      return `${n}: ${reason}`;
    })
    .filter(Boolean);

  const acceptedCount = Array.isArray(data?.accepted) ? data.accepted.length : 0;
  const rejectedCount = rejectedItems.length;

  const summaryLine = nums.length > 1
    ? `المؤهل: ${acceptedCount} — المرفوض: ${rejectedCount}`
    : "";

  const fullMsg = [
    msg,
    summaryLine,
    rejectedLines.length ? rejectedLines.join("\n") : ""
  ].filter(Boolean).join("\n\n");

  if (fullMsg) {
    showGate(
      fullMsg,
      data?.allowed ? "success" : "error"
    );
  }

  if (nums.length > 1 && Array.isArray(data?.accepted)) {
    applyAcceptedNumbers(data, nums);
  }
}
async function runGateNow() {
  const form = document.getElementById("diagnosisForm");
  if (!form) return;
  const payload = collectPayload(form);
  const nums = parseNumbers(payload.animalNumber);
  renderBulkResultTable();
  if (!payload.checkType) {
  showGate("اختر نوع الفحص أولًا، ثم يبدأ التحقق.", "info");
  return;
}

const gateKey = JSON.stringify({
  n: nums.join(","),
  d: payload.eventDate,
  m: payload.method || "",
  c: payload.checkType || ""
});

  if (gateKey === lastGateKey) return;
  lastGateKey = gateKey;

  const endpoint = "/api/pregnancy-diagnosis/gate";
  

  try {
    

      const { data, authRequired } = await sessionPostJson(endpoint, payload);

    if (authRequired) {
      showMsg(data.message || "❌ سجّل الدخول أولًا.", "error");
      return;
    }

    renderGateResult(data, nums);

} catch (err) {
  console.error("pregnancy diagnosis gate failed", err);
}
}

function scheduleGate() {
  clearTimeout(gateTimer);
  gateTimer = setTimeout(runGateNow, 350);
}
  document.getElementById("animalNumber")?.addEventListener("input", () => {
  resetServerAcceptedNumbers();
  renderBulkResultTable();
  scheduleGate();
});

document.getElementById("eventDate")?.addEventListener("change", () => {
  resetServerAcceptedNumbers();
  renderBulkResultTable();
  scheduleGate();
});

document.querySelectorAll('input[name="method"], input[name="checkType"]').forEach(el => {
  el.addEventListener("change", () => {
    resetServerAcceptedNumbers();
    applyCheckTypeUI();
    scheduleGate();
  });
});

document.querySelectorAll('input[name="result"]').forEach(el => {
  el.addEventListener("change", () => {
    applyCheckTypeUI();
  });
});
applyCheckTypeUI();
// أول رسالة تحقق عند فتح الصفحة
scheduleGate();
document.getElementById("diagnosisForm")?.addEventListener("submit", async (e) => {
  e.preventDefault();

  const form = e.currentTarget;
  const payload = collectPayload(form);
  const nums = parseNumbers(payload.animalNumber);
 if (!payload.checkType) {
  showMsg("❌ اختر نوع الفحص أولًا.", "error");
  return;
}
  const isBulk =
    new URLSearchParams(location.search).get("mode") === "bulk" ||
    nums.length > 1;
  const saveNums = isBulk
  ? (Array.isArray(serverAcceptedNumbers) ? serverAcceptedNumbers : [])
  : nums;

if (isBulk && !Array.isArray(serverAcceptedNumbers)) {
  showMsg("❌ انتظر نتيجة التحقق من السيرفر أولًا.", "error");
  return;
}
  if (isBulk) {
  renderBulkResultTable();

 const missing = missingBulkResultNumbers(saveNums);

  if (missing.length) {
    showMsg(
      `❌ اختر نتيجة التشخيص لكل رقم قبل الحفظ.\nأرقام بدون نتيجة: ${missing.join(", ")}`,
      "error"
    );
    return;
  }

  payload.animalNumber = saveNums.join(",");
payload.animalNumbers = saveNums.join(",");
payload.number = saveNums.join(",");
payload.numbers = saveNums.join(",");

payload.bulkResults = bulkResultsForNumbers(saveNums);
payload.resultsByAnimal = payload.bulkResults;
payload.result = payload.bulkResults[0]?.result || "";
}
  const endpoint = isBulk
    ? "/api/pregnancy-diagnosis/bulk-save"
    : "/api/pregnancy-diagnosis/save";

  const btn = document.getElementById("saveBtn");

  try {
    if (btn) btn.disabled = true;

    const { data, authRequired } = await sessionPostJson(endpoint, payload);

    if (authRequired) {
      showMsg(data.message || "❌ سجّل الدخول أولًا.", "error");
      return;
    }

    const mainMsg = String(data.message || data.error || "").trim();
    const mainClean = compactReason(mainMsg);

    const rejectedLines = Array.isArray(data.rejected) && data.rejected.length
      ? data.rejected.slice(0, 8).map(x => {
          const n = String(x.animalNumber || "").trim();
          const reason = compactReason(x.reason || "");
          if (!reason) return "";
          if (reason === mainClean) return "";
          return `${n}: ${reason}`;
        }).filter(Boolean).join("\n")
      : "";

    const serverMessage = [
      mainMsg,
      rejectedLines
    ].filter(Boolean).join("\n\n");

    if (serverMessage.trim()) {
      showMsg(
        serverMessage,
        data.ok ? "success" : "error"
      );
    }

    if (data.ok && data.redirectUrl) {
      setTimeout(() => {
        location.href = data.redirectUrl;
      }, 1100);
    }

  } catch (err) {
    console.error("pregnancy diagnosis save failed", err);
    showMsg("❌ فشل الاتصال بالسيرفر أثناء حفظ تشخيص الحمل.", "error");

  } finally {
    if (btn) btn.disabled = false;
  }
});
</script>

</body>
</html>
