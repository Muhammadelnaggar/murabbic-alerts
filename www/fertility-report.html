<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تقرير الخصوبة - مُرَبِّيك</title>

  <link rel="icon" type="image/svg+xml" href="/images/dashboard.svg">
  <link rel="stylesheet" href="/css/forms.css">
  <style>
    body[data-page="fertility-report"] .mbk-top {
    position: sticky;
    top: 0;
    z-index: 50;
    background: #ffffff;
    border-bottom: 1px solid #e5e7eb;
  }

  body[data-page="fertility-report"] .mbk-head {
    max-width: 980px;
    margin: 0 auto;
    min-height: 72px;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  body[data-page="fertility-report"] .mbk-logo {
    width: 46px;
    height: 46px;
    object-fit: contain;
    flex: 0 0 46px;
  }

  body[data-page="fertility-report"] .mbk-center {
    flex: 1;
    min-width: 0;
    text-align: center;
    line-height: 1.25;
  }

  body[data-page="fertility-report"] .mbk-page-title {
    font-size: 19px;
    font-weight: 950;
    color: #0f172a;
    white-space: normal;
  }

  body[data-page="fertility-report"] .mbk-app-name {
    margin-top: 2px;
    font-size: 13px;
    font-weight: 900;
    color: #047857;
  }

  body[data-page="fertility-report"] .mbk-back {
    flex: 0 0 auto;
    text-decoration: none;
    border: 1px solid #dbe3ea;
    background: #f8fafc;
    color: #0f172a;
    border-radius: 12px;
    padding: 9px 12px;
    font-size: 14px;
    font-weight: 900;
  }

  @media (max-width: 520px) {
    body[data-page="fertility-report"] .mbk-head {
      min-height: 66px;
      padding: 8px 10px;
      gap: 8px;
    }

    body[data-page="fertility-report"] .mbk-logo {
      width: 40px;
      height: 40px;
      flex-basis: 40px;
    }

    body[data-page="fertility-report"] .mbk-page-title {
      font-size: 17px;
    }

    body[data-page="fertility-report"] .mbk-app-name {
      font-size: 12px;
    }

    body[data-page="fertility-report"] .mbk-back {
      padding: 8px 10px;
      font-size: 13px;
    }
  }
  body[data-page="fertility-report"] #summaryGrid,
  body[data-page="fertility-report"] #herdGrid,
  body[data-page="fertility-report"] #conceptionGrid,
  body[data-page="fertility-report"] #advisoryWrap {
    display: block;
  }

  body[data-page="fertility-report"] .fert-panel {
    border: 1px solid #e5e7eb;
    border-radius: 20px;
    background: #ffffff;
    padding: 16px;
    margin-bottom: 12px;
  }

  body[data-page="fertility-report"] .fert-hero {
    border-right: 5px solid #047857;
    background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
  }

  body[data-page="fertility-report"] .fert-title {
    font-size: 1.06rem;
    font-weight: 900;
    color: #0f172a;
    line-height: 1.8;
  }

  body[data-page="fertility-report"] .fert-read {
    margin-top: 8px;
    font-size: .94rem;
    line-height: 1.95;
    color: #334155;
  }

  body[data-page="fertility-report"] .fert-advice {
    margin-top: 10px;
    border-right: 4px solid #047857;
    background: #ecfdf5;
    border-radius: 12px;
    padding: 10px 12px;
    font-size: .93rem;
    line-height: 1.9;
    color: #065f46;
    font-weight: 800;
  }

  body[data-page="fertility-report"] .fert-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 14px;
  }

  body[data-page="fertility-report"] .fert-stat {
    background: #f8fafc;
    border: 1px solid #eef2f7;
    border-radius: 14px;
    padding: 10px;
  }

  body[data-page="fertility-report"] .fert-stat-label {
    font-size: .76rem;
    color: #64748b;
    font-weight: 800;
  }

  body[data-page="fertility-report"] .fert-stat-value {
    margin-top: 4px;
    font-size: 1.14rem;
    color: #047857;
    font-weight: 950;
    line-height: 1.35;
  }

  body[data-page="fertility-report"] .fert-row {
    display: grid;
    grid-template-columns: 135px 1fr;
    gap: 14px;
    padding: 14px 0;
    border-top: 1px solid #eef2f7;
  }

  body[data-page="fertility-report"] .fert-row:first-child {
    border-top: 0;
    padding-top: 0;
  }

  body[data-page="fertility-report"] .fert-row-label {
    font-size: .84rem;
    font-weight: 900;
    color: #475569;
    line-height: 1.6;
  }

  body[data-page="fertility-report"] .fert-row-value {
    margin-top: 6px;
    font-size: 1.48rem;
    font-weight: 950;
    color: #047857;
    line-height: 1.15;
  }

  body[data-page="fertility-report"] .fert-row-sub {
    margin-top: 6px;
    font-size: .78rem;
    font-weight: 800;
    color: #64748b;
    line-height: 1.6;
  }

  body[data-page="fertility-report"] .fert-table-title {
    margin: 14px 0 8px;
    font-size: .9rem;
    font-weight: 900;
    color: #0f172a;
  }
  body[data-page="fertility-report"] .page {
  padding-bottom: 110px;
}

body[data-page="fertility-report"] #statusBar.is-done {
  display: none;
}

body[data-page="fertility-report"] .actions-bar {
  z-index: 30;
}
body[data-page="fertility-report"] .fert-card-list {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

body[data-page="fertility-report"] .fert-mini-card {
  border: 1px solid #e5e7eb;
  border-radius: 18px;
  background: #ffffff;
  padding: 12px;
}

body[data-page="fertility-report"] .fert-mini-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}

body[data-page="fertility-report"] .fert-mini-title {
  font-size: .98rem;
  font-weight: 950;
  color: #0f172a;
  line-height: 1.5;
}

body[data-page="fertility-report"] .fert-mini-badge {
  flex: 0 0 auto;
}

body[data-page="fertility-report"] .fert-mini-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

body[data-page="fertility-report"] .fert-mini-item {
  background: #f8fafc;
  border: 1px solid #eef2f7;
  border-radius: 12px;
  padding: 9px;
}

body[data-page="fertility-report"] .fert-mini-label {
  font-size: .72rem;
  font-weight: 850;
  color: #64748b;
  line-height: 1.5;
}

body[data-page="fertility-report"] .fert-mini-value {
  margin-top: 4px;
  font-size: 1rem;
  font-weight: 950;
  color: #047857;
  line-height: 1.35;
  word-break: break-word;
}

@media (max-width: 520px) {
  body[data-page="fertility-report"] .fert-mini-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  body[data-page="fertility-report"] .fert-mini-head {
    display: block;
  }

  body[data-page="fertility-report"] .fert-mini-badge {
    margin-top: 8px;
  }
}
body[data-page="fertility-report"] .fert-action-list {
  margin: 10px 0 0;
  padding: 0 18px 0 0;
  color: #334155;
  font-size: .93rem;
  line-height: 1.9;
}

body[data-page="fertility-report"] .fert-action-list li {
  margin: 4px 0;
}
@media print {
  body[data-page="fertility-report"] .actions-bar,
  body[data-page="fertility-report"] #statusBar {
    display: none !important;
  }

  body[data-page="fertility-report"] .page {
    padding-bottom: 0 !important;
  }
}
  @media (max-width: 520px) {
    body[data-page="fertility-report"] .fert-stats {
      grid-template-columns: repeat(2, 1fr);
    }

    body[data-page="fertility-report"] .fert-row {
      grid-template-columns: 1fr;
      gap: 8px;
    }
  }
</style>
</head>

<body data-page="fertility-report">

<header class="mbk-top">
  <div class="mbk-head">
    <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">

    <div class="mbk-center">
      <div class="mbk-page-title" id="pageTitle">تقرير الخصوبة</div>
      <div class="mbk-app-name">مُرَبِّيك</div>
    </div>

    <a class="mbk-back" href="dashboard.html">رجوع</a>
  </div>
</header>

<div class="page">

  <div id="statusBar" class="card">جارٍ تحميل تقرير الخصوبة...</div>

  <div class="card">
    <div class="section-title">🌿 ملخص تقرير الخصوبة</div>
    <div id="summaryGrid" class="kpi-grid"></div>
  </div>

  <div class="card">
    <div class="section-title">📌 الحالة التناسلية للقطيع</div>
    <div id="herdGrid" class="kpi-grid"></div>
  </div>

  <div class="card">
   <div class="section-title">🧠 المؤشرات التناسلية الفنية للقطيع</div>
    <div id="conceptionGrid" class="kpi-grid"></div>
  </div>

  <div class="card">
    <div class="section-title">👨‍⚕️ كفاءة الملقحين</div>
    <div id="inseminatorsWrap"></div>
  </div>

  <div class="card">
    <div class="section-title">🔥 THI الحالي ونصيحة توقيت التلقيح</div>
    <div id="thiWrap"></div>
  </div>

  <div class="card">
  <div class="section-title">🔁 تحليل التلقيح المتكرر</div>
    <div id="repeatBreedersWrap"></div>
  </div>

  <div class="card">
    <div class="section-title">🧠 قراءة مُرَبِّيك</div>
    <div id="advisoryWrap"></div>
  </div>

</div>

<div class="actions-bar">
  <button type="button" class="btn secondary" onclick="location.href='dashboard.html'">الرجوع لغرفة التحكم</button>
  <button type="button" class="btn primary" onclick="window.print()">طباعة التقرير</button>
</div>

<script>
const API_BASE = "";

function qs(name){
  return new URLSearchParams(location.search).get(name);
}

const rawType = String(qs("type") || "cows").toLowerCase();
const reportType = rawType === "buffalo" ? "buffalo" : "cows";
const reportTypeLabel = reportType === "buffalo" ? "الجاموس" : "الأبقار";

function el(id){
  return document.getElementById(id);
}

function esc(v){
  return String(v ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function fmtNum(v){
  const n = Number(v);
  return Number.isFinite(n) ? n.toLocaleString("ar-EG") : "--";
}

function fmtPct(v){
  const n = Number(v);
  return Number.isFinite(n) ? `${n.toFixed(1).replace(".0", "")}%` : "--";
}

function box(label, value, sub = "", cls = ""){
  return `
    <div class="kpi ${cls}">
      <div class="kpi-label">${esc(label)}</div>
      <div class="kpi-value">${esc(value ?? "--")}</div>
      ${sub ? `<div class="kpi-sub">${esc(sub)}</div>` : ""}
    </div>
  `;
}
function linesHtml(items = []){
  return items
    .map(v => String(v || "").trim())
    .filter(Boolean)
    .map(v => `<div>${esc(v)}</div>`)
    .join("");
}

function boxRich(label, value, subHtml = "", cls = ""){
  return `
    <div class="kpi ${cls}">
      <div class="kpi-label">${esc(label)}</div>
      <div class="kpi-value">${esc(value ?? "--")}</div>
      ${subHtml ? `<div class="kpi-sub">${subHtml}</div>` : ""}
    </div>
  `;
}
function badge(text, status){
  const s = String(status || "muted");
  const cls =
    s === "good" ? "status-ok" :
    s === "warn" ? "status-warn" :
    s === "danger" ? "status-error" :
    "status-muted";

  return `<span class="${cls}">${esc(text || "غير مكتمل")}</span>`;
}

function emptyMsg(text){
  return `<div class="kpi-sub">${esc(text)}</div>`;
}

function table(headers, rows){
  if (!rows.length) return emptyMsg("لا توجد بيانات كافية حاليًا.");

  return `
    <div class="preview-scroll">
      <table class="mbk-table">
        <thead>
          <tr>${headers.map(h => `<th>${esc(h)}</th>`).join("")}</tr>
        </thead>
        <tbody>
          ${rows.join("")}
        </tbody>
      </table>
    </div>
  `;
}

async function fetchReport(){
  const res = await fetch(`${API_BASE}/api/fertility-report?type=${encodeURIComponent(reportType)}`, {
    method: "GET",
    credentials: "same-origin",
    cache: "no-store",
    headers: {
      "Accept": "application/json",
      "Cache-Control": "no-store"
    }
  });

  const data = await res.json().catch(() => ({}));

  if (!res.ok || data.ok !== true) {
    throw new Error(data.message || data.error || "تعذّر تحميل تقرير الخصوبة.");
  }

  return data;
}

function renderSummary(j){
  const h = j.herdSummary || {};
  const rb = j.repeatBreederAnalysis || j.repeatBreeders || {};

  el("summaryGrid").innerHTML = `
    <div class="fert-panel fert-hero">
      <div class="fert-title">
        نطاق تقرير الخصوبة
      </div>

      <div class="fert-read">
        هذا القسم يعرض بيانات التقرير الأساسية فقط. القراءة الفنية وتقييم مُرَبِّيك موجودان في نهاية التقرير بعد عرض المؤشرات والجداول.
      </div>

      <div class="fert-stats">
        <div class="fert-stat">
          <div class="fert-stat-label">نوع القطيع</div>
          <div class="fert-stat-value">${esc(reportTypeLabel)}</div>
        </div>

        <div class="fert-stat">
          <div class="fert-stat-label">فترة التحليل</div>
          <div class="fert-stat-value">${fmtNum(j.periodDays || 180)} يوم</div>
        </div>

        <div class="fert-stat">
          <div class="fert-stat-label">إجمالي نشط</div>
          <div class="fert-stat-value">${fmtNum(h.totalActive)}</div>
        </div>

        <div class="fert-stat">
          <div class="fert-stat-label">Repeat Breeder</div>
          <div class="fert-stat-value">${fmtNum(rb.count || 0)} — ${fmtPct(rb.ratePct)}</div>
        </div>
      </div>
    </div>
  `;
}
function renderHerd(j){
  const hc = j.herdComposition || j.herdReproductiveComposition || {};
  const cards = Array.isArray(hc.cards) ? hc.cards : [];

  if (!cards.length) {
    el("herdGrid").innerHTML = emptyMsg("لا توجد قراءة بنية قطيع جاهزة من السيرفر.");
    return;
  }

  el("herdGrid").innerHTML = `
    <div class="fert-panel">
      <div class="fert-title">${esc(hc.title || "بنية القطيع التناسلية الحالية")}</div>
      <div class="fert-read">${esc(hc.read || "")}</div>

      ${cards.map(c => `
        <div class="fert-row">
          <div>
            <div class="fert-row-label">${esc(c.label)}</div>
            <div class="fert-row-value">${fmtNum(c.count)}</div>
            <div class="fert-row-sub">${esc(c.pctText || "--")}</div>
          </div>

          <div class="fert-read">${esc(c.read || "")}</div>
        </div>
      `).join("")}
    </div>
  `;
}

function renderConception(j){
  const indicators = Array.isArray(j.fertilityIndicators)
    ? j.fertilityIndicators
    : (
        Array.isArray(j.expertReport?.indicators)
          ? j.expertReport.indicators
          : []
      );

  if (!indicators.length) {
    el("conceptionGrid").innerHTML = emptyMsg("لا توجد مؤشرات تناسلية كافية حاليًا.");
    return;
  }

  el("conceptionGrid").innerHTML = `
    <div class="fert-panel">
      ${indicators.map(x => `
        <div class="fert-row">
          <div>
            <div class="fert-row-label">${esc(x.title || x.key || "--")}</div>
            <div class="fert-row-value">${esc(x.valueText || "--")}</div>
            ${x.benchmarkText ? `<div class="fert-row-sub">${esc(x.benchmarkText)}</div>` : ""}
          </div>

          <div>
            ${badge(x.rating || "غير مكتمل", x.status)}
            <div class="fert-read">${esc(x.read || "")}</div>
            ${x.advice ? `<div class="fert-advice">${esc(x.advice)}</div>` : ""}
          </div>
        </div>
      `).join("")}
    </div>
  `;
}
function renderInseminators(j){
  const rows = Array.isArray(j.inseminators) ? j.inseminators : [];

  if (!rows.length) {
    el("inseminatorsWrap").innerHTML = emptyMsg("لا توجد بيانات كافية حاليًا.");
    return;
  }

  el("inseminatorsWrap").innerHTML = `
    <div class="fert-panel">
      <div class="fert-card-list">
        ${rows.map(r => `
          <div class="fert-mini-card">
            <div class="fert-mini-head">
              <div class="fert-mini-title">${esc(r.inseminator || "غير محدد")}</div>
              <div class="fert-mini-badge">${badge(r.evaluation, r.status)}</div>
            </div>

            <div class="fert-mini-grid">
              <div class="fert-mini-item">
                <div class="fert-mini-label">تلقيحات الفترة</div>
                <div class="fert-mini-value">${fmtNum(r.totalAiInPeriod)}</div>
              </div>

              <div class="fert-mini-item">
                <div class="fert-mini-label">محكوم عليها</div>
                <div class="fert-mini-value">${fmtNum(r.totalJudged)}</div>
              </div>

              <div class="fert-mini-item">
                <div class="fert-mini-label">حمل مثبت</div>
                <div class="fert-mini-value">${fmtNum(r.pregnancies)}</div>
              </div>

              <div class="fert-mini-item">
                <div class="fert-mini-label">CR</div>
                <div class="fert-mini-value">${fmtPct(r.conceptionRatePct)}</div>
              </div>

              <div class="fert-mini-item">
                <div class="fert-mini-label">متوسط THI</div>
                <div class="fert-mini-value">${r.avgThi == null ? "--" : fmtNum(r.avgThi)}</div>
              </div>
            </div>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}
function renderThi(j){
  const advice =
    j.fertilityThiAdvice ||
    j.breedingThiAdvice ||
    j.thiBreedingAdvice ||
    {};

  const current = advice.current || {};
  const actions = Array.isArray(advice.actions) ? advice.actions : [];

  el("thiWrap").innerHTML = `
    <div class="fert-panel">
      <div class="fert-title">
        ${esc(advice.title || "THI الحالي ونصيحة توقيت التلقيح")}
      </div>

      <div class="fert-stats">
        <div class="fert-stat">
          <div class="fert-stat-label">THI الحالي</div>
          <div class="fert-stat-value">${esc(current.thiText || "--")}</div>
        </div>

        <div class="fert-stat">
          <div class="fert-stat-label">الحالة</div>
          <div class="fert-stat-value">${esc(current.levelLabel || "غير متاح")}</div>
        </div>

        <div class="fert-stat">
          <div class="fert-stat-label">الحرارة</div>
          <div class="fert-stat-value">${current.tempC == null ? "--" : `${fmtNum(current.tempC)}°`}</div>
        </div>

        <div class="fert-stat">
          <div class="fert-stat-label">الرطوبة</div>
          <div class="fert-stat-value">${current.humidity == null ? "--" : `${fmtNum(current.humidity)}%`}</div>
        </div>
      </div>

      <div class="fert-read">
        ${esc(advice.summary || "لا توجد قراءة THI حالية كافية.")}
      </div>

      ${
        advice.timingAdvice
          ? `<div class="fert-advice">${esc(advice.timingAdvice)}</div>`
          : ""
      }

      ${
        actions.length
          ? `<ul class="fert-action-list">${actions.map(a => `<li>${esc(a)}</li>`).join("")}</ul>`
          : ""
      }
    </div>
  `;
}

function renderRepeatBreeders(j){
  const rb = j.repeatBreederAnalysis || j.repeatBreeders || {};
  const rows = Array.isArray(rb.rows) ? rb.rows : [];
  const drivers = Array.isArray(rb.likelyDrivers) ? rb.likelyDrivers : [];

  const driverLines = drivers.map(d => {
    const title = d.title || d.key || "سبب محتمل";
    const count = d.count == null ? "--" : fmtNum(d.count);
    const pct = d.pct == null ? "--" : fmtPct(d.pct);
    const strength = d.strength || "";
    return `${title}: ${count} حالة (${pct})${strength ? ` — ${strength}` : ""}`;
  });

  const head = `
    <div class="fert-panel">
      <div class="fert-title">ضغط التلقيح المتكرر في القطيع</div>

      <div class="fert-stats">
        <div class="fert-stat">
          <div class="fert-stat-label">الحالات</div>
          <div class="fert-stat-value">${fmtNum(rb.count || 0)}</div>
        </div>

        <div class="fert-stat">
          <div class="fert-stat-label">المؤهلون للتلقيح</div>
          <div class="fert-stat-value">${fmtNum(rb.eligibleCount)}</div>
        </div>

        <div class="fert-stat">
          <div class="fert-stat-label">النسبة</div>
          <div class="fert-stat-value">${fmtPct(rb.ratePct)}</div>
        </div>

        <div class="fert-stat">
          <div class="fert-stat-label">التقييم</div>
          <div class="fert-stat-value">${esc(rb.severityLabel || "--")}</div>
        </div>
      </div>

      <div class="fert-read">${esc(rb.herdRead || "")}</div>

      ${
        driverLines.length
          ? `<div class="fert-advice">${driverLines.map(x => `• ${esc(x)}`).join("<br>")}</div>`
          : ""
      }
    </div>
  `;

  if (!rows.length) {
    el("repeatBreedersWrap").innerHTML =
      head +
      emptyMsg("لا توجد حيوانات Repeat Breeder محققة للشروط حاليًا.");
    return;
  }

  const htmlRows = rows.map(r => `
    <tr>
      <td>${esc(r.animalNumber)}</td>
      <td>${fmtNum(r.servicesCount)}</td>
      <td>${esc(r.lastInseminationDate || "--")}</td>
      <td>${esc(r.cycleRegularity || "--")}</td>
      <td>${esc(r.timingPattern || "--")}</td>
      <td>${esc(r.thiPattern || "--")}</td>
      <td>${esc(Array.isArray(r.likelyCauses) ? r.likelyCauses.join("، ") : "")}</td>
      <td>${esc(r.mbkRead || r.reproductiveSuspicion || "--")}</td>
    </tr>
  `);

  el("repeatBreedersWrap").innerHTML =
    head +
    `<div class="fert-table-title">الحالات الفردية المحققة للشروط</div>` +
    table(
      ["رقم الحيوان", "عدد التلقيحات", "آخر تلقيح", "انتظام الدورة", "التوقيت", "THI", "الأسباب المحتملة", "قراءة مُرَبِّيك"],
      htmlRows
    );
}

function renderAdvisory(j){
  const expert = j.expertReport || {};
  const main = expert.mainBottleneck || j.bottleneckAnalysis?.main || {};
  const recs = Array.isArray(j.farmRecommendations)
    ? j.farmRecommendations
    : (
        Array.isArray(j.advisory?.notes)
          ? j.advisory.notes
          : []
      );

  el("advisoryWrap").innerHTML = `
    <div class="fert-panel">
      <div class="fert-title">
        ${esc(expert.headline || j.advisory?.headline || "لا توجد قراءة كافية بعد.")}
      </div>

      <div class="fert-read">
        ${main.title ? `<strong>${esc(main.title)}</strong><br>` : ""}
        ${esc(main.read || "")}
      </div>

      ${
        recs.length
          ? `<div class="fert-advice">${recs.map(r => `• ${esc(r)}`).join("<br>")}</div>`
          : ""
      }
    </div>
  `;
}
async function main(){
  el("pageTitle").textContent = `تقرير الخصوبة — ${reportTypeLabel}`;

  try {
    const j = await fetchReport();

    renderSummary(j);
    renderHerd(j);
    renderConception(j);
    renderInseminators(j);
    renderThi(j);
    renderRepeatBreeders(j);
    renderAdvisory(j);

    el("statusBar").classList.add("is-done");

  } catch (e) {
    console.error(e);
    el("statusBar").classList.remove("is-done");
    el("statusBar").textContent = e.message || "تعذّر تحميل تقرير الخصوبة.";
  }
}

main();
</script>

</body>
</html>
