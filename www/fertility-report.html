<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تقرير الخصوبة - مُرَبِّيك</title>

  <link rel="icon" type="image/svg+xml" href="/images/dashboard.svg">
  <link rel="stylesheet" href="/css/forms.css">
</head>

<body data-page="fertility-report">

<header class="mbk-top">
  <div class="mbk-head">
    <div class="mbk-title">
      <div class="mbk-page" id="pageTitle">تقرير الخصوبة</div>
      <div class="mbk-app">مُرَبِّيك</div>
    </div>
    <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">
  </div>
</header>

<div class="page">

  <div id="statusBar" class="card">جارٍ تحميل تقرير الخصوبة...</div>

  <div class="card">
    <div class="section-title">🌿 ملخص تقرير الخصوبة</div>
    <div id="summaryGrid" class="kpi-grid"></div>
  </div>

  <div class="card">
    <div class="section-title">📌 الحالة التناسلية للقطيع</div>
    <div id="herdGrid" class="kpi-grid"></div>
  </div>

  <div class="card">
   <div class="section-title">🧠 المؤشرات التناسلية الفنية للقطيع</div>
    <div id="conceptionGrid" class="kpi-grid"></div>
  </div>

  <div class="card">
    <div class="section-title">👨‍⚕️ كفاءة الملقحين</div>
    <div id="inseminatorsWrap"></div>
  </div>

  <div class="card">
    <div class="section-title">🔥 تأثير THI / الإجهاد الحراري</div>
    <div id="thiWrap"></div>
  </div>

  <div class="card">
  <div class="section-title">🔁 تحليل التلقيح المتكرر</div>
    <div id="repeatBreedersWrap"></div>
  </div>

  <div class="card">
    <div class="section-title">🧠 قراءة مُرَبِّيك</div>
    <div id="advisoryWrap"></div>
  </div>

</div>

<div class="actions-bar">
  <button type="button" class="btn secondary" onclick="location.href='dashboard.html'">الرجوع لغرفة التحكم</button>
  <button type="button" class="btn primary" onclick="window.print()">طباعة التقرير</button>
</div>

<script>
const API_BASE = "";

function qs(name){
  return new URLSearchParams(location.search).get(name);
}

const rawType = String(qs("type") || "cows").toLowerCase();
const reportType = rawType === "buffalo" ? "buffalo" : "cows";
const reportTypeLabel = reportType === "buffalo" ? "الجاموس" : "الأبقار";

function el(id){
  return document.getElementById(id);
}

function esc(v){
  return String(v ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function fmtNum(v){
  const n = Number(v);
  return Number.isFinite(n) ? n.toLocaleString("ar-EG") : "--";
}

function fmtPct(v){
  const n = Number(v);
  return Number.isFinite(n) ? `${n.toFixed(1).replace(".0", "")}%` : "--";
}

function box(label, value, sub = "", cls = ""){
  return `
    <div class="kpi ${cls}">
      <div class="kpi-label">${esc(label)}</div>
      <div class="kpi-value">${esc(value ?? "--")}</div>
      ${sub ? `<div class="kpi-sub">${esc(sub)}</div>` : ""}
    </div>
  `;
}
function linesHtml(items = []){
  return items
    .map(v => String(v || "").trim())
    .filter(Boolean)
    .map(v => `<div>${esc(v)}</div>`)
    .join("");
}

function boxRich(label, value, subHtml = "", cls = ""){
  return `
    <div class="kpi ${cls}">
      <div class="kpi-label">${esc(label)}</div>
      <div class="kpi-value">${esc(value ?? "--")}</div>
      ${subHtml ? `<div class="kpi-sub">${subHtml}</div>` : ""}
    </div>
  `;
}
function badge(text, status){
  const s = String(status || "muted");
  const cls =
    s === "good" ? "status-ok" :
    s === "warn" ? "status-warn" :
    s === "danger" ? "status-error" :
    "status-muted";

  return `<span class="${cls}">${esc(text || "غير مكتمل")}</span>`;
}

function emptyMsg(text){
  return `<div class="kpi-sub">${esc(text)}</div>`;
}

function table(headers, rows){
  if (!rows.length) return emptyMsg("لا توجد بيانات كافية حاليًا.");

  return `
    <div class="preview-scroll">
      <table class="mbk-table">
        <thead>
          <tr>${headers.map(h => `<th>${esc(h)}</th>`).join("")}</tr>
        </thead>
        <tbody>
          ${rows.join("")}
        </tbody>
      </table>
    </div>
  `;
}

async function fetchReport(){
  const res = await fetch(`${API_BASE}/api/fertility-report?type=${encodeURIComponent(reportType)}`, {
    method: "GET",
    credentials: "same-origin",
    cache: "no-store",
    headers: {
      "Accept": "application/json",
      "Cache-Control": "no-store"
    }
  });

  const data = await res.json().catch(() => ({}));

  if (!res.ok || data.ok !== true) {
    throw new Error(data.message || data.error || "تعذّر تحميل تقرير الخصوبة.");
  }

  return data;
}

function renderSummary(j){
  const expert = j.expertReport || {};
  const main = expert.mainBottleneck || j.bottleneckAnalysis?.main || {};
  const rb = j.repeatBreederAnalysis || j.repeatBreeders || {};
  const recs = Array.isArray(j.farmRecommendations) ? j.farmRecommendations : [];

  el("summaryGrid").innerHTML =
    box("نوع القطيع", reportTypeLabel) +
    box("الفترة", `${fmtNum(j.periodDays || 180)} يوم`) +
    boxRich(
      "تقييم مُرَبِّيك العام",
      expert.overallRating || "--",
      linesHtml([expert.headline])
    ) +
    boxRich(
      "الخلل المرجح",
      main.title || "--",
      linesHtml([main.read])
    ) +
    box(
      "Repeat Breeder",
      `${fmtNum(rb.count || 0)} حالة`,
      `النسبة ${fmtPct(rb.ratePct)} من المؤهلين للتلقيح`
    ) +
    boxRich(
      "التوصية الفنية الأولى",
      recs[0] || "--",
      ""
    );
}

function renderHerd(j){
  const h = j.herdSummary || {};

  el("herdGrid").innerHTML =
    box("إجمالي نشط", fmtNum(h.totalActive)) +
    box("عشار", fmtNum(h.pregnantCount)) +
    box("مفتوحة", fmtNum(h.openCount)) +
    box("ملقحة", fmtNum(h.inseminatedCount)) +
    box("حديثة الولادة", fmtNum(h.freshCount)) +
    box("جافة", fmtNum(h.dryCount));
}

function renderConception(j){
  const indicators = Array.isArray(j.fertilityIndicators)
    ? j.fertilityIndicators
    : (
        Array.isArray(j.expertReport?.indicators)
          ? j.expertReport.indicators
          : []
      );

  if (!indicators.length) {
    el("conceptionGrid").innerHTML = emptyMsg("لا توجد مؤشرات تناسلية كافية حاليًا.");
    return;
  }

  el("conceptionGrid").innerHTML = indicators.map(x => {
    const cls =
      x.status === "danger" ? "health" :
      x.status === "warn" ? "repro" :
      "";

    return boxRich(
      x.title || x.key || "--",
      x.valueText || "--",
      linesHtml([
        x.benchmarkText || "",
        x.rating ? `التقييم: ${x.rating}` : "",
        x.read || "",
        x.advice ? `توصية مُرَبِّيك: ${x.advice}` : ""
      ]),
      cls
    );
  }).join("");
}
function renderInseminators(j){
  const rows = Array.isArray(j.inseminators) ? j.inseminators : [];

  const htmlRows = rows.map(r => `
    <tr>
      <td>${esc(r.inseminator || "غير محدد")}</td>
      <td>${fmtNum(r.totalAiInPeriod)}</td>
      <td>${fmtNum(r.totalJudged)}</td>
      <td>${fmtNum(r.pregnancies)}</td>
      <td>${fmtPct(r.conceptionRatePct)}</td>
      <td>${r.avgThi == null ? "--" : fmtNum(r.avgThi)}</td>
      <td>${badge(r.evaluation, r.status)}</td>
    </tr>
  `);

  el("inseminatorsWrap").innerHTML = table(
    ["الملقح", "تلقيحات الفترة", "محكوم عليها", "حمل مثبت", "CR", "متوسط THI", "التقييم"],
    htmlRows
  );
}

function renderThi(j){
  const rows = Array.isArray(j.thiConception) ? j.thiConception : [];

  const htmlRows = rows.map(r => `
    <tr>
      <td>${esc(r.label || r.level || "غير متاح")}</td>
      <td>${fmtNum(r.judged)}</td>
      <td>${fmtNum(r.pregnancies)}</td>
      <td>${fmtPct(r.conceptionRatePct)}</td>
    </tr>
  `);

  el("thiWrap").innerHTML = table(
    ["مستوى THI", "تلقيحات محكوم عليها", "حمل مثبت", "CR"],
    htmlRows
  );
}

function renderRepeatBreeders(j){
  const rb = j.repeatBreederAnalysis || j.repeatBreeders || {};
  const rows = Array.isArray(rb.rows) ? rb.rows : [];
  const drivers = Array.isArray(rb.likelyDrivers) ? rb.likelyDrivers : [];

  const driversText = drivers.length
    ? drivers.map(d => `${d.title}: ${fmtNum(d.count)} حالة (${fmtPct(d.pct)}) — ${d.strength}`).join(" | ")
    : "";

  const headHtml =
    boxRich(
      "ضغط Repeat Breeder في القطيع",
      rb.severityLabel || "--",
      linesHtml([
        `عدد الحالات: ${fmtNum(rb.count || 0)}`,
        `المؤهلون للتلقيح: ${fmtNum(rb.eligibleCount)}`,
        `النسبة: ${fmtPct(rb.ratePct)}`,
        rb.avgServices != null ? `متوسط عدد التلقيحات في الحالات المتكررة: ${fmtNum(rb.avgServices)}` : "",
        rb.herdRead || "",
        driversText ? `الأسباب المرجحة: ${driversText}` : ""
      ]),
      rb.severity === "danger" ? "health" : "repro"
    );

  if (!rows.length) {
    el("repeatBreedersWrap").innerHTML =
      headHtml +
      emptyMsg("لا توجد حيوانات Repeat Breeder محققة للشروط حاليًا.");
    return;
  }

  const htmlRows = rows.map(r => `
    <tr>
      <td>${esc(r.animalNumber)}</td>
      <td>${fmtNum(r.servicesCount)}</td>
      <td>${esc(r.lastInseminationDate || "--")}</td>
      <td>${esc(r.cycleRegularity || "--")}</td>
      <td>${esc(r.timingPattern || "--")}</td>
      <td>${esc(r.thiPattern || "--")}</td>
      <td>${esc(Array.isArray(r.likelyCauses) ? r.likelyCauses.join("، ") : "")}</td>
      <td>${esc(r.mbkRead || r.reproductiveSuspicion || "--")}</td>
    </tr>
  `);

  el("repeatBreedersWrap").innerHTML =
    headHtml +
    table(
      ["رقم الحيوان", "عدد التلقيحات", "آخر تلقيح", "انتظام الدورة", "التوقيت", "THI", "الأسباب المحتملة", "قراءة مُرَبِّيك"],
      htmlRows
    );
}

function renderActions(j){
  const actions = j.actionLists || {};
  const dueDx = Array.isArray(actions.duePregnancyDiagnosis) ? actions.duePregnancyDiagnosis : [];
  const delayed = Array.isArray(actions.delayedFirstBreeding) ? actions.delayedFirstBreeding : [];

  const rows = [];

  dueDx.forEach(r => {
    rows.push(`
      <tr>
        <td>تشخيص حمل</td>
        <td>${esc(r.animalNumber)}</td>
        <td>${esc(r.lastInseminationDate || "--")}</td>
        <td>${fmtNum(r.daysSinceInsemination)} يوم بعد التلقيح</td>
      </tr>
    `);
  });

  delayed.forEach(r => {
    rows.push(`
      <tr>
        <td>تأخر أول تلقيح</td>
        <td>${esc(r.animalNumber)}</td>
        <td>${fmtNum(r.daysInMilk)} يوم حليب</td>
        <td>${esc(r.reproductiveStatus || "--")}</td>
      </tr>
    `);
  });

  el("actionsWrap").innerHTML = table(
    ["القائمة", "رقم الحيوان", "التاريخ/الأيام", "ملاحظة"],
    rows
  );
}

function renderAdvisory(j){
  const expert = j.expertReport || {};
  const main = expert.mainBottleneck || j.bottleneckAnalysis?.main || {};
  const recs = Array.isArray(j.farmRecommendations)
    ? j.farmRecommendations
    : (
        Array.isArray(j.advisory?.notes)
          ? j.advisory.notes
          : []
      );

  el("advisoryWrap").innerHTML =
    boxRich(
      "القراءة العامة",
      expert.headline || j.advisory?.headline || "لا توجد قراءة كافية بعد.",
      linesHtml([
        main.title ? `الخلل المرجح: ${main.title}` : "",
        main.read || "",
        ...recs.map(r => `• ${r}`)
      ])
    );
}
async function main(){
  el("pageTitle").textContent = `تقرير الخصوبة — ${reportTypeLabel}`;

  try {
    const j = await fetchReport();

    renderSummary(j);
    renderHerd(j);
    renderConception(j);
    renderInseminators(j);
    renderThi(j);
    renderRepeatBreeders(j);
    renderAdvisory(j);

    el("statusBar").textContent = `تم تحميل تقرير الخصوبة — ${reportTypeLabel}.`;

  } catch (e) {
    console.error(e);
    el("statusBar").textContent = e.message || "تعذّر تحميل تقرير الخصوبة.";
  }
}

main();
</script>

</body>
</html>
