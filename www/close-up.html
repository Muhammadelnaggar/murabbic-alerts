<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>تحضير للولادة — مُرَبِّك</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
 
  <link rel="stylesheet" href="css/forms.css">

 
</head>
<body>
 <header>
  <div class="mbk-head">
    <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">
    <div class="mbk-center">
      <div class="mbk-page-title">التحضير للولادة</div>
      <div class="mbk-app-name">مُرَبِّيك</div>
    </div>
    <a class="mbk-back" href="add-event.html">رجوع</a>
  </div>
</header>

<div id="sysbar" class="infobar" role="status" aria-live="polite"></div>
 <main class="mbk-form">
  <form id="closeupForm" class="mbk-card">
    <label for="animalNumber">رقم الحيوان</label>
    <input id="animalNumber" name="animalNumber" inputmode="numeric" autocomplete="off" required />

    <label for="eventDate">تاريخ التحضير</label>
    <input id="eventDate" name="eventDate" type="date" required />

    <fieldset>
      <legend>عليقة التحضير</legend>
      <div class="radio-group">
        <label><input type="radio" name="ration" value="نعم" required> نعم</label>
        <label><input type="radio" name="ration" value="لا" required> لا</label>
      </div>
    </fieldset>

    <fieldset>
      <legend>الأملاح الأنيونية</legend>
      <div class="radio-group">
        <label><input type="radio" name="anionicSalts" value="نعم" required> نعم</label>
        <label><input type="radio" name="anionicSalts" value="لا" required> لا</label>
      </div>
    </fieldset>

    <div class="actions-bar inline">
      <button class="save" id="saveBtn" type="submit">حفظ التحضير</button>
      <button class="ghost" id="openCowCard" type="button">فتح بطاقة الحيوان</button>
    </div>
  </form>
</main>

<div id="nutritionDialog" class="mbk-card hide" role="dialog" aria-modal="true" aria-labelledby="nd_t">
  <div class="card">
    <h3 id="nd_t">إدخال عليقة التحضير؟</h3>
    <p class="form-hint">يمكنك الانتقال الآن لصفحة التغذية لإدخال مكونات العليقة لهذا الحيوان.</p>
    <div class="actions-bar inline">
      <button type="button" id="nd_yes" class="save">نعم، انتقل الآن</button>
      <button type="button" id="nd_no" class="ghost">لاحقًا</button>
    </div>
  </div>
</div>
 <script>
(function(){
  "use strict";

  const $ = id => document.getElementById(id);

  const form = $("closeupForm");
  const inputAnimal = $("animalNumber");
  const inputDate = $("eventDate");
  const saveBtn = $("saveBtn");
  const openCowCardBtn = $("openCowCard");
  const dialog = $("nutritionDialog");
  const ndYes = $("nd_yes");
  const ndNo = $("nd_no");
  const sysbar = $("sysbar");

  let gateOk = false;
  let gateTimer = null;

  function normDigits(v){
    const map = {"٠":"0","١":"1","٢":"2","٣":"3","٤":"4","٥":"5","٦":"6","٧":"7","٨":"8","٩":"9","۰":"0","۱":"1","۲":"2","۳":"3","۴":"4","۵":"5","۶":"6","۷":"7","۸":"8","۹":"9"};
    return String(v || "").trim().replace(/[٠-٩۰-۹]/g, d => map[d] || d).replace(/[^\d]/g, "");
  }

  function todayISO(){
    const d = new Date();
    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    return d.toISOString().slice(0,10);
  }

  function getQS(name){
    return new URL(location.href).searchParams.get(name) || "";
  }

  function firstNonEmpty(...vals){
    return vals.find(v => String(v || "").trim() !== "") || "";
  }

  function getUid(){
    return String(
      window.MBK_USER_ID ||
      window.mbkUserId ||
      window.mbk?.userId ||
      localStorage.getItem("userId") ||
      localStorage.getItem("uid") ||
      localStorage.getItem("tenantId") ||
      ""
    ).trim();
  }

  function buildUrl(path, params){
    const u = new URL(path, location.origin);
    Object.entries(params || {}).forEach(([k,v]) => {
      if (String(v || "").trim()) u.searchParams.set(k, v);
    });
    return u.toString();
  }

  function showMsg(text, ok){
    if (!sysbar) return;
    sysbar.textContent = text || "";
    sysbar.className = "infobar show " + (ok ? "success" : "error");
    try { sysbar.scrollIntoView({ behavior:"smooth", block:"start" }); } catch(_){}
  }

  function hideMsg(){
    if (!sysbar) return;
    sysbar.textContent = "";
    sysbar.className = "infobar";
  }

  function getRadio(name){
    return form.querySelector(`input[name="${name}"]:checked`)?.value || "";
  }

  function setSaveEnabled(v){
    if (saveBtn) saveBtn.disabled = !v;
  }

  async function runGate(){
    const uid = getUid();
    const animalNumber = normDigits(inputAnimal.value);
    const eventDate = String(inputDate.value || "").trim();

    gateOk = false;
    setSaveEnabled(false);

    if (!animalNumber || !eventDate) {
      hideMsg();
      return;
    }

    try {
      const r = await fetch("/api/close-up/gate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          ...(uid ? {"X-User-Id": uid} : {})
        },
        body: JSON.stringify({ animalNumber, eventDate })
      });

      const j = await r.json().catch(() => ({}));

      if (!r.ok || !j.ok || !j.allowed) {
        showMsg(j.message || "❌ الحيوان غير مؤهل لتسجيل التحضير.", false);
        return;
      }

      gateOk = true;
      setSaveEnabled(true);
      showMsg(j.message || "✅ تم التحقق — أكمل تسجيل تحضير الولادة.", true);

    } catch(e) {
      console.error("close-up gate error:", e);
      showMsg("تعذّر التحقق من تحضير الولادة الآن.", false);
    }
  }

  function scheduleGate(){
    clearTimeout(gateTimer);
    gateTimer = setTimeout(runGate, 350);
  }

  async function saveCloseup(e){
    e.preventDefault();

    const uid = getUid();
    const animalNumber = normDigits(inputAnimal.value);
    const eventDate = String(inputDate.value || "").trim();
    const ration = getRadio("ration");
    const anionicSalts = getRadio("anionicSalts");

    if (!animalNumber) return showMsg("❌ رقم الحيوان مطلوب.", false);
    if (!eventDate) return showMsg("❌ تاريخ التحضير مطلوب.", false);
    if (!ration) return showMsg("❌ يجب تحديد هل تم تقديم عليقة التحضير.", false);
    if (!anionicSalts) return showMsg("❌ يجب تحديد هل تم استخدام الأملاح الأنيونية.", false);

    try {
      saveBtn.disabled = true;
      saveBtn.textContent = "جارٍ الحفظ…";

      if (!gateOk) {
        await runGate();
        if (!gateOk) return;
      }

      const r = await fetch("/api/close-up/save", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          ...(uid ? {"X-User-Id": uid} : {})
        },
        body: JSON.stringify({
          animalNumber,
          eventDate,
          ration,
          anionicSalts
        })
      });

      const j = await r.json().catch(() => ({}));

      if (!r.ok || !j.ok) {
        throw new Error(j.message || "تعذّر حفظ تحضير الولادة.");
      }

      localStorage.setItem("lastAnimalId", animalNumber);
      localStorage.setItem("currentAnimalId", animalNumber);
      localStorage.setItem("eventDate", eventDate);
      localStorage.setItem("lastEventDate", eventDate);

      showMsg(j.message || "✅ تم حفظ تحضير الولادة بنجاح", true);

      if (ration === "نعم") {
       dialog.classList.remove("hide");
      } else {
        setTimeout(() => {
          location.href = j.redirectUrl || `/event-list.html?number=${encodeURIComponent(animalNumber)}`;
        }, 900);
      }

    } catch(err) {
      console.error("close-up save error:", err);
      showMsg(err.message || "تعذّر حفظ تحضير الولادة.", false);
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = "حفظ التحضير";
    }
  }

  const qsAnimal = firstNonEmpty(
    getQS("animalId"),
    getQS("number"),
    getQS("animalNumber"),
    localStorage.getItem("lastAnimalId"),
    localStorage.getItem("currentAnimalId")
  );

  const qsDate = firstNonEmpty(
    getQS("date"),
    getQS("eventDate"),
    localStorage.getItem("eventDate"),
    localStorage.getItem("lastEventDate"),
    todayISO()
  );

  if (inputAnimal && qsAnimal) inputAnimal.value = normDigits(qsAnimal);
  if (inputDate && qsDate) inputDate.value = qsDate;

  setSaveEnabled(false);
  scheduleGate();

  inputAnimal?.addEventListener("input", scheduleGate);
  inputDate?.addEventListener("change", scheduleGate);

  form?.addEventListener("submit", saveCloseup);

  openCowCardBtn?.addEventListener("click", () => {
    const n = normDigits(inputAnimal.value);
    if (!n) return;
    location.href = `/cow-card.html?number=${encodeURIComponent(n)}`;
  });

  ndYes?.addEventListener("click", () => {
    const n = normDigits(inputAnimal.value);
    const d = String(inputDate.value || "").trim();
    location.href = buildUrl("/nutrition.html", { animalId: n, number: n, date: d });
  });

  ndNo?.addEventListener("click", () => {
    const n = normDigits(inputAnimal.value);
   dialog.classList.add("hide");
    location.href = `/event-list.html?number=${encodeURIComponent(n)}`;
  });
})();
</script>
</body>
</html>
