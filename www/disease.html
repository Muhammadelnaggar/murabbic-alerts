<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="stylesheet" href="css/forms.css">
  
 <title>التشخيص الصحي — مُرَبِّيك</title>
 
</head>
<body>
 <header>
  <div class="mbk-head">
    <a class="mbk-back" href="add-event.html">رجوع</a>

    <div class="mbk-center">
      <div class="mbk-page-title">التشخيص الصحي</div>
     <div class="mbk-app-name">مُرَبِّك — تسجيل تشخيص صحي</div>
    </div>

    <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّك" />
  </div>
</header>

  <main>
    
  <div id="gateBox" class="infobar info show">
    جاري تجهيز التشخيصات المناسبة...
  </div>
    <div class="card grid">
      <div class="row">
        <div>
          <label>رقم الحيوان</label>
          <input id="animalNumber" inputmode="numeric" placeholder="مثال: 1023" required />
        </div>
        <div>
          <label>تاريخ التشخيص</label>
          <input id="eventDate" type="date" required />
        </div>
        <div>
          <label>ملاحظات</label>
          <input id="notes" placeholder="اختياري" />
        </div>
      </div>
    </div>

   <div class="card grid">
  <div id="animalSummary" class="form-hint"></div>
  <div id="dz" class="mbk-action-hub"></div>
 
</div>
  </main>

<script>
(function(){
  const API_BASE = location.origin;
  const $ = (id) => document.getElementById(id);
  const animalNumberEl = $("animalNumber");
  const eventDateEl = $("eventDate");
  const gateBox = $("gateBox");
  const dz = $("dz");
  const animalSummary = $("animalSummary");
  const notesEl = $("notes");

  let gateTimer = null;
 

  function todayLocal(){
    const d = new Date();
    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    return d.toISOString().slice(0,10);
  }

  function digitsOnly(v){
    const map = {
      "٠":"0","١":"1","٢":"2","٣":"3","٤":"4","٥":"5","٦":"6","٧":"7","٨":"8","٩":"9",
      "۰":"0","۱":"1","۲":"2","۳":"3","۴":"4","۵":"5","۶":"6","۷":"7","۸":"8","۹":"9"
    };

    return String(v || "")
      .replace(/[٠-٩۰-۹]/g, d => map[d] || d)
      .replace(/[^\d]/g, "")
      .trim();
  }


  function setBar(el, text, type){
    if (!el) return;
    el.textContent = text || "";
    el.className = "infobar show " + (type || "info");
  }
  function handleAuthRequired(j){
    if (j && (j.error === "auth_required" || j.message === "سجّل الدخول أولًا.")) {
      location.replace("login.html");
      return true;
    }
    return false;
  }
  function renderSummary(animal){
    if (!animalSummary) return;

    if (!animal) {
      animalSummary.textContent = "";
      return;
    }

    const parts = [];

    if (animal.productionStatus) parts.push("إنتاجيًا: " + animal.productionStatus);
    if (animal.reproductiveStatus) parts.push("تناسليًا: " + animal.reproductiveStatus);
    if (animal.followerStatus) parts.push("حالة التابع: " + animal.followerStatus);

    animalSummary.textContent = parts.join(" — ");
  }
async function saveDiseaseItem(item, btn){
  const animalNumber = digitsOnly(animalNumberEl.value);
  const eventDate = eventDateEl.value || todayLocal();
  const notes = notesEl ? notesEl.value : "";

  if (item.specialPage) {
    location.href = `${item.specialPage}?number=${encodeURIComponent(animalNumber)}&date=${encodeURIComponent(eventDate)}`;
    return;
  }

  btn.disabled = true;
 setBar(gateBox, "جاري حفظ التشخيص...", "info");

  try {
          const r = await fetch(API_BASE + "/api/disease/save", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      credentials: "same-origin",
      body: JSON.stringify({
        animalNumber,
        eventDate,
        diseaseCode: item.code,
        notes
      })
    });

const j = await r.json().catch(() => ({}));
if (r.status === 401 || handleAuthRequired(j)) return;

if (!r.ok || !j.ok) {
  setBar(gateBox, j.message || "❌ تعذّر حفظ التشخيص الصحي.", "error");
  window.scrollTo({ top: 0, behavior: "smooth" });
  btn.disabled = false;
  return;
}

setBar(gateBox, j.message || "✅ تم حفظ التشخيص الصحي بنجاح.", "success");
window.scrollTo({ top: 0, behavior: "smooth" });

setTimeout(() => {
  location.href = j.redirectUrl || `event-list.html?number=${encodeURIComponent(animalNumber)}`;
}, 2500);

  } catch (e) {
    console.error("disease save failed", e);
    setBar(gateBox, "❌ تعذّر الاتصال بالسيرفر.", "error");
    btn.disabled = false;
  }
}
  function renderDiseases(list){
    dz.innerHTML = "";
   
    if (!Array.isArray(list) || !list.length) {
     dz.innerHTML = '<div class="infobar warning show">لا توجد اختيارات تشخيص معرفة من السيرفر الآن.</div>';
      return;
    }

    const groups = new Map();

    list.forEach(item => {
      const g = item.group || "عام";
      if (!groups.has(g)) groups.set(g, []);
      groups.get(g).push(item);
    });

    groups.forEach((items, groupName) => {
      const sec = document.createElement("section");
      sec.className = "mbk-action-section";

      const title = document.createElement("div");
      title.className = "mbk-action-section-title";
      title.textContent = groupName;

      const wrap = document.createElement("div");
      wrap.className = "mbk-action-list";

      items.forEach(item => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "mbk-action-tile";
        btn.dataset.code = item.code || "";
        btn.textContent = item.name || "";

      btn.addEventListener("click", () => saveDiseaseItem(item, btn));

        wrap.appendChild(btn);
      });

      sec.appendChild(title);
      sec.appendChild(wrap);
      dz.appendChild(sec);
    });
  }

  async function runGate(){
    const animalNumber = digitsOnly(animalNumberEl.value);
    const eventDate = eventDateEl.value;

    dz.innerHTML = "";
    renderSummary(null);


    if (!animalNumber || !eventDate) {
      setBar(gateBox, "أدخل رقم الحيوان وتاريخ التشخيص لعرض التشخيصات المناسبة.", "info");
      return;
    }

    setBar(gateBox, "جاري التحقق من السيرفر...", "info");

    try {
           const r = await fetch(API_BASE + "/api/disease/gate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        credentials: "same-origin",
        body: JSON.stringify({ animalNumber, eventDate })
      });

      const j = await r.json().catch(() => ({}));
      if (r.status === 401 || handleAuthRequired(j)) return;

      setBar(
        gateBox,
        j.message || "تم التحقق.",
        j.allowed ? "success" : (j.silent ? "info" : "error")
      );

      if (!j.allowed) {
        dz.innerHTML = "";
        renderSummary(null);
        return;
      }

      renderSummary(j.animal || null);
      renderDiseases(j.diseases || []);

    } catch (e) {
      console.error("disease gate failed", e);
      setBar(gateBox, "❌ تعذّر الاتصال بالسيرفر.", "error");
      dz.innerHTML = "";
      renderSummary(null);
    }
  }

  function scheduleGate(){
    clearTimeout(gateTimer);
    gateTimer = setTimeout(runGate, 350);
  }

  function hydrate(){
    const p = new URLSearchParams(location.search);

    animalNumberEl.value = digitsOnly(
      p.get("number") ||
      p.get("animalNumber") ||
      p.get("animalId") ||
      ""
    );

    const d = String(
      p.get("date") ||
      p.get("eventDate") ||
      ""
    ).slice(0,10);

    eventDateEl.value = /^\d{4}-\d{2}-\d{2}$/.test(d) ? d : todayLocal();
  }

  animalNumberEl.addEventListener("input", scheduleGate);
  eventDateEl.addEventListener("change", scheduleGate);

  hydrate();
  runGate();
})();
</script>
</body>
</html>
