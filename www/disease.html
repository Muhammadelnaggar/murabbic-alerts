<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="stylesheet" href="css/forms.css">
  
 <title>التشخيص الصحي — مُرَبِّيك</title>
 
</head>
<body>
 <header>
  <div class="mbk-head">
    <a class="mbk-back" href="add-event.html">رجوع</a>

    <div class="mbk-center">
      <div class="mbk-page-title">التشخيص الصحي</div>
     <div class="mbk-app-name">مُرَبِّك — تسجيل تشخيص صحي</div>
    </div>

    <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّك" />
  </div>
</header>

  <main>
    
  <div id="gateBox" class="infobar info show">
    جاري تجهيز التشخيصات المناسبة...
  </div>
    <div class="card grid">
      <div class="row">
        <div>
          <label>رقم الحيوان</label>
          <input id="animalNumber" inputmode="numeric" placeholder="مثال: 1023" required />
        </div>
        <div>
          <label>تاريخ التشخيص</label>
          <input id="eventDate" type="date" required />
        </div>
        <div>
          <label>ملاحظات</label>
          <input id="notes" placeholder="اختياري" />
        </div>
      </div>
    </div>

   <div class="card grid">
  <div id="animalSummary" class="form-hint"></div>
  <div id="dz" class="mbk-action-hub"></div>
 
</div>
  </main>

<script>
(function(){
  const API_BASE = location.origin;
  const $ = (id) => document.getElementById(id);
  const animalNumberEl = $("animalNumber");
  const eventDateEl = $("eventDate");
  const gateBox = $("gateBox");
  const dz = $("dz");
  const animalSummary = $("animalSummary");
  const notesEl = $("notes");
    const DISEASE_OPTIONS = [
    { code: "milk_fever", name: "حمى اللبن", group: "تمثيل وإنتاج" },
    { code: "ketosis", name: "كيتوزس", group: "تمثيل وإنتاج" },
    { code: "displaced_abomasum", name: "انقلاب المنفحة", group: "تمثيل وإنتاج" },
    { code: "rumen_acidosis", name: "حموضة الكرش", group: "تمثيل وإنتاج" },
    { code: "phosphorus_def", name: "نقص فوسفور", group: "تمثيل وإنتاج" },
    { code: "magnesium_def", name: "نقص ماغنيسيوم", group: "تمثيل وإنتاج" },
    { code: "retained_placenta", name: "احتباس مشيمة", group: "تناسل" },
    { code: "metritis_endometritis", name: "التهاب رحم / التهاب بطانة الرحم", group: "تناسل" },
    { code: "ovarian_cysts", name: "تكيسات مبيضية", group: "تناسل" },
    { code: "brucellosis", name: "بروسيلا", group: "تناسل" },
    { code: "bovine_respiratory_disease", name: "مرض تنفسي بقري", group: "معدية / جهازية" },
    { code: "johnes_disease", name: "جونز", group: "معدية / جهازية" },
    { code: "bovine_viral_diarrhea", name: "BVD / الإسهال الفيروسي البقري", group: "معدية / جهازية" },
    { code: "fmd", name: "حمى قلاعية", group: "معدية / جهازية" },
    { code: "three_day_sickness", name: "حمى الثلاث أيام", group: "معدية / جهازية" },
    { code: "lumpy_skin", name: "جلد عقدي", group: "معدية / جهازية" },
    { code: "septicemia", name: "تسمم دموي", group: "معدية / جهازية" },
    { code: "blood_parasites", name: "طفيليات دم", group: "معدية / جهازية" },
    { code: "pinkeye", name: "التهاب العين", group: "معدية / جهازية" },

    { code: "calf_scours", name: "سكاور / إسهال عجول", group: "أمراض العجول" },
    { code: "calf_pneumonia", name: "نيمونيا عجول", group: "أمراض العجول" },
    { code: "navel_infection", name: "التهاب سرة", group: "أمراض العجول" },
    { code: "joint_ill", name: "التهاب مفاصل عجول", group: "أمراض العجول" },
    { code: "calf_coccidiosis", name: "كوكسيديا عجول", group: "أمراض العجول" }
  ];

  let gateTimer = null;
  let gateAllowed = false;
  let gateKey = "";
  let gateMessage = "لم يتم التحقق من الحيوان بعد.";
 

  function todayLocal(){
    const d = new Date();
    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    return d.toISOString().slice(0,10);
  }

  function digitsOnly(v){
    const map = {
      "٠":"0","١":"1","٢":"2","٣":"3","٤":"4","٥":"5","٦":"6","٧":"7","٨":"8","٩":"9",
      "۰":"0","۱":"1","۲":"2","۳":"3","۴":"4","۵":"5","۶":"6","۷":"7","۸":"8","۹":"9"
    };

    return String(v || "")
      .replace(/[٠-٩۰-۹]/g, d => map[d] || d)
      .replace(/[^\d]/g, "")
      .trim();
  }


  function setBar(el, text, type){
    if (!el) return;
    el.textContent = text || "";
    el.className = "infobar show " + (type || "info");
  }
  function handleAuthRequired(j){
    if (j && (j.error === "auth_required" || j.message === "سجّل الدخول أولًا.")) {
      location.replace("login.html");
      return true;
    }
    return false;
  }
  function renderSummary(animal){
    if (!animalSummary) return;

    if (!animal) {
      animalSummary.textContent = "";
      return;
    }

    const parts = [];

    if (animal.productionStatus) parts.push("إنتاجيًا: " + animal.productionStatus);
    if (animal.reproductiveStatus) parts.push("تناسليًا: " + animal.reproductiveStatus);
    if (animal.followerStatus) parts.push("حالة التابع: " + animal.followerStatus);

    animalSummary.textContent = parts.join(" — ");
  }
async function saveDiseaseItem(item, btn){
  const animalNumber = digitsOnly(animalNumberEl.value);
  const eventDate = eventDateEl.value || todayLocal();
  const notes = notesEl ? notesEl.value : "";

  if (!animalNumber || !eventDate) {
    setBar(gateBox, "أدخل رقم الحيوان وتاريخ التشخيص أولًا.", "error");
    window.scrollTo({ top: 0, behavior: "smooth" });
    return;
  }

  // الأمراض التي لها صفحة خاصة تمرر الرقم والتاريخ مثل صفحات الأحداث
  if (item.specialPage) {
    const qs = new URLSearchParams({
      number: animalNumber,
      animalNumber: animalNumber,
      date: eventDate,
      eventDate: eventDate
    });

    if (notes) qs.set("notes", notes);

    location.href = `${item.specialPage}?${qs.toString()}`;
    return;
  }

  // الأمراض التي تُحفظ من نفس الصفحة لا تُحفظ إلا بعد Gate ناجح
  const currentGateKey = animalNumber + "|" + eventDate;

  if (!gateAllowed || gateKey !== currentGateKey) {
    setBar(
      gateBox,
      gateMessage || "يلزم نجاح التحقق من الحيوان قبل تسجيل التشخيص.",
      "error"
    );
    window.scrollTo({ top: 0, behavior: "smooth" });
    runGate();
    return;
  }

  btn.disabled = true;
  setBar(gateBox, "جاري حفظ التشخيص...", "info");

  try {
    const r = await fetch(API_BASE + "/api/disease/save", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      credentials: "same-origin",
      body: JSON.stringify({
        animalNumber,
        eventDate,
        diseaseCode: item.code,
        notes
      })
    });

    const j = await r.json().catch(() => ({}));
    if (r.status === 401 || handleAuthRequired(j)) return;

    if (!r.ok || !j.ok) {
      setBar(gateBox, j.message || "❌ تعذّر حفظ التشخيص الصحي.", "error");
      window.scrollTo({ top: 0, behavior: "smooth" });
      btn.disabled = false;
      return;
    }

    setBar(gateBox, j.message || "✅ تم حفظ التشخيص الصحي بنجاح.", "success");
    window.scrollTo({ top: 0, behavior: "smooth" });

    setTimeout(() => {
      location.href = j.redirectUrl || `event-list.html?number=${encodeURIComponent(animalNumber)}`;
    }, 2500);

  } catch (e) {
    console.error("disease save failed", e);
    setBar(gateBox, "❌ تعذّر الاتصال بالسيرفر.", "error");
    btn.disabled = false;
  }
}
  function renderDiseases(list){
    dz.innerHTML = "";

    const source = Array.isArray(list) && list.length ? list : DISEASE_OPTIONS;

    const groups = new Map();

    source.forEach(item => {
      const g = item.group || "عام";
      if (!groups.has(g)) groups.set(g, []);
      groups.get(g).push(item);
    });

    groups.forEach((items, groupName) => {
      const sec = document.createElement("section");
      sec.className = "mbk-action-section";

      const title = document.createElement("div");
      title.className = "mbk-action-section-title";
      title.textContent = groupName;

      const wrap = document.createElement("div");
      wrap.className = "mbk-action-list";

      items.forEach(item => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "mbk-action-tile";
        btn.dataset.code = item.code || "";
        btn.textContent = item.name || "";

        btn.addEventListener("click", () => saveDiseaseItem(item, btn));

        wrap.appendChild(btn);
      });

      sec.appendChild(title);
      sec.appendChild(wrap);
      dz.appendChild(sec);
    });
  }

  async function runGate(){
    const animalNumber = digitsOnly(animalNumberEl.value);
    const eventDate = eventDateEl.value;

    gateAllowed = false;
    gateKey = "";
    gateMessage = "لم يتم التحقق من الحيوان بعد.";

    renderSummary(null);
    renderDiseases(DISEASE_OPTIONS);


    if (!animalNumber || !eventDate) {
      setBar(gateBox, "أدخل رقم الحيوان وتاريخ التشخيص لعرض التشخيصات المناسبة.", "info");
      return;
    }

    setBar(gateBox, "جاري التحقق من السيرفر...", "info");

    try {
           const r = await fetch(API_BASE + "/api/disease/gate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        credentials: "same-origin",
        body: JSON.stringify({ animalNumber, eventDate })
      });

      const j = await r.json().catch(() => ({}));
      if (r.status === 401 || handleAuthRequired(j)) return;

           if (!r.ok || !j.allowed) {
        gateAllowed = false;
        gateKey = "";
        gateMessage = j.message || "لم يمر الحيوان من التحقق.";

        setBar(gateBox, gateMessage, "error");
        renderSummary(null);
        renderDiseases(DISEASE_OPTIONS);
        return;
      }

      gateAllowed = true;
      gateKey = animalNumber + "|" + eventDate;
      gateMessage = j.message || "✅ الحيوان صالح لتسجيل التشخيص.";

      setBar(gateBox, gateMessage, "success");
      renderSummary(j.animal || null);
      renderDiseases(DISEASE_OPTIONS);

       } catch (e) {
      console.error("disease gate failed", e);

      gateAllowed = false;
      gateKey = "";
      gateMessage = "❌ تعذّر التحقق من السيرفر. لا يمكن حفظ التشخيص المباشر قبل نجاح التحقق.";

      setBar(gateBox, gateMessage, "error");
      renderDiseases(DISEASE_OPTIONS);
      renderSummary(null);
    }
  }

  function scheduleGate(){
    clearTimeout(gateTimer);
    gateTimer = setTimeout(runGate, 350);
  }

  function hydrate(){
    const p = new URLSearchParams(location.search);

    animalNumberEl.value = digitsOnly(
      p.get("number") ||
      p.get("animalNumber") ||
      p.get("animalId") ||
      ""
    );

    const d = String(
      p.get("date") ||
      p.get("eventDate") ||
      ""
    ).slice(0,10);

    eventDateEl.value = /^\d{4}-\d{2}-\d{2}$/.test(d) ? d : todayLocal();
  }

  animalNumberEl.addEventListener("input", scheduleGate);
  eventDateEl.addEventListener("change", scheduleGate);

   hydrate();
  renderDiseases(DISEASE_OPTIONS);
  runGate();
})();
</script>
</body>
</html>
