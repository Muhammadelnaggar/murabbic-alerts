<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>قائمة الحيوانات</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/forms.css">

</head>
<body data-page="animal-list">
  
<header class="mbk-top">
  <div class="mbk-head">
    <div class="mbk-title">
      <div class="mbk-page">قائمة الحيوانات</div>
      <div class="mbk-app">مُرَبِّيك</div>
    </div>
    <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">
  </div>
</header>

  <div class="controls">
    <input type="text" id="searchNumber" placeholder="ابحث برقم الحيوان">
   <select id="typeSelector">
      <option value="">عرض النوع</option>
    </select>
   <select id="filterReproductive">
      <option value="">كل الحالات التناسلية</option>
      <option value="حديث الولادة">حديث الولادة</option>
      <option value="ملقحة">ملقحة</option>
      <option value="عشار">عشار</option>
      <option value="مفتوحة">مفتوحة</option>
      <option value="إجهاض">إجهاض</option>
    </select>
   <button id="resetFilterBtn" type="button">عرض الكل</button>
  </div>

  <div class="table-wrapper">
    <table id="animalTable">
      <thead>
        <tr>
          <th>رقم الحيوان</th>
          <th>النوع</th>
          <th>السلالة</th>
          <th>الحالة الإنتاجية</th>
          <th>أيام الحليب</th>
          <th>الحالة التناسلية</th>
          <th>أيام ملقحة</th>
          <th>اللبن اليومي</th>
          <th>عمر الحمل</th>
          <th>تاريخ الميلاد</th>
          <th>تاريخ آخر ولادة</th>
          <th>البطاقة</th>
          <th>تسجيل حدث</th>
       
        </tr>
      </thead>
      <tbody id="animalBody"></tbody>
    </table>
  </div>

  <div id="noData" class="no-data" style="display:none;">لا يوجد حيوانات مسجلة بعد.</div>
  <a href="dashboard.html" class="back-button">🔙 عودة إلى غرفة التحكم</a>

<script>
  const $ = id => document.getElementById(id);
  let animalsData = [];
  let searchTimer = null;

  function readStoredUid() {
    const keys = [
      'murabbik_uid',
      'mbk_uid',
      'uid',
      'userId',
      'ownerUid',
      'currentUserId'
    ];

    for (const k of keys) {
      const v = (localStorage.getItem(k) || sessionStorage.getItem(k) || '').trim();
      if (v) return v;
    }

    const jsonKeys = ['murabbik_user', 'mbk_user', 'user', 'currentUser'];
    for (const k of jsonKeys) {
      const raw = localStorage.getItem(k) || sessionStorage.getItem(k) || '';
      if (!raw) continue;

      try {
        const obj = JSON.parse(raw);
        const v = String(obj.uid || obj.userId || obj.ownerUid || obj.id || '').trim();
        if (v) return v;
      } catch (_) {}
    }

    return '';
  }

  function setMessage(text) {
    const noData = $('noData');
    const tbody = $('animalBody');
    if (tbody) tbody.innerHTML = '';
    if (noData) {
      noData.textContent = text || 'لا يوجد حيوانات مسجلة بعد.';
      noData.style.display = 'block';
    }
  }

  function updateStickyCols() {
    const th1 = document.querySelector('#animalTable thead th:nth-child(1)');
    if (!th1) return;
   document.body.style.setProperty('--sticky-col1', th1.offsetWidth + 'px');
  }

  window.addEventListener('resize', updateStickyCols);

  function buildAnimalsUrl() {
    const params = new URLSearchParams();

    const q = $('searchNumber')?.value.trim() || '';
    const type = $('typeSelector')?.value || '';
    const repro = $('filterReproductive')?.value || '';

    if (q) params.set('searchNumber', q);
    if (type) params.set('type', type);
    if (repro) params.set('reproductiveStatus', repro);

    const qs = params.toString();
    return qs ? `/api/animals?${qs}` : '/api/animals';
  }

  async function apiLoadAnimals() {
    const uid = readStoredUid();

    if (!uid) {
      location.href = 'login.html?next=animal-list.html';
      return null;
    }

    const res = await fetch(buildAnimalsUrl(), {
      method: 'GET',
      cache: 'no-store',
      headers: {
        'Accept': 'application/json',
        'X-User-Id': uid
      }
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok || data.ok === false) {
      throw new Error(data.message || data.error || 'تعذّر تحميل قائمة الحيوانات.');
    }

    return data;
  }

  function updateTypeOptions(types = []) {
    const typeSelector = $('typeSelector');
    if (!typeSelector) return;

    const selected = typeSelector.value;
    typeSelector.innerHTML = '<option value="">عرض النوع</option>';

    types.forEach(type => {
      const opt = document.createElement('option');
      opt.value = type;
      opt.textContent = type === 'بقرة' ? '🐄 الأبقار' : type === 'جاموسة' ? '🐃 الجاموس' : type;
      typeSelector.appendChild(opt);
    });

    if (selected && types.includes(selected)) {
      typeSelector.value = selected;
    }
  }

  function appendTextCell(tr, text) {
    const td = document.createElement('td');
    td.textContent = text ?? '---';
    tr.appendChild(td);
  }

  function appendButtonCell(tr, label, url) {
    const td = document.createElement('td');
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'button';
    btn.textContent = label;
    btn.addEventListener('click', () => {
      if (url) location.href = url;
    });
    td.appendChild(btn);
    tr.appendChild(td);
  }

  function renderTable(data) {
    const tbody = $('animalBody');
    const noData = $('noData');
    if (!tbody || !noData) return;

    tbody.innerHTML = '';

    if (!data || data.length === 0) {
      noData.textContent = 'لا يوجد حيوانات مطابقة.';
      noData.style.display = 'block';
      updateStickyCols();
      return;
    }

    noData.style.display = 'none';

    data.forEach(animal => {
      const tr = document.createElement('tr');
      if (animal.rowClass) tr.className = animal.rowClass;

      appendTextCell(tr, animal.animalNumber);
      appendTextCell(tr, animal.animalTypeAr);
      appendTextCell(tr, animal.breed);
      appendTextCell(tr, animal.productionStatus);
      appendTextCell(tr, animal.daysInMilk);
      appendTextCell(tr, animal.reproductiveStatus);
      appendTextCell(tr, animal.inseminatedDays);
      appendTextCell(tr, animal.dailyMilk);
      appendTextCell(tr, animal.pregnancyDays);
      appendTextCell(tr, animal.birthDate);
      appendTextCell(tr, animal.lastCalvingDate);
      appendButtonCell(tr, '📄', animal.cardUrl);
      appendButtonCell(tr, '📋', animal.eventUrl);

      tbody.appendChild(tr);
    });

    updateStickyCols();
  }

  async function loadAnimals() {
    try {
      const data = await apiLoadAnimals();
      if (!data) return;

      animalsData = data.animals || [];
      updateTypeOptions(data.typeOptions || []);
      renderTable(animalsData);
    } catch (e) {
      console.error('animal-list load failed:', e);
      setMessage(e.message || 'تعذّر تحميل قائمة الحيوانات.');
    }
  }

  function scheduleLoadAnimals() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(loadAnimals, 250);
  }

  $('searchNumber')?.addEventListener('input', scheduleLoadAnimals);

 
  $('typeSelector')?.addEventListener('change', loadAnimals);
$('filterReproductive')?.addEventListener('change', loadAnimals);

$('resetFilterBtn')?.addEventListener('click', function(){
  $('searchNumber').value = '';
  $('filterReproductive').value = '';
  $('typeSelector').value = '';
  loadAnimals();
});
  document.addEventListener('DOMContentLoaded', loadAnimals);
</script>


</body>
</html>
