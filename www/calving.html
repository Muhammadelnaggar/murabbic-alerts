<!DOCTYPE html>
<html lang="ar" dir="rtl" data-page="calving">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="stylesheet" href="css/forms.css">

  <title>تسجيل ولادة — مُرَبِّيك</title>

 <style media="not all">
    :root{
      --green:#0ea05a;--green-600:#0b7f47;--bg:#f7faf7;--text:#0f172a;
      --muted:#64748b;--card:#ffffff
    }
    *{box-sizing:border-box}
    html,body{max-width:100%;overflow-x:hidden}
    body{
      margin:0;
      font-family:'Cairo',Tahoma,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    header{
      position:sticky;top:0;z-index:10;
      background:#fff;
      border-bottom:1px solid #e2e8f0;
      box-shadow:0 2px 4px rgba(0,0,0,.05)
    }
    main{
      max-width:920px;
      margin:20px auto;
      padding:16px;
      padding-bottom:110px
    }
    .card{
      background:var(--card);
      border:1px solid #e2e8f0;
      border-radius:16px;
      padding:20px;
      box-shadow:0 2px 6px rgba(0,0,0,.05)
    }
    .grid{display:grid;grid-template-columns:1fr;gap:16px}
    .row{display:grid;gap:14px;min-width:0}
    @media(min-width:720px){.row{grid-template-columns:repeat(2,1fr)}}
    label{
      font-weight:600;font-size:15px;
      color:#0f172a;
      display:block;margin-bottom:6px
    }
    input,select{
      width:100%;padding:12px;
      border:1px solid #cbd5e1;
      border-radius:10px;
      background:#fff;font-size:16px
    }
    .radio-group{
      display:flex;flex-wrap:wrap;
      gap:10px;padding:6px 0
    }
    .radio-group label{
      font-weight:500;font-size:14px;
      background:#f1f5f9;
      border:1px solid #cbd5e1;
      border-radius:8px;
      padding:6px 10px;
      cursor:pointer
    }
    .radio-group input{margin-inline-start:6px}

    .actions-bar{
      position:fixed;bottom:0;left:0;right:0;
      background:#fff;
      border-top:1px solid #e2e8f0;
      box-shadow:0 -2px 6px rgba(0,0,0,.08);
      display:flex;gap:10px;
      padding:12px;z-index:20
    }
    .actions-bar button{
      flex:1;padding:14px;
      font-size:16px;font-weight:700;
      border-radius:12px;cursor:pointer;border:0
    }
    .actions-bar .save{background:var(--green);color:#fff}
    .actions-bar .ghost{background:#eef2f7;color:#0f172a}

    .infobar{
      display:none;margin-top:14px;padding:12px;
      border-radius:10px;font-size:14px;font-weight:700;
      text-align:center;margin-inline:auto;max-width:560px
    }
    /* رسالة خطأ */
.infobar.error{
  background:#fff1f2;
  border:1px solid #fecaca;
  color:#b91c1c;
}

/* رسالة نجاح */
.infobar.success{
  background:#ecfdf5;
  border:1px solid #bbf7d0;
  color:#065f46;
}

/* رسالة عادية (معلومة / جاري التحقق) */
.infobar.info{
  background:#eff6ff;
  border:1px solid #bfdbfe;
  color:#1e40af;
}


    /* ===== Header (Calving) ===== */
    .mbk-head{
      max-width:920px;margin:0 auto;
      padding:12px 16px;
      display:flex;align-items:center;justify-content:space-between;
      gap:12px;
    }
    .mbk-logo{height:56px;width:auto;object-fit:contain;opacity:.70}
    .mbk-center{flex:1;text-align:center;line-height:1.15}
    .mbk-page-title{font-weight:900;color:var(--green-600);font-size:18px}
    .mbk-app-name{font-weight:800;font-size:13px;opacity:.85;margin-top:4px}
    .mbk-back{
      width:44px;height:44px;border-radius:999px;
      background:#f1f5f9;border:1px solid #cbd5e1;
      color:#0f172a;text-decoration:none;
      display:flex;align-items:center;justify-content:center;
      font-weight:900;font-size:12px;
    }

    #sysbar{
      display:none;
      max-width:920px;
      margin:10px auto 0;
    }
    #sysbar.show{display:block}

    /* أزرار تفاعلية داخل الانفوبار */
    .infobar .sys-actions{
      margin-top:10px;
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }
    .infobar .sys-btn{
      padding:10px 12px;
      border-radius:12px;
      border:1px solid #cbd5e1;
      background:#fff;
      cursor:pointer;
      font-weight:800;
      font-size:14px;
      color:#0f172a;
      min-width:140px;
    }
    .infobar .sys-btn.primary{
      border:0;
      background:var(--green);
      color:#fff;
    }
    .infobar.error .sys-btn.primary{
      background:#dc2626;
    }

    /* مسافة خفيفة بين مجموعات المواليد */
    .offspring-group{padding-top:4px}
  </style>
</head>

<body>
  <!-- تتبّع أساسي -->
  <script>window.dataLayer = window.dataLayer || [];</script>

  <header>
    <div class="mbk-head">
      <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">
      <div class="mbk-center">
        <div class="mbk-page-title">تسجيل ولادة</div>
        <div class="mbk-app-name">مُرَبِّيك</div>
      </div>
      <a class="mbk-back" href="add-event.html">رجوع</a>
    </div>
  </header>

  <!-- ✅ كل رسائل النظام هنا تحت العنوان مباشرة -->
  <div id="sysbar" class="infobar" role="status" aria-live="polite"></div>

  <main>
   <form id="calving-form" class="card grid" autocomplete="off" novalidate data-event="ولادة">

      <input type="hidden" data-field="animalId" id="animalId">
      <input type="hidden" data-field="species" id="species">
      <input type="hidden" data-field="reproStatus" value="عشار">

      <div class="row">
        <div>
          <label>رقم الحيوان</label>
          <input id="animalNumber" data-field="animalNumber" inputmode="numeric"
                 placeholder="مثال: 1023" required />
        </div>
        <div>
          <label>تاريخ الولادة</label>
          <input id="eventDate" data-field="eventDate" type="date" required />
        </div>
      </div>

      <div class="row">
        <div>
          <label>نوع الولادة</label>
          <select id="calvingKind" data-field="calvingKind" required>
            <option value="">اختر</option>
            <option value="طبيعية">طبيعية</option>
            <option value="متعسرة">متعسرة</option>
            <option value="قيصرية">قيصرية</option>
            <option value="نافقة">نافقة</option>
          </select>
        </div>
        <div class="live-only">
          <label>عدد المواليد</label>
          <div class="radio-group">
            <label><input type="radio" name="calfCount" data-field="calfCount" value="1" required> 1</label>
            <label><input type="radio" name="calfCount" data-field="calfCount" value="2"> 2</label>
            <label><input type="radio" name="calfCount" data-field="calfCount" value="3"> 3</label>
          </div>
        </div>
      </div>

      <!-- ===================== مولود (1) ===================== -->
      <div class="offspring-group live-only" id="offspring1">
        <label>المولود (1)</label>

        <div class="row">
          <div>
            <label>جنس المولود</label>
            <div class="radio-group">
              <label><input type="radio" name="calf1Sex" data-field="calf1Sex" value="ذكر" required> ذكر</label>
              <label><input type="radio" name="calf1Sex" data-field="calf1Sex" value="أنثى"> أنثى</label>
            </div>
          </div>
          <div>
            <label>رقم العجل</label>
            <input id="calfId" data-field="calfId" placeholder="رقم تعريف العجل" required />
          </div>
        </div>

        <div class="row">
          <div>
            <label>مصير العجل (1)</label>
            <div class="radio-group">
              <label><input type="radio" name="calf1Fate" data-field="calf1Fate" value="تربية" required> تربية</label>
              <label><input type="radio" name="calf1Fate" data-field="calf1Fate" value="بيع"> بيع</label>
            </div>
          </div>
        </div>
      </div>

      <!-- ===================== مولود (2) ===================== -->
      <div class="offspring-group live-only" id="offspring2" style="display:none">
        <label>المولود (2)</label>

        <div class="row">
          <div>
            <label>جنس المولود</label>
            <div class="radio-group">
              <label><input type="radio" name="calf2Sex" data-field="calf2Sex" value="ذكر" required> ذكر</label>
              <label><input type="radio" name="calf2Sex" data-field="calf2Sex" value="أنثى"> أنثى</label>
            </div>
          </div>
          <div>
            <label>رقم العجل</label>
            <input id="calf2Id" data-field="calf2Id" placeholder="رقم تعريف العجل الثاني" required />
          </div>
        </div>

        <div class="row">
          <div>
            <label>مصير العجل (2)</label>
            <div class="radio-group">
              <label><input type="radio" name="calf2Fate" data-field="calf2Fate" value="تربية" required> تربية</label>
              <label><input type="radio" name="calf2Fate" data-field="calf2Fate" value="بيع"> بيع</label>
            </div>
          </div>
        </div>
      </div>

      <!-- ===================== مولود (3) ===================== -->
      <div class="offspring-group live-only" id="offspring3" style="display:none">
        <label>المولود (3)</label>

        <div class="row">
          <div>
            <label>جنس المولود</label>
            <div class="radio-group">
              <label><input type="radio" name="calf3Sex" data-field="calf3Sex" value="ذكر" required> ذكر</label>
              <label><input type="radio" name="calf3Sex" data-field="calf3Sex" value="أنثى"> أنثى</label>
            </div>
          </div>
          <div>
            <label>رقم العجل</label>
            <input id="calf3Id" data-field="calf3Id" placeholder="رقم تعريف العجل الثالث" required />
          </div>
        </div>

        <div class="row">
          <div>
            <label>مصير العجل (3)</label>
            <div class="radio-group">
              <label><input type="radio" name="calf3Fate" data-field="calf3Fate" value="تربية" required> تربية</label>
              <label><input type="radio" name="calf3Fate" data-field="calf3Fate" value="بيع"> بيع</label>
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div>
          <label>آخر تلقيح مُخصِّب</label>
          <input id="lastInseminationDate" type="date" data-field="lastInseminationDate" required />
        </div>
        <div>
          <label>ملاحظات</label>
          <input id="notes" data-field="notes" placeholder="اختياري" />
        </div>
      </div>

    </form>
  </main>

  <div class="actions-bar">
    <button class="save" id="saveBtn" type="submit" form="calving-form">حفظ الولادة ✅</button>
    <button class="ghost" id="toCardBtn" type="button">فتح بطاقة الحيوان</button>
  </div>

<script>
  const qp = new URLSearchParams(location.search);

  const form = document.getElementById("calving-form");
  const sysbar = document.getElementById("sysbar");

  const animalEl = document.getElementById("animalNumber");
  const dateEl = document.getElementById("eventDate");
  const kindEl = document.getElementById("calvingKind");
  const lastAiEl = document.getElementById("lastInseminationDate");
  const animalIdEl = document.getElementById("animalId");
  const speciesEl = document.getElementById("species");
  const saveBtn = document.getElementById("saveBtn");

  function getUid() {
    return String(
      localStorage.getItem("userId") ||
      localStorage.getItem("uid") ||
      localStorage.getItem("tenantId") ||
      localStorage.getItem("ownerUid") ||
      ""
    ).trim();
  }

  function apiBase() {
    return String(
      window.API_BASE ||
      localStorage.getItem("API_BASE") ||
      ""
    ).replace(/\/$/, "");
  }

  function toISO(s) {
    const v = String(s || "").trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
    const d = new Date(v);
    if (Number.isNaN(d.getTime())) return "";
    return new Date(d.getTime() - d.getTimezoneOffset() * 60000)
      .toISOString()
      .slice(0, 10);
  }

  function normalizeDigits(raw) {
    const map = {
      "٠": "0","١": "1","٢": "2","٣": "3","٤": "4","٥": "5","٦": "6","٧": "7","٨": "8","٩": "9",
      "۰": "0","۱": "1","۲": "2","۳": "3","۴": "4","۵": "5","۶": "6","۷": "7","۸": "8","۹": "9"
    };

    return String(raw || "")
      .replace(/[٠-٩۰-۹]/g, d => map[d] || d)
      .replace(/[^\d]/g, "")
      .trim();
  }

  function readRadio(name) {
    return String(form.querySelector(`input[name="${name}"]:checked`)?.value || "").trim();
  }

  function escapeHtml(s) {
    return String(s || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function compactReason(reason) {
    return String(reason || "")
      .replace(/^❌\s*/, "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function showSysbar(msg, type = "info", actions = []) {
    if (!sysbar) return;

    sysbar.style.display = "block";
    sysbar.className = "infobar show " + (
      type === "error" ? "error" :
      type === "success" ? "success" :
      "info"
    );

    sysbar.innerHTML = `
      <div style="display:grid;gap:10px;text-align:center">
        <div style="white-space:pre-line;font-weight:900;font-size:15px;line-height:1.7">
          ${escapeHtml(msg)}
        </div>

        <button type="button" id="gateOkBtn"
          style="width:auto;min-width:110px;margin:0 auto;padding:8px 16px;border-radius:999px;border:2px solid #0b7f47;background:#fff;color:#0b7f47;font-weight:900;cursor:pointer">
          حسنًا
        </button>
      </div>
    `;

    const okBtn = sysbar.querySelector("#gateOkBtn");
    okBtn?.addEventListener("click", () => {
      sysbar.style.display = "none";
    });

    if (Array.isArray(actions) && actions.length) {
      const wrap = document.createElement("div");
      wrap.className = "sys-actions";

      actions.forEach((a) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "sys-btn" + (a.primary ? " primary" : "");
        btn.textContent = a.label || "إجراء";

        btn.addEventListener("click", () => {
          if (a.url) {
            location.href = a.url;
            return;
          }

          if (a.focus) {
            document.querySelector(`[data-field="${a.focus}"]`)?.focus?.();
            document.getElementById(a.focus)?.focus?.();
          }
        });

        wrap.appendChild(btn);
      });

      sysbar.appendChild(wrap);
    }

    try { sysbar.scrollIntoView({ behavior: "smooth", block: "start" }); } catch (_) {}
  }

  function setDetailsDisabled(disabled) {
    form.querySelectorAll("[data-field], button[type='submit']").forEach((el) => {
      const key = el.getAttribute("data-field") || "";
      if (key === "animalNumber" || key === "eventDate") return;
      el.disabled = !!disabled;
    });

    if (saveBtn) saveBtn.disabled = !!disabled;
  }

  function collectPayload() {
    return {
      animalNumber: normalizeDigits(animalEl?.value || ""),
      number: normalizeDigits(animalEl?.value || ""),
      eventDate: String(dateEl?.value || "").trim(),
      date: String(dateEl?.value || "").trim(),

      animalId: String(animalIdEl?.value || "").trim(),
      species: String(speciesEl?.value || "").trim(),
      reproStatus: "عشار",

      calvingKind: String(kindEl?.value || "").trim(),
      calfCount: readRadio("calfCount"),

      calf1Sex: readRadio("calf1Sex"),
      calfId: String(document.getElementById("calfId")?.value || "").trim(),
      calf1Fate: readRadio("calf1Fate"),

      calf2Sex: readRadio("calf2Sex"),
      calf2Id: String(document.getElementById("calf2Id")?.value || "").trim(),
      calf2Fate: readRadio("calf2Fate"),

      calf3Sex: readRadio("calf3Sex"),
      calf3Id: String(document.getElementById("calf3Id")?.value || "").trim(),
      calf3Fate: readRadio("calf3Fate"),

      lastInseminationDate: String(lastAiEl?.value || "").trim(),
      notes: String(document.getElementById("notes")?.value || "").trim()
    };
  }

  function renderServerMessage(data, fallback, successByAllowed = false) {
    const msg = String(data?.message || data?.error || fallback || "").trim();
    const msgClean = compactReason(msg);

    const rejectedItems = Array.isArray(data?.rejected) ? data.rejected : [];

    const rejectedLines = rejectedItems
      .slice(0, 8)
      .map(x => {
        const n = String(x.animalNumber || "").trim();
        const reason = compactReason(x.reason || "");
        if (!reason) return "";
        if (reason === msgClean) return "";
        return `${n}: ${reason}`;
      })
      .filter(Boolean);

    const fullMsg = [
      msg,
      rejectedLines.length ? rejectedLines.join("\n") : ""
    ].filter(Boolean).join("\n\n");

    const isSuccess = successByAllowed ? !!data?.allowed : !!data?.ok;

    showSysbar(
      fullMsg || fallback || "تعذّر تنفيذ الطلب.",
      isSuccess ? "success" : "error",
      Array.isArray(data?.actions) ? data.actions : []
    );
  }

  function applyGateData(data) {
    if (animalIdEl && data?.animalId) {
      animalIdEl.value = String(data.animalId || "");
    }

    if (speciesEl && data?.species) {
      speciesEl.value = String(data.species || "");
    }

    if (lastAiEl && data?.lastInseminationDate) {
      lastAiEl.value = String(data.lastInseminationDate || "").slice(0, 10);
    }
  }

  function syncCalfGroups() {
    const isDead = (kindEl?.value === "نافقة");
    const count = parseInt(
      form.querySelector('input[name="calfCount"]:checked')?.value || "1",
      10
    );

    document.querySelectorAll(".live-only").forEach(el => {
      el.style.display = isDead ? "none" : "";
    });

    const enableLive = !isDead;

    const calfCountRadios = form.querySelectorAll('input[name="calfCount"]');
    calfCountRadios.forEach((r, i) => {
      if (enableLive) {
        r.required = (i === 0);
      } else {
        r.required = false;
        r.checked = false;
      }
    });

    const calfId1 = document.getElementById("calfId");
    const calf1SexRadios = form.querySelectorAll('input[name="calf1Sex"]');
    const calf1FateRadios = form.querySelectorAll('input[name="calf1Fate"]');

    if (calfId1) {
      calfId1.required = enableLive;
      if (!enableLive) calfId1.value = "";
    }

    calf1SexRadios.forEach((r, i) => {
      r.required = enableLive && i === 0;
      if (!enableLive) r.checked = false;
    });

    calf1FateRadios.forEach((r, i) => {
      r.required = enableLive && i === 0;
      if (!enableLive) r.checked = false;
    });

    [["offspring2", 2], ["offspring3", 3]].forEach(([id, idx]) => {
      const group = document.getElementById(id);
      const visible = enableLive && count >= idx;

      if (group) group.style.display = visible ? "" : "none";

      const idEl = document.getElementById(`calf${idx}Id`);
      const sexRadios = form.querySelectorAll(`input[name="calf${idx}Sex"]`);
      const fateRadios = form.querySelectorAll(`input[name="calf${idx}Fate"]`);

      if (idEl) {
        idEl.required = visible;
        if (!visible) idEl.value = "";
      }

      sexRadios.forEach((r, i) => {
        r.required = visible && i === 0;
        if (!visible) r.checked = false;
      });

      fateRadios.forEach((r, i) => {
        r.required = visible && i === 0;
        if (!visible) r.checked = false;
      });
    });
  }

  let gateTimer = null;
  let lastGateKey = "";

  async function runGateNow() {
    const uid = getUid();
    const payload = collectPayload();

    const gateKey = JSON.stringify({
      n: payload.animalNumber,
      d: payload.eventDate
    });

    if (gateKey === lastGateKey) return;
    lastGateKey = gateKey;

    if (!uid || !payload.animalNumber || !payload.eventDate) {
      setDetailsDisabled(true);
      if (sysbar) sysbar.style.display = "none";
      return;
    }

    const endpoint = "/api/calving/gate";
    const url = apiBase() ? `${apiBase()}${endpoint}` : endpoint;

    try {
      setDetailsDisabled(true);
      showSysbar("جارِ التحقق من أهلية الولادة…", "info");

      const r = await fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-User-Id": uid
        },
        body: JSON.stringify(payload)
      });

      const data = await r.json().catch(() => ({
        ok: false,
        allowed: false,
        message: "تعذّر قراءة رد السيرفر."
      }));

      renderServerMessage(data, "تعذّر التحقق من أهلية الولادة.", true);

      if (data?.allowed) {
        applyGateData(data);
        setDetailsDisabled(false);
        syncCalfGroups();
      } else {
        setDetailsDisabled(true);
      }

    } catch (err) {
      console.error("calving gate failed", err);
      showSysbar("❌ تعذّر التحقق من أهلية الولادة الآن.", "error");
      setDetailsDisabled(true);
    }
  }

  function scheduleGate() {
    clearTimeout(gateTimer);
    gateTimer = setTimeout(runGateNow, 350);
  }

  form?.addEventListener("submit", async (e) => {
    e.preventDefault();

    const uid = getUid();
    const payload = collectPayload();

    const endpoint = "/api/calving/save";
    const url = apiBase() ? `${apiBase()}${endpoint}` : endpoint;

    try {
      if (saveBtn) saveBtn.disabled = true;

      showSysbar("جارِ حفظ الولادة…", "info");

      const r = await fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-User-Id": uid
        },
        body: JSON.stringify(payload)
      });

      const data = await r.json().catch(() => ({
        ok: false,
        message: "تعذّر قراءة رد السيرفر."
      }));

      renderServerMessage(data, "تعذّر حفظ الولادة.", false);

      if (data?.ok) {
        try {
          localStorage.setItem("lastAnimalId", data.animalNumber || payload.animalNumber || "");
          localStorage.setItem("lastEventDate", data.eventDate || payload.eventDate || "");
        } catch (_) {}

        if (data.redirectUrl) {
          setTimeout(() => {
            location.href = data.redirectUrl;
          }, 1100);
        }
      }

    } catch (err) {
      console.error("calving save failed", err);
      showSysbar("❌ تعذّر حفظ الولادة الآن.", "error");
    } finally {
      if (saveBtn) saveBtn.disabled = false;
    }
  });

  kindEl?.addEventListener("change", syncCalfGroups);
  form?.querySelectorAll('input[name="calfCount"]').forEach(r => {
    r.addEventListener("change", syncCalfGroups);
  });

  animalEl?.addEventListener("input", scheduleGate);
  animalEl?.addEventListener("change", scheduleGate);
  dateEl?.addEventListener("change", scheduleGate);

  document.getElementById("toCardBtn")?.addEventListener("click", () => {
    const n = normalizeDigits(animalEl?.value || "");
    if (!n) {
      showSysbar("أدخل رقم الحيوان أولًا قبل فتح البطاقة.", "error");
      return;
    }

    location.href = `/cow-card.html?number=${encodeURIComponent(n)}`;
  });

  document.addEventListener("DOMContentLoaded", () => {
    const n = qp.get("animalNumber") || qp.get("number") || qp.get("animalId") || localStorage.getItem("lastAnimalId") || "";
    const d = qp.get("eventDate") || qp.get("date") || qp.get("dt") || localStorage.getItem("lastEventDate") || "";

    if (animalEl) animalEl.value = normalizeDigits(n);
    if (dateEl) dateEl.value = toISO(d) || new Date().toISOString().slice(0, 10);

    setDetailsDisabled(true);
    syncCalfGroups();
    scheduleGate();
  });
</script>
</body>
</html>
