<!DOCTYPE html>
<html lang="ar" dir="rtl" data-page="heat">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>تسجيل شياع — مُرَبِّيك</title>

  <link rel="stylesheet" href="css/forms.css" />

  <!-- Tracking (مرة واحدة فقط) -->
  <script>window.dataLayer = window.dataLayer || [];</script>
  <script src="/js/app-core.js"></script>

  <!-- Validation / Forms init (Central Gate + Validation) -->
  <script type="module" src="js/forms-init.js"></script>

  <style>
    header{
      position: sticky;
      top: 0;
      z-index: 20;
      background: #fff;
      border-bottom: 1px solid var(--border, #e2e8f0);
    }
    .mbk-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:10px 12px;
      max-width:980px;
      margin:0 auto;
    }
    .mbk-logo{
      height:48px;
      width:auto;
      object-fit:contain;
      opacity:.6;
      flex-shrink:0;
    }
    .mbk-center{ flex:1; text-align:center; line-height:1.15; }
    .mbk-page-title{ font-size:18px; font-weight:900; color: var(--ink, #0f172a); }
    .mbk-app-name{ font-size:13px; font-weight:800; color: var(--brand-600, #0b7f47); opacity:.9; }

    .mbk-back{
      width:42px;
      height:42px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      font-weight:900;
      color: var(--brand-600, #0b7f47);
      border:2px solid var(--brand-600, #0b7f47);
      background:#fff;
      flex-shrink:0;
    }

    /* Infobar تحت الهيدر */
    #sysbar.infobar{
      display:block;
      position: sticky;
      top: 72px;
      z-index: 19;
      margin: 10px 12px;
      max-width:520px;
      margin-left:auto;
      margin-right:auto;
    }

    .wrap{ max-width:520px; margin:12px auto 24px; padding:0 12px; }
    .mbk-card{
      background:#fff;
      border:1px solid var(--border, #e2e8f0);
      border-radius:16px;
      padding:14px;
      box-shadow:0 1px 0 rgba(15,23,42,.04);
    }

    .btn-row{
      position: sticky;
      bottom: 10px;
      background: #fff;
      padding: 10px;
      border: 1px solid var(--border, #e2e8f0);
      border-radius: 16px;
      display:flex;
      gap:10px;
      margin:14px 12px 18px;
      max-width:520px;
      margin-left:auto;
      margin-right:auto;
      z-index: 5;
    }
    .btn-row .save-btn,
    .btn-row .open-card{
      flex:1;
      width:auto;
      border-radius:14px;
      padding:12px 14px;
      font-weight:900;
      font-size:16px;
      cursor:pointer;
      border:0;
    }
    .btn-row .save-btn{
      background: var(--brand, #0ea05a);
      color:#fff;
    }
    .btn-row .open-card{
      background:#fff !important;
      color: var(--brand-600, #0b7f47) !important;
      border:2px solid var(--brand-600, #0b7f47) !important;
    }
  </style>
</head>

<body data-page="heat">

  <header>
    <div class="mbk-head">
      <a class="mbk-back" href="add-event.html" title="رجوع">رجوع</a>

      <div class="mbk-center">
        <div class="mbk-page-title">تسجيل شياع</div>
        <div class="mbk-app-name">مُرَبِّيك</div>
      </div>

      <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">
    </div>
  </header>

  <!-- infobar -->
  <div id="sysbar" class="infobar"></div>

  <div class="wrap">

    <!-- ✅ لازم Form علشان forms-init يشتغل -->
   <form id="heatForm" class="mbk-card" data-validate="true" data-event-type="شياع" data-event="شياع" novalidate>

      <!-- Hidden: علشان forms-init يحقن animalId -->
      <input id="animalId" data-field="animalId" type="hidden" />

      <label>رقم الحيوان</label>
     <textarea id="animalNumber" data-field="animalNumber" rows="3" style="width:100%"></textarea>
      <div class="hint" style="font-size:12px;color:#64748b;margin-top:6px">يمكن إدخال رقم واحد أو عدة أرقام مفصولة بفاصلة أو مسافة.</div>

      <label>تاريخ الشياع</label>
      <input id="eventDate" data-field="eventDate" type="date" />
     <label>وقت ملاحظة الشياع</label>
<div class="radio-row" style="display:flex;gap:14px;align-items:center;margin:6px 0 10px;">
  <label style="display:flex;gap:8px;align-items:center;font-weight:800;">
    <input type="radio" name="heatTime" data-field="heatTime" value="ص" />
    ص
  </label>

  <label style="display:flex;gap:8px;align-items:center;font-weight:800;">
    <input type="radio" name="heatTime" data-field="heatTime" value="م" />
    م
  </label>
</div>

      <label>الحالة التناسلية الحالية</label>
      <input id="reproStatus" data-field="reproductiveStatusSnapshot" readonly />

      <label>أيام الحليب (DIM)</label>
      <input id="dim" data-field="dimAtEvent" readonly />
      <label>عدد الأيام منذ آخر شياع / تلقيح</label>
<input id="daysSinceLastHeatOrAI" readonly />
      <label>ملاحظات</label>
      <textarea id="notes" data-field="notes" rows="3" placeholder="اختياري"></textarea>

      <!-- زر داخلي مخفي فقط للتوافق لو احتجناه -->
      <button type="submit" id="saveBtn" style="display:none"></button>
    </form>
  </div>

  <div class="btn-row">
    <!-- ✅ زر الحفظ = submit (بدون onclick) -->
    <button id="saveBtnUI" class="save-btn" type="submit" form="heatForm">✅ تسجيل الشياع</button>
    <button id="openCowCard" class="open-card" type="button">🧾 بطاقة الحيوان</button>
  </div>

  <script type="module">
    import { db, auth } from "/js/firebase-config.js";
    import { updateAnimalByEvent } from "/js/animal-update.js";
    import {
  collection, addDoc, serverTimestamp,
  getDocs, query, where, orderBy, limit
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


    const $ = (id) => document.getElementById(id);
    const form = $("heatForm");
    const bar  = $("sysbar");

    function msg(t, ok=false){
      bar.className = "infobar " + (ok ? "success" : "error");
      bar.style.display = "block";
      bar.textContent = t;
      try{ bar.scrollIntoView({behavior:"smooth", block:"start"}); }catch(_){}
    }

   // ✅ Prefill من URL / localStorage (يدعم فردي + جماعي من add-event)
const p  = new URLSearchParams(location.search);

// ✅ لو جاي جماعي من add-event: mbkMode=group&bulk=33,34,35
const mode = (p.get("mbkMode") || "").toString().trim().toLowerCase();
const bulk = (p.get("bulk") || "").toString().trim();

// ✅ رقم مفرد (لو موجود)
const numSingle = (p.get("number") || p.get("animalNumber") || "").toString().trim();

// ✅ الأسبقية: bulk (لو group) → single → localStorage
const num =
  (mode === "group" && bulk ? bulk : "") ||
  numSingle ||
  (localStorage.getItem("lastAnimalNumber") || "").toString().trim() ||
  "";

const dt =
  (p.get("date") || p.get("eventDate") ||
   localStorage.getItem("lastEventDate") ||
   new Date().toISOString().slice(0,10)
  ).toString().slice(0,10);

// ✅ تعبئة الحقول
$("animalNumber").value = num;
$("eventDate").value = dt;


    function toDate(s){
      const d = new Date(String(s || "").slice(0,10));
      return isNaN(d.getTime()) ? null : d;
    }
async function calcDaysSinceLastHeatOrAI(){
  const doc = form.__mbkDoc;
  if (!doc) return;

  const uid = auth?.currentUser?.uid || localStorage.getItem("userId");
  if (!uid) return;

  const animalNumber = $("animalNumber").value.trim();
  const eventDate = $("eventDate").value;

  if (!animalNumber || !eventDate) return;

  try{
    const eventsRef = collection(db, "events");

    const snap = await getDocs(query(
      eventsRef,
      where("userId", "==", uid),
      where("animalNumber", "==", animalNumber),
      where("type", "in", ["شياع","insemination"]),
      orderBy("eventDate", "desc"),
      limit(1)
    ));

    if (snap.empty){
      $("daysSinceLastHeatOrAI").value = "";
      return;
    }

    const last = snap.docs[0].data();
    const lastDate = new Date(last.eventDate);
    const currentDate = new Date(eventDate);

    const diff = Math.floor((currentDate - lastDate) / 86400000);

    $("daysSinceLastHeatOrAI").value = diff >= 0 ? diff : "";

  }catch(e){
    console.error(e);
  }
}

    function calcDIMFromDoc(){
      const doc = form.__mbkDoc || null;
      if (!doc) { $("dim").value = ""; return; }

      const calv = toDate(doc.lastCalvingDate);
      const evd  = toDate($("eventDate").value || dt);
      if (!calv || !evd) { $("dim").value = ""; return; }

      const days = Math.floor((evd - calv) / 86400000);
      $("dim").value = String(Math.max(0, days));
    }

    function fillFromDocIfReady(){
      if (form?.dataset?.animalOk !== "1") return;
      const doc = form.__mbkDoc || null;
      if (!doc) return;

      $("reproStatus").value = String(doc.reproductiveStatus || "").trim();
      calcDIMFromDoc();
    }

    // بعد نجاح الـGate، forms-init سيملأ form.__mbkDoc و dataset.animalOk
   const docWatcher = setInterval(async () => {
  fillFromDocIfReady();
  await calcDaysSinceLastHeatOrAI();

      if (form?.dataset?.animalOk === "1" && form.__mbkDoc) {
        clearInterval(docWatcher);
      }
    }, 120);

   $("eventDate").addEventListener("change", async () => {
  calcDIMFromDoc();
  await calcDaysSinceLastHeatOrAI();
});

   $("openCowCard").addEventListener("click", ()=> {
  const n = String($("animalNumber").value || "").trim();
  if (!n) { msg("⚠️ لم يتم تمرير رقم الحيوان.", false); return; }
  // ✅ لو جماعي (فواصل/مسافات) امنع فتح البطاقة
  if (/[\s,]/.test(n)) { msg("⚠️ بطاقة الحيوان تعمل مع رقم واحد فقط.", false); return; }
  location.href = `cow-card.html?number=${encodeURIComponent(n)}`;
});


    // ✅ الحفظ المركزي: ممنوع submit محلي — ننتظر mbk:valid
    
// ✅ الحفظ المركزي: ممنوع submit محلي — ننتظر mbk:valid (Single + Bulk)
form.addEventListener("mbk:valid", async (e) => {
  const d = e?.detail || {};
  if (!d || d.eventName !== "شياع") return;

  try{
    const uid = auth?.currentUser?.uid || localStorage.getItem("userId") || "";
    if (!uid) { msg("⚠️ لم يتم تأكيد الدخول.", false); return; }

    // ====== Bulk ======
    if (d.bulk && Array.isArray(d.bulkEvents) && d.bulkEvents.length) {
      const ok = [];
      const bad = [];

      for (const fd of d.bulkEvents) {
        const eventDate = String(fd.eventDate || "").slice(0,10);
        const animalNumber = String(fd.animalNumber || "").trim();

        const payload = {
          animalNumber,
          animalId: String(fd.animalId || animalNumber),
          type: "شياع",
          eventType: "شياع",
          eventDate,
          heatTime: String(fd.heatTime || "").trim() || null,
          notes: String(fd.notes || "").trim(),
          reproductiveStatusSnapshot: String(fd.reproductiveStatusSnapshot || "").trim() || null,
          dimAtEvent: (fd.dimAtEvent === "" ? null : (Number(fd.dimAtEvent) || null)),
          daysSinceLastHeatOrAI: Number(document.getElementById("daysSinceLastHeatOrAI")?.value) || null,
          userId: uid,
          source: "/heat.html",
          createdAt: serverTimestamp()
        };

        try{
          await addDoc(collection(db, "events"), payload);
          ok.push(animalNumber);
        }catch(err){
          bad.push(animalNumber);
          console.error("heat save bulk err", animalNumber, err);
        }
      }

      if (ok.length) msg(`✅ تم تسجيل الشياع لـ ${ok.length} حيوان.`, true);
      if (bad.length) msg(`⚠️ تعذّر الحفظ لـ: ${bad.join("، ")}`, false);
      return;
    }

    // ====== Single ======
    const fd = d.formData || {};
    const eventDate = String(fd.eventDate || "").slice(0,10);
    const animalNumber = String(fd.animalNumber || "").trim();

    const payload = {
      animalNumber,
      animalId: String(fd.animalId || animalNumber),
      type: "شياع",
      eventType: "شياع",
      eventDate,
      heatTime: String(fd.heatTime || "").trim() || null,
      notes: String(fd.notes || "").trim(),
      reproductiveStatusSnapshot: String(fd.reproductiveStatusSnapshot || "").trim() || null,
      dimAtEvent: (fd.dimAtEvent === "" ? null : (Number(fd.dimAtEvent) || null)),
      daysSinceLastHeatOrAI: Number(document.getElementById("daysSinceLastHeatOrAI")?.value) || null,
      userId: uid,
      source: "/heat.html",
      createdAt: serverTimestamp()
    };

    await addDoc(collection(db, "events"), payload);
    msg("✅ تم تسجيل الشياع بنجاح.", true);

  }catch(err){
    console.error(err);
    msg("❌ حدث خطأ أثناء الحفظ.", false);
  }
});

    // Tracking
    const t = window.t || { event:(n,d)=>window.dataLayer.push({event:n, ...d}) };
    t.event("page_view", { page: "heat", title: "تسجيل شياع" });
  </script>

</body>
</html>
