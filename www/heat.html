<!DOCTYPE html>
<html lang="ar" dir="rtl" data-page="heat">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>تسجيل شياع — مُرَبِّيك</title>

  <link rel="stylesheet" href="css/forms.css" />


  <style>
    header{
      position: sticky;
      top: 0;
      z-index: 20;
      background: #fff;
      border-bottom: 1px solid var(--border, #e2e8f0);
    }
    .mbk-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:10px 12px;
      max-width:980px;
      margin:0 auto;
    }
    .mbk-logo{
      height:48px;
      width:auto;
      object-fit:contain;
      opacity:.6;
      flex-shrink:0;
    }
    .mbk-center{ flex:1; text-align:center; line-height:1.15; }
    .mbk-page-title{ font-size:18px; font-weight:900; color: var(--ink, #0f172a); }
    .mbk-app-name{ font-size:13px; font-weight:800; color: var(--brand-600, #0b7f47); opacity:.9; }

    .mbk-back{
      width:42px;
      height:42px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      font-weight:900;
      color: var(--brand-600, #0b7f47);
      border:2px solid var(--brand-600, #0b7f47);
      background:#fff;
      flex-shrink:0;
    }

    /* Infobar تحت الهيدر */
    #sysbar.infobar{
      display:block;
      position: sticky;
      top: 72px;
      z-index: 19;
      margin: 10px 12px;
      max-width:520px;
      margin-left:auto;
      margin-right:auto;
    }

    .wrap{ max-width:520px; margin:12px auto 24px; padding:0 12px; }
    .mbk-card{
      background:#fff;
      border:1px solid var(--border, #e2e8f0);
      border-radius:16px;
      padding:14px;
      box-shadow:0 1px 0 rgba(15,23,42,.04);
    }

    .btn-row{
      position: sticky;
      bottom: 10px;
      background: #fff;
      padding: 10px;
      border: 1px solid var(--border, #e2e8f0);
      border-radius: 16px;
      display:flex;
      gap:10px;
      margin:14px 12px 18px;
      max-width:520px;
      margin-left:auto;
      margin-right:auto;
      z-index: 5;
    }
    .btn-row .save-btn,
    .btn-row .open-card{
      flex:1;
      width:auto;
      border-radius:14px;
      padding:12px 14px;
      font-weight:900;
      font-size:16px;
      cursor:pointer;
      border:0;
    }
    .btn-row .save-btn{
      background: var(--brand, #0ea05a);
      color:#fff;
    }
    .btn-row .open-card{
      background:#fff !important;
      color: var(--brand-600, #0b7f47) !important;
      border:2px solid var(--brand-600, #0b7f47) !important;
    }
  </style>
</head>

<body data-page="heat">

  <header>
    <div class="mbk-head">
      <a class="mbk-back" href="add-event.html" title="رجوع">رجوع</a>

      <div class="mbk-center">
        <div class="mbk-page-title">تسجيل شياع</div>
        <div class="mbk-app-name">مُرَبِّيك</div>
      </div>

      <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">
    </div>
  </header>

  <!-- infobar -->
  <div id="sysbar" class="infobar"></div>

  <div class="wrap">

   <form id="heatForm" class="mbk-card" novalidate>

      <!-- Hidden: علشان forms-init يحقن animalId -->
      <input id="animalId" data-field="animalId" type="hidden" />

      <label>رقم الحيوان</label>
     <textarea id="animalNumber" data-field="animalNumber" rows="3" style="width:100%"></textarea>
      <div class="hint" style="font-size:12px;color:#64748b;margin-top:6px">يمكن إدخال رقم واحد أو عدة أرقام مفصولة بفاصلة أو مسافة.</div>

      <label>تاريخ الشياع</label>
      <input id="eventDate" data-field="eventDate" type="date" />
     <label>وقت ملاحظة الشياع</label>
<div class="radio-row" style="display:flex;gap:14px;align-items:center;margin:6px 0 10px;">
  <label style="display:flex;gap:8px;align-items:center;font-weight:800;">
    <input type="radio" name="heatTime" data-field="heatTime" value="ص" />
    ص
  </label>

  <label style="display:flex;gap:8px;align-items:center;font-weight:800;">
    <input type="radio" name="heatTime" data-field="heatTime" value="م" />
    م
  </label>
</div>

      <label>الحالة التناسلية الحالية</label>
      <input id="reproStatus" data-field="reproductiveStatusSnapshot" readonly />

      <label>أيام الحليب (DIM)</label>
      <input id="dim" data-field="dimAtEvent" readonly />
      <label>عدد الأيام منذ آخر شياع / تلقيح</label>
<input id="daysSinceLastHeatOrAI" readonly />
      <label>ملاحظات</label>
      <textarea id="notes" data-field="notes" rows="3" placeholder="اختياري"></textarea>

      <!-- زر داخلي مخفي فقط للتوافق لو احتجناه -->
      <button type="submit" id="saveBtn" style="display:none"></button>
    </form>
  </div>

  <div class="btn-row">
    <!-- ✅ زر الحفظ = submit (بدون onclick) -->
    <button id="saveBtnUI" class="save-btn" type="submit" form="heatForm">✅ تسجيل الشياع</button>
    <button id="openCowCard" class="open-card" type="button">🧾 بطاقة الحيوان</button>
  </div>

<script>
(function(){
  "use strict";

  const $ = id => document.getElementById(id);

  const form = $("heatForm");
  const bar = $("sysbar");
  const animalEl = $("animalNumber");
  const dateEl = $("eventDate");
  const saveBtn = $("saveBtnUI");
  const openCowCardBtn = $("openCowCard");

  let gateTimer = null;
  let gateState = {
    allowed: false,
    animalNumbers: [],
    results: []
  };

  function normDigits(v){
    const map = {
      "٠":"0","١":"1","٢":"2","٣":"3","٤":"4","٥":"5","٦":"6","٧":"7","٨":"8","٩":"9",
      "۰":"0","۱":"1","۲":"2","۳":"3","۴":"4","۵":"5","۶":"6","۷":"7","۸":"8","۹":"9"
    };

    return String(v || "")
      .trim()
      .replace(/[٠-٩۰-۹]/g, d => map[d] || d);
  }

  function splitNumbers(v){
    return String(v || "")
      .split(/[\s,،;]+/)
      .map(x => normDigits(x).replace(/[^\d]/g, ""))
      .filter(Boolean);
  }

  function todayISO(){
    const d = new Date();
    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    return d.toISOString().slice(0,10);
  }

  function getQS(name){
    return new URL(location.href).searchParams.get(name) || "";
  }

  function getUid(){
    return String(
      window.MBK_USER_ID ||
      window.mbkUserId ||
      window.mbk?.userId ||
      localStorage.getItem("userId") ||
      localStorage.getItem("uid") ||
      localStorage.getItem("tenantId") ||
      ""
    ).trim();
  }

  function msg(text, ok=false){
    if (!bar) return;
    bar.className = "infobar show " + (ok ? "success" : "error");
    bar.style.display = "block";
    bar.textContent = text || "";
    try { bar.scrollIntoView({ behavior:"smooth", block:"start" }); } catch(_){}
  }

  function clearMsg(){
    if (!bar) return;
    bar.className = "infobar";
    bar.textContent = "";
  }

  function getHeatTime(){
    return form.querySelector('input[name="heatTime"]:checked')?.value || "";
  }

  async function postJson(url, body){
    const uid = getUid();

    const r = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        ...(uid ? { "X-User-Id": uid } : {})
      },
      body: JSON.stringify(body || {})
    });

    const j = await r.json().catch(() => ({}));

    if (!r.ok) {
      const err = new Error(j.message || "تعذّر الاتصال بالسيرفر.");
      err.payload = j;
      throw err;
    }

    return j;
  }

  async function getContextSingle(number, eventDate){
    const uid = getUid();
    const q =
      `/api/heat/context?animalNumber=${encodeURIComponent(number)}` +
      `&eventDate=${encodeURIComponent(eventDate)}`;

    const r = await fetch(q, {
      headers: {
        ...(uid ? { "X-User-Id": uid } : {})
      }
    });

    return await r.json().catch(() => ({}));
  }

  function clearContextFields(){
    if ($("animalId")) $("animalId").value = "";
    if ($("reproStatus")) $("reproStatus").value = "";
    if ($("dim")) $("dim").value = "";
    if ($("daysSinceLastHeatOrAI")) $("daysSinceLastHeatOrAI").value = "";
  }

  async function loadContextAfterGate(){
    const nums = splitNumbers(animalEl.value);
    const eventDate = String(dateEl.value || "").slice(0,10);

    if (nums.length !== 1 || !eventDate) {
      clearContextFields();
      return;
    }

    try {
      const res = await getContextSingle(nums[0], eventDate);

      if (!res?.ok) {
        clearContextFields();
        return;
      }

      if ($("animalId")) $("animalId").value = String(res.animalId || "");
      if ($("reproStatus")) $("reproStatus").value = String(res.reproductiveStatus || "");
      if ($("dim")) $("dim").value = res.dimAtEvent == null ? "" : String(res.dimAtEvent);
      if ($("daysSinceLastHeatOrAI")) {
        $("daysSinceLastHeatOrAI").value =
          res.daysSinceLastHeatOrAI == null ? "" : String(res.daysSinceLastHeatOrAI);
      }

    } catch(e) {
      console.error("heat context failed:", e);
      clearContextFields();
    }
  }

  async function runGate(){
    const raw = String(animalEl.value || "").trim();
    const eventDate = String(dateEl.value || "").slice(0,10);

    gateState = { allowed:false, animalNumbers:[], results:[] };
    if (saveBtn) saveBtn.disabled = true;

    if (!raw || !eventDate) {
      clearContextFields();
      clearMsg();
      return;
    }

    try {
      const res = await postJson("/api/heat/gate", {
        animalNumber: raw,
        eventDate
      });

      gateState = {
        allowed: !!res.allowed,
        animalNumbers: Array.isArray(res.animalNumbers) ? res.animalNumbers : [],
        results: Array.isArray(res.results) ? res.results : []
      };

      if (!res.allowed) {
        const preview = gateState.results
          .slice(0,5)
          .map(x => `${x.animalNumber}: ${x.message}`)
          .join(" — ");

        msg(preview || res.message || "❌ لا يوجد أي رقم مؤهل لتسجيل الشياع.", false);
        clearContextFields();
        return;
      }

      animalEl.value = gateState.animalNumbers.join(",");

      const rejected = Array.isArray(res.rejected) ? res.rejected : [];
      const suffix = rejected.length
        ? ` — تم استبعاد ${rejected.length}: ${rejected.slice(0,3).map(x => x.animalNumber).join("، ")}${rejected.length > 3 ? "…" : ""}`
        : "";

      msg((res.message || "✅ تم التحقق — يمكن تسجيل الشياع.") + suffix, true);

      if (saveBtn) saveBtn.disabled = false;
      await loadContextAfterGate();

    } catch(e) {
      console.error("heat gate failed:", e);
      msg(e.message || "تعذّر التحقق من الشياع الآن.", false);
      clearContextFields();
    }
  }

  function scheduleGate(){
    clearTimeout(gateTimer);
    gateTimer = setTimeout(runGate, 350);
  }

  async function saveHeat(e){
    e.preventDefault();

    const raw = String(animalEl.value || "").trim();
    const eventDate = String(dateEl.value || "").slice(0,10);
    const heatTime = getHeatTime();
    const notes = String($("notes")?.value || "").trim();

    if (!raw) return msg("❌ رقم الحيوان مطلوب.", false);
    if (!eventDate) return msg("❌ تاريخ الشياع مطلوب.", false);
    if (!heatTime) return msg("❌ وقت ملاحظة الشياع مطلوب.", false);

    try {
      if (saveBtn) {
        saveBtn.disabled = true;
        saveBtn.textContent = "جارٍ الحفظ…";
      }

      if (!gateState.allowed) {
        await runGate();
        if (!gateState.allowed) return;
      }

      const nums = gateState.animalNumbers.length ? gateState.animalNumbers : splitNumbers(raw);

      const ok = [];
      const bad = [];

      for (const n of nums) {
        try {
          const res = await postJson("/api/heat/save", {
            animalNumber: n,
            eventDate,
            heatTime,
            notes: notes || null
          });

          if (res?.ok) ok.push(n);
          else bad.push(n);
        } catch(err) {
          console.error("heat save failed:", n, err);
          bad.push(n);
        }
      }

      localStorage.setItem("lastEventDate", eventDate);
      if (ok.length === 1) {
        localStorage.setItem("lastAnimalNumber", ok[0]);
      }

      if (ok.length && !bad.length) {
        msg(ok.length === 1 ? "✅ تم حفظ شياع بنجاح" : `✅ تم حفظ الشياع لـ ${ok.length} حيوان.`, true);

        if (ok.length === 1) {
          setTimeout(() => {
            location.href = `event-list.html?number=${encodeURIComponent(ok[0])}`;
          }, 900);
        }

        return;
      }

      if (ok.length && bad.length) {
        msg(`✅ تم حفظ ${ok.length} — وتعذّر حفظ: ${bad.join("، ")}`, false);
        return;
      }

      msg(`❌ تعذّر حفظ الشياع للأرقام: ${bad.join("، ")}`, false);

    } catch(err) {
      console.error(err);
      msg(err.message || "❌ حدث خطأ أثناء الحفظ.", false);
    } finally {
      if (saveBtn) {
        saveBtn.disabled = false;
        saveBtn.textContent = "✅ تسجيل الشياع";
      }
    }
  }

  const p = new URLSearchParams(location.search);
  const mode = String(p.get("mbkMode") || "").trim().toLowerCase();
  const bulk = String(p.get("bulk") || "").trim();

  const num =
    (mode === "group" && bulk ? bulk : "") ||
    String(p.get("number") || p.get("animalNumber") || "").trim() ||
    String(localStorage.getItem("lastAnimalNumber") || "").trim();

  const dt =
    String(p.get("date") || p.get("eventDate") || localStorage.getItem("lastEventDate") || todayISO())
      .slice(0,10);

  if (animalEl) animalEl.value = num;
  if (dateEl) dateEl.value = dt;

  animalEl?.addEventListener("input", scheduleGate);
  animalEl?.addEventListener("blur", runGate);
  dateEl?.addEventListener("change", scheduleGate);
  form?.addEventListener("submit", saveHeat);

  openCowCardBtn?.addEventListener("click", () => {
    const nums = splitNumbers(animalEl.value);
    if (!nums.length) return msg("⚠️ لم يتم تمرير رقم الحيوان.", false);
    if (nums.length > 1) return msg("⚠️ بطاقة الحيوان تعمل مع رقم واحد فقط.", false);
    location.href = `cow-card.html?number=${encodeURIComponent(nums[0])}`;
  });

  scheduleGate();

})();
</script>

</body>
</html>
