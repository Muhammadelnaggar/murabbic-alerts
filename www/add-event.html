  <style>
    :root{

    .mbk-top{
      position: sticky; top:0; z-index:50;
      background:#fff;
      border-bottom:1px solid var(--border);
    }
    .mbk-head{
      max-width:980px;
      margin:0 auto;
      padding:10px 12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .mbk-title{ line-height:1.1; }

    .mbk-app{ font-size:13px; font-weight:900; color:var(--brand-600); opacity:.9; }

    *{box-sizing:border-box}
   body{
  margin:0;
  padding-bottom:8px;
  background:var(--bg);
  font-family:'Cairo','Arial',sans-serif;
  color:var(--text);
}

    .meta{padding:8px 10px;text-align:center;font-size:16px}

    .form{

    .grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;

    }
    @media(min-width:768px){.grid{grid-template-columns:repeat(3,1fr);} }

    .btn{
      padding:14px;
      background:#fff;
      border:1px solid var(--border);
      border-radius:12px;
      font-weight:700;
      cursor:pointer;
      text-align:center;
      transition:.2s;

    }
    .btn:hover{
      background:var(--brand);
      border-color:var(--brand);
      color:#fff;
      transform:translateY(-2px);
      box-shadow:0 6px 12px rgba(0,0,0,.12)
    }

    #inlineMsg{margin:12px;padding:10px;background:#f1f8e9;border:1px solid #c5e1a5;border-radius:10px;display:none}
    #inlineMsg .text{font-size:14px;font-weight:700;color:var(--text);text-align:center}

  margin:12px;

  background:linear-gradient(135deg,#eefaf2 0%, #f8fffb 100%);
  border:2px dashed #86cfa0;

}

.import-title{

}

.import-sub{

@media (max-width:480px){
  .btn-import-milk{

}

 <script>
  function updateCowCardNav(number, multi){
    const link = document.querySelector('[data-nav="cow-card"]');
    if (!link) return;

    if (multi){
      link.href = '#';
      link.classList.add('mbk-nav-link-disabled');
      return;
    }

    if (number){
      link.href = 'cow-card.html?number=' + encodeURIComponent(number);
      link.classList.remove('mbk-nav-link-disabled');
    } else {
      link.href = '#';
      link.classList.add('mbk-nav-link-disabled');
    }
  }

  (function(){
    const $ = s => document.querySelector(s);
    const $$ = s => document.querySelectorAll(s);

    const norm = v =>
      (v == null || v === 'undefined' || v === 'null' || v === 'NaN')
        ? ''
        : String(v).trim();

    const todayISO = () => {
      const d = new Date();
      d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
      return d.toISOString().slice(0, 10);
    };

    const DIGITS = {
      '٠':'0','١':'1','٢':'2','٣':'3','٤':'4','٥':'5','٦':'6','٧':'7','٨':'8','٩':'9',
      '۰':'0','۱':'1','۲':'2','۳':'3','۴':'4','۵':'5','۶':'6','۷':'7','۸':'8','۹':'9'
    };

    const toLatinKeepSep = s =>
      String(s || '').replace(/[٠-٩۰-۹]/g, d => DIGITS[d] || d);

    const toDigitsOnly = s =>
      String(s || '')
        .replace(/[٠-٩۰-۹]/g, d => DIGITS[d] || d)
        .replace(/[^\d]/g, '');

    function parseNumbers(raw){
      const s = toLatinKeepSep(raw || '');
      const matches = s.match(/\d+/g) || [];
      const list = matches.map(x => toDigitsOnly(x)).filter(Boolean);
      return [...new Set(list)];
    }

    function getCurrentUid(){
      return window.mbk?.userId
        || localStorage.getItem('userId')
        || localStorage.getItem('uid')
        || '';
    }

    function getSelectedGroupMeta(){
      const sel = $('#groupSelect');
      const opt = sel?.options?.[sel.selectedIndex];

      return {
        name: norm(opt?.dataset?.groupName || ''),
        groupName: norm(opt?.dataset?.groupName || ''),
        animalType: norm(opt?.dataset?.animalType || ''),
        groupId: norm(opt?.dataset?.groupId || ''),
        groupKey: norm(opt?.dataset?.groupKey || ''),
        feedingEligible: opt?.dataset?.feedingEligible === '1'
      };
    }

    function currentNumbersAndDate(){
      const numbers = parseNumbers($('#animalNumbers')?.value || '');

      let date = norm($('#eventDate')?.value) || todayISO();
      if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) date = todayISO();

      return { numbers, date };
    }

    function refreshAnimalInfo(){
      const list = parseNumbers($('#animalNumbers')?.value || '');

      if (list.length === 1){
        $('#animalInfo').textContent = `🐄 الحيوان الحالي: ${list[0]}`;
        updateCowCardNav(list[0], false);
      } else if (list.length > 1){
        $('#animalInfo').textContent = `🐄 إدخال جماعي: ${list.length} أرقام`;
        updateCowCardNav('', true);
      } else {
        $('#animalInfo').textContent = '🐄 الحيوان الحالي: غير محدد';
        updateCowCardNav('', false);
      }
    }

    async function hydrate(){
      const uid = getCurrentUid();
      const qs = new URLSearchParams(location.search);

      const rawNumbers =
        qs.get('numbers') ||
        qs.get('bulk') ||
        qs.get('number') ||
        qs.get('animalNumber') ||
        '';

      const rawDate =
        qs.get('eventDate') ||
        qs.get('date') ||
        '';

      let date = todayISO();

      if (uid) {
        try {
          const q = new URLSearchParams();
          if (rawNumbers) q.set('numbers', rawNumbers);
          if (rawDate) q.set('eventDate', rawDate);

          const r = await fetch('/api/events-page/context?' + q.toString(), {
            method: 'GET',
            headers: {
              'Accept': 'application/json',
              'X-User-Id': uid
            },
            cache: 'no-store'
          });

          const j = await r.json().catch(() => null);

          if (r.ok && j && j.ok !== false) {
            date = j.eventDate || date;

            if (Array.isArray(j.numbers) && j.numbers.length) {
              $('#animalNumbers').value = j.numbers.join('\n');
            } else {
              $('#animalNumbers').value = '';
            }

            $('#animalInfo').textContent = j.animalInfoText || '🐄 الحيوان الحالي: غير محدد';
          } else {
            $('#animalNumbers').value = '';
          }

        } catch (e) {
          console.error('events context failed', e);
          $('#animalNumbers').value = '';
        }
      } else {
        const one = toDigitsOnly(qs.get('number') || qs.get('animalNumber') || '');
        $('#animalNumbers').value = one || '';
      }

      $('#dateInfo').textContent = `📅 التاريخ الحالي: ${date}`;
      if (!norm($('#eventDate').value)) $('#eventDate').value = date;

      refreshAnimalInfo();
    }

    async function loadGroupsIntoSelect(){
      const select = $('#groupSelect');
      const hint = $('#groupHint');
      const warn = $('#warn');

      if (!select) return;

      const uid = getCurrentUid();

      if (!uid){
        warn.textContent = '⚠️ تعذر تحميل المجموعات الآن.';
        return;
      }

      try{
        warn.textContent = '';
        select.innerHTML = '<option value="">جاري تحميل المجموعات...</option>';
        select.style.display = 'block';
        if (hint) hint.style.display = 'block';

        const r = await fetch('/api/events-page/groups', {
          method: 'GET',
          headers: {
            'Accept': 'application/json',
            'X-User-Id': uid
          },
          cache: 'no-store'
        });

        const j = await r.json().catch(() => null);

        if (!r.ok || !j || j.ok === false){
          warn.textContent = j?.message || '⚠️ فشل تحميل المجموعات من السيرفر.';
          select.innerHTML = '<option value="">تعذر تحميل المجموعات</option>';
          return;
        }

        const rows = Array.isArray(j.groups) ? j.groups : [];

        if (!rows.length){
          select.innerHTML = '<option value="">لا توجد مجموعات محفوظة</option>';
          return;
        }

        select.innerHTML = '<option value="">اختر مجموعة...</option>' + rows.map(g => {
          const members = Array.isArray(g.members) ? g.members : [];
          const nums = members.map(x => String(x).trim()).filter(Boolean).join(',');
          const animalType = String(g.animalType || '');
          const label = `${g.name || g.id || 'مجموعة'}${animalType ? ' — ' + (animalType === 'buffalo' ? 'جاموس' : animalType === 'cow' ? 'أبقار' : animalType) : ''} (${Number(g.animalsCount || members.length || 0)})`;

          return `<option value="${nums}"
            data-group-name="${String(g.name || '').replace(/"/g, '&quot;')}"
            data-animal-type="${String(g.animalType || '').replace(/"/g, '&quot;')}"
            data-group-id="${String(g.groupId || g.id || '').replace(/"/g, '&quot;')}"
            data-group-key="${String(g.groupKey || '').replace(/"/g, '&quot;')}"
            data-feeding-eligible="${g.feedingEligible ? '1' : '0'}">${label}</option>`;
        }).join('');

      } catch(err){
        console.error('groups load failed', err);
        warn.textContent = '⚠️ فشل تحميل المجموعات من السيرفر.';
        select.innerHTML = '<option value="">تعذر تحميل المجموعات</option>';
        select.style.display = 'block';
      }
    }

    function applySelectedGroupNumbers(raw, groupName = ''){
      const list = parseNumbers(raw || '');
      const textarea = $('#animalNumbers');

      if (!textarea) return;

      textarea.value = list.join('\n');

      if (list.length === 1){
        $('#animalInfo').textContent = `🐄 الحيوان الحالي: ${list[0]}`;
        updateCowCardNav(list[0], false);
      } else if (list.length > 1){
        $('#animalInfo').textContent = groupName
          ? `🐄 المجموعة الحالية: ${groupName}`
          : `🐄 إدخال جماعي: ${list.length} أرقام`;
        updateCowCardNav('', true);
      } else {
        $('#animalInfo').textContent = '🐄 الحيوان الحالي: غير محدد';
        updateCowCardNav('', false);
      }
    }

    function wireGroupsPicker(){
      $('#btnPickGroup')?.addEventListener('click', async (e)=>{
        e.preventDefault();
        await loadGroupsIntoSelect();
      }, {passive:false});

      $('#groupSelect')?.addEventListener('change', (e)=>{
        const raw = e.target.value || '';
        const groupName =
          e.target.options?.[e.target.selectedIndex]?.dataset?.groupName || '';
        applySelectedGroupNumbers(raw, groupName);
      }, {passive:true});
    }

    async function resolveEventFromServer({ page = '', action = '' } = {}){
      const uid = getCurrentUid();
      const { numbers, date } = currentNumbersAndDate();

      if (!uid){
        $('#warn').textContent = '⚠️ تعذر تحديد المستخدم الحالي.';
        return null;
      }

      try{
        $('#warn').textContent = '';

        const r = await fetch('/api/events-page/resolve', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json',
            'X-User-Id': uid
          },
          body: JSON.stringify({
            page,
            action,
            numbers,
            eventDate: date,
            group: getSelectedGroupMeta()
          })
        });

        const j = await r.json().catch(() => null);

        if (!r.ok || !j || j.ok === false || j.allowed === false){
          $('#warn').textContent = j?.message || '⚠️ تعذر تجهيز الحدث من السيرفر.';
          return null;
        }

        return j;

      } catch(err){
        console.error('events resolve failed', err);
        $('#warn').textContent = '⚠️ تعذر الاتصال بالسيرفر.';
        return null;
      }
    }

    function openMilkImport(){
      let date = norm($('#eventDate').value) || todayISO();
      if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) date = todayISO();

      $('#warn').textContent = '';
      const u = new URL('daily-milk-import.html', location.href);
      u.searchParams.set('mode', 'import');
      u.searchParams.set('source', 'batch');
      u.searchParams.set('date', date);
      u.searchParams.set('eventDate', date);
      location.href = u.toString();
    }

    function wireButtons(){
      $$('#eventButtons .btn[data-page]').forEach(btn=>{
        btn.addEventListener('click', async (e)=>{
          e.preventDefault();

          const target = btn.getAttribute('data-page') || '';
          const out = await resolveEventFromServer({ page: target });

          if (!out) return;

          if (out.redirectUrl){
            location.href = out.redirectUrl;
          }
        }, {passive:false});
      });
    }
function wireEventListTop(){
  document.getElementById('btnEventListTop')?.addEventListener('click', async (e)=>{
    e.preventDefault();

    const out = await resolveEventFromServer({ page: 'event-list.html' });

    if (!out) return;

    if (out.redirectUrl){
      location.href = out.redirectUrl;
    }
  }, {passive:false});
}
    function wireLive(){
      const input = $('#animalNumbers');
      if (!input) return;
   
      input.addEventListener('input', ()=>{
        refreshAnimalInfo();
      }, {passive:true});
    }

    async function saveTrimmingInline(){
      const out = await resolveEventFromServer({ action: 'trimming' });
      if (!out) return;

      const uid = getCurrentUid();
      const { numbers, date } = currentNumbersAndDate();

      try{
        const r = await fetch('/api/hoof-trimming/save', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json',
            'X-User-Id': uid
          },
          body: JSON.stringify({
            numbers,
            eventDate: date,
            source: location.pathname
          })
        });

        const j = await r.json().catch(() => null);

        const box = document.getElementById('inlineMsg');

        if (!r.ok || !j || j.ok === false){
          box.querySelector('.text').textContent = j?.message || '❌ تعذر تسجيل تقليم الحوافر.';
          box.style.display = 'block';
          return;
        }

        box.querySelector('.text').textContent = j.message || '✅ تم تسجيل تقليم الحوافر.';
        box.style.display = 'block';

       

      } catch(err){
        const box = document.getElementById('inlineMsg');
        box.querySelector('.text').textContent = '❌ تعذر الاتصال بالسيرفر.';
        box.style.display = 'block';
        console.error('Trimming save failed', err);
      }
    }

    function wireTrimming(){
      document.getElementById('btnTrimming')?.addEventListener('click', (e)=>{
        e.preventDefault();
        saveTrimmingInline();
      }, {passive:false});
    }

    function wireMilkImport(){
      document.getElementById('btnMilkImport')?.addEventListener('click', (e)=>{
        e.preventDefault();
        openMilkImport();
      }, {passive:false});
    }

    hydrate();
    wireLive();
    wireButtons();
    wireEventListTop();
    wireTrimming();
    wireMilkImport();
    wireGroupsPicker();
  })();
</script>
