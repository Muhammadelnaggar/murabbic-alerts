<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>مُرَبِّيك</title>

  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0b7f47">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <style>
    :root{
      --green:#0b7f47;
      --green-dark:#064f31;
      --sky:#dff5ff;
      --text:#123522;
    }

    *{box-sizing:border-box}

   body{
  margin:0;
  min-height:100vh;
  overflow:hidden;
  font-family:'Cairo',Tahoma,sans-serif;
  background:#f4faf6;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.splash-art{
  position:fixed;
  inset:0;
  z-index:1;
  overflow:hidden;
  background:#f4faf6;
}

.splash-art picture,
.splash-art img{
  display:block;
  width:100%;
  height:100%;
}

.splash-art img{
  object-fit:cover;
  object-position:center;
}

    .install-box{
  position:fixed;
  left:18px;
  right:18px;
  bottom:24px;
  z-index:5;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  text-align:center;
}

.install-box[hidden]{
  display:none;
}

.install-btn{
  border:0;
  border-radius:999px;
  padding:13px 22px;
  background:#0b7f47;
  color:#fff;
  font-family:inherit;
  font-size:16px;
  font-weight:900;
  box-shadow:0 12px 26px rgba(6,79,49,.28);
  cursor:pointer;
}

.install-note{
  color:#064f31;
  font-size:13px;
  font-weight:800;
  background:rgba(255,255,255,.72);
  padding:6px 10px;
  border-radius:999px;
}
  </style>
</head>

<body>

 <div class="splash-art" aria-label="مُرَبِّيك">
  <picture>
    <source media="(min-width: 768px)" srcset="/images/murabbik-splash-desktop.png">
    <img src="/images/murabbik-splash-mobile.png" alt="مُرَبِّيك — إدارة ذكية للقطيع والإنتاج">
  </picture>
</div>
   <div id="installBox" class="install-box" hidden>
    <button id="installBtn" class="install-btn" type="button">تثبيت مُرَبِّيك</button>
    <div class="install-note">اضغط مرة واحدة لتثبيت التطبيق على جهازك</div>
  </div>
 <script>
  let deferredInstallPrompt = null;
  let installPromptSeen = false;
  let installDone = false;

  const installBox = document.getElementById('installBox');
  const installBtn = document.getElementById('installBtn');
  const installNote = installBox ? installBox.querySelector('.install-note') : null;
   function mbkInstallDeviceText(state = 'ready'){
  const ua = String(navigator.userAgent || '').toLowerCase();
  const platform = String(navigator.platform || '').toLowerCase();
  const touch = Number(navigator.maxTouchPoints || 0);

  const isIpad =
    ua.includes('ipad') ||
    (platform.includes('mac') && touch > 1);

  const isMobile =
    /iphone|ipod|android.*mobile|windows phone/.test(ua);

  const isTablet =
    isIpad ||
    ua.includes('tablet') ||
    (ua.includes('android') && !ua.includes('mobile'));

  const deviceText = isMobile
    ? 'موبايلك'
    : isTablet
      ? 'التابلت'
      : 'الكمبيوتر';

  const openText = isMobile || isTablet
    ? 'الشاشة الرئيسية'
    : 'سطح المكتب أو قائمة Start';

  if (state === 'installed') {
    return {
      button: 'تم تثبيت مُرَبِّيك بنجاح',
      note: `افتح مُرَبِّيك الآن من الأيقونة الجديدة على ${openText}.`
    };
  }

  return {
    button: `تثبيت مُرَبِّيك على ${deviceText}`,
    note: `اضغط مرة واحدة لتثبيت التطبيق على ${deviceText}.`
  };
}

function applyInstallDeviceText(state = 'ready'){
  const t = mbkInstallDeviceText(state);

  if (installBtn) {
    installBtn.textContent = t.button;
  }

  if (installNote) {
    installNote.textContent = t.note;
  }
}

  function isStandaloneApp(){
    return window.matchMedia('(display-mode: standalone)').matches ||
           window.navigator.standalone === true;
  }

  function goLogin(delay){
    setTimeout(() => {
      window.location.replace("login.html");
    }, delay);
  }

function showInstalledMessage(){
  installDone = true;

  if (installBox) {
    installBox.hidden = false;
  }

  const t = mbkInstallDeviceText('installed');

  if (installBtn) {
    installBtn.disabled = true;
    installBtn.textContent = t.button;
    installBtn.style.opacity = '0.9';
    installBtn.style.cursor = 'default';
  }

  if (installNote) {
    installNote.textContent = t.note;
  }
}

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(function(){});
    });
  }

  window.addEventListener('beforeinstallprompt', function (event) {
    event.preventDefault();
    deferredInstallPrompt = event;
    installPromptSeen = true;

    applyInstallDeviceText('ready');

if (installBox) {
  installBox.hidden = false;
}
  });

  if (installBtn) {
    installBtn.addEventListener('click', async function () {
      if (!deferredInstallPrompt) {
        goLogin(300);
        return;
      }

      const promptEvent = deferredInstallPrompt;
      deferredInstallPrompt = null;

      try {
        promptEvent.prompt();
        const choice = await promptEvent.userChoice;

        if (choice && choice.outcome === 'accepted') {
          showInstalledMessage();
          return;
        }
      } catch (_) {}

      if (!installDone) {
        if (installBox) {
          installBox.hidden = true;
        }
        goLogin(700);
      }
    });
  }

  window.addEventListener('appinstalled', function () {
    showInstalledMessage();
  });

 if (isStandaloneApp()) {
  goLogin(8000);
} else {
  setTimeout(function () {
    if (!installPromptSeen && !installDone) {
      window.location.replace("login.html");
    }
  }, 8000);
}
</script>
</body>
</html>
