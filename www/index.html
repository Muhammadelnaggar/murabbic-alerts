<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>مُرَبِّيك</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0b7f47">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="/icons/icon-192.png">

<style>
  :root{
    --green:#0b7f47;
    --green-dark:#075f36;
    --field:#1f8a4c;
    --field-light:#49b86f;
    --cream:#fff7df;
    --sun:#ffd36a;
    --brown:#6b4f2a;
    --text:#173b24;
    --white:#ffffff;
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    min-height:100vh;
    font-family:'Cairo',Tahoma,sans-serif;
    overflow:hidden;
    color:var(--text);
    background:
      linear-gradient(180deg, #dff7ff 0%, #f8ffe8 42%, #d9f4cf 43%, #0b7f47 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    position:relative;
  }

  .farm-bg{
    position:absolute;
    inset:0;
    overflow:hidden;
    pointer-events:none;
  }

  .sun{
    position:absolute;
    width:110px;
    height:110px;
    top:9%;
    left:12%;
    border-radius:50%;
    background:radial-gradient(circle, #fff1a8 0%, var(--sun) 62%, rgba(255,211,106,.25) 100%);
    box-shadow:0 0 55px rgba(255,211,106,.55);
  }

  .field{
    position:absolute;
    left:-8%;
    right:-8%;
    bottom:-4%;
    height:43%;
    background:
      repeating-linear-gradient(
        112deg,
        rgba(255,255,255,.16) 0 2px,
        transparent 2px 34px
      ),
      linear-gradient(180deg, var(--field-light), var(--field));
    border-radius:50% 50% 0 0 / 18% 18% 0 0;
  }

  .field::before{
    content:"";
    position:absolute;
    inset:18px 0 auto 0;
    height:42px;
    background:rgba(255,255,255,.10);
    border-radius:50%;
    filter:blur(10px);
  }

  .fence{
    position:absolute;
    right:7%;
    bottom:28%;
    width:86%;
    height:26px;
    border-top:4px solid rgba(107,79,42,.55);
    border-bottom:4px solid rgba(107,79,42,.45);
  }

  .fence::before{
    content:"";
    position:absolute;
    inset:-14px 0 0 0;
    background:
      repeating-linear-gradient(
        90deg,
        rgba(107,79,42,.55) 0 5px,
        transparent 5px 78px
      );
  }

  .splash-shell{
    position:relative;
    z-index:2;
    width:min(92vw,460px);
    padding:18px;
  }

  .splash-card{
    background:rgba(255,255,255,.88);
    border:1px solid rgba(11,127,71,.18);
    border-radius:26px;
    padding:28px 22px 24px;
    box-shadow:0 18px 45px rgba(16,72,38,.22);
  }

  .logo-wrap{
    width:104px;
    height:104px;
    margin:0 auto 16px;
    border-radius:24px;
    background:linear-gradient(180deg,#ffffff,#eef9ef);
    border:1px solid rgba(11,127,71,.18);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 10px 24px rgba(11,127,71,.15);
  }

  .logo{
    width:74px;
    height:74px;
    object-fit:contain;
    animation:float 2.8s ease-in-out infinite alternate;
  }

  @keyframes float{
    from{transform:translateY(0)}
    to{transform:translateY(-7px)}
  }

  .farm-tag{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding:7px 14px;
    border-radius:999px;
    background:#eef9ef;
    border:1px solid rgba(11,127,71,.20);
    color:var(--green-dark);
    font-size:13px;
    font-weight:900;
    margin-bottom:12px;
  }

  .brand{
    font-size:42px;
    font-weight:900;
    line-height:1.1;
    color:var(--green-dark);
    margin:0;
    opacity:0;
    animation:fadeInUp .9s ease .1s forwards;
  }

  .slogan{
    max-width:330px;
    margin:14px auto 0;
    font-size:16px;
    line-height:1.9;
    color:#31533a;
    font-weight:800;
    opacity:0;
    animation:fadeInUp .9s ease .25s forwards;
  }

  .animal-row{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
    margin:18px 0 16px;
  }

  .animal-chip{
    min-height:54px;
    border-radius:16px;
    background:#f6fff4;
    border:1px solid rgba(11,127,71,.16);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:3px;
    font-weight:900;
    color:var(--green-dark);
    box-shadow:0 6px 14px rgba(11,127,71,.07);
  }

  .animal-chip span{
    font-size:20px;
    line-height:1;
  }

  .animal-chip small{
    font-size:12px;
    color:#45614d;
    font-weight:800;
  }

  .status-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    padding-top:12px;
    border-top:1px solid rgba(11,127,71,.13);
    font-size:14px;
    font-weight:900;
    color:var(--green-dark);
    opacity:0;
    animation:fadeInUp .9s ease .42s forwards;
  }

  .loader{
    width:22px;
    height:22px;
    border-radius:50%;
    border:3px solid rgba(11,127,71,.20);
    border-top-color:var(--green);
    animation:spin .9s linear infinite;
    flex:0 0 auto;
  }

  @keyframes spin{
    to{transform:rotate(360deg)}
  }

  @keyframes fadeInUp{
    from{transform:translateY(16px);opacity:0}
    to{transform:translateY(0);opacity:1}
  }

  @media(max-width:480px){
    .splash-card{
      border-radius:22px;
      padding:26px 18px 22px;
    }

    .brand{
      font-size:36px;
    }

    .slogan{
      font-size:15px;
    }

    .animal-row{
      gap:7px;
    }

    .animal-chip{
      min-height:50px;
    }

    .logo-wrap{
      width:96px;
      height:96px;
    }

    .logo{
      width:66px;
      height:66px;
    }

    .sun{
      width:88px;
      height:88px;
      top:8%;
      left:8%;
    }
  }
</style>
</head>

<body>

<div class="splash-bg" aria-hidden="true">
  <span class="orb orb-1"></span>
  <span class="orb orb-2"></span>
  <span class="orb orb-3"></span>
</div>

<div class="splash-shell">
  <div class="splash-card">
    <div class="logo-wrap">
      <img src="images/logo.png" alt="شعار مُرَبِّيك" class="logo">
    </div>

    <div class="eyebrow">منصة إدارة القطيع الذكية</div>

   <div class="farm-bg" aria-hidden="true">
  <span class="sun"></span>
  <span class="field"></span>
  <span class="fence"></span>
</div>

<div class="splash-shell">
  <div class="splash-card">
    <div class="logo-wrap">
      <img src="images/logo.png" alt="شعار مُرَبِّيك" class="logo">
    </div>

    <div class="farm-tag">أبقار • جاموس • مزارع</div>

    <div class="brand">مُرَبِّيك</div>

    <div class="slogan">
      نظام خبير لمتابعة القطيع، تنظيم الأحداث، وتنبيه المربي قبل فوات القرار.
    </div>

    <div class="animal-row">
      <div class="animal-chip">
        <span>🐄</span>
        <small>أبقار</small>
      </div>
      <div class="animal-chip">
        <span>🐃</span>
        <small>جاموس</small>
      </div>
      <div class="animal-chip">
        <span>🥛</span>
        <small>لبن وتنبيهات</small>
      </div>
    </div>

    <div class="status-row">
      <div class="loader" aria-hidden="true"></div>
      <span>جارٍ تجهيز مُرَبِّيك…</span>
    </div>
  </div>
</div>

  <script>
    setTimeout(() => {
  window.location.replace("login.html");
}, 3000);
  </script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(()=>{});
  }
</script>

</body>
</html>
