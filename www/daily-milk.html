<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>تسجيل إنتاج اللبن اليومي — مُرَبِّك</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>

  <link rel="stylesheet" href="css/forms.css">
 
  <style>
    :root{
      --green:#0ea05a; --green-600:#0b7f47; --bg:#f7faf7; --card:#ffffff;
      --text:#0f172a; --muted:#64748b; --border:#e2e8f0;
    }
    *{box-sizing:border-box}
    html,body{max-width:100%;overflow-x:hidden}
    body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,'Segoe UI','Cairo',Tahoma,Arial,sans-serif}
    header{position:sticky;top:0;z-index:10;background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px}
    h1{margin:0;color:var(--green-600);font-size:20px;font-weight:800}
    .wrap{max-width:720px;margin:16px auto;padding:0 12px}
    form{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
    label{display:block;margin-top:12px;font-weight:700}
    input[type="text"],input[type="date"],input[type="number"],select{
      width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;background:#fff;font-size:16px;outline:none
    }
    input:focus, select:focus{border-color:var(--green-600)}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    .col{flex:1 1 180px;min-width:180px}
    .radio-group{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
    .radio-group label{font-weight:600}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;
      appearance:none;border:none;border-radius:12px;padding:12px 14px;cursor:pointer;font-weight:800;font-size:16px
    }
    .btn-primary{background:var(--green);color:#fff}
    .btn-ghost{background:#fff;border:1px solid var(--border);color:var(--text)}
    .submit{width:100%;margin-top:18px}
    .confirm{display:none;margin-top:14px;border:1px dashed var(--green-600);background:#eaf7f0;border-radius:12px;padding:12px}
    .confirm .title{font-weight:900;color:var(--green-600);margin-bottom:6px}
    .muted{color:var(--muted);font-size:14px}
    /* رسالة مستخدم عامة (من غير تفاصيل تقنية) */
    .msg{display:none;margin:12px 0;padding:10px;border:1px solid #fde68a;background:#fffbeb;color:#7c2d12;border-radius:10px;font-weight:700}
    /* تكبير خانة رقم الحيوان */
   #animalNumber{font-size:20px;padding:14px 16px;border-radius:12px;letter-spacing:.3px;height:56px}

    .hide{display:none !important}
    /* شريط ديباچ اختياري للمطور (يظهر مع ?debug=1) */
    #devbar{display:none;position:fixed;top:0;left:0;right:0;z-index:99;background:#111;color:#0f0;font:12px/1.4 monospace;padding:6px}
    /* ===== أزرار مُرَبِّيك القياسية ===== */
.btn-row{
  display:flex;
  gap:10px;
  margin-top:18px;
}

.save-btn{
  flex:1;
  height:48px;
  border-radius:14px;
  font-weight:800;
  font-size:16px;
  cursor:pointer;
  border:none;
  transition:.2s ease;
}

/* زر الحفظ (أخضر مربيك) */
.save-btn:not(.open-card){
  background:#0ea05a;
  color:#fff;
  box-shadow:0 2px 4px rgba(0,0,0,.08);
}
.save-btn:not(.open-card):active{
  transform:scale(.98);
}

/* زر فتح البطاقة (فاتح بحد أخضر) */
.open-card{
  background:#fff;
  color:#0b7f47;
  border:2px solid #0ea05a;
}
.open-card:active{
  transform:scale(.98);
}
#bulkBox{margin-top:12px}
#bulkTable{
  width:100%;
  table-layout:fixed;
  border-collapse:separate;
  border-spacing:0 6px;
}
#bulkTable th{
  font-size:13px;
  font-weight:800;
  color:#0f172a;
  padding:6px 4px !important;
  line-height:1.2;
}
#bulkTable td{
  vertical-align:middle;
}
#bulkTable input[type="number"]{
  width:100% !important;
  min-width:0 !important;
  padding:8px 4px !important;
  font-size:15px !important;
  text-align:center;
}
#bulkTable .bulk-total{
  font-size:13px !important;
  line-height:1.2;
}
#bulkTable .bulk-kind-cell{
  font-size:13px !important;
}
@media (max-width: 480px){
  #bulkInfo{
    font-size:13px !important;
    line-height:1.5;
  }
  #bulkTable th{
    font-size:12px;
    padding:4px 2px !important;
  }
  #bulkTable input[type="number"]{
    font-size:14px !important;
    padding:7px 2px !important;
  }
  #bulkTable .bulk-total{
    font-size:12px !important;
  }
}
  </style>
</head>
<body>
  <div id="devbar"></div>
<header>
  <div class="mbk-head">
    <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">
    <div class="mbk-center">
      <div class="mbk-page-title">تسجيل إنتاج اللبن اليومي</div>
      <div class="mbk-app-name">مُرَبِّيك</div>
    </div>
    <a class="mbk-back" href="add-event.html">رجوع</a>
  </div>
</header>


  <div class="wrap">
    <!-- رسالة عامة للمستخدم عند الحاجة فقط -->
    <div id="msg" class="msg" aria-live="polite"></div>

   <form id="milkForm" autocomplete="off" novalidate>
  <div id="sysbar" class="infobar"></div>
<div id="bulkBox" class="hide">
  <div id="bulkDateBar" style="display:none;margin:0 0 12px 0"></div>
  <div id="bulkInfo" class="muted" style="margin:0 0 12px 0;font-weight:800"></div>

 <div style="width:100%">
  <table id="bulkTable" style="width:100%;table-layout:fixed;border-collapse:separate;border-spacing:0 6px">
      <thead>
        <tr>
          <th style="text-align:right;padding:8px 10px">رقم الحيوان</th>
          <th style="text-align:center;padding:8px 10px">النوع</th>
          <th style="text-align:center;padding:8px 10px">حلبة 1</th>
          <th style="text-align:center;padding:8px 10px">حلبة 2</th>
          <th style="text-align:center;padding:8px 10px" id="bulkHeadS3">حلبة 3</th>
          <th style="text-align:center;padding:8px 10px">الإجمالي</th>
        </tr>
      </thead>
      <tbody id="bulkRows"></tbody>
    </table>
  </div>

<div class="btn-row">
  <button type="button" id="saveBulkBtn" class="save-btn">حفظ اللبن</button>
  <button type="button" id="cancelBulkBtn" class="save-btn open-card">لوحة التحكم</button>
</div>
</div>
      <div class="row">
        <div class="col">
          <label for="animalNumber">رقم الحيوان</label>
<input id="animalNumber" name="animalNumber" data-field="animalNumber"
       inputmode="numeric" autocomplete="off" required />

        </div>
        <div class="col">
          <label for="eventDate">تاريخ اليوم</label>
         <input id="eventDate" name="eventDate" data-field="eventDate" type="date" required />
        </div>
      </div>

      <div id="sessions">
        <div class="row">
          <div class="col">
            <label id="s1label" for="s1">حلبة 1 (كجم)</label>
           <input id="s1" data-field="milkS1" type="number" min="0" step="0.1" inputmode="decimal" placeholder="0.0" />
          </div>
          <div class="col">
            <label id="s2label" for="s2">حلبة 2 (كجم)</label>
           <input id="s2" data-field="milkS2" type="number" min="0" step="0.1" inputmode="decimal" placeholder="0.0" />
          </div>
          <div class="col" id="col-s3">
            <label id="s3label" for="s3">حلبة 3 (كجم)</label>
           <input id="s3" data-field="milkS3" type="number" min="0" step="0.1" inputmode="decimal" placeholder="0.0" />
          </div>
        </div>
      </div>

<div class="btn-row">
  <button type="submit" class="save-btn">حفظ اللبن اليومي</button>

  <button type="button" id="openCowCardBtn" class="save-btn open-card">
    فتح بطاقة الحيوان
  </button>
</div>



      <!-- ✅ تأكيد داخل النموذج -->
      <div id="confirmBox" class="confirm" style="display:none" aria-live="polite">
        <div class="title">✅ تم تسجيل اللبن اليومي بنجاح</div>
        <div class="muted" id="totalLine"></div>
        <div class="row" style="margin-top:8px">
          <button type="button" id="goAddEvent" class="btn btn-primary">تسجيل حدث آخر</button>
          <button type="button" id="backDash" class="btn btn-ghost">العودة للوحة التحكم</button>
        </div>
      </div>
    </form>
  </div>

 <script type="module">
  const $ = (id) => document.getElementById(id);

  const form = $("milkForm");
  const inputAnimal = $("animalNumber");
  const inputDate = $("eventDate");
  const sysbar = $("sysbar");
  const msgBox = $("msg");

  const colS3 = $("col-s3");
  const s1label = $("s1label");
  const s2label = $("s2label");
  const s3label = $("s3label");

  const s1Input = $("s1");
  const s2Input = $("s2");
  const s3Input = $("s3");

  const bulkBox = $("bulkBox");
  const bulkDateBar = $("bulkDateBar");
  const bulkInfo = $("bulkInfo");
  const bulkRows = $("bulkRows");
  const saveBulkBtn = $("saveBulkBtn");
  const cancelBulkBtn = $("cancelBulkBtn");
  const openCowCardBtn = $("openCowCardBtn");

  const goAddEventBtn = $("goAddEvent");
  const backDashBtn = $("backDash");
  const confirmBox = $("confirmBox");

  let gateState = {
    allowed: false,
    accepted: [],
    rejected: [],
    byNumber: new Map()
  };

  function getQS(k) {
    return new URL(location.href).searchParams.get(k) || "";
  }

  function firstNonEmpty(...vals) {
    return vals.find(v => String(v ?? "").trim() !== "") || "";
  }

  function apiBase() {
    return String(window.API_BASE || localStorage.getItem("API_BASE") || "").replace(/\/$/, "");
  }

  function apiUrl(path) {
    const base = apiBase();
    return base ? `${base}${path}` : path;
  }

  async function getUid() {
    const fromTenant = String(window.__tenant?.userId || "").trim();
    if (fromTenant) return fromTenant;

    try {
      const v = String(
        localStorage.getItem("userId") ||
        localStorage.getItem("uid") ||
        localStorage.getItem("tenantId") ||
        ""
      ).trim();

      return v;
    } catch (_) {
      return "";
    }
  }

  function normalizeDigits(v) {
    const map = {
      "٠":"0","١":"1","٢":"2","٣":"3","٤":"4","٥":"5","٦":"6","٧":"7","٨":"8","٩":"9",
      "۰":"0","۱":"1","۲":"2","۳":"3","۴":"4","۵":"5","۶":"6","۷":"7","۸":"8","۹":"9"
    };

    return String(v || "")
      .trim()
      .replace(/[٠-٩۰-۹]/g, d => map[d] || d)
      .replace(/[^\d]/g, "");
  }

  function parseBulkNumbers(raw) {
    return [...new Set(
      String(raw || "")
        .replace(/[٠-٩۰-۹]/g, d => ({
          "٠":"0","١":"1","٢":"2","٣":"3","٤":"4","٥":"5","٦":"6","٧":"7","٨":"8","٩":"9",
          "۰":"0","۱":"1","۲":"2","۳":"3","۴":"4","۵":"5","۶":"6","۷":"7","۸":"8","۹":"9"
        }[d] || d))
        .split(/[,\n،;\s]+/)
        .map(x => normalizeDigits(x))
        .filter(Boolean)
    )];
  }

  function toNumberOrBlank(v) {
    const s = String(v ?? "").trim();
    if (!s) return "";
    return s.replace(",", ".");
  }

  function showBar(text, type = "info") {
    if (!sysbar) return;

    const cls =
      type === "success" ? "success" :
      type === "error" ? "error" :
      type === "warning" ? "warning" :
      "info";

    sysbar.className = `infobar mbk-infobar show ${cls}`;
    sysbar.style.display = "block";
    sysbar.textContent = String(text || "");
    try { sysbar.scrollIntoView({ behavior: "smooth", block: "start" }); } catch (_) {}
  }

  function hideBar() {
    if (!sysbar) return;
    sysbar.textContent = "";
    sysbar.style.display = "none";
  }

  function showMsg(text) {
    if (!msgBox) return;
    msgBox.textContent = String(text || "");
    msgBox.style.display = "block";
  }

  function hideMsg() {
    if (!msgBox) return;
    msgBox.textContent = "";
    msgBox.style.display = "none";
  }

  function applyKindUI(kind) {
    if (kind === "buffalo") {
      colS3?.classList.add("hide");
      if (s1label) s1label.textContent = "حلبة صباح (كجم)";
      if (s2label) s2label.textContent = "حلبة مساء (كجم)";
      if (s3Input) s3Input.value = "";
      return;
    }

    colS3?.classList.remove("hide");
    if (s1label) s1label.textContent = "حلبة 1 (كجم)";
    if (s2label) s2label.textContent = "حلبة 2 (كجم)";
    if (s3label) s3label.textContent = "حلبة 3 (كجم)";
  }

  async function callDailyMilkGate(numbers, eventDate) {
    const uid = await getUid();

    const r = await fetch(apiUrl("/api/daily-milk/gate"), {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-User-Id": uid
      },
      body: JSON.stringify({
        animalNumbers: numbers,
        animalNumber: Array.isArray(numbers) ? "" : numbers,
        eventDate
      })
    });

    return await r.json().catch(() => ({
      ok: false,
      allowed: false,
      message: "تعذّر قراءة رد السيرفر."
    }));
  }

  async function callDailyMilkSave(payload) {
    const uid = await getUid();

    const r = await fetch(apiUrl("/api/daily-milk/save"), {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-User-Id": uid
      },
      body: JSON.stringify(payload)
    });

    return await r.json().catch(() => ({
      ok: false,
      message: "تعذّر قراءة رد السيرفر."
    }));
  }

  function applyGateResult(data) {
    const accepted = Array.isArray(data?.accepted)
      ? data.accepted
      : (Array.isArray(data?.valid) ? data.valid : []);

    const rejected = Array.isArray(data?.rejected) ? data.rejected : [];

    gateState = {
      allowed: data?.allowed === true && accepted.length > 0,
      accepted,
      rejected,
      byNumber: new Map(accepted.map(x => [String(x.animalNumber || x.number || "").trim(), x]))
    };

    if (!gateState.allowed) {
      showBar(data?.message || "❌ لا يوجد رقم مؤهل لتسجيل اللبن.", "error");
      return;
    }

    const first = accepted[0] || {};
    const kind = String(first.kind || "").trim() || (String(first.species || "") === "جاموس" ? "buffalo" : "cow");
    applyKindUI(kind);

    showBar(data?.message || "✅ تم التحقق — أكمل إدخال اللبن.", "success");
  }

  async function runSingleGate() {
    const n = normalizeDigits(inputAnimal?.value || "");
    const d = String(inputDate?.value || "").trim();

    if (!n || !d) {
      gateState = { allowed: false, accepted: [], rejected: [], byNumber: new Map() };
      hideBar();
      return;
    }

    showBar("جارِ التحقق من الرقم…", "info");

    try {
      const data = await callDailyMilkGate(n, d);
      applyGateResult(data);
    } catch (_) {
      gateState = { allowed: false, accepted: [], rejected: [], byNumber: new Map() };
      showBar("تعذّر الاتصال بالسيرفر للتحقق.", "error");
    }
  }

  function bulkRowHtml(n) {
    return `
      <tr class="bulk-row" data-number="${n}" data-kind="cow" data-eligible="0">
        <td style="padding:8px 6px;background:#fff;border:1px solid #e2e8f0;border-left:none;border-radius:0 12px 12px 0;font-weight:800;white-space:nowrap;font-size:15px">
          ${n}
        </td>
        <td class="bulk-kind-cell" style="padding:8px 6px;background:#fff;border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0;text-align:center;font-weight:700;color:#0b7f47;font-size:14px">
          ...
        </td>
        <td style="padding:6px 4px;background:#fff;border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0">
          <input type="number" class="bulk-s1" min="0" step="0.1" inputmode="decimal" placeholder="0.0" style="width:100%;min-width:0;padding:10px 6px;text-align:center" disabled />
        </td>
        <td style="padding:6px 4px;background:#fff;border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0">
          <input type="number" class="bulk-s2" min="0" step="0.1" inputmode="decimal" placeholder="0.0" style="width:100%;min-width:0;padding:10px 6px;text-align:center" disabled />
        </td>
        <td class="bulk-s3-cell" style="padding:8px;background:#fff;border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0">
          <input type="number" class="bulk-s3" min="0" step="0.1" inputmode="decimal" placeholder="0.0" style="width:100%;min-width:0;padding:10px 6px;text-align:center" disabled />
        </td>
        <td style="padding:8px 6px;background:#fff;border:1px solid #e2e8f0;border-right:none;border-radius:12px 0 0 12px;text-align:center;font-size:14px">
          <div class="bulk-total" style="font-weight:900;color:#0b7f47;min-width:0;font-size:14px">—</div>
        </td>
      </tr>
    `;
  }

  function applyBulkRowKind(row, kind) {
    const s3Cell = row.querySelector(".bulk-s3-cell");
    const s3Input = row.querySelector(".bulk-s3");
    const kindCell = row.querySelector(".bulk-kind-cell");

    row.dataset.kind = kind;

    if (kind === "buffalo") {
      if (kindCell) kindCell.textContent = "جاموس";
      if (s3Cell) s3Cell.style.display = "none";
      if (s3Input) {
        s3Input.value = "";
        s3Input.disabled = true;
      }
      return;
    }

    if (kindCell) kindCell.textContent = "أبقار";
    if (s3Cell) s3Cell.style.display = "";
    if (s3Input) s3Input.disabled = false;
  }

  function applyBulkGateResult(data) {
    const accepted = Array.isArray(data?.accepted)
      ? data.accepted
      : (Array.isArray(data?.valid) ? data.valid : []);

    const validMap = new Map(
      accepted.map(x => [String(x.animalNumber || x.number || "").trim(), x])
    );

    const rejectedMap = new Map(
      (Array.isArray(data?.rejected) ? data.rejected : [])
        .map(x => [String(x.animalNumber || x.number || "").trim(), x.reason || "مرفوض"])
    );

    let ok = 0;
    let bad = 0;

    document.querySelectorAll(".bulk-row").forEach(row => {
      const n = String(row.dataset.number || "").trim();
      const item = validMap.get(n);

      if (item) {
        const kind = String(item.kind || "").trim() || (String(item.species || "") === "جاموس" ? "buffalo" : "cow");

        row.dataset.eligible = "1";
        row.dataset.animalId = String(item.animalId || "");
        row.dataset.species = String(item.species || "");
        row.style.opacity = "1";
        row.style.filter = "none";

        applyBulkRowKind(row, kind);

        row.querySelectorAll("input").forEach(inp => {
          if (!inp.closest(".bulk-s3-cell") || kind !== "buffalo") inp.disabled = false;
        });

        ok++;
        return;
      }

      row.dataset.eligible = "0";
      row.style.opacity = "0.55";
      row.style.filter = "grayscale(.15)";

      const kindCell = row.querySelector(".bulk-kind-cell");
      if (kindCell) {
        kindCell.textContent = rejectedMap.get(n) || "مرفوض";
        kindCell.style.color = "#b91c1c";
        kindCell.style.fontWeight = "800";
      }

      row.querySelectorAll("input").forEach(inp => {
        inp.disabled = true;
        inp.value = "";
      });

      bad++;
    });

    if (saveBulkBtn) saveBulkBtn.disabled = ok === 0;

    bulkInfo.textContent = ok
      ? `إدخال جماعي: ${ok} جاهز${bad ? ` — ${bad} مرفوض` : ""}`
      : "إدخال جماعي: لا توجد أرقام مؤهلة";
  }

  async function runBulkGate(numbers) {
    const d = String(inputDate?.value || "").trim();

    if (!d) {
      bulkInfo.textContent = "اختر تاريخ اليوم لبدء التحقق.";
      if (saveBulkBtn) saveBulkBtn.disabled = true;
      return;
    }

    bulkInfo.textContent = `جارِ التحقق من ${numbers.length} رقم...`;
    if (saveBulkBtn) saveBulkBtn.disabled = true;

    try {
      const data = await callDailyMilkGate(numbers, d);
      applyBulkGateResult(data);
    } catch (_) {
      bulkInfo.textContent = "تعذّر الاتصال بالسيرفر للتحقق.";
      if (saveBulkBtn) saveBulkBtn.disabled = true;
    }
  }

  function setupBulkMode(numbers) {
    bulkBox?.classList.remove("hide");

    const animalCol = inputAnimal?.closest(".col");
    const dateCol = inputDate?.closest(".col");
    const firstRow = inputAnimal?.closest(".row");
    const singleBtns = form?.querySelectorAll(".btn-row")?.[1];

    animalCol?.classList.add("hide");

    if (bulkDateBar && dateCol && !bulkDateBar.contains(dateCol)) {
      bulkDateBar.style.display = "block";
      dateCol.style.flex = "1 1 100%";
      dateCol.style.minWidth = "100%";
      dateCol.style.margin = "0";
      bulkDateBar.innerHTML = "";
      bulkDateBar.appendChild(dateCol);
    }

    if (firstRow) {
      const visibleCols = Array.from(firstRow.querySelectorAll(".col"))
        .filter(el => !el.classList.contains("hide") && !bulkDateBar.contains(el));

      if (!visibleCols.length) firstRow.classList.add("hide");
    }

    document.getElementById("sessions")?.classList.add("hide");
    singleBtns?.classList.add("hide");
    openCowCardBtn?.classList.add("hide");

    bulkInfo.textContent = `إدخال جماعي: ${numbers.length} حيوان`;
    bulkRows.innerHTML = numbers.map(bulkRowHtml).join("");

    inputDate?.addEventListener("change", () => runBulkGate(numbers));
    runBulkGate(numbers);
  }

  function collectSinglePayload() {
    const animalNumber = normalizeDigits(inputAnimal?.value || "");
    const eventDate = String(inputDate?.value || "").trim();

    return {
      animalNumber,
      eventDate,
      milkS1: toNumberOrBlank(s1Input?.value),
      milkS2: toNumberOrBlank(s2Input?.value),
      milkS3: toNumberOrBlank(s3Input?.value)
    };
  }

  function collectBulkRows() {
    return Array.from(document.querySelectorAll(".bulk-row"))
      .filter(row => row.dataset.eligible === "1")
      .map(row => ({
        animalNumber: String(row.dataset.number || "").trim(),
        animalId: String(row.dataset.animalId || "").trim(),
        milkS1: toNumberOrBlank(row.querySelector(".bulk-s1")?.value),
        milkS2: toNumberOrBlank(row.querySelector(".bulk-s2")?.value),
        milkS3: toNumberOrBlank(row.querySelector(".bulk-s3")?.value)
      }));
  }

  async function saveSingle() {
    hideMsg();

    const payload = collectSinglePayload();

    showBar("جارِ حفظ اللبن اليومي…", "info");

    const data = await callDailyMilkSave(payload);

    if (!data?.ok) {
      showBar(data?.message || "تعذّر حفظ اللبن اليومي.", "error");
      return;
    }

    try {
      localStorage.setItem("lastAnimalId", payload.animalNumber || "");
      localStorage.setItem("currentAnimalId", payload.animalNumber || "");
      localStorage.setItem("eventDate", payload.eventDate || "");
      localStorage.setItem("lastEventDate", payload.eventDate || "");
    } catch (_) {}

    showBar(data.message || "✅ تم حفظ اللبن اليومي بنجاح", "success");
    if (confirmBox) confirmBox.style.display = "none";

    const url = data.redirectUrl || `/event-list.html?number=${encodeURIComponent(payload.animalNumber)}`;
    setTimeout(() => {
      location.href = url;
    }, 900);
  }

  async function saveBulk() {
    hideMsg();

    const eventDate = String(inputDate?.value || "").trim();
    const rows = collectBulkRows();

    if (!rows.length) {
      showMsg("لا توجد أرقام مؤهلة للحفظ.");
      return;
    }

    saveBulkBtn.disabled = true;
    cancelBulkBtn.disabled = true;

    showBar("جارِ حفظ اللبن الجماعي…", "info");

    const data = await callDailyMilkSave({
      eventDate,
      rows
    });

    saveBulkBtn.disabled = false;
    cancelBulkBtn.disabled = false;

    if (!data?.ok) {
      showBar(data?.message || "تعذّر حفظ اللبن الجماعي.", "error");
      return;
    }

    const saved = Number(data.savedCount || 0);
    const rejected = Number(data.rejectedCount || 0);

    let text = data.message || `✅ تم حفظ اللبن اليومي بنجاح`;
    if (saved || rejected) {
      text = `✅ تم حفظ ${saved} سجل لبن${rejected ? ` — وتعذر حفظ ${rejected}` : ""}`;
    }

    showBar(text, "success");

    setTimeout(() => {
      location.href = "/dashboard.html";
    }, 1000);
  }

  form?.addEventListener("submit", async (e) => {
    e.preventDefault();

    try {
      await saveSingle();
    } catch (_) {
      showBar("تعذّر الاتصال بالسيرفر أثناء حفظ اللبن اليومي.", "error");
    }
  });

  saveBulkBtn?.addEventListener("click", async () => {
    try {
      await saveBulk();
    } catch (_) {
      saveBulkBtn.disabled = false;
      cancelBulkBtn.disabled = false;
      showBar("تعذّر الاتصال بالسيرفر أثناء حفظ اللبن الجماعي.", "error");
    }
  });

  cancelBulkBtn?.addEventListener("click", () => {
    location.href = "/dashboard.html";
  });

  openCowCardBtn?.addEventListener("click", () => {
    const n = normalizeDigits(inputAnimal?.value || "");
    if (!n) return;
    location.href = `/cow-card.html?number=${encodeURIComponent(n)}`;
  });

  goAddEventBtn?.addEventListener("click", () => {
    location.href = "/add-event.html";
  });

  backDashBtn?.addEventListener("click", () => {
    location.href = "/dashboard.html";
  });

  const qsMode = firstNonEmpty(getQS("mode"));
  const qsNumbersRaw = firstNonEmpty(getQS("numbers"));
  const bulkNumbers = parseBulkNumbers(qsNumbersRaw);
  const isBulkMode = qsMode === "bulk" && bulkNumbers.length > 1;

  const qsAnimal = firstNonEmpty(
    getQS("animalId"),
    getQS("number"),
    getQS("animalNumber"),
    localStorage.getItem("lastAnimalId"),
    localStorage.getItem("currentAnimalId")
  );

  const qsDate = firstNonEmpty(
    getQS("date"),
    getQS("eventDate"),
    localStorage.getItem("eventDate"),
    localStorage.getItem("lastEventDate")
  );

  if (!inputDate.value && qsDate) inputDate.value = qsDate;

  if (isBulkMode) {
    setupBulkMode(bulkNumbers);
  } else {
    if (!inputAnimal.value && qsAnimal) inputAnimal.value = normalizeDigits(qsAnimal);

    inputAnimal?.addEventListener("change", runSingleGate);
    inputAnimal?.addEventListener("blur", runSingleGate);
    inputDate?.addEventListener("change", runSingleGate);

    if (inputAnimal.value && inputDate.value) {
      runSingleGate();
    }
  }
</script>
</body>
</html>
