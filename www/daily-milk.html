 <script type="module">

  <link rel="stylesheet" href="css/forms.css">

  <style>
    :root{
      --green:#0ea05a; --green-600:#0b7f47; --bg:#f7faf7; --card:#ffffff;
      --text:#0f172a; --muted:#64748b; --border:#e2e8f0;
    }
    *{box-sizing:border-box}
    html,body{max-width:100%;overflow-x:hidden}
    body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,'Segoe UI','Cairo',Tahoma,Arial,sans-serif}
    header{position:sticky;top:0;z-index:10;background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px}
    h1{margin:0;color:var(--green-600);font-size:20px;font-weight:800}
    .wrap{max-width:720px;margin:16px auto;padding:0 12px}
    form{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
    label{display:block;margin-top:12px;font-weight:700}
    input[type="text"],input[type="date"],input[type="number"],select{
      width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;background:#fff;font-size:16px;outline:none
    }
    input:focus, select:focus{border-color:var(--green-600)}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    .col{flex:1 1 180px;min-width:180px}
    .radio-group{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap}
    .radio-group label{font-weight:600}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;
      appearance:none;border:none;border-radius:12px;padding:12px 14px;cursor:pointer;font-weight:800;font-size:16px
    }
    .btn-primary{background:var(--green);color:#fff}
    .btn-ghost{background:#fff;border:1px solid var(--border);color:var(--text)}
    .submit{width:100%;margin-top:18px}
    .confirm{display:none;margin-top:14px;border:1px dashed var(--green-600);background:#eaf7f0;border-radius:12px;padding:12px}
    .confirm .title{font-weight:900;color:var(--green-600);margin-bottom:6px}
    .muted{color:var(--muted);font-size:14px}
    /* رسالة مستخدم عامة (من غير تفاصيل تقنية) */
    .msg{display:none;margin:12px 0;padding:10px;border:1px solid #fde68a;background:#fffbeb;color:#7c2d12;border-radius:10px;font-weight:700}
    /* تكبير خانة رقم الحيوان */
   #animalNumber{font-size:20px;padding:14px 16px;border-radius:12px;letter-spacing:.3px;height:56px}

    .hide{display:none !important}
    /* شريط ديباچ اختياري للمطور (يظهر مع ?debug=1) */
    #devbar{display:none;position:fixed;top:0;left:0;right:0;z-index:99;background:#111;color:#0f0;font:12px/1.4 monospace;padding:6px}
    /* ===== أزرار مُرَبِّيك القياسية ===== */
.btn-row{
  display:flex;
  gap:10px;
  margin-top:18px;
}

.save-btn{
  flex:1;
  height:48px;
  border-radius:14px;
  font-weight:800;
  font-size:16px;
  cursor:pointer;
  border:none;
  transition:.2s ease;
}

/* زر الحفظ (أخضر مربيك) */
.save-btn:not(.open-card){
  background:#0ea05a;
  color:#fff;
  box-shadow:0 2px 4px rgba(0,0,0,.08);
}
.save-btn:not(.open-card):active{
  transform:scale(.98);
}

/* زر فتح البطاقة (فاتح بحد أخضر) */
.open-card{
  background:#fff;
  color:#0b7f47;
  border:2px solid #0ea05a;
}
.open-card:active{
  transform:scale(.98);
}
#bulkBox{margin-top:12px}
#bulkTable{
  width:100%;
  table-layout:fixed;
  border-collapse:separate;
  border-spacing:0 6px;
}
#bulkTable th{
  font-size:13px;
  font-weight:800;
  color:#0f172a;
  padding:6px 4px !important;
  line-height:1.2;
}
#bulkTable td{
  vertical-align:middle;
}
#bulkTable input[type="number"]{
  width:100% !important;
  min-width:0 !important;
  padding:8px 4px !important;
  font-size:15px !important;
  text-align:center;
}
#bulkTable .bulk-total{
  font-size:13px !important;
  line-height:1.2;
}
#bulkTable .bulk-kind-cell{
  font-size:13px !important;
}
@media (max-width: 480px){
  #bulkInfo{
    font-size:13px !important;
    line-height:1.5;
  }
  #bulkTable th{
    font-size:12px;
    padding:4px 2px !important;
  }
  #bulkTable input[type="number"]{
    font-size:14px !important;
    padding:7px 2px !important;
  }
  #bulkTable .bulk-total{
    font-size:12px !important;
  }
}
  </style>
</head>

<header>

 <div style="width:100%">

<input id="animalNumber" name="animalNumber" data-field="animalNumber"

  <script type="module">
    // ===== إعداد وضع التطوير الاختياري =====

    const DEV = new URL(location.href).searchParams.get('debug') === '1' || localStorage.getItem('debug') === '1';
    const devbar = document.getElementById('devbar');
    function dev(msg){ if(DEV){ devbar.style.display='block'; devbar.textContent = String(msg); } console.error(msg); }

    // ===== أدوات عامة =====
    const $ = (id)=> document.getElementById(id);
    const msgBox = $('msg');
    function showMsg(text){ msgBox.textContent = text; msgBox.style.display = 'block'; }
    function hideMsg(){ msgBox.textContent=''; msgBox.style.display = 'none'; }
    function getQS(k){ return new URL(location.href).searchParams.get(k) || ''; }
    function firstNonEmpty(...vals){ return vals.find(v => (v ?? '').toString().trim() !== '') || ''; }
    function buildUrl(path, params){
      const u = new URL(path, location.origin);
      Object.entries(params||{}).forEach(([k,v])=>{
        if ((v ?? '').toString().trim() !== '') u.searchParams.set(k, v);
      });
      return u.toString();
    }
    function toNum(v){ const n = parseFloat(String(v).replace(',', '.')); return Number.isFinite(n) ? n : 0; }

    // ===== تفعيل/إخفاء الحلبة الثالثة حسب النوع =====
    const colS3 = $('col-s3'), s1label = $('s1label'), s2label = $('s2label'), s3label = $('s3label');
    function applyKindUI(kind){
      if (kind === 'buffalo'){
        colS3.classList.add('hide'); s1label.textContent='حلبة صباح (كجم)'; s2label.textContent='حلبة مساء (كجم)';
      } else {
        colS3.classList.remove('hide'); s1label.textContent='حلبة 1 (كجم)'; s2label.textContent='حلبة 2 (كجم)'; s3label.textContent='حلبة 3 (كجم)';
      }
    }

    // ===== تهيئة السياق =====
const inputAnimal = $('animalNumber');
const inputDate   = $('eventDate');
const qsMode = firstNonEmpty(getQS('mode'));
const qsNumbersRaw = firstNonEmpty(getQS('numbers'));

const qsAnimal = firstNonEmpty(getQS('animalId'), getQS('number'), getQS('animalNumber'),
                               localStorage.getItem('lastAnimalId'), localStorage.getItem('currentAnimalId'));
const qsDate   = firstNonEmpty(getQS('date'), getQS('eventDate'),
                               localStorage.getItem('eventDate'), localStorage.getItem('lastEventDate'));
const qsKind   = firstNonEmpty(getQS('kind'), getQS('type'), localStorage.getItem('lastKind'));

function parseBulkNumbers(raw){
  const map = {'٠':'0','١':'1','٢':'2','٣':'3','٤':'4','٥':'5','٦':'6','٧':'7','٨':'8','٩':'9','۰':'0','۱':'1','۲':'2','۳':'3','۴':'4','۵':'5','۶':'6','۷':'7','۸':'8','۹':'9'};
  return [...new Set(
    String(raw || '')
      .replace(/[٠-٩۰-۹]/g, d => map[d] || d)
      .split(/[,\n،;\s]+/)
      .map(x => x.trim())
      .filter(Boolean)
  )];
}

const bulkNumbers = parseBulkNumbers(qsNumbersRaw);
const isBulkMode = (qsMode === 'bulk' && bulkNumbers.length > 1);

if (!isBulkMode && !inputAnimal.value && qsAnimal) inputAnimal.value = qsAnimal;
if (!inputDate.value && qsDate) inputDate.value = qsDate;
   

    // ===== ربط فايرستور (من غير أي رسائل تقنية للمستخدم) =====
   let db, addDoc, collection, serverTimestamp, query, where, getDocs, limit;
    async function ensureDb(){
      try{
        const appMod = await import('/js/firebase-config.js');
        const app = appMod.app || appMod.default || appMod;
        const mod = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');
        db = appMod.db || mod.getFirestore(app.app || app);
       addDoc = mod.addDoc;
collection = mod.collection;
serverTimestamp = mod.serverTimestamp;
query = mod.query;
where = mod.where;
getDocs = mod.getDocs;
limit = mod.limit;
      } catch (e){
        // لا نعرض أي تحذير للمستخدم — فقط سجل للمطور
        dev('Firebase init failed: ' + (e?.message || e));
      }
    }
    await ensureDb();

    // ===== منطق الإرسال =====
    const form = $('milkForm');
    const confirmBox = $('confirmBox');
    const totalLine = $('totalLine');
const goAddEventBtn = $('goAddEvent');
const backDashBtn = $('backDash');
const openCowCardBtn = $('openCowCardBtn');

openCowCardBtn?.addEventListener('click', () => {
  const n = inputAnimal.value.trim();
  if (!n) return;
  location.href = `/cow-card.html?number=${encodeURIComponent(n)}`;
});
    const sysbar = document.getElementById("sysbar");
function showSaveOK(text){
  if (!sysbar) return;
  sysbar.style.display = "block";
  sysbar.style.border = "1px solid #86efac";
  sysbar.style.background = "#ecfdf5";
  sysbar.style.color = "#065f46";
  sysbar.style.padding = "12px 14px";
  sysbar.style.borderRadius = "12px";
  sysbar.style.margin = "12px 0";
  sysbar.style.fontWeight = "800";
  sysbar.textContent = text;
  try { sysbar.scrollIntoView({ behavior:"smooth", block:"start" }); } catch(_){}
}

const bulkBox = $('bulkBox');
const bulkDateBar = $('bulkDateBar');
const bulkInfo = $('bulkInfo');
const bulkRows = $('bulkRows');
const saveBulkBtn = $('saveBulkBtn');
const cancelBulkBtn = $('cancelBulkBtn');
const s1Input = $('s1');
const s2Input = $('s2');
const s3Input = $('s3');

let bulkSubmitState = null;

function markBulkRowRejected(row, reason){
  row.dataset.eligible = '0';
  row.style.opacity = '0.55';
  row.style.filter = 'grayscale(.15)';

  const kindCell = row.querySelector('.bulk-kind-cell');
  if (kindCell) {
    kindCell.textContent = reason || 'مرفوض';
    kindCell.style.color = '#b91c1c';
    kindCell.style.fontWeight = '800';
  }

  row.querySelectorAll('input').forEach(inp => {
    inp.disabled = true;
    inp.value = '';
  });

  updateBulkRowTotal(row);
}

function markBulkRowAccepted(row, species){
  row.dataset.eligible = '1';
  row.style.opacity = '1';
  row.style.filter = 'none';

  const kind = (species === 'جاموس') ? 'buffalo' : 'cow';
  applyBulkRowKind(row, kind);

  const kindCell = row.querySelector('.bulk-kind-cell');
  if (kindCell) {
    kindCell.style.color = '#0b7f47';
    kindCell.style.fontWeight = '800';
  }

  row.querySelectorAll('input').forEach(inp => {
    inp.disabled = false;
  });
}

async function validateBulkRowsOnLoad(){
  const rows = Array.from(document.querySelectorAll('.bulk-row'));
  let ok = 0;
  let bad = 0;
  const rejected = [];

  for (const row of rows) {
    const animalNumber = String(row.dataset.number || '').trim();
    const meta = await fetchAnimalMeta(animalNumber);

    if (!meta?.doc) {
      markBulkRowRejected(row, 'غير موجود');
      rejected.push(animalNumber);
      bad++;
      continue;
    }

    markBulkRowAccepted(row, meta.species || 'أبقار');
    ok++;
  }

  if (ok && !bad) {
    bulkInfo.textContent = `إدخال جماعي: ${ok} حيوان جاهز`;
    return;
  }

  if (ok && bad) {
    bulkInfo.textContent = `إدخال جماعي: ${ok} جاهز — ${bad} مرفوض`;
    showMsg(`تم استبعاد الأرقام غير المؤهلة: ${rejected.join(' - ')}`);
    return;
  }

  bulkInfo.textContent = `إدخال جماعي: لا توجد أرقام مؤهلة`;
  showMsg(`لا توجد أرقام صالحة للحفظ: ${rejected.join(' - ')}`);
}

function fillSingleFormFromBulkRow(row, eventDate){
  const animalNumber = String(row.dataset.number || '').trim();
  const kind = String(row.dataset.kind || 'cow').trim();
  const s1 = toNum(row.querySelector('.bulk-s1')?.value);
  const s2 = toNum(row.querySelector('.bulk-s2')?.value);
  const s3 = toNum(row.querySelector('.bulk-s3')?.value);

  inputAnimal.value = animalNumber;
  inputDate.value = eventDate;
  applyKindUI(kind);

  s1Input.value = s1 > 0 ? String(s1) : '';
  s2Input.value = s2 > 0 ? String(s2) : '';
  s3Input.value = (kind === 'buffalo') ? '' : (s3 > 0 ? String(s3) : '');

  return { animalNumber, kind, s1, s2, s3 };
}

function settleBulkSubmit(result){
  if (!bulkSubmitState) return false;
  clearTimeout(bulkSubmitState.timer);
  const resolve = bulkSubmitState.resolve;
  bulkSubmitState = null;
  resolve(result);
  return true;
}

function submitOneBulkRowThroughCentral(){
  return new Promise((resolve) => {
    const timer = setTimeout(() => {
      if (!bulkSubmitState) return;
      bulkSubmitState = null;
      resolve({ ok:false, reason:'timeout' });
    }, 3000);

    bulkSubmitState = { resolve, timer };
    form.requestSubmit();
  });
}
function bulkRowHtml(n){
  return `
    <tr class="bulk-row" data-number="${n}" data-kind="cow">
      <td style="padding:8px 6px;background:#fff;border:1px solid #e2e8f0;border-left:none;border-radius:0 12px 12px 0;font-weight:800;white-space:nowrap;font-size:15px">
        ${n}
      </td>

     <td class="bulk-kind-cell" style="padding:8px 6px;background:#fff;border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0;text-align:center;font-weight:700;color:#0b7f47;font-size:14px">
        ...
      </td>

      <td style="padding:6px 4px;background:#fff;border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0">
       <input type="number" class="bulk-s1" min="0" step="0.1" inputmode="decimal" placeholder="0.0" style="width:100%;min-width:0;padding:10px 6px;text-align:center" />
      </td>

     <td style="padding:6px 4px;background:#fff;border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0">
       <input type="number" class="bulk-s2" min="0" step="0.1" inputmode="decimal" placeholder="0.0" style="width:100%;min-width:0;padding:10px 6px;text-align:center" />
      </td>

      <td class="bulk-s3-cell" style="padding:8px;background:#fff;border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0">
      <input type="number" class="bulk-s3" min="0" step="0.1" inputmode="decimal" placeholder="0.0" style="width:100%;min-width:0;padding:10px 6px;text-align:center" />
      </td>

      <td style="padding:8px 6px;background:#fff;border:1px solid #e2e8f0;border-right:none;border-radius:12px 0 0 12px;text-align:center;font-size:14px">
       <div class="bulk-total" style="font-weight:900;color:#0b7f47;min-width:0;font-size:14px">0.0</div>
      </td>
    </tr>
  `;
}

function updateBulkRowTotal(row){
  if (!row) return;
 const s1 = toNum(row.querySelector('.bulk-s1')?.value);
const s2 = toNum(row.querySelector('.bulk-s2')?.value);
const s3 = toNum(row.querySelector('.bulk-s3')?.value);
const kind = String(row.dataset.kind || 'cow').trim();
const total = (kind === 'buffalo') ? (s1 + s2) : (s1 + s2 + s3);

  const totalBox = row.querySelector('.bulk-total');
  if (totalBox) totalBox.textContent = `${total.toFixed(1)} كجم`;
}
function bindBulkTotals(){
  document.querySelectorAll('.bulk-row').forEach((row) => {
    ['.bulk-s1','.bulk-s2','.bulk-s3'].forEach((sel) => {
      row.querySelector(sel)?.addEventListener('input', () => updateBulkRowTotal(row));
    });
    updateBulkRowTotal(row);
  });
}

function setupBulkMode(){
  if (!isBulkMode) return;

  bulkBox.classList.remove('hide');

  const animalCol = inputAnimal.closest('.col');
  const dateCol = inputDate.closest('.col');
  const firstRow = inputAnimal.closest('.row');
  const singleBtns = form.querySelectorAll('.btn-row')[1];

  // أخفِ عمود رقم الحيوان الفردي فقط
  if (animalCol) animalCol.classList.add('hide');

  // انقل عمود التاريخ كاملًا (اللابيل + الحقل) تحت الهيدر داخل الـ bulkBox
  if (bulkDateBar && dateCol && !bulkDateBar.contains(dateCol)) {
    bulkDateBar.style.display = 'block';
    dateCol.style.flex = '1 1 100%';
    dateCol.style.minWidth = '100%';
    dateCol.style.margin = '0';
    bulkDateBar.innerHTML = '';
    bulkDateBar.appendChild(dateCol);
  }

  // لو الصف الأول لم يبق فيه شيء ظاهر غير التاريخ المنقول، أخفه
  if (firstRow) {
    const visibleCols = Array.from(firstRow.querySelectorAll('.col'))
      .filter(el => !el.classList.contains('hide') && !bulkDateBar.contains(el));
    if (!visibleCols.length) firstRow.classList.add('hide');
  }

  bulkInfo.textContent = `إدخال جماعي: ${bulkNumbers.length} حيوان`;
  bulkRows.innerHTML = bulkNumbers.map(bulkRowHtml).join('');
  bindBulkTotals();

    async function fetchAnimalMeta(animalNumber){
  const uid = String(window.__tenant?.userId || localStorage.getItem("userId") || "").trim();
  const nStr = String(animalNumber || "").trim();
  const nNum = Number(nStr);

  if (!db || !uid || !nStr) return null;

  const tries = [
    ["userId", "animalNumber", nStr],
    ["userId", "animalNumber", nNum],
    ["ownerUid", "animalNumber", nStr],
    ["ownerUid", "animalNumber", nNum]
  ].filter(([, , v]) => !(typeof v === "number" && Number.isNaN(v)));

  for (const [ownerField, numField, numVal] of tries) {
    try {
      const qx = query(
        collection(db, "animals"),
        where(ownerField, "==", uid),
        where(numField, "==", numVal),
        limit(1)
      );
      const snap = await getDocs(qx);
      if (!snap.empty) {
        const d = snap.docs[0].data() || {};
        let sp = String(d.species || d.animalTypeAr || d.animalType || "").trim();
        if (/cow|بقر/i.test(sp)) sp = "أبقار";
        if (/buffalo|جاموس/i.test(sp)) sp = "جاموس";
        return { species: sp || "أبقار", doc: d };
      }
    } catch (_) {}
  }

  return null;
}

function applyBulkRowKind(row, kind){
  const s3Cell = row.querySelector('.bulk-s3-cell');
  const s3Input = row.querySelector('.bulk-s3');
  const kindCell = row.querySelector('.bulk-kind-cell');

  if (kind === 'buffalo') {
    if (kindCell) kindCell.textContent = 'جاموس';
    if (s3Cell) s3Cell.style.display = 'none';
    if (s3Input) {
      s3Input.value = '';
      s3Input.disabled = true;
    }
  } else {
    if (kindCell) kindCell.textContent = 'أبقار';
    if (s3Cell) s3Cell.style.display = '';
    if (s3Input) s3Input.disabled = false;
  }

  row.dataset.kind = kind;
  updateBulkRowTotal(row);
}
async function detectBulkKinds(){
  const rows = Array.from(document.querySelectorAll('.bulk-row'));
  for (const row of rows) {
    const animalNumber = String(row.dataset.number || '').trim();
    const meta = await fetchAnimalMeta(animalNumber);
    const kind = (meta?.species === 'جاموس') ? 'buffalo' : 'cow';
    applyBulkRowKind(row, kind);
  }
}

  localStorage.setItem("lastKind", payload.kind || "");
}

saveBulkBtn?.addEventListener('click', async () => {
  hideMsg();

  const eventDate = String(inputDate.value || '').trim();
  if (!eventDate) {
    showMsg('اختر تاريخ اليوم أولًا.');
    return;
  }

  const rows = Array.from(document.querySelectorAll('.bulk-row'));
  const eligibleRows = rows.filter(row => row.dataset.eligible === '1');

  if (!eligibleRows.length) {
    showMsg('لا توجد أرقام مؤهلة للحفظ.');
    return;
  }

  saveBulkBtn.disabled = true;
  cancelBulkBtn.disabled = true;

  let saved = 0;
  let failed = 0;
  const rejected = [];

  for (const row of eligibleRows) {
    const preview = fillSingleFormFromBulkRow(row, eventDate);
    const total = (preview.kind === 'buffalo')
      ? (preview.s1 + preview.s2)
      : (preview.s1 + preview.s2 + preview.s3);

    if (total <= 0) continue;

    const result = await submitOneBulkRowThroughCentral();

    if (result?.ok) {
      saved++;
    } else {
      failed++;
      rejected.push(preview.animalNumber);
    }
  }

  saveBulkBtn.disabled = false;
  cancelBulkBtn.disabled = false;

  if (saved > 0) {
    let text = `✅ تم تسجيل ${saved} سجل لبن جماعي بنجاح`;
    if (failed) text += ` — وتعذر حفظ ${failed}`;
    if (rejected.length) text += ` — أرقام مرفوضة: ${rejected.join(' - ')}`;
    showSaveOK(text);
    try { window.scrollTo({ top: 0, behavior: "smooth" }); } catch(_) {}
    return;
  }

  if (rejected.length) {
    showMsg(`تعذّر حفظ الأرقام التالية: ${rejected.join(' - ')}`);
    return;
  }

  showMsg('لم يتم حفظ أي سجل. أدخل كميات اللبن في صف واحد على الأقل.');
});
