<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>تسجيل إنتاج اللبن اليومي — مُرَبِّك</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>

  <link rel="stylesheet" href="css/forms.css">
 
</head>
<body>
  <div id="devbar"></div>
<header>
  <div class="mbk-head">
    <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">
    <div class="mbk-center">
      <div class="mbk-page-title">تسجيل إنتاج اللبن اليومي</div>
      <div class="mbk-app-name">مُرَبِّيك</div>
    </div>
    <a class="mbk-back" href="add-event.html">رجوع</a>
  </div>
</header>


  <div class="wrap">
    <!-- رسالة عامة للمستخدم عند الحاجة فقط -->
    <div id="msg" class="msg" aria-live="polite"></div>

   <form id="milkForm" autocomplete="off" novalidate>
  <div id="sysbar" class="infobar"></div>
<div id="bulkBox" class="hide compact-section">
  <div id="bulkDateBar" style="display:none;margin:0 0 12px 0"></div>
 <div id="bulkInfo" class="muted compact-note"></div>

 <div style="width:100%">
<table id="bulkTable" class="compact-table">
      <thead>
        <tr>
          <th style="text-align:right;padding:8px 10px">رقم الحيوان</th>
          <th style="text-align:center;padding:8px 10px">النوع</th>
          <th style="text-align:center;padding:8px 10px">حلبة 1</th>
          <th style="text-align:center;padding:8px 10px">حلبة 2</th>
          <th style="text-align:center;padding:8px 10px" id="bulkHeadS3">حلبة 3</th>
          <th style="text-align:center;padding:8px 10px">الإجمالي</th>
        </tr>
      </thead>
      <tbody id="bulkRows"></tbody>
    </table>
  </div>

<div class="actions-bar" id="bulkActions">
  <button type="button" id="saveBulkBtn" class="save">حفظ اللبن</button>
  <button type="button" id="cancelBulkBtn" class="ghost">لوحة التحكم</button>
</div>
</div>
      <div class="row">
        <div class="col">
          <label for="animalNumber">رقم الحيوان</label>
<input id="animalNumber" class="big-number-input" name="animalNumber" data-field="animalNumber"
       inputmode="numeric" autocomplete="off" required />

        </div>
        <div class="col">
          <label for="eventDate">تاريخ اليوم</label>
         <input id="eventDate" name="eventDate" data-field="eventDate" type="date" required />
        </div>
      </div>
           <div id="sessions">
        <div class="row">
          <div class="col">
            <label id="s1label" for="s1">حلبة 1 (كجم)</label>
            <input id="s1" data-field="milkS1" type="number" min="0" step="0.1" inputmode="decimal" placeholder="0.0" />
          </div>
          <div class="col">
            <label id="s2label" for="s2">حلبة 2 (كجم)</label>
            <input id="s2" data-field="milkS2" type="number" min="0" step="0.1" inputmode="decimal" placeholder="0.0" />
          </div>
          <div class="col" id="col-s3">
            <label id="s3label" for="s3">حلبة 3 (كجم)</label>
            <input id="s3" data-field="milkS3" type="number" min="0" step="0.1" inputmode="decimal" placeholder="0.0" />
          </div>
        </div>
      </div>
     <div id="singleTotalBox" class="muted total-line">
  الإجمالي: <span data-key="singleTotalText">—</span> كجم
</div>

<div class="actions-bar" id="singleActionsBar">
  <button type="submit" class="save">حفظ اللبن اليومي</button>

  <button type="button" id="openCowCardBtn" class="ghost">
    فتح بطاقة الحيوان
  </button>
</div>
  </form>
  </div>

<script>
  const $ = (id) => document.getElementById(id);

  const form = $("milkForm");
  const sysbar = $("sysbar");
  const msgBox = $("msg");

  const animalInput = $("animalNumber");
  const dateInput = $("eventDate");

  const sessionsBox = $("sessions");
  const singleTotalBox = $("singleTotalBox");
  const bulkBox = $("bulkBox");
  const bulkDateBar = $("bulkDateBar");
  const bulkInfo = $("bulkInfo");
  const bulkRows = $("bulkRows");

  const saveBulkBtn = $("saveBulkBtn");
  const cancelBulkBtn = $("cancelBulkBtn");
  const openCowCardBtn = $("openCowCardBtn");

  const singleSaveBtn = form?.querySelector('button[type="submit"]');
  const singleActions = $("singleActionsBar");

  const inputSlots = {
    milkS1: { input: $("s1"), label: $("s1label"), wrap: $("s1")?.closest(".col") },
    milkS2: { input: $("s2"), label: $("s2label"), wrap: $("s2")?.closest(".col") },
    milkS3: { input: $("s3"), label: $("s3label"), wrap: $("s3")?.closest(".col") }
  };

  let currentMode = "single";

  function qs(name) {
    return new URL(location.href).searchParams.get(name) || "";
  }

async function postServer(path, payload) {
  const res = await fetch(path, {
    method: "POST",
    credentials: "same-origin",
    cache: "no-store",
    headers: {
      "Content-Type": "application/json",
      "Accept": "application/json"
    },
    body: JSON.stringify(payload || {})
  });

  const data = await res.json().catch(() => ({
    ok: false,
    ui: {
      status: "error",
      message: "تعذّر قراءة رد السيرفر."
    }
  }));

  if (res.status === 401 || data?.error === "auth_required") {
    return {
      ok: false,
      ui: {
        status: "error",
        message: data?.message || "سجّل الدخول أولًا."
      }
    };
  }

  return data;
}
let previewTimer = null;

async function runPreview() {
  clearTimeout(previewTimer);

  previewTimer = setTimeout(async () => {
    const data = await postServer("/api/daily-milk/preview", savePayload());
    const ui = data.ui || {};
    const rows = Array.isArray(ui.rows) ? ui.rows : [];

    if (currentMode === "bulk") {
      rows.forEach(r => {
        const rowEl = document.querySelector(`[data-mbk-row="daily-milk"][data-number="${r.animalNumber}"]`);
        const totalEl = rowEl?.querySelector("[data-key='totalText']");
        if (totalEl) totalEl.textContent = r.totalText || "—";
      });
      return;
    }

    const totalEl = document.querySelector("[data-key='singleTotalText']");
    if (totalEl) {
      totalEl.textContent = ui.single?.totalText || rows[0]?.totalText || "—";
    }
  }, 250);
}
  function showBar(ui) {
    const status = String(ui?.status || "info");
    const cls =
      status === "success" ? "success" :
      status === "error" ? "error" :
      status === "warning" ? "warning" :
      "info";

    if (!sysbar) return;
    sysbar.className = `infobar mbk-infobar show ${cls}`;
    sysbar.style.display = "block";
    sysbar.textContent = String(ui?.message || "");
  }

  function showMsg(text) {
    if (!msgBox) return;
    msgBox.textContent = String(text || "");
    msgBox.style.display = text ? "block" : "none";
  }

  function applyInputSlot(slot, item) {
    if (!slot) return;

    if (slot.label) slot.label.textContent = item?.label || "";
    if (slot.input) {
      slot.input.disabled = !!item?.disabled;
      if (item?.visible === false) slot.input.value = "";
    }
    if (slot.wrap) {
      slot.wrap.classList.toggle("hide", item?.visible === false);
    }
  }

  function renderSingle(ui) {
    currentMode = "single";

    bulkBox?.classList.add("hide");
    sessionsBox?.classList.remove("hide");
    singleTotalBox?.classList.remove("hide");
    singleActions?.classList.remove("hide");
    openCowCardBtn?.classList.remove("hide");

    Object.values(inputSlots).forEach(slot => {
      slot.wrap?.classList.add("hide");
      if (slot.input) {
        slot.input.disabled = true;
        slot.input.value = "";
      }
    });

    const inputs = Array.isArray(ui?.single?.inputs) ? ui.single.inputs : [];

    inputs.forEach(item => {
      applyInputSlot(inputSlots[item?.key], item);
    });

    if (singleSaveBtn) singleSaveBtn.disabled = ui?.canSave !== true;
  }

  function renderBulk(ui) {
    currentMode = "bulk";

    bulkBox?.classList.remove("hide");
    sessionsBox?.classList.add("hide");
    singleTotalBox?.classList.add("hide");
    singleActions?.classList.add("hide");
    openCowCardBtn?.classList.add("hide");

    const animalCol = animalInput?.closest(".col");
    const dateCol = dateInput?.closest(".col");
    const firstRow = animalInput?.closest(".row");

    animalCol?.classList.add("hide");

    if (bulkDateBar && dateCol && !bulkDateBar.contains(dateCol)) {
      bulkDateBar.style.display = "block";
      bulkDateBar.innerHTML = "";
      dateCol.style.flex = "1 1 100%";
      dateCol.style.minWidth = "100%";
      bulkDateBar.appendChild(dateCol);
    }

    if (firstRow) {
      const hasVisibleCol = Array.from(firstRow.querySelectorAll(".col"))
        .some(el => !el.classList.contains("hide") && !bulkDateBar?.contains(el));
      firstRow.classList.toggle("hide", !hasVisibleCol);
    }

    const rows = Array.isArray(ui?.bulk?.rows) ? ui.bulk.rows : [];

    if (bulkInfo) {
      bulkInfo.textContent = ui?.message || "";
    }

    if (saveBulkBtn) {
      saveBulkBtn.disabled = ui?.canSave !== true;
    }

    if (!bulkRows) return;

    bulkRows.innerHTML = rows.map(row => {
      const inputs = Array.isArray(row.inputs) ? row.inputs : [];
      const inputByKey = Object.fromEntries(inputs.map(x => [x.key, x]));

      const inputCell = (key) => {
        const spec = inputByKey[key] || {};
        const hidden = spec.visible === false ? "display:none;" : "";
        const disabled = spec.disabled || row.canEdit === false ? "disabled" : "";

        return `
          <td style="padding:6px 4px;background:#fff;border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0;${hidden}">
            <input data-key="${key}" type="number" min="0" step="0.1" inputmode="decimal"
              placeholder="0.0" ${disabled}
              style="width:100%;min-width:0;padding:10px 6px;text-align:center" />
          </td>
        `;
      };

      return `
        <tr data-mbk-row="daily-milk" data-number="${row.animalNumber || ""}" data-can-save="${row.canSave ? "1" : "0"}" style="${row.canSave ? "" : "opacity:.55;filter:grayscale(.15)"}">
          <td style="padding:8px 6px;background:#fff;border:1px solid #e2e8f0;border-left:none;border-radius:0 12px 12px 0;font-weight:800;white-space:nowrap;font-size:15px">
            ${row.animalNumber || ""}
          </td>
          <td style="padding:8px 6px;background:#fff;border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0;text-align:center;font-weight:800;color:${row.canSave ? "#0b7f47" : "#b91c1c"};font-size:13px">
            ${row.canSave ? (row.speciesLabel || "") : (row.reason || "مرفوض")}
          </td>
          ${inputCell("milkS1")}
          ${inputCell("milkS2")}
          ${inputCell("milkS3")}
          <td style="padding:8px 6px;background:#fff;border:1px solid #e2e8f0;border-right:none;border-radius:12px 0 0 12px;text-align:center;font-size:14px">
            <div data-key="totalText" style="font-weight:900;color:#0b7f47;min-width:0;font-size:14px">—</div>
          </td>
        </tr>
      `;
    }).join("");
  }

  function renderServerUi(ui) {
    showBar(ui || {});

    if (ui?.mode === "bulk") {
      renderBulk(ui);
      return;
    }

    renderSingle(ui || {});
  }

  function gatePayload() {
    return {
      mode: qs("mode"),
      animalNumbers: qs("numbers"),
      animalNumber: animalInput?.value || "",
      eventDate: dateInput?.value || ""
    };
  }

  function savePayload() {
    if (currentMode === "bulk") {
      return {
        eventDate: dateInput?.value || "",
        rows: Array.from(document.querySelectorAll("[data-mbk-row='daily-milk']"))
          .filter(row => row.dataset.canSave === "1")
          .map(row => ({
            animalNumber: row.dataset.number || "",
            milkS1: row.querySelector("[data-key='milkS1']")?.value || "",
            milkS2: row.querySelector("[data-key='milkS2']")?.value || "",
            milkS3: row.querySelector("[data-key='milkS3']")?.value || ""
          }))
      };
    }

    return {
      animalNumber: animalInput?.value || "",
      eventDate: dateInput?.value || "",
      milkS1: inputSlots.milkS1.input?.value || "",
      milkS2: inputSlots.milkS2.input?.value || "",
      milkS3: inputSlots.milkS3.input?.value || ""
    };
  }

  async function runGate() {
    const payload = gatePayload();

    if (!payload.eventDate || (!payload.animalNumber && !payload.animalNumbers)) return;

    showMsg("");
    showBar({ status: "info", message: "جارِ التحقق…" });

    const data = await postServer("/api/daily-milk/gate", payload);
    renderServerUi(data.ui || {
      status: data.ok ? "success" : "error",
      message: data.message || "تم استلام رد السيرفر.",
      canSave: data.allowed === true
    });
  }

  async function runSave() {
    showMsg("");
    showBar({ status: "info", message: "جارِ الحفظ…" });

    const data = await postServer("/api/daily-milk/save", savePayload());
    const ui = data.ui || {
      status: data.ok ? "success" : "error",
      message: data.message || "تم استلام رد السيرفر.",
      canRedirect: !!data.redirectUrl,
      redirectUrl: data.redirectUrl || ""
    };

    renderServerUi(ui);

    if (ui.canRedirect && ui.redirectUrl) {
      setTimeout(() => {
        location.href = ui.redirectUrl;
      }, 900);
    }
  }

  form?.addEventListener("submit", async (e) => {
    e.preventDefault();
    try {
      await runSave();
    } catch (_) {
      showBar({ status: "error", message: "تعذّر الاتصال بالسيرفر أثناء الحفظ." });
    }
  });

  saveBulkBtn?.addEventListener("click", async () => {
    try {
      await runSave();
    } catch (_) {
      showBar({ status: "error", message: "تعذّر الاتصال بالسيرفر أثناء الحفظ." });
    }
  });

  cancelBulkBtn?.addEventListener("click", () => {
    location.href = "/dashboard.html";
  });

  openCowCardBtn?.addEventListener("click", () => {
    const n = animalInput?.value || "";
    if (!n) return;
    location.href = `/cow-card.html?number=${encodeURIComponent(n)}`;
  });

  animalInput?.addEventListener("change", runGate);
  animalInput?.addEventListener("blur", runGate);
  dateInput?.addEventListener("change", runGate);
  ["milkS1", "milkS2", "milkS3"].forEach(key => {
  inputSlots[key]?.input?.addEventListener("input", runPreview);
});

document.addEventListener("input", (e) => {
  if (e.target?.matches?.("[data-mbk-row='daily-milk'] input[data-key]")) {
    runPreview();
  }
});

  const initialDate = qs("date") || qs("eventDate") || "";
  const initialNumber = qs("animalNumber") || qs("number") || qs("animalId") || "";

  if (initialDate && dateInput) dateInput.value = initialDate;
  if (initialNumber && animalInput) animalInput.value = initialNumber;

  if ((qs("numbers") || initialNumber) && dateInput?.value) {
    runGate();
  }
</script>
</body>
</html>
