<!DOCTYPE html>
<html lang="ar" dir="rtl" data-page="lameness">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/forms.css">
 
  <title>تسجيل العرج</title>
 
</head>
<body>
  <header>
  <div class="mbk-head">
    <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">
    <div class="mbk-center">
      <div class="mbk-page-title">تسجيل حالة العرج</div>
      <div class="mbk-app-name">مُرَبِّيك</div>
    </div>
    <a class="mbk-back" href="add-event.html">رجوع</a>
  </div>
</header>

  <div id="msg" class="infobar" role="status" aria-live="polite"></div>

  <main>
    <section class="card">
      <form id="lamenessForm" class="grid">

        <div class="row">
          <div>
            <label for="animalId">رقم الحيوان</label>
            <input type="text" id="animalId" name="animalId">
          </div>

          <div>
            <label for="lamenessDate">تاريخ العرج</label>
            <input type="date" id="lamenessDate" name="lamenessDate">
          </div>
        </div>

        <fieldset>
          <legend>الحافر المصاب</legend>
          <div class="radio-group">
  <label><input type="checkbox" name="affectedLegs" value="أمام يمين"> أمام يمين</label>
  <label><input type="checkbox" name="affectedLegs" value="أمام شمال"> أمام شمال</label>
  <label><input type="checkbox" name="affectedLegs" value="خلف يمين"> خلف يمين</label>
  <label><input type="checkbox" name="affectedLegs" value="خلف شمال"> خلف شمال</label>
</div>
        </fieldset>

        <div class="row">
          <div>
            <label for="lamenessType">نوع العرج</label>
            <select id="lamenessType" name="lamenessType">
              <option value="">اختر</option>
<option value="مرض الخط الأبيض">مرض الخط الأبيض</option>
<option value="قرحة النعل">قرحة النعل</option>
<option value="كدمة أو نزيف في النعل">كدمة أو نزيف في النعل</option>
<option value="خراج الحافر">خراج الحافر</option>
<option value="التهاب جلد الكعب / مورتيلاّرو">التهاب جلد الكعب / مورتيلاّرو</option>
<option value="تعفن القدم / التهاب بين الأظلاف">تعفن القدم / التهاب بين الأظلاف</option>
<option value="تآكل الكعب">تآكل الكعب</option>
<option value="تشقق جدار الحافر">تشقق جدار الحافر</option>
<option value="جرح نافذ أو جسم غريب">جرح نافذ أو جسم غريب</option>
<option value="التهاب الصفائح / خلل تكوين القرن">التهاب الصفائح / خلل تكوين القرن</option>
<option value="عرج غير محدد يحتاج فحص الحافر">عرج غير محدد يحتاج فحص الحافر</option>
            </select>
          </div>

          <div>
            <label for="vet">اسم الطبيب البيطري المعالج</label>
            <input type="text" id="vet" name="vet" placeholder="اختياري">
          </div>
        </div>

      </form>
    </section>
  </main>

 <div class="actions-bar">
  <button type="submit" form="lamenessForm" id="saveBtn" class="save">تسجيل الحالة</button>
</div>


<script>
  const form = document.getElementById('lamenessForm');
  const msg  = document.getElementById('msg');
  const btn  = document.getElementById('saveBtn');



  function todayLocal(){
    const d = new Date();
    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    return d.toISOString().slice(0,10);
  }

   function showMsg(text, ok){
    if (!msg) return;

    msg.textContent = text || "";
    msg.className = text
      ? `infobar mbk-infobar show ${ok ? "success" : "error"}`
      : "infobar";

    msg.style.display = text ? "block" : "none";

    try { msg.scrollIntoView({ behavior:"smooth", block:"center" }); } catch {}
  }

  function collectPayload(){
   const affectedLegs = Array.from(
  document.querySelectorAll('input[name="affectedLegs"]:checked')
).map(el => el.value);

return {
  animalNumber: document.getElementById("animalId").value.trim(),
  eventDate: document.getElementById("lamenessDate").value,
  affectedLegs,
  affectedLeg: affectedLegs.join("، "),
  lamenessType: document.getElementById("lamenessType").value,
  vet: (document.getElementById("vet").value || "").trim()
};
  }

  async function apiPost(url, payload){
    const r = await fetch(url, {
      method: "POST",
      credentials: "same-origin",
      cache: "no-store",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json"
      },
      body: JSON.stringify(payload || {})
    });

    let data = {};
    try { data = await r.json(); } catch {}

    if (r.status === 401 || data?.error === "auth_required") {
      throw new Error(data.message || "❌ سجّل الدخول أولًا.");
    }

    if (!r.ok || data.ok === false) {
      throw new Error(data.message || "تعذّر تنفيذ الطلب.");
    }

    return data;
  }

  function hydrate(){
    const qs = new URLSearchParams(location.search);
    const id = qs.get("animalId") || qs.get("number") || qs.get("animalNumber") || "";
    const dt = qs.get("date") || qs.get("eventDate") || todayLocal();

    document.getElementById("animalId").value = id;
    document.getElementById("lamenessDate").value = dt;

    try { history.replaceState(null, "", location.pathname); } catch {}
  }

  async function runGate(){
    const payload = collectPayload();

    if (!payload.animalNumber || !payload.eventDate) return;

    try {
      const data = await apiPost("/api/lameness/gate", payload);
      if (data && data.message && !data.silent) {
        showMsg(data.message, !!data.allowed);
      }
    } catch (err) {
      showMsg(err.message || "تعذّر التحقق من الحيوان.", false);
    }
  }

  hydrate();

  document.getElementById("animalId").addEventListener("change", runGate);
  document.getElementById("lamenessDate").addEventListener("change", runGate);

  form.addEventListener("submit", async (e)=>{
    e.preventDefault();

    showMsg("", false);
    btn.disabled = true;

    try {
      const data = await apiPost("/api/lameness/save", collectPayload());

      showMsg(data.message || "✅ تم حفظ العرج بنجاح", true);

      setTimeout(()=>{
        location.href = data.redirectUrl || "event-list.html";
      }, 1200);

    } catch (err) {
      showMsg(err.message || "❌ تعذّر حفظ العرج الآن.", false);
      btn.disabled = false;
    }
  });

  runGate();
</script>
</body>
</html>
