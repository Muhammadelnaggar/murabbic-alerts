<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/forms.css">
  <script type="module" src="js/forms-init.js"></script>
  <title>تسجيل العرج</title>
  <style>
    body {
      background-color: #fff9db;
      direction: rtl;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
      margin: 0;
    }
    h2 {
      color: #2e7d32;
      text-align: center;
      margin-bottom: 25px;
      font-size: 24px;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-width: 560px;
      margin: 0 auto;
      background: #fffef4;
      padding: 16px;
      border: 1px solid #ffe08a;
      border-radius: 10px;
    }
    label {
      font-weight: bold;
      font-size: 18px;
    }
    input, select, button {
      padding: 14px;
      font-size: 18px;
      border-radius: 8px;
      border: 1px solid #2e7d32; /* ✅ تصحيح كود اللون */
      box-sizing: border-box;
      background: #fff;
    }
    .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 17px;
      background-color: #e8f5e9;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #2e7d32;
      cursor: pointer;
    }
    button[type="submit"] {
      background-color: #2e7d32;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }
    /* رسالة داخلية */
    #msg {
      display: none;
      text-align: center;
      font-weight: bold;
      margin: 10px auto 0;
      padding: 10px;
      border-radius: 8px;
      max-width: 560px;
    }
    #msg.success { background:#d1e7dd; color:#0f5132; border:1px solid #a3cfbb; }
    #msg.error   { background:#f8d7da; color:#842029; border:1px solid #f1aeb5; }
  </style>
</head>
<body>
  <h2>تسجيل حالة العرج</h2>

  <div id="msg"></div>

  <form id="lamenessForm">
    <label for="animalId">رقم الحيوان</label>
    <input type="text" id="animalId" name="animalId" required>

    <label for="lamenessDate">تاريخ العرج</label>
    <input type="date" id="lamenessDate" name="lamenessDate" required>

    <label>الحافر المصاب</label>
    <div class="radio-group">
      <label><input type="radio" name="affectedLeg" value="أمام يمين" required> أمام يمين</label>
      <label><input type="radio" name="affectedLeg" value="أمام شمال"> أمام شمال</label>
      <label><input type="radio" name="affectedLeg" value="خلف يمين"> خلف يمين</label>
      <label><input type="radio" name="affectedLeg" value="خلف شمال"> خلف شمال</label>
    </div>

    <label for="lamenessType">نوع العرج</label>
    <select id="lamenessType" name="lamenessType" required>
      <option value="">اختر</option>
      <option value="قرحة">قرحة</option>
      <option value="تعفن الحافر">تعفن الحافر</option>
      <option value="خراج الحافر">خراج الحافر</option>
      <option value="جسم معدني">جسم معدني</option>
      <option value="التهاب ما بين الأظلاف">التهاب ما بين الأظلاف</option>
      <option value="التهاب الصفائح الحساسة">التهاب الصفائح الحساسة</option>
    </select>

    <label for="vet">اسم الطبيب البيطري المعالج</label>
    <input type="text" id="vet" name="vet" placeholder="اختياري">

    <button type="submit" id="saveBtn">تسجيل الحالة</button>
  </form>

  <!-- تتبّع بسيط -->
  <script>
    (function () {
      window.dataLayer = window.dataLayer || [];
      window.__sentEvents = window.__sentEvents || new Set();
      window.t = window.t || {
        event: function (name, props) {
          try {
            props = props || {};
            if (name === 'page_view') {
              var key = 'pv:' + (props.page || location.pathname);
              if (window.__sentEvents.has(key)) return;
              window.__sentEvents.add(key);
            }
            dataLayer.push({ event: name, ts: Date.now(), ...props });
          } catch (e) {}
        }
      };
      t.event('page_view', { page: location.pathname, feature: 'lameness' });
    })();
  </script>

  <!-- اختياري -->
  <script src="/js/app-core.js" defer></script>

<script>
  const form = document.getElementById('lamenessForm');
  const msg  = document.getElementById('msg');
  const btn  = document.getElementById('saveBtn');

  function getUid(){
    return localStorage.getItem("uid") ||
           localStorage.getItem("userId") ||
           localStorage.getItem("murabbik_uid") ||
           "";
  }

  function todayLocal(){
    const d = new Date();
    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    return d.toISOString().slice(0,10);
  }

  function showMsg(text, ok){
    msg.textContent = text || "";
    msg.className = ok ? "success" : "error";
    msg.style.display = text ? "block" : "none";
    try { msg.scrollIntoView({ behavior:"smooth", block:"center" }); } catch {}
  }

  function collectPayload(){
    const affectedLegEl = document.querySelector('input[name="affectedLeg"]:checked');

    return {
      animalNumber: document.getElementById("animalId").value.trim(),
      eventDate: document.getElementById("lamenessDate").value,
      affectedLeg: affectedLegEl ? affectedLegEl.value : "",
      lamenessType: document.getElementById("lamenessType").value,
      vet: (document.getElementById("vet").value || "").trim()
    };
  }

  async function apiPost(url, payload){
    const uid = getUid();

    const r = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-User-Id": uid
      },
      body: JSON.stringify(payload || {})
    });

    let data = {};
    try { data = await r.json(); } catch {}

    if (!r.ok || data.ok === false) {
      throw new Error(data.message || "تعذّر تنفيذ الطلب.");
    }

    return data;
  }

  function hydrate(){
    const qs = new URLSearchParams(location.search);
    const id = qs.get("animalId") || qs.get("number") || qs.get("animalNumber") || "";
    const dt = qs.get("date") || qs.get("eventDate") || todayLocal();

    document.getElementById("animalId").value = id;
    document.getElementById("lamenessDate").value = dt;

    try { history.replaceState(null, "", location.pathname); } catch {}
  }

  async function runGate(){
    const payload = collectPayload();

    if (!payload.animalNumber || !payload.eventDate) return;

    try {
      const data = await apiPost("/api/lameness/gate", payload);
      if (data && data.message && !data.silent) {
        showMsg(data.message, !!data.allowed);
      }
    } catch (err) {
      showMsg(err.message || "تعذّر التحقق من الحيوان.", false);
    }
  }

  hydrate();

  document.getElementById("animalId").addEventListener("change", runGate);
  document.getElementById("lamenessDate").addEventListener("change", runGate);

  form.addEventListener("submit", async (e)=>{
    e.preventDefault();

    showMsg("", false);
    btn.disabled = true;

    try {
      const data = await apiPost("/api/lameness/save", collectPayload());

      showMsg(data.message || "✅ تم حفظ العرج بنجاح", true);

      setTimeout(()=>{
        location.href = data.redirectUrl || "event-list.html";
      }, 1200);

    } catch (err) {
      showMsg(err.message || "❌ تعذّر حفظ العرج الآن.", false);
      btn.disabled = false;
    }
  });

  runGate();
</script>
</body>
</html>
