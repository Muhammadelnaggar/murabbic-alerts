<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>استيراد اللبن اليومي — مُرَبِّيك</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>

  <link rel="stylesheet" href="css/forms.css">
  
 
</head>
<body>
  <header>
    <div class="mbk-head">
      <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">
      <div class="mbk-center">
        <div class="mbk-page-title">استيراد اللبن اليومي</div>
        <div class="mbk-app-name">مُرَبِّيك</div>
      </div>
      <a class="mbk-back" href="add-event.html">رجوع</a>
    </div>
  </header>

  <div class="wrap">
    <div class="card">
      <div id="sysbar" class="infobar"></div>

     <h1 class="mbk-title">استيراد اللبن اليومي</h1>
           <div class="mbk-sub">استيراد اللبن من المحلب — يمكنك لصق بيانات المحلب أو تحميل ملفه</div>

       <div class="row">
  <div>
          <label for="eventDate">تاريخ اليوم</label>
          <input id="eventDate" type="date" />
        </div>
      </div>

    <div id="batchPane">
        <label for="batchInput">ألصق بيانات المحلب هنا</label>
        <textarea id="batchInput" placeholder="101, 8, 7, 6
102, 10, 9, 8
103, 6, 5"></textarea>
<div class="form-hint">
  ارفع ملف المحلب كما هو، ثم راجع المعاينة قبل الحفظ.
</div>
      </div>

     <input id="fileInput" type="file" accept=".csv,.txt,.xlsx,.xls,text/csv,text/plain,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" class="hide" />
<div class="actions-bar inline">
  <button type="button" id="loadFileBtn" class="ghost">تحميل ملف المحلب</button>
  <button type="button" id="previewBtn" class="save">معاينة</button>
  <button type="button" id="clearBtn" class="ghost">مسح</button>
</div>
    
      <div class="kpi-grid" id="kpiBar">
       <div class="kpi-box">
          <div class="kpi-value" id="kpiRows">0</div>
          <div class="kpi-label">صفوف مقروءة</div>
        </div>
        <div class="kpi-box">
          <div class="kpi-value" id="kpiValid">0</div>
          <div class="kpi-label">صحيحة</div>
        </div>
        <div class="kpi-box">
          <div class="kpi-value" id="kpiInvalid">0</div>
          <div class="kpi-label">مرفوضة</div>
        </div>
        <div class="kpi-box">
          <div class="kpi-value" id="kpiMilk">0.0</div>
          <div class="kpi-label">إجمالي اللبن</div>
        </div>
      </div>

    <div class="preview-scroll hide" id="previewWrap">
  <table class="compact-table">
          <thead>
            <tr>
              <th>رقم الحيوان</th>
              <th>النوع</th>
              <th>حلبة 1</th>
              <th>حلبة 2</th>
              <th>حلبة 3</th>
              <th>الإجمالي</th>
              <th>الحالة</th>
            </tr>
          </thead>
          <tbody id="previewRows"></tbody>
        </table>
      </div>

     <div class="actions-bar">
  <button type="button" id="saveBtn" class="save">حفظ بيانات المحلب</button>
</div>
    </div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);

  const eventDate = $("eventDate");
  const batchInput = $("batchInput");
  const fileInput = $("fileInput");
  const loadFileBtn = $("loadFileBtn");
  const previewBtn = $("previewBtn");
  const clearBtn = $("clearBtn");
  const saveBtn = $("saveBtn");
  const previewWrap = $("previewWrap");
  const previewRows = $("previewRows");
  const sysbar = $("sysbar");

  const kpiRows = $("kpiRows");
  const kpiValid = $("kpiValid");
  const kpiInvalid = $("kpiInvalid");
  const kpiMilk = $("kpiMilk");

  let lastPreviewRows = [];

  function todayISO() {
    const d = new Date();
    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    return d.toISOString().slice(0, 10);
  }

  function showBar(status, text) {
    const cls =
      status === "success" || status === "ok" ? "success" :
      status === "error" || status === "err" ? "error" :
      status === "warning" || status === "warn" ? "warning" :
      "info";

    sysbar.className = `infobar mbk-infobar show ${cls}`;
    sysbar.style.display = "block";
    sysbar.textContent = String(text || "");
    try { sysbar.scrollIntoView({ behavior: "smooth", block: "start" }); } catch (_) {}
  }

  function hideBar() {
    sysbar.className = "infobar";
    sysbar.textContent = "";
    sysbar.style.display = "none";
  }

 async function postJson(path, payload) {
  const res = await fetch(path, {
    method: "POST",
    credentials: "same-origin",
    cache: "no-store",
    headers: {
      "Content-Type": "application/json",
      "Accept": "application/json"
    },
    body: JSON.stringify(payload || {})
  });

  const data = await res.json().catch(() => ({
    ok: false,
    ui: {
      status: "error",
      message: "تعذّر قراءة رد السيرفر."
    }
  }));

  if (res.status === 401 || data?.error === "auth_required") {
    return {
      ok: false,
      ui: {
        status: "error",
        message: data?.message || "سجّل الدخول أولًا."
      }
    };
  }

  return data;
}
 async function postForm(path, formData) {
  const res = await fetch(path, {
    method: "POST",
    credentials: "same-origin",
    cache: "no-store",
    headers: {
      "Accept": "application/json"
    },
    body: formData
  });

  const data = await res.json().catch(() => ({
    ok: false,
    ui: {
      status: "error",
      message: "تعذّر قراءة رد السيرفر."
    }
  }));

  if (res.status === 401 || data?.error === "auth_required") {
    return {
      ok: false,
      ui: {
        status: "error",
        message: data?.message || "سجّل الدخول أولًا."
      }
    };
  }

  return data;
}
  function renderUi(ui) {
    const rows = Array.isArray(ui?.rows) ? ui.rows : [];
    lastPreviewRows = rows;

    const kpi = ui?.kpi || {};
    kpiRows.textContent = String(kpi.totalRows ?? rows.length ?? 0);
    kpiValid.textContent = String(kpi.validRows ?? rows.filter(r => r.valid === true).length);
    kpiInvalid.textContent = String(kpi.invalidRows ?? rows.filter(r => r.valid !== true).length);
    kpiMilk.textContent = String(kpi.totalMilk ?? "0.0");

    previewRows.innerHTML = rows.map(row => {
      const ok = row.valid === true;
      const cls = ok ? "status-ok" : "status-bad";
      const statusText = ok ? "جاهز" : (row.reason || "مرفوض");

      return `
        <tr>
          <td class="num">${row.animalNumber || "—"}</td>
          <td>${row.species || "—"}</td>
          <td>${Number(row.milkS1 || 0) ? Number(row.milkS1 || 0).toFixed(1) : "—"}</td>
          <td>${Number(row.milkS2 || 0) ? Number(row.milkS2 || 0).toFixed(1) : "—"}</td>
          <td>${Number(row.milkS3 || 0) ? Number(row.milkS3 || 0).toFixed(1) : "—"}</td>
          <td>${row.totalText || (Number(row.milkKg || 0) ? Number(row.milkKg || 0).toFixed(1) : "—")}</td>
          <td class="${cls}">${statusText}</td>
        </tr>
      `;
    }).join("");

    previewWrap.classList.toggle("hide", rows.length === 0);
    saveBtn.disabled = ui?.canSave !== true;

    if (ui?.message) {
      showBar(ui.status || "info", ui.message);
    }
  }

  async function makePreview() {
    hideBar();

    const date = String(eventDate.value || "").trim();
    if (!date) {
      showBar("warning", "اختر تاريخ اليوم أولًا.");
      return;
    }

    const file = fileInput.files?.[0] || null;
    const rawText = String(batchInput.value || "").trim();

    if (!file && !rawText) {
      showBar("warning", "ألصق بيانات المحلب أو حمّل ملف المحلب أولًا.");
      return;
    }

    previewBtn.disabled = true;
    saveBtn.disabled = true;
    clearBtn.disabled = true;

    try {
      let data;

      if (file) {
        const fd = new FormData();
        fd.append("eventDate", date);
        fd.append("file", file);
        data = await postForm("/api/daily-milk/import/preview", fd);
      } else {
        data = await postJson("/api/daily-milk/import/preview", {
          eventDate: date,
          rawText
        });
      }

      renderUi(data.ui || {
        status: data.ok ? "success" : "error",
        message: data.message || "تم استلام رد السيرفر.",
        rows: data.rows || []
      });

    } catch (_) {
      showBar("error", "تعذّرت معاينة بيانات المحلب الآن.");
    } finally {
      previewBtn.disabled = false;
      clearBtn.disabled = false;
    }
  }

  async function saveAll() {
    hideBar();

    const date = String(eventDate.value || "").trim();
    if (!date) {
      showBar("warning", "اختر تاريخ اليوم أولًا.");
      return;
    }

    const rows = lastPreviewRows.filter(r => r.valid === true);
    if (!rows.length) {
      showBar("warning", "لا توجد صفوف صحيحة جاهزة للحفظ.");
      return;
    }

    saveBtn.disabled = true;
    previewBtn.disabled = true;
    clearBtn.disabled = true;

    try {
      const data = await postJson("/api/daily-milk/import/save", {
        eventDate: date,
        rows
      });

      renderUi(data.ui || {
        status: data.ok ? "success" : "error",
        message: data.message || "تم استلام رد السيرفر.",
        rows: []
      });

    } catch (_) {
      showBar("error", "تعذّر حفظ بيانات المحلب الآن.");
    } finally {
      previewBtn.disabled = false;
      clearBtn.disabled = false;
      saveBtn.disabled = lastPreviewRows.filter(r => r.valid === true).length === 0;
    }
  }

  function clearAll() {
    hideBar();
    batchInput.value = "";
    fileInput.value = "";
    lastPreviewRows = [];
    renderUi({
      rows: [],
      kpi: {
        totalRows: 0,
        validRows: 0,
        invalidRows: 0,
        totalMilk: "0.0"
      },
      canSave: false
    });
  }

  loadFileBtn.addEventListener("click", () => {
    fileInput.click();
  });

  fileInput.addEventListener("change", async () => {
    const f = fileInput.files?.[0];
    if (!f) return;

    const date = String(eventDate.value || "").trim();
    if (!date) {
      showBar("warning", "تم اختيار الملف. اختر تاريخ اليوم ثم اضغط معاينة.");
      return;
    }

    await makePreview();
  });

  previewBtn.addEventListener("click", makePreview);
  saveBtn.addEventListener("click", saveAll);
  clearBtn.addEventListener("click", clearAll);

  const qs = new URLSearchParams(location.search);
  const rawDate = String(qs.get("eventDate") || qs.get("date") || "").trim();
  eventDate.value = /^\d{4}-\d{2}-\d{2}$/.test(rawDate) ? rawDate : todayISO();

  clearAll();
</script>
</body>
</html>
