<!DOCTYPE html>
<html lang="ar" dir="rtl" data-page="abortion">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="stylesheet" href="css/forms.css">
 
 

  <title>تسجيل إجهاض — مُرَبِّيك</title>

 
</head>

<body>
  <!-- تتبّع أساسي -->
  <script>window.dataLayer = window.dataLayer || [];</script>

  <header>
    <div class="mbk-head">
      <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">
      <div class="mbk-center">
        <div class="mbk-page-title">تسجيل إجهاض</div>
        <div class="mbk-app-name">مُرَبِّيك</div>
      </div>
      <a class="mbk-back" href="add-event.html">رجوع</a>
    </div>
  </header>

  <!-- ✅ sysbar تحت العنوان مباشرة -->
  <div id="sysbar" class="infobar" role="status" aria-live="polite"></div>

  <main>
   <form id="abortion-form" class="card grid" autocomplete="off" novalidate data-event="إجهاض">

      <!-- قياسي -->
      <input type="hidden" data-field="animalId" id="animalId">
      <input type="hidden" data-field="species" id="species">

      <div class="row">
        <div>
          <label>رقم الحيوان</label>
          <input id="animalNumber" data-field="animalNumber" inputmode="numeric"
                 placeholder="مثال: 1023" required />
        </div>
        <div>
          <label>تاريخ الإجهاض</label>
          <input id="eventDate" data-field="eventDate" type="date" required />
        </div>
      </div>

      <div class="row">
        <div>
          <label>آخر تلقيح (من الوثيقة)</label>
          <input id="lastInseminationDate" type="date" readonly />
        </div>
        <div>
          <label>عمر الإجهاض (بالشهور)</label>
          <input id="abortionAgeMonths" data-field="abortionAgeMonths" type="number" step="0.1" inputmode="decimal" readonly />
        </div>
      </div>

      <div class="row">
        <div>
          <label>السبب المحتمل</label>
          <input id="probableCause" data-field="probableCause" readonly />
        </div>
        <div>
          <label>ملاحظات</label>
          <textarea id="notes" data-field="notes" placeholder="اختياري"></textarea>
        </div>
      </div>

    </form>
  </main>

  <div class="actions-bar">
    <button class="save" id="saveBtn" type="submit" form="abortion-form">حفظ الإجهاض ✅</button>
    <button class="ghost" id="toCardBtn" type="button">فتح بطاقة الحيوان</button>
  </div>
<script>
  const qp = new URLSearchParams(location.search);

  const form = document.getElementById("abortion-form");
  const sysbar = document.getElementById("sysbar");

  const animalEl = document.getElementById("animalNumber");
  const dateEl = document.getElementById("eventDate");
  const animalIdEl = document.getElementById("animalId");
  const speciesEl = document.getElementById("species");
  const lastAiEl = document.getElementById("lastInseminationDate");
  const ageEl = document.getElementById("abortionAgeMonths");
  const causeEl = document.getElementById("probableCause");
  const notesEl = document.getElementById("notes");
  const saveBtn = document.getElementById("saveBtn");

  function getUid() {
    return String(
      localStorage.getItem("userId") ||
      localStorage.getItem("uid") ||
      localStorage.getItem("tenantId") ||
      localStorage.getItem("ownerUid") ||
      ""
    ).trim();
  }

  function apiBase() {
    return String(
      window.API_BASE ||
      localStorage.getItem("API_BASE") ||
      ""
    ).replace(/\/$/, "");
  }

  function normalizeDigits(raw) {
    const map = {
      "٠": "0","١": "1","٢": "2","٣": "3","٤": "4","٥": "5","٦": "6","٧": "7","٨": "8","٩": "9",
      "۰": "0","۱": "1","۲": "2","۳": "3","۴": "4","۵": "5","۶": "6","۷": "7","۸": "8","۹": "9"
    };

    return String(raw || "")
      .replace(/[٠-٩۰-۹]/g, d => map[d] || d)
      .replace(/[^\d]/g, "")
      .trim();
  }

  function toISO(s) {
    const v = String(s || "").trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
    const d = new Date(v);
    if (Number.isNaN(d.getTime())) return "";
    return new Date(d.getTime() - d.getTimezoneOffset() * 60000)
      .toISOString()
      .slice(0, 10);
  }

  function escapeHtml(s) {
    return String(s || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function compactReason(reason) {
    return String(reason || "")
      .replace(/^❌\s*/, "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function showSysbar(msg, type = "info", actions = []) {
    if (!sysbar) return;

    sysbar.style.display = "block";
    sysbar.className = "infobar show " + (
      type === "error" ? "error" :
      type === "success" ? "success" :
      type === "warn" ? "warning" :
      "info"
    );

    sysbar.innerHTML = `
      <div style="display:grid;gap:10px;text-align:center">
        <div style="white-space:pre-line;font-weight:900;font-size:15px;line-height:1.7">
          ${escapeHtml(msg)}
        </div>

        <button type="button" id="gateOkBtn"
          style="width:auto;min-width:110px;margin:0 auto;padding:8px 16px;border-radius:999px;border:2px solid #0b7f47;background:#fff;color:#0b7f47;font-weight:900;cursor:pointer">
          حسنًا
        </button>
      </div>
    `;

    sysbar.querySelector("#gateOkBtn")?.addEventListener("click", () => {
      sysbar.style.display = "none";
    });

    if (Array.isArray(actions) && actions.length) {
      const wrap = document.createElement("div");
      wrap.className = "sys-actions";

      actions.forEach((a) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "sys-btn" + (a.primary ? " primary" : "");
        btn.textContent = a.label || "إجراء";

        btn.addEventListener("click", () => {
          if (a.url) {
            location.href = a.url;
            return;
          }

          if (a.focus) {
            document.querySelector(`[data-field="${a.focus}"]`)?.focus?.();
            document.getElementById(a.focus)?.focus?.();
          }
        });

        wrap.appendChild(btn);
      });

      sysbar.appendChild(wrap);
    }

    try { sysbar.scrollIntoView({ behavior: "smooth", block: "start" }); } catch (_) {}
  }

  function setDetailsDisabled(disabled) {
    form.querySelectorAll("[data-field], button[type='submit']").forEach((el) => {
      const key = el.getAttribute("data-field") || "";
      if (key === "animalNumber" || key === "eventDate") return;
      el.disabled = !!disabled;
    });

    if (saveBtn) saveBtn.disabled = !!disabled;
  }

  function collectPayload() {
    return {
      animalNumber: normalizeDigits(animalEl?.value || ""),
      number: normalizeDigits(animalEl?.value || ""),
      eventDate: String(dateEl?.value || "").trim(),
      date: String(dateEl?.value || "").trim(),

      animalId: String(animalIdEl?.value || "").trim(),
      species: String(speciesEl?.value || "").trim(),
      lastInseminationDate: String(lastAiEl?.value || "").trim(),
      abortionAgeMonths: String(ageEl?.value || "").trim(),
      probableCause: String(causeEl?.value || "").trim(),
      notes: String(notesEl?.value || "").trim()
    };
  }

  function renderServerMessage(data, fallback, successByAllowed = false) {
    const msg = String(data?.message || data?.error || fallback || "").trim();
    const msgClean = compactReason(msg);

    const rejectedItems = Array.isArray(data?.rejected) ? data.rejected : [];

    const rejectedLines = rejectedItems
      .slice(0, 8)
      .map(x => {
        const n = String(x.animalNumber || "").trim();
        const reason = compactReason(x.reason || "");
        if (!reason) return "";
        if (reason === msgClean) return "";
        return `${n}: ${reason}`;
      })
      .filter(Boolean);

    const fullMsg = [
      msg,
      rejectedLines.length ? rejectedLines.join("\n") : ""
    ].filter(Boolean).join("\n\n");

    const isSuccess = successByAllowed ? !!data?.allowed : !!data?.ok;

    showSysbar(
      fullMsg || fallback || "تعذّر تنفيذ الطلب.",
      isSuccess ? "success" : "error",
      Array.isArray(data?.actions) ? data.actions : []
    );
  }

  function applyGateData(data) {
    if (animalIdEl && data?.animalId) {
      animalIdEl.value = String(data.animalId || "");
    }

    if (speciesEl && data?.species) {
      speciesEl.value = String(data.species || "");
    }

    if (lastAiEl && data?.lastInseminationDate) {
      lastAiEl.value = String(data.lastInseminationDate || "").slice(0, 10);
    }

    if (ageEl && data?.abortionAgeMonths !== undefined && data?.abortionAgeMonths !== null) {
      ageEl.value = String(data.abortionAgeMonths);
    }

    if (causeEl) {
      causeEl.value = String(data?.probableCause || "");
    }
  }

  let gateTimer = null;
  let lastGateKey = "";

  async function runGateNow() {
    const uid = getUid();
    const payload = collectPayload();

    const gateKey = JSON.stringify({
      n: payload.animalNumber,
      d: payload.eventDate
    });

    if (gateKey === lastGateKey) return;
    lastGateKey = gateKey;

    if (!uid || !payload.animalNumber || !payload.eventDate) {
      setDetailsDisabled(true);
      if (sysbar) sysbar.style.display = "none";
      return;
    }

    const endpoint = "/api/abortion/gate";
    const url = apiBase() ? `${apiBase()}${endpoint}` : endpoint;

    try {
      setDetailsDisabled(true);
      showSysbar("جارِ التحقق من أهلية الإجهاض…", "info");

      const r = await fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-User-Id": uid
        },
        body: JSON.stringify(payload)
      });

      const data = await r.json().catch(() => ({
        ok: false,
        allowed: false,
        message: "تعذّر قراءة رد السيرفر."
      }));

      renderServerMessage(data, "تعذّر التحقق من أهلية الإجهاض.", true);

      if (data?.allowed) {
        applyGateData(data);
        setDetailsDisabled(false);
      } else {
        setDetailsDisabled(true);
      }

    } catch (err) {
      console.error("abortion gate failed", err);
      showSysbar("❌ تعذّر التحقق من أهلية الإجهاض الآن.", "error");
      setDetailsDisabled(true);
    }
  }

  function scheduleGate() {
    clearTimeout(gateTimer);
    gateTimer = setTimeout(runGateNow, 350);
  }

  form?.addEventListener("submit", async (e) => {
    e.preventDefault();

    const uid = getUid();
    const payload = collectPayload();

    const endpoint = "/api/abortion/save";
    const url = apiBase() ? `${apiBase()}${endpoint}` : endpoint;

    try {
      if (saveBtn) saveBtn.disabled = true;

      showSysbar("جارِ حفظ الإجهاض…", "info");

      const r = await fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-User-Id": uid
        },
        body: JSON.stringify(payload)
      });

      const data = await r.json().catch(() => ({
        ok: false,
        message: "تعذّر قراءة رد السيرفر."
      }));

      renderServerMessage(data, "تعذّر حفظ الإجهاض.", false);

      if (data?.ok) {
        try {
          localStorage.setItem("lastAnimalId", data.animalNumber || payload.animalNumber || "");
          localStorage.setItem("lastEventDate", data.eventDate || payload.eventDate || "");
        } catch (_) {}

        if (data.redirectUrl) {
          setTimeout(() => {
            location.href = data.redirectUrl;
          }, 1100);
        }
      }

    } catch (err) {
      console.error("abortion save failed", err);
      showSysbar("❌ تعذّر حفظ الإجهاض الآن.", "error");
    } finally {
      if (saveBtn) saveBtn.disabled = false;
    }
  });

  animalEl?.addEventListener("input", scheduleGate);
  animalEl?.addEventListener("change", scheduleGate);
  dateEl?.addEventListener("change", scheduleGate);

  document.getElementById("toCardBtn")?.addEventListener("click", () => {
    const n = normalizeDigits(animalEl?.value || "");
    if (!n) {
      showSysbar("أدخل رقم الحيوان أولًا قبل فتح البطاقة.", "error");
      return;
    }

    location.href = `/cow-card.html?number=${encodeURIComponent(n)}`;
  });

  document.addEventListener("DOMContentLoaded", () => {
    const n =
      qp.get("animalNumber") ||
      qp.get("number") ||
      qp.get("animalId") ||
      localStorage.getItem("lastAnimalId") ||
      "";

    const d =
      qp.get("eventDate") ||
      qp.get("date") ||
      qp.get("dt") ||
      localStorage.getItem("lastEventDate") ||
      "";

    if (animalEl) animalEl.value = normalizeDigits(n);
    if (dateEl) dateEl.value = toISO(d) || new Date().toISOString().slice(0, 10);

    setDetailsDisabled(true);
    scheduleGate();
  });
</script>

</body>
</html>
