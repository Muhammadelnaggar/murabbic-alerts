<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>استعادة كلمة المرور — مُرَبِّيك</title>
  <link rel="stylesheet" href="css/forms.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --mbk-green:#1F5C3A;
      --mbk-green-dark:#184A31;
      --mbk-gold:#B08A2E;
      --mbk-bg:#F6FAF4;
      --mbk-bg2:#EEF6E9;
      --mbk-text:#0F172A;
      --mbk-muted:#64748B;
      --mbk-border:#DCE8D6;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      padding:22px 14px;
      direction:rtl;
      font-family:'Cairo',system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--mbk-text);
      background:
        radial-gradient(circle at top center, rgba(176,138,46,.13) 0, transparent 260px),
        linear-gradient(180deg,var(--mbk-bg) 0%,var(--mbk-bg2) 100%);
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .reg-header{
      width:100%;
      max-width:460px;
      text-align:center;
      padding:0 8px 18px;
      margin:0 0 6px;
    }

    .reg-logo{
      width:78px;
      height:78px;
      object-fit:contain;
      display:block;
      margin:0 auto 4px;
    }

    .reg-app{
      color:var(--mbk-green);
      font-size:28px;
      font-weight:900;
      line-height:1.1;
    }

    .reg-tagline{
      margin-top:6px;
      color:var(--mbk-gold);
      font-size:14px;
      font-weight:800;
    }

    .container{
      width:100%;
      max-width:460px;
      padding:0 12px 18px;
    }

    .title{
      margin:4px 0 14px;
      text-align:center;
      color:var(--mbk-green-dark);
      font-size:20px;
      font-weight:900;
    }

    label{
      display:block;
      margin:12px 2px 6px;
      color:var(--mbk-green-dark);
      font-size:13px;
      font-weight:900;
    }

    input{
      width:100%;
      min-height:48px;
      border:1px solid var(--mbk-border);
      border-radius:15px;
      padding:11px 13px;
      background:#fff;
      color:var(--mbk-text);
      font-size:15px;
      font-weight:700;
      outline:none;
      box-shadow:0 4px 14px rgba(15,23,42,.035);
    }

    input:focus{
      border-color:var(--mbk-green);
      box-shadow:0 0 0 3px rgba(31,92,58,.12);
    }

    .hint{
      margin:6px 2px 2px;
      color:var(--mbk-muted);
      font-size:12px;
      line-height:1.6;
      font-weight:700;
    }

    button{
      width:100%;
      min-height:50px;
      margin-top:18px;
      border:0;
      border-radius:16px;
      background:#1F5C3A !important;
      color:#fff;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 12px 24px rgba(31,92,58,.24);
    }

    button:hover{background:#184A31 !important}
    button:disabled{opacity:.65;cursor:not-allowed}

    .message{
      display:none;
      padding:12px 14px;
      border-radius:16px;
      font-size:14px;
      font-weight:900;
      text-align:center;
      margin:0 0 12px;
    }

    .message.success{
      display:block;
      background:#E8F5EE;
      color:#166534;
      border:1px solid #BFE3CC;
    }

    .message.error{
      display:block;
      background:#FEF2F2;
      color:#991B1B;
      border:1px solid #FECACA;
    }

    #resetBox{
      display:none;
      margin-top:14px;
    }

    .link{
      margin-top:14px;
      text-align:center;
      font-size:13px;
      font-weight:900;
    }

    .link a{
      color:var(--mbk-green);
      text-decoration:none;
    }
  </style>
</head>

<body>
  <header class="reg-header">
    <img class="reg-logo" src="/images/logo.png" alt="مُرَبِّيك">
    <div class="reg-app">مُرَبِّيك</div>
    <div class="reg-tagline">نظام خبير لإدارة القطيع</div>
  </header>

  <div class="container">
    <div class="title">استعادة كلمة المرور</div>

    <div id="msg" class="message" role="status" aria-live="polite"></div>

    <form id="resetForm" novalidate>
      <label for="phone">رقم الهاتف *</label>
      <input id="phone" type="tel" required placeholder="مثال: 01012345678" />

      <div id="resetBox">
        <label for="otpCode">كود التحقق *</label>
        <input id="otpCode" type="text" inputmode="numeric" maxlength="6" placeholder="أدخل كود التحقق" />
        <div class="hint">أدخل الكود المكوّن من ٦ أرقام.</div>

        <label for="password">كلمة المرور الجديدة *</label>
        <input id="password" type="password" minlength="8" />
        <div class="hint">٨ أحرف على الأقل، وتحتوي على حرف ورقم.</div>

        <label for="confirmPassword">تأكيد كلمة المرور الجديدة *</label>
        <input id="confirmPassword" type="password" minlength="8" />
      </div>

      <button id="submitBtn" type="submit">إرسال كود التحقق</button>
    </form>

    <div class="link">
      <a href="login.html">الرجوع لتسجيل الدخول</a>
    </div>
  </div>

<script>
  const form = document.getElementById('resetForm');
  const msg = document.getElementById('msg');
  const btn = document.getElementById('submitBtn');
  const phoneInp = document.getElementById('phone');
  const resetBox = document.getElementById('resetBox');
  const otpInp = document.getElementById('otpCode');
  const passInp = document.getElementById('password');
  const confirmInp = document.getElementById('confirmPassword');

  let resetRequestId = "";

  function showMessage(text,type='error'){
    msg.textContent = text;
    msg.className = `message ${type}`;
    msg.style.display = 'block';
  }

  function clearMessage(){
    msg.textContent = '';
    msg.style.display = 'none';
  }

  form.addEventListener('submit', async (e)=>{
    e.preventDefault();
    clearMessage();

    const prev = btn.textContent;
    btn.disabled = true;

    try{
      if (!resetRequestId) {
        btn.textContent = 'جارٍ إرسال الكود…';

        const r = await fetch('/api/auth/password-reset/start', {
          method:'POST',
          credentials:'include',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({ phone: phoneInp.value.trim() })
        });

        const data = await r.json().catch(()=>({}));

        if (!r.ok || !data.ok) {
          showMessage(data.message || 'تعذّر إرسال كود التحقق.');
          return;
        }

        resetRequestId = data.requestId || "";
        resetBox.style.display = 'block';
        phoneInp.disabled = true;
        otpInp.focus();
        btn.textContent = 'تغيير كلمة المرور';

        showMessage(
          data.devOtp
            ? `تم إرسال كود التحقق. كود التجربة: ${data.devOtp}`
            : 'تم إرسال كود التحقق إلى رقم الهاتف.',
          'success'
        );

        return;
      }

      btn.textContent = 'جارٍ تغيير كلمة المرور…';

      const r = await fetch('/api/auth/password-reset/verify', {
        method:'POST',
        credentials:'include',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          requestId: resetRequestId,
          otp: otpInp.value.trim(),
          password: passInp.value,
          confirmPassword: confirmInp.value
        })
      });

      const data = await r.json().catch(()=>({}));

      if (!r.ok || !data.ok) {
        showMessage(data.message || 'تعذّر تغيير كلمة المرور.');
        return;
      }

      showMessage(data.message || 'تم تغيير كلمة المرور بنجاح.', 'success');

      setTimeout(()=>{
        location.href = data.redirectUrl || 'login.html';
      }, 900);

    }catch(err){
      showMessage('تعذّر الاتصال بالسيرفر الآن.');
    }finally{
      btn.disabled = false;
      if (!resetRequestId) btn.textContent = prev;
    }
  });
</script>
</body>
</html>
