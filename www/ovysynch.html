<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>

  

  <link rel="stylesheet" href="css/forms.css">
 

  <title>بروتوكول تزامن التبويض والتلقيح الإجباري — مُرَبِّيك</title>

</head>

<body>
  <header>
    <div class="mbk-head">
      <a class="mbk-back" href="add-event.html" title="رجوع">رجوع</a>

      <div class="mbk-center">
        <div class="mbk-page-title">بروتوكول التزامن والتلقيح</div>
        <div class="mbk-app-name">مُرَبِّيك</div>
      </div>

      <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">
    </div>
  </header>

 <main class="mbk-form">
    <div id="sysbar" class="infobar"></div>
    <div class="mbk-card">
     <form id="ovForm" autocomplete="off">
        <!-- ✅ حقول ربط للمسار المركزي -->
 <input type="hidden" id="animalNumber" value="">
<input type="hidden" id="animalNumbers" value="">
<input type="hidden" id="eventDate" value="">
<input type="hidden" id="species" value="">
<input type="hidden" id="steps" value="">
<input type="hidden" id="animalId" value="">
        <!-- ✅ اختيار وضع التسجيل: فردي / مجموعة -->
        <div class="field">
         <div class="radio-group">
            <label>
              <input type="radio" name="mbkMode" id="modeSingle" value="single" checked>
              ⬤ تسجيل لحيوان واحد
            </label>

           <label>
              <input type="radio" name="mbkMode" id="modeGroup" value="group">
              ⬤ تسجيل لمجموعة حيوانات
            </label>
          </div>
         <div class="form-hint" id="modeHint">اختر الوضع… والصفحة ستُظهر لك الحقول المناسبة تلقائيًا.</div>
        </div>

        <!-- ✅ وضع المجموعة -->
        <div id="modeBulkBox" hidden>
         <div class="row">
            <div class="field">
              <label for="bulkAnimals">إدخال جماعي (كل رقم في سطر)</label>
              <textarea id="bulkAnimals" rows="4" placeholder="مثال:
105
106
110"></textarea>
              <div class="form-hint">لو كتبت هنا: سيتم تسجيل نفس البروتوكول لكل الأرقام.</div>
            </div>

<button id="applyBulk" type="button" class="secondary-btn">تطبيق القائمة</button>
           <div class="form-hint" id="bulkHint"></div>
          </div>
        </div>

        <!-- ✅ وضع الفردي -->
        <div id="modeSingleBox">
          <div class="field">
            <label for="animalNumberUI">رقم الحيوان</label>
            <input id="animalNumberUI" type="text" placeholder="مثال: 105" />
          </div>
        </div>

       <div class="row row-2">
          <div class="field">
            <label for="startDate">تاريخ بدء البروتوكول (اليوم 0)</label>
            <input id="startDate" type="date" />
          </div>

          <div class="field">
            <label for="startTime">ساعة بدء البروتوكول</label>
            <input id="startTime" type="time" value="08:00" />
            <div class="form-hint">مثال: 08:00 صباحًا — باقي المواعيد تُحسب تلقائيًا</div>
          </div>
        </div>

       <div class="row">
          <div class="field">
            <label for="program">نوع البرنامج</label>
            <select id="program" data-field="program">
              <option value="" selected disabled>اختر البرنامج</option>
              <option value="ovsynch">Ovsynch</option>
              <option value="cosynch72">Cosynch-72</option>
              <option value="presynch_ovsynch">Presynch + Ovsynch</option>
            </select>
           <div class="form-hint">ضع علامة ✓ عند تنفيذ كل خطوة.</div>
          </div>
        </div>

        <div id="stepsBox" class="steps-list" aria-live="polite"></div>
        <div id="warn" class="form-warn"></div>

        <!-- مهم للمسار المركزي -->
        <button type="submit" id="hiddenSubmit" style="display:none"></button>
      </form>
    </div>
 </main>

  <div class="actions-bar">
    <button id="saveBtn" class="save" type="button">تسجيل البروتوكول</button>
    <button id="openCowCard" class="ghost" type="button">بطاقة الحيوان</button>
  </div>

<script>
(() => {
  const form        = document.getElementById('ovForm');
  const animalUI    = document.getElementById('animalNumberUI');
  const startDateEl = document.getElementById('startDate');
  const startTimeEl = document.getElementById('startTime');
  const bulkEl      = document.getElementById('bulkAnimals');
  const applyBulk   = document.getElementById('applyBulk');
  const programEl   = document.getElementById('program');
  const stepsBox    = document.getElementById('stepsBox');
  const saveBtn     = document.getElementById('saveBtn');
  const openCowCard = document.getElementById('openCowCard');
  const bulkHintEl  = document.getElementById('bulkHint');

  const infoEl      = document.getElementById('sysbar');
  const warnEl      = document.getElementById('warn');

  const modeSingle  = document.getElementById('modeSingle');
  const modeGroup   = document.getElementById('modeGroup');
  const modeBulkBox = document.getElementById('modeBulkBox');
  const modeSingleBox = document.getElementById('modeSingleBox');

  const animalHidden = document.getElementById("animalNumber");
  const eventHidden  = document.getElementById("eventDate");
  const stepsHidden  = document.getElementById("steps");
  const animalNumbersHidden = document.getElementById("animalNumbers");

  let stepsState = [];
  let bulkList = [];
  let gateTimer = null;

  function todayISO(){
    const d = new Date();
    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    return d.toISOString().slice(0,10);
  }

  function getUserId(){
    return String(
      localStorage.getItem("userId") ||
      localStorage.getItem("uid") ||
      localStorage.getItem("ownerUid") ||
      ""
    ).trim();
  }

  async function mbkApi(path, options = {}){
    const uid = getUserId();

    if (!uid) {
      const err = new Error("⚠️ سجّل الدخول أولًا.");
      err.code = "login_required";
      throw err;
    }

    const headers = {
      "Content-Type": "application/json",
      "X-User-Id": uid,
      ...(options.headers || {})
    };

    const res = await fetch(path, {
      ...options,
      headers
    });

    let data = {};
    try { data = await res.json(); } catch (_) {}

    if (!res.ok) {
      const err = new Error(data?.message || "تعذّر الاتصال بالسيرفر.");
      err.data = data;
      throw err;
    }

    return data;
  }

  function showWarn(t){
    warnEl.textContent = t || "";
  }

  function clearWarn(){
    warnEl.textContent = "";
  }

function showInfoMessage(msg, cls = "ok"){
  const lines = Array.isArray(msg)
    ? msg
    : String(msg || "").split("\n").filter(Boolean);

  const safeLines = lines.map(x =>
    String(x || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
  );

  infoEl.style.display = "block";
  infoEl.className = `infobar mbk-infobar show ${cls}`;

  infoEl.innerHTML = safeLines
    .map(line => `<div>${line}</div>`)
    .join("");
}

  function parseBulk(){
    const raw = (bulkEl?.value || "").trim();
    if (!raw) {
      bulkList = [];
      return [];
    }

    const arr = raw
      .split(/\n|,|;|،|\s+/g)
      .map(x => String(x || "").trim())
      .filter(Boolean);

    bulkList = [...new Set(arr)];
    return bulkList;
  }

  function getMode(){
    return modeGroup.checked ? "group" : "single";
  }

  function getCurrentNumbers(){
    const mode = getMode();

    if (mode === "group") {
      return parseBulk().map(x => String(x).trim()).filter(Boolean);
    }

    return [String(animalUI.value || "").trim()].filter(Boolean);
  }

  function setMode(m){
    const isGroup = (m === "group");
    modeGroup.checked = isGroup;
    modeSingle.checked = !isGroup;
    modeBulkBox.hidden = !isGroup;
    modeSingleBox.hidden = isGroup;

    try {
      localStorage.setItem("mbk_ov_mode", isGroup ? "group" : "single");
    } catch {}

    clearWarn();
    syncCentral();
    scheduleGatePreview();
  }

  const qp = new URLSearchParams(location.search);
  const stepParam = (qp.get("step") || qp.get("stepIndex") || "").trim();
  const STEP_MODE = !!stepParam;
  const STEP_INDEX = STEP_MODE ? Math.max(0, parseInt(stepParam, 10) || 0) : -1;

  const PROGRAMS = {
    ovsynch: [
      { day: 0,  name: "GnRH (اليوم 0)" },
      { day: 7,  name: "PGF2α (اليوم 7)" },
      { day: 9,  name: "GnRH (اليوم 9)" },
      { day: 10, name: "تلقيح مُوقّت TAI (اليوم 10)" }
    ],
    cosynch72: [
      { day: 0,  name: "GnRH (اليوم 0)" },
      { day: 7,  name: "PGF2α (اليوم 7)" },
      { day: 10, name: "GnRH + تلقيح مُوقّت TAI (Cosynch-72) (اليوم 10)" }
    ],
    presynch_ovsynch: [
      { day: 0,  name: "PGF2α (Presynch 1) (اليوم 0)" },
      { day: 14, name: "PGF2α (Presynch 2) (اليوم 14)" },
      { day: 28, name: "GnRH (Ovsynch) (اليوم 28)" },
      { day: 35, name: "PGF2α (Ovsynch) (اليوم 35)" },
      { day: 37, name: "GnRH (Ovsynch) (اليوم 37)" },
      { day: 38, name: "تلقيح مُوقّت TAI (Ovsynch) (اليوم 38)" }
    ]
  };

  function syncCentral(){
    const list = getCurrentNumbers();

    animalHidden.value = list[0] || "";
    if (animalNumbersHidden) {
      animalNumbersHidden.value = JSON.stringify(list);
    }

    eventHidden.value = (startDateEl.value || "").trim();
    stepsHidden.value = JSON.stringify(stepsState || []);
  }

  function updateSteps(){
    stepsBox.innerHTML = "";

    const start = startDateEl.value;
    const program = programEl.value;

    if (!start || !program) {
      stepsState = [];
      syncCentral();
      return;
    }

    stepsState = (PROGRAMS[program] || []).map(s => {
      const d = new Date(start + "T" + (startTimeEl.value || "08:00"));
      d.setDate(d.getDate() + s.day);

      return {
        day: s.day,
        name: s.name,
        date: d.toISOString().slice(0,16),
        done: false
      };
    });

    for (let i = 0; i < stepsState.length; i++) {
      const st = stepsState[i];
      const row = document.createElement("div");
      row.className = "step-item";

      row.innerHTML = `
        <div>
          <div class="name">${st.name}</div>
          <div class="date">📅 ${new Date(st.date).toLocaleString('ar-EG')}</div>
        </div>
        <label class="chk">
          <input type="checkbox" data-i="${i}">
          تم
        </label>`;

      stepsBox.appendChild(row);
    }

    syncCentral();
  }

  async function runGatePreview(){
    if (STEP_MODE) return;

    const list = getCurrentNumbers();
    const eventDate = (startDateEl.value || "").trim();

    if (!list.length || !eventDate) {
      clearWarn();
      return;
    }

    try {
      const data = await mbkApi("/api/ovsynch/gate", {
        method: "POST",
        body: JSON.stringify({
          animalNumbers: list,
          animalNumber: list[0] || "",
          eventDate,
          startDate: eventDate
        })
      });

if (data?.silent) return;

/* عند الإدخال الجماعي: السيرفر هو مصدر الفلترة.
   نُبقي في الصندوق الأرقام المؤهلة فقط. */
if (getMode() === "group" && Array.isArray(data.accepted)) {
  const acceptedNums = data.accepted
    .map(x => {
      if (typeof x === "string" || typeof x === "number") return String(x).trim();
      return String(x?.animalNumber || x?.number || "").trim();
    })
    .filter(Boolean);

  if (acceptedNums.length) {
    bulkEl.value = acceptedNums.join("\n");

    try {
      bulkHintEl.textContent = `تم تطبيق ${acceptedNums.length} رقم مؤهل فقط.`;
    } catch {}

    syncCentral();
  }
}

clearWarn();
showInfoMessage(data.message || "", data.allowed ? "ok" : "err");
    } catch (err) {
     clearWarn();
     showInfoMessage(err?.message || "❌ تعذّر فحص أهلية أرقام التزامن الآن.", "err");
    }
  }

  function scheduleGatePreview(){
    if (STEP_MODE) return;

    clearTimeout(gateTimer);
    gateTimer = setTimeout(() => {
      runGatePreview();
    }, 350);
  }

  async function loadStepTargets(){
    if (!STEP_MODE) return;

    setMode("group");
    modeSingle.disabled = true;
    modeGroup.disabled = true;

    saveBtn.textContent = "تأكيد تنفيذ الخطوة";
    openCowCard.textContent = "رجوع للداشبورد";

    try {
      const due = todayISO();

      const data = await mbkApi(
        `/api/ovsynch/step-targets?stepIndex=${encodeURIComponent(STEP_INDEX)}&dueDate=${encodeURIComponent(due)}`,
        { method: "GET" }
      );

      const nums = Array.isArray(data.animalNumbers) ? data.animalNumbers : [];

      if (!nums.length) {
        showWarn(data.message || "✅ لا يوجد حيوانات مطلوبة لهذه الخطوة اليوم.");
        try { bulkEl.value = ""; } catch {}
        try { bulkHintEl.textContent = ""; } catch {}
        return;
      }

      showWarn(data.message || `خطوات اليوم — الخطوة رقم ${STEP_INDEX} — ${nums.length} حيوان`);

      const meta = data.meta || {};

      if (meta.program || meta.protocolProgram) {
        programEl.value = String(meta.program || meta.protocolProgram || "");
      }

      if (meta.protocolStartDate) {
        startDateEl.value = String(meta.protocolStartDate).slice(0,10);
      }

      programEl.disabled = true;
      startDateEl.disabled = true;
      startTimeEl.disabled = true;

      updateSteps();

      bulkEl.value = nums.join("\n");

      try {
        bulkHintEl.textContent = `تم تحميل ${nums.length} رقم تلقائيًا من مهام اليوم — يمكنك حذف/إضافة أرقام قبل التأكيد.`;
      } catch {}

      syncCentral();

      const boxes = stepsBox.querySelectorAll('input[type="checkbox"][data-i]');
      boxes.forEach(b => {
        const i = parseInt(b.dataset.i || "-1", 10);

        if (i !== STEP_INDEX) {
          b.disabled = true;
         b.closest('.step-item')?.classList.add("disabled");
        } else {
          b.disabled = false;
        }
      });

      const targetBox = stepsBox.querySelector(`input[type="checkbox"][data-i="${STEP_INDEX}"]`);
     targetBox?.closest(".step-item")?.scrollIntoView({ behavior:"smooth", block:"center" });

    } catch (err) {
      showWarn(err?.message || "❌ تعذّر تحميل مهام خطوة التزامن الآن.");
    }
  }

  async function confirmStepExecution(){
    if (!STEP_MODE) return;

    clearWarn();

    const list = parseBulk().map(x => String(x).trim()).filter(Boolean);
    if (!list.length) {
      showWarn("⚠️ القائمة فارغة.");
      return;
    }

    const st = stepsState[STEP_INDEX] || {};
    const program = (programEl.value || "").trim();
    const startISO = (startDateEl.value || "").trim() || todayISO();

    try {
      const data = await mbkApi("/api/ovsynch/confirm-step", {
        method: "POST",
        body: JSON.stringify({
          animalNumbers: list,
          animalNumber: list[0] || "",
          program,
          protocolProgram: program,
          protocolStartDate: startISO,
          date: todayISO(),
          stepIndex: STEP_INDEX,
          stepDay: Number(st.day ?? 0),
          stepName: String(st.name || "")
        })
      });

      showWarn(data.message || `✅ تم تأكيد تنفيذ الخطوة لـ ${data.doneCount || 0} حيوان.`);

      try {
        setTimeout(() => {
          location.href = "/dashboard.html";
        }, 700);
      } catch {}

    } catch (err) {
      showWarn(err?.message || "❌ تعذّر تأكيد خطوة بروتوكول التزامن الآن.");
    }
  }

  async function saveProtocol(){
    if (STEP_MODE) {
      await confirmStepExecution();
      return;
    }

    clearWarn();

    const start = (startDateEl.value || "").trim() || todayISO();
    if (!startDateEl.value) {
      startDateEl.value = start;
    }

    const program = (programEl.value || "").trim();

    syncCentral();

    const list = getCurrentNumbers();

    try {
      const data = await mbkApi("/api/ovsynch/save", {
        method: "POST",
        body: JSON.stringify({
          animalNumbers: list,
          animalNumber: list[0] || "",
          eventDate: start,
          startDate: start,
          program,
          steps: stepsState
        })
      });

      showInfoMessage(data.message || "✅ تم التسجيل بنجاح", "ok");
      clearWarn();
      syncCentral();

    } catch (err) {
      const data = err?.data || {};
      showInfoMessage(data?.message || err?.message || "❌ تعذّر حفظ بروتوكول التزامن الآن.", "err");
    }
  }

  function hydrateFromURL(){
    const qp = new URLSearchParams(location.search);

    if (STEP_MODE) {
      setMode("group");
      syncCentral();
      return;
    }

    const saved = (localStorage.getItem("mbk_ov_mode") || "single");
    const m = (qp.get("mbkMode") || "").trim().toLowerCase();

    const bulkRaw = (qp.get("bulk") || qp.get("numbers") || qp.get("list") || "").trim();
    const numRaw  = (qp.get("number") || qp.get("animalNumber") || "").trim();
    const dt      = (qp.get("date") || qp.get("eventDate") || "").trim();

    if (bulkRaw) {
      setMode("group");
      try { localStorage.setItem("mbk_ov_mode", "group"); } catch {}

      const cleaned = bulkRaw
        .replace(/[،;,]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();

      const arr = cleaned ? cleaned.split(" ").filter(Boolean) : [];
      bulkEl.value = arr.join("\n");
      animalUI.value = "";
    }

    else if (numRaw && !/[\s،,;\n]/.test(numRaw)) {
      setMode("single");
      try { localStorage.setItem("mbk_ov_mode", "single"); } catch {}
      animalUI.value = numRaw;
      bulkEl.value = "";
    }

    else if (numRaw && /[\s،,;\n]/.test(numRaw)) {
      setMode("group");
      try { localStorage.setItem("mbk_ov_mode", "group"); } catch {}

      const cleaned = numRaw
        .replace(/[،,;]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();

      const arr = cleaned ? cleaned.split(" ").filter(Boolean) : [];
      bulkEl.value = arr.join("\n");
      animalUI.value = "";
    }

    else if (m === "group" || m === "single") {
      setMode(m);
    }

    else {
      setMode(saved === "group" ? "group" : "single");
    }

    if (dt) {
      startDateEl.value = dt || todayISO();
    }

    syncCentral();
    scheduleGatePreview();
  }

  openCowCard.addEventListener("click", () => {
    if (STEP_MODE) {
      location.href = "/dashboard.html";
      return;
    }

    const num = (getMode() === "group" ? (parseBulk()[0] || "") : (animalUI.value || "")).trim();

    if (!num) {
      showWarn("⚠️ اكتب رقم الحيوان أولًا.");
      return;
    }

    location.href = `cow-card.html?number=${encodeURIComponent(num)}`;
  });

  modeSingle.addEventListener("change", () => setMode("single"));
  modeGroup.addEventListener("change", () => setMode("group"));

  animalUI.addEventListener("input", () => {
    syncCentral();
    scheduleGatePreview();
  });

  bulkEl?.addEventListener("input", () => {
    syncCentral();
    scheduleGatePreview();
  });

  applyBulk?.addEventListener("click", () => {
    setMode("group");
    parseBulk();
    syncCentral();
    scheduleGatePreview();

    try {
      bulkHintEl.textContent = parseBulk().length
        ? `تم تطبيق ${parseBulk().length} رقم.`
        : "";
    } catch {}
  });

  startDateEl.addEventListener("input", () => {
    syncCentral();
    scheduleGatePreview();
  });

  programEl.addEventListener("change", () => {
    updateSteps();
    syncCentral();
  });

  startDateEl.addEventListener("change", () => {
    updateSteps();
    syncCentral();
    scheduleGatePreview();
  });

  startTimeEl.addEventListener("change", () => {
    updateSteps();
    syncCentral();
  });

  stepsBox.addEventListener("change", async (e) => {
    const i = e.target?.dataset?.i;
    if (i === undefined) return;

    const idx = parseInt(i, 10);

    if (STEP_MODE) {
      if (idx !== STEP_INDEX) {
        e.target.checked = false;
        return;
      }

      if (!!e.target.checked) {
        await confirmStepExecution();
      } else {
        e.target.checked = true;
      }

      return;
    }

    if (stepsState[idx]) {
      stepsState[idx].done = !!e.target.checked;
    }

    syncCentral();
  });

  saveBtn.addEventListener("click", saveProtocol);

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    saveProtocol();
  });

  if (!startDateEl.value) {
    startDateEl.value = todayISO();
  }

  hydrateFromURL();
  updateSteps();
  loadStepTargets();
  syncCentral();
})();
</script>
</body>
</html>
