<!DOCTYPE html>
<html lang="ar" dir="rtl" data-page="weaning">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>تسجيل الفطام — مُرَبِّيك</title>
  <link rel="stylesheet" href="css/forms.css" />
 
</head>
<body>
<header>
  <div class="mbk-head">
    <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">
    <div class="mbk-center">
      <div class="mbk-page-title">تسجيل الفطام</div>
      <div class="mbk-app-name">مُرَبِّيك</div>
    </div>
    <a class="mbk-back" href="add-event.html">رجوع</a>
  </div>
</header>

<main class="mbk-form">
  <div id="info" class="infobar"></div>
  <form id="weaningForm" data-event="فطام" novalidate>

    <section class="mbk-card">
     <div class="field">
  <label for="animalNumber">رقم الحيوان</label>
  <textarea id="animalNumber" data-field="animalNumber" style="min-height:80px; resize:vertical;"></textarea>
</div>
      <div class="field">
        <label for="eventDate">تاريخ الفطام</label>
        <input id="eventDate" data-field="eventDate" type="date" />
      </div>

      <div class="field" id="singleAgeWrap" style="display:none;">
        <label for="weaningAgeDays">عمر الفطام (يوم)</label>
        <input id="weaningAgeDays" data-field="weaningAgeDays" type="number" readonly />
      </div>
      <div class="field" id="weaningWeightWrap">
  <label for="weaningWeightKg">وزن الفطام (كجم)</label>
  <input id="weaningWeightKg" data-field="weaningWeightKg" type="number" min="0" step="0.1" placeholder="اختياري" />
</div>
      <div class="field" id="bulkAgeHint" style="display:none;">
        <label>عمر الفطام</label>
       <div class="form-hint">سيتم حساب عمر الفطام تلقائيًا من السيرفر لكل حيوان حسب تاريخ الميلاد المسجل.</div>
      </div>

      <div class="field">
        <label for="notes">ملاحظات</label>
        <textarea id="notes" data-field="notes" rows="3" placeholder="اختياري"></textarea>
      </div>
    </section>

    <div class="actions-bar">
  <button class="save" id="saveBtn" type="submit">تسجيل الحدث</button>
  <button class="ghost" id="cardBtn" type="button">بطاقة الحيوان</button>
</div>
  </form>
</main>

<script>
  const $ = (id) => document.getElementById(id);

  const form = $("weaningForm");
  const info = $("info");
  const saveBtn = $("saveBtn");
  const cardBtn = $("cardBtn");

  const qs = new URLSearchParams(location.search);

  const DIGITS = {
    "٠":"0","١":"1","٢":"2","٣":"3","٤":"4","٥":"5","٦":"6","٧":"7","٨":"8","٩":"9",
    "۰":"0","۱":"1","۲":"2","۳":"3","۴":"4","۵":"5","۶":"6","۷":"7","۸":"8","۹":"9"
  };

  function toLatin(v){
    return String(v || "").replace(/[٠-٩۰-۹]/g, d => DIGITS[d] || d);
  }

  function parseNumbers(raw){
    return [...new Set(
      (toLatin(raw).match(/\d+/g) || [])
        .map(x => x.replace(/\D/g, ""))
        .filter(Boolean)
    )];
  }

  function todayISO(){
    return new Date().toISOString().slice(0, 10);
  }



  const initialRaw = String(
    qs.get("numbers") ||
    qs.get("bulk") ||
    qs.get("animalNumbers") ||
    qs.get("selectedNumbers") ||
    qs.get("number") ||
    qs.get("animalNumber") ||
    ""
  ).trim();

  const initialNumbers = parseNumbers(initialRaw);
  const initialMode = String(qs.get("mode") || qs.get("mbkMode") || "").trim().toLowerCase();
  const startsBulk = initialMode === "bulk" || initialMode === "group" || initialNumbers.length > 1;
  const initialDate = String(qs.get("date") || qs.get("eventDate") || todayISO()).slice(0, 10);

  let lastGate = null;
  let gateTimer = null;

  function getCurrentNumbers(){
    return parseNumbers($("animalNumber").value || "");
  }

  function isBulkNow(){
    return startsBulk || getCurrentNumbers().length > 1;
  }

function setMessage(text, type = "info"){
  info.className = `infobar show ${type}`;
  info.textContent = String(text || "");
  info.style.whiteSpace = "pre-line";
}

function clearMessage(){
  info.className = "infobar";
  info.textContent = "";
  info.innerHTML = "";
}

function setMessageWithOk(text, type = "success", okLabel = "حسنًا", onOk = null){
  info.className = `infobar show ${type}`;
  info.innerHTML = "";
  info.style.whiteSpace = "normal";

  const msg = document.createElement("div");
  msg.textContent = String(text || "");
  msg.style.whiteSpace = "pre-line";

  const actions = document.createElement("div");
  actions.className = "mbk-weaning-ok-actions";

  const btn = document.createElement("button");
  btn.type = "button";
  btn.className = "mbk-weaning-ok-btn";
  btn.textContent = okLabel;

  btn.addEventListener("click", () => {
    if (typeof onOk === "function") {
      onOk();
    } else {
      clearMessage();
    }
  }, { once:true });

  actions.appendChild(btn);
  info.appendChild(msg);
  info.appendChild(actions);
}
function setBusy(busy){
  if (saveBtn) saveBtn.disabled = !!busy || !lastGate?.canSave;
  if (cardBtn) cardBtn.disabled = !!busy || getCurrentNumbers().length !== 1;
}

function responseText(j = {}){
  return String(j?.message || j?.ui?.message || "").trim();
}
  async function apiPost(path, payload){
    const r = await fetch(path, {
      method: "POST",
      credentials: "same-origin",
      cache: "no-store",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json"
      },
      body: JSON.stringify(payload || {})
    });

    const j = await r.json().catch(() => ({
      ok: false,
      canSave: false,
      message: "❌ رد السيرفر غير صالح."
    }));

    if (r.status === 401 || j?.error === "auth_required") {
      return {
        httpStatus: r.status,
        ok: false,
        canSave: false,
        error: "auth_required",
        message: j?.message || "❌ سجّل الدخول أولًا.",
        accepted: [],
        rejected: []
      };
    }

    return { httpStatus: r.status, ...j };
  }

  function renderGate(j = {}){
    lastGate = j;

    const accepted = Array.isArray(j.accepted) ? j.accepted : [];
    const first = accepted[0] || null;
    const bulk = isBulkNow();

    $("singleAgeWrap").style.display = bulk ? "none" : "";
    $("bulkAgeHint").style.display = bulk ? "" : "none";

    $("weaningAgeDays").value =
      !bulk && first && Number.isFinite(Number(first.weaningAgeDays))
        ? String(first.weaningAgeDays)
        : "";

    if (saveBtn) saveBtn.disabled = !j.canSave;

    const nums = getCurrentNumbers();
    if (cardBtn) {
      cardBtn.disabled = nums.length !== 1;
      cardBtn.style.opacity = nums.length === 1 ? "1" : ".6";
      cardBtn.style.pointerEvents = nums.length === 1 ? "auto" : "none";
    }

    const text = responseText(j);
    if (text) setMessage(text, j.canSave ? "success" : "error");
    else clearMessage();
  }

  async function runGate({ silent = false } = {}){
    const numbers = getCurrentNumbers();
    const eventDate = String($("eventDate").value || "").slice(0, 10);

    if (!numbers.length || !eventDate) {
      lastGate = { canSave:false };
      if (saveBtn) saveBtn.disabled = true;
      if (!silent) setMessage("اكتب رقم الحيوان وتاريخ الفطام.", "info");
      return;
    }

    if (!silent) setMessage("جاري التحقق من السيرفر…", "info");
    setBusy(true);

    try {
      const j = await apiPost("/api/weaning/gate", {
        numbers,
        animalNumbers: numbers,
        eventDate
      });

      renderGate(j);
    } catch (e) {
      console.error(e);
      lastGate = { canSave:false };
      if (saveBtn) saveBtn.disabled = true;
      setMessage("❌ تعذّر التحقق من السيرفر الآن.", "error");
    } finally {
      setBusy(false);
    }
  }

  function scheduleGate(){
    clearTimeout(gateTimer);
    gateTimer = setTimeout(() => runGate({ silent:true }), 350);
  }

  function hydrateUI(){
    $("eventDate").value = initialDate;
    $("animalNumber").value = initialNumbers.join(startsBulk ? "\n" : "");
    $("animalNumber").rows = startsBulk ? Math.max(3, initialNumbers.length) : 1;

    $("singleAgeWrap").style.display = startsBulk ? "none" : "";
    $("bulkAgeHint").style.display = startsBulk ? "" : "none";

    if (saveBtn) saveBtn.disabled = true;
    if (cardBtn) cardBtn.disabled = initialNumbers.length !== 1;
  }

  cardBtn.addEventListener("click", () => {
    const nums = getCurrentNumbers();
    if (nums.length !== 1) return;
   location.href = `calf-card.html?number=${encodeURIComponent(nums[0])}`;
  });

  $("animalNumber").addEventListener("input", scheduleGate);
  $("eventDate").addEventListener("input", scheduleGate);
  $("eventDate").addEventListener("change", () => runGate({ silent:false }));

form.addEventListener("submit", async (ev) => {
  ev.preventDefault();

  const numbers = getCurrentNumbers();
  const eventDate = String($("eventDate").value || "").slice(0, 10);
  const notes = String($("notes").value || "").trim();
  const weaningWeightKg = String($("weaningWeightKg")?.value || "").trim();

  setMessage("جاري الحفظ من السيرفر…", "info");
  setBusy(true);

  try {
    const j = await apiPost("/api/weaning/save", {
      numbers,
      animalNumbers: numbers,
      eventDate,
      notes,
      weaningWeightKg
    });

const text = responseText(j) || "تمت المعالجة.";

if (j.ok) {
  setMessageWithOk(
    text || "✅ تم حفظ الفطام بنجاح.",
    "success",
    "حسنًا",
    () => {
      if (j.redirectUrl) {
        location.href = j.redirectUrl;
      } else {
        clearMessage();
      }
    }
  );
  return;
}

setMessage(text, "error");
await runGate({ silent:true });
  } catch (e) {
    console.error(e);
    setMessage("❌ فشل حفظ الفطام من السيرفر.", "error");
  } finally {
    setBusy(false);
  }
});

  hydrateUI();
  runGate({ silent:true });
</script>
</body>
</html>
