<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
 


  <link rel="stylesheet" href="css/forms.css">
 <title>تقييم سمات إنتاج اللبن بالكاميرا — مُرَبِّك</title>

</head>
<body>
  

  <header>
    <div class="mbk-head">
      <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">
      <div class="mbk-center">
        <div class="mbk-page-title">تقييم سمات إنتاج اللبن</div>
        <div class="mbk-app-name">مُرَبِّيك</div>
      </div>
      <a class="mbk-back" id="backTopBtn" href="add-event.html">رجوع</a>
    </div>
  </header>

<div id="sysbar" class="infobar" role="status" aria-live="polite"></div>

<main class="mbk-vision-container">
  <div class="mbk-card">
    <label>رقم الحيوان</label>
    <div class="mbk-score-card">
      <span class="mbk-score-badge animal-number">—</span>
    </div>
  </div>

  <section class="card vision-card" id="cameraCard">
    <div class="mbk-vision-tabs">
      <button class="mbk-vision-tab active" data-angle="side">جانبية كاملة</button>
      <button class="mbk-vision-tab" data-angle="rear">خلفية كاملة</button>
    </div>

    <div class="mbk-vision-controls">
      <div class="left"></div>

      <div class="right">
        <button id="captureBtn" class="mbk-btn mbk-btn-primary" type="button">التقاط</button>
        <button id="retakeBtn" class="mbk-btn mbk-btn-danger" type="button" disabled>إعادة الالتقاط</button>
        <button id="uploadBtn" class="mbk-btn mbk-btn-light" type="button">رفع صورة</button>
      </div>

     <input id="uploadInput" class="hide" type="file" accept="image/*" />
    </div>

    <div class="mbk-camera-frame side-view" id="previewWrap">
      <video id="preview" class="mbk-camera-preview" playsinline autoplay muted></video>
      <canvas id="overlay" class="mbk-camera-overlay"></canvas>
    </div>

   <div class="form-hint mbk-vision-instructions">
     الجانبية: الحيوان كاملًا من الجانب مع الجسم والضرع والأرجل والحوض.<br>
الخلفية: الحيوان كاملًا من الخلف مع الضرع والحلمات والأخدود الضرعي والأرجل الخلفية.
    </div>

    <div class="mbk-thumbs" id="thumbs"></div>

    <div class="mbk-results" id="resultsBox">
      <h3 class="mbk-page-title">تقييم سمات إنتاج اللبن</h3>

      <div id="scoreWidget" class="mbk-score-card">
        <div class="mbk-score-badge" id="scoreBadge">بانتظار التقييم</div>
        <div class="mbk-score-bar">
         <div class="mbk-score-fill" id="scoreFill"></div>
        </div>
        <div class="mbk-score-note" id="scoreNote">
         التقط صورتين كاملتين: جانبية وخلفية.
        </div>
      </div>

     <div class="mbk-score-card hide" id="breakdownBox"></div>
    </div>

    <div class="mbk-save-panel">
      <input type="hidden" id="animalId" />

      <label>
        تاريخ التقييم
        <input type="date" id="eventDate" class="input" />
      </label>

      <div class="actions-bar inline">
        <button id="saveBtn" class="save" type="button">حفظ التقييم</button>
        <button id="backBtn" class="ghost" type="button">لوحة التحكم</button>
      </div>
    </div>
  </section>
</main>

<script>
(function () {
  "use strict";

  const qs = new URLSearchParams(location.search);
  const $ = (s, p = document) => p.querySelector(s);
  const $$ = (s, p = document) => Array.from(p.querySelectorAll(s));
  const angles = ["side", "rear"];
  const angleLabels = {
    side: "جانبية",
    rear: "خلفية",
  };

  const guideText = {
    side: "صورة جانبية كاملة: الجسم، الظهر، الحوض، الضرع، والأرجل.",
    rear: "صورة خلفية كاملة: الضرع، الحلمات، الأخدود الضرعي، الحوض، والأرجل الخلفية.",
  };

  const preview = $("#preview");
  const overlay = $("#overlay");
  const previewWrap = $("#previewWrap");
  const captureBtn = $("#captureBtn");
  const retakeBtn = $("#retakeBtn");
  const uploadBtn = $("#uploadBtn");
  const uploadInput = $("#uploadInput");
  const saveBtn = $("#saveBtn");
  const backBtn = $("#backBtn");

  const animalIdInput = $("#animalId");
  const eventDateInput = $("#eventDate");
  const numberSpan = $(".animal-number");
  const msgBox = $("#sysbar");

  const thumbs = $("#thumbs");
  const scoreBadge = $("#scoreBadge");
  const scoreFill = $("#scoreFill");
  const scoreNote = $("#scoreNote");
  const breakdownBox = $("#breakdownBox");

  const state = {
    stream: null,
    currentAngle: "side",
    captures: {
      side: null,
      rear: null,
      front: null
    },
    analysis: null
  };

  function todayCairo() {
    const now = new Date(new Date().toLocaleString("en-US", { timeZone: "Africa/Cairo" }));
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, "0");
    const d = String(now.getDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
  }

  function contextFromUrl() {
    return {
      animalId: qs.get("animalId") || "",
      animalNumber: qs.get("number") || qs.get("animalNumber") || "",
      eventDate: qs.get("date") || todayCairo()
    };
  }

  function getTenantUid() {
    return String(
      window.MBK_USER_ID ||
      window.mbkUserId ||
      window.mbk?.userId ||
      localStorage.getItem("userId") ||
      localStorage.getItem("uid") ||
      localStorage.getItem("tenantId") ||
      ""
    ).trim();
  }

  function showMsg(text, ok) {
    if (!msgBox) return;
    msgBox.textContent = text;
    msgBox.className = "infobar show " + (ok ? "success" : "error");

    try {
      msgBox.scrollIntoView({ behavior: "smooth", block: "start" });
    } catch (_) {}
  }

  function hideMsg() {
    if (!msgBox) return;
    msgBox.className = "infobar";
    msgBox.textContent = "";
  }

  function setAngle(angle) {
    if (!angles.includes(angle)) return;

    state.currentAngle = angle;

    $$(".mbk-vision-tab").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.angle === angle);
    });

    if (previewWrap) {
      previewWrap.classList.remove("side-view", "rear-view");
      previewWrap.classList.add(angle === "side" ? "side-view" : "rear-view");
    }

    retakeBtn.disabled = !state.captures[angle];

    fitOverlay();
    drawGuide();
  }

  function fitOverlay() {
    if (!preview || !overlay) return;

    const r = preview.getBoundingClientRect();
    overlay.width = Math.max(1, Math.floor(r.width * devicePixelRatio));
    overlay.height = Math.max(1, Math.floor(r.height * devicePixelRatio));
    overlay.style.width = r.width + "px";
    overlay.style.height = r.height + "px";
  }

  function drawGuide() {
    if (!overlay) return;

    const g = overlay.getContext("2d");
    if (!g) return;

    const w = overlay.width;
    const h = overlay.height;

    g.clearRect(0, 0, w, h);

    let box = {
      x: Math.round(w * 0.10),
      y: Math.round(h * 0.14),
      w: Math.round(w * 0.80),
      h: Math.round(h * 0.72)
    };

    if (state.currentAngle === "side") {
      box = {
        x: Math.round(w * 0.05),
        y: Math.round(h * 0.18),
        w: Math.round(w * 0.90),
        h: Math.round(h * 0.64)
      };
    }

    if (state.currentAngle === "front") {
      box = {
        x: Math.round(w * 0.18),
        y: Math.round(h * 0.12),
        w: Math.round(w * 0.64),
        h: Math.round(h * 0.76)
      };
    }

    g.fillStyle = "rgba(0,0,0,.25)";
    g.fillRect(0, 0, w, h);

    g.save();
    g.globalCompositeOperation = "destination-out";
    g.beginPath();

    if (g.roundRect) {
      g.roundRect(box.x, box.y, box.w, box.h, 18 * devicePixelRatio);
    } else {
      g.rect(box.x, box.y, box.w, box.h);
    }

    g.fill();
    g.restore();

    g.strokeStyle = "rgba(14,160,90,.95)";
    g.lineWidth = 4 * devicePixelRatio;
    g.beginPath();

    if (g.roundRect) {
      g.roundRect(box.x, box.y, box.w, box.h, 18 * devicePixelRatio);
    } else {
      g.rect(box.x, box.y, box.w, box.h);
    }

    g.stroke();

    g.fillStyle = "rgba(14,160,90,.95)";
    g.font = `${14 * devicePixelRatio}px Cairo, system-ui, sans-serif`;
    g.textAlign = "center";
    g.fillText(
      guideText[state.currentAngle] || "",
      w / 2,
      Math.max(24 * devicePixelRatio, box.y - 10 * devicePixelRatio)
    );
  }

  async function stopCamera() {
    if (state.stream) {
      state.stream.getTracks().forEach(t => t.stop());
    }
    state.stream = null;
  }

  async function startCamera() {
    await stopCamera();

    if (!navigator.mediaDevices?.getUserMedia) {
      throw new Error("متصفحك لا يدعم تشغيل الكاميرا. استخدم رفع صورة بديلة.");
    }

    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: "environment" },
        width: { ideal: 1600 },
        height: { ideal: 1200 }
      },
      audio: false
    });

    state.stream = stream;
    preview.srcObject = stream;

    await preview.play();

    fitOverlay();
    drawGuide();
  }

  function captureFrame() {
    const w = preview.videoWidth || preview.clientWidth;
    const h = preview.videoHeight || preview.clientHeight;

    if (!w || !h) return null;

    const canvas = document.createElement("canvas");
    canvas.width = w;
    canvas.height = h;

    const g = canvas.getContext("2d");
    if (!g) return null;

    g.drawImage(preview, 0, 0, w, h);

    return canvas.toDataURL("image/jpeg", 0.92);
  }

  function renderThumbs() {
    if (!thumbs) return;

    thumbs.innerHTML = "";

    for (const angle of angles) {
      const item = document.createElement("div");
      item.className = "mbk-thumb";
      item.title = angleLabels[angle];

      const img = document.createElement("img");
      if (state.captures[angle]) img.src = state.captures[angle];
      item.appendChild(img);

      const label = document.createElement("div");
      label.className = "label";
      label.textContent = angleLabels[angle];
      item.appendChild(label);

      item.addEventListener("click", () => setAngle(angle));
      thumbs.appendChild(item);
    }
  }

  function hasAllCaptures() {
   return !!(state.captures.side && state.captures.rear);
  }

  function setWaiting() {
    state.analysis = null;

    scoreBadge.textContent = hasAllCaptures()
      ? "جاهز للتحليل"
     : "بانتظار الصورتين";

    scoreFill.style.width = "0%";
    scoreFill.style.background = "#e5e7eb";

    scoreNote.textContent = hasAllCaptures()
      ? "اضغط التقاط/رفع عند أي زاوية لتحديثها، وسيتم التحليل بعد اكتمال الصور."
     : "التقط صورتين كاملتين: جانبية وخلفية.";
    
   if (breakdownBox) {
  breakdownBox.classList.add("hide");
  breakdownBox.innerHTML = "";
}
  }

  function renderAnalysis(result) {
    state.analysis = result;

    const score = Number(result.score);
    const pct = Math.max(0, Math.min(100, score));

    scoreBadge.textContent = `درجة ${score} من 100 — ${result.grade || ""}`;
    scoreFill.style.width = pct + "%";
    scoreFill.style.background = score >= 80 ? "#22c55e" : "#f59e0b";

    scoreNote.textContent = [
      result.reason || "",
      result.recommendation ? `التوصية: ${result.recommendation}` : ""
    ].filter(Boolean).join("\n");

    if (breakdownBox) {
      const b = result.breakdown || {};

      breakdownBox.classList.remove("hide");
      breakdownBox.innerHTML = `
        <div class="mbk-score-badge">التوزيع العلمي</div>
        <div>الضرع: ${Number(b.udder || 0)} / 40</div>
        <div>الأرجل والأقدام: ${Number(b.feetAndLegs || 0)} / 20</div>
        <div>القوة والطابع الحلاب: ${Number(b.dairyStrength || 0)} / 20</div>
        <div>المقدمة والسعة الجسمية: ${Number(b.frontEndAndCapacity || 0)} / 15</div>
        <div>الرامب/الحوض: ${Number(b.rump || 0)} / 5</div>
      `;
    }
  }

  async function analyzeOnServer() {
    if (!hasAllCaptures()) {
      setWaiting();
      return;
    }

    const r = await fetch("/api/dairy-traits/vision-analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
 captures: {
  side: state.captures.side,
  rear: state.captures.rear
}
      })
    });

    const j = await r.json().catch(() => ({}));

    if (!r.ok || !j.ok) {
      throw new Error(j.message || "تعذّر تحليل سمات إنتاج اللبن.");
    }

    renderAnalysis(j);
  }

  async function captureCurrentAngle() {
    try {
      hideMsg();

      captureBtn.disabled = true;
      captureBtn.textContent = "جاري الالتقاط...";

      const image = captureFrame();

      if (!image) {
        throw new Error("تعذّر التقاط الصورة.");
      }

      state.captures[state.currentAngle] = image;
      state.analysis = null;

      renderThumbs();
      setWaiting();

      if (hasAllCaptures()) {
        captureBtn.textContent = "جاري التحليل...";
        await analyzeOnServer();
      }

      retakeBtn.disabled = false;

    } catch (e) {
      console.warn("dairy traits capture error:", e);
      showMsg(e.message || "تعذّر تحليل سمات إنتاج اللبن.", false);
    } finally {
      captureBtn.disabled = false;
      captureBtn.textContent = "التقاط";
    }
  }

  function readFileAsDataUrl(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function uploadCurrentAngle(file) {
    if (!file) return;

    try {
      hideMsg();

      uploadBtn.disabled = true;
      uploadBtn.textContent = "جاري التحليل...";

      const image = await readFileAsDataUrl(file);

      state.captures[state.currentAngle] = image;
      state.analysis = null;

      renderThumbs();
      setWaiting();

      if (hasAllCaptures()) {
        await analyzeOnServer();
      }

      retakeBtn.disabled = false;

    } catch (e) {
      console.warn("dairy traits upload error:", e);
      showMsg(e.message || "تعذّر تحليل الصورة.", false);
    } finally {
      uploadBtn.disabled = false;
      uploadBtn.textContent = "رفع صورة";
      uploadInput.value = "";
    }
  }

  async function saveDairyTraits() {
    const ctx = contextFromUrl();
    const analysis = state.analysis;

    if (!analysis || !analysis.ok || !Number.isFinite(Number(analysis.score))) {
      showMsg("حلّل الصورتين أولًا قبل الحفظ.", false);
      return;
    }

    const uid = getTenantUid();

    try {
      saveBtn.disabled = true;
      saveBtn.textContent = "جارٍ الحفظ…";

      const r = await fetch("/api/dairy-traits/save", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          ...(uid ? { "X-User-Id": uid } : {})
        },
        body: JSON.stringify({
          animalId: ctx.animalId,
          animalNumber: ctx.animalNumber,
          eventDate: eventDateInput.value || ctx.eventDate || todayCairo(),
          score: analysis.score,
          analysis
        })
      });

      const j = await r.json().catch(() => ({}));

      if (!r.ok || !j.ok) {
        throw new Error(j.message || "تعذّر حفظ تقييم سمات إنتاج اللبن.");
      }

      showMsg(j.message || "✅ تم حفظ تقييم سمات إنتاج اللبن بنجاح", true);

      setTimeout(() => {
        const number = j.animalNumber || ctx.animalNumber || "";
        const dt = j.eventDate || eventDateInput.value || ctx.eventDate || todayCairo();
        location.href = `add-event.html?number=${encodeURIComponent(number)}&date=${encodeURIComponent(dt)}`;
      }, 900);

    } catch (e) {
      console.error("dairy traits save error:", e);
      showMsg(e.message || "تعذّر حفظ تقييم سمات إنتاج اللبن.", false);
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = "حفظ التقييم";
    }
  }

  function bindEvents() {
    $$(".mbk-vision-tab").forEach(btn => {
      btn.addEventListener("click", () => setAngle(btn.dataset.angle));
    });

    captureBtn.addEventListener("click", e => {
      e.preventDefault();
      captureCurrentAngle();
    });

    retakeBtn.addEventListener("click", e => {
      e.preventDefault();

      state.captures[state.currentAngle] = null;
      state.analysis = null;

      retakeBtn.disabled = true;
      renderThumbs();
      setWaiting();
    });

    uploadBtn.addEventListener("click", e => {
      e.preventDefault();
      uploadInput.click();
    });

    uploadInput.addEventListener("change", e => {
      uploadCurrentAngle(e.target.files?.[0]);
    });

    saveBtn.addEventListener("click", e => {
      e.preventDefault();
      saveDairyTraits();
    });

    backBtn.addEventListener("click", e => {
      e.preventDefault();

      const ctx = contextFromUrl();
      const number = ctx.animalNumber || "";
      const dt = eventDateInput.value || ctx.eventDate || todayCairo();

      location.href = `dashboard.html?number=${encodeURIComponent(number)}&date=${encodeURIComponent(dt)}`;
    });

    window.addEventListener("resize", () => {
      fitOverlay();
      drawGuide();
    });
  }

  async function init() {
    const ctx = contextFromUrl();

    if (animalIdInput) animalIdInput.value = ctx.animalId || "";
    if (eventDateInput) eventDateInput.value = ctx.eventDate || todayCairo();
    if (numberSpan) numberSpan.textContent = ctx.animalNumber || (ctx.animalId ? `#${ctx.animalId.slice(-5)}` : "—");

    renderThumbs();
    setWaiting();
    bindEvents();
    setAngle("side");

    try {
      await startCamera();
    } catch (e) {
      console.warn("camera error:", e);
      showMsg(e.message || "تعذّر تشغيل الكاميرا. يمكنك استخدام رفع صور بديلة.", false);
    }
  }

  init();
})();
</script>
  
</body>
</html>
