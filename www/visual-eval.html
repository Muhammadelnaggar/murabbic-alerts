  <script>
    // ===== تهيئة عامة وحالة الصفحة =====
    const qs = new URLSearchParams(location.search);
    const $ = (s,p=document)=>p.querySelector(s);
    const $$ = (s,p=document)=>[...p.querySelectorAll(s)];
    const isDemo = qs.get('demo')==='1' || qs.get('mode')==='demo';

    // تتبع ذكي (جاهز للتكامل)
    window.dataLayer = window.dataLayer || [];
    const t = { event:(name,p={})=>{ try{ window.dataLayer.push({event:name, ...p}); }catch{} } };
    t.event('page_view', { page: location.pathname, feature:'milking_traits_eval' });

    function todayCairo(){ const now=new Date(new Date().toLocaleString('en-US',{timeZone:'Africa/Cairo'})); return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`; }
   function getAnimalFromContext(){
  const id =
    qs.get('animalId') ||
    localStorage.getItem('currentAnimalId') ||
    '';

  const number =
    qs.get('number') ||
    qs.get('animalNumber') ||
    localStorage.getItem('currentAnimalNumber') ||
    '';

  const date =
    qs.get('eventDate') ||
    qs.get('date') ||
    sessionStorage.getItem('currentEventDate') ||
    localStorage.getItem('currentEventDate') ||
    todayCairo();

  if(id) localStorage.setItem('currentAnimalId', id);
  if(number) localStorage.setItem('currentAnimalNumber', number);
  if(date){
    localStorage.setItem('currentEventDate', date);
    sessionStorage.setItem('currentEventDate', date);
  }

  return { id, number, date };
}

    const anglesOrder=['udder-rear','side','front-body','teat-close'];
    const angleLabels={ 'udder-rear':'خلفية','side':'جانبية','front-body':'أمامية','teat-close':'قريبة ضرع' };
    const helperByAngle={
      'udder-rear':'قيّم تماثل أرباع الضرع وتوزيع الحلمات واتساع الأرجل الخلفية والـ udder cleft.',
      'side':'قيّم استقامة الظهر وزاوية الرامب وعمق الجسم.',
      'front-body':'قيّم اتساع الصدر واستقامة/توازي الأرجل الأمامية.',
      'teat-close':'قيّم توزيع/حجم الحلمات وتماثلها.'
    };

    const state = { currentAngle:'side', stream:null, track:null, capabilities:null, torchOn:false, captures: { 'udder-rear':null,'side':null,'front-body':null,'teat-close':null }, k:{} };
    window.state = state; // لأغراض الذكاء والتتبع

    const preview=$('#preview'), overlay=$('#overlay'), cameraSelect=$('#cameraSelect');
    const toggleFlash=$('#toggleFlash'), restartBtn=$('#restartBtn');
    const captureToggleBtn=$('#captureToggleBtn'), nextAngleBtn=$('#nextAngleBtn');
    const uploadBtn=$('#uploadBtn'), uploadInput=$('#uploadInput');
    const thumbs=$('#thumbs'), helperText=$('#helperText');
    const animalIdInput = $('#animalId'), saveBtn = $('#saveBtn'), backBtn = $('#backBtn');
    const animalNumberInput = $('#animalNumber');
    const evalDateInput = $('#evalDate');
  

const ctx = getAnimalFromContext();
if (animalIdInput) animalIdInput.value = ctx.id || '';
if (animalNumberInput) animalNumberInput.value = ctx.number || '';
if (evalDateInput) evalDateInput.value = ctx.date || todayCairo();

  

    // ===== الكاميرا =====
    async function listCameras(){ const devs=await navigator.mediaDevices.enumerateDevices(); const cams=devs.filter(d=>d.kind==='videoinput'); cameraSelect.innerHTML=''; cams.forEach((c,i)=>{ const o=document.createElement('option'); o.value=c.deviceId; o.textContent=c.label||`كاميرا ${i+1}`; cameraSelect.appendChild(o); }); return cams; }
    async function startCamera(deviceId){ if(state.stream){ state.stream.getTracks().forEach(t=>t.stop()); }
      const cs=deviceId?{video:{deviceId:{exact:deviceId}}}:{video:{facingMode:{ideal:'environment'}}};
      const stream=await navigator.mediaDevices.getUserMedia(cs); state.stream=stream; preview.srcObject=stream;
      const [track]=stream.getVideoTracks(); state.track=track; state.capabilities=track.getCapabilities?.()||null;
      await preview.play(); fitOverlay(); drawGuide(); populateTorchSupport(); }
    function populateTorchSupport(){ const cap=state.capabilities; toggleFlash.disabled=!(cap&&'torch' in cap); }
    function fitOverlay(){ const r=preview.getBoundingClientRect(); overlay.width=r.width*devicePixelRatio; overlay.height=r.height*devicePixelRatio; overlay.style.width=r.width+'px'; overlay.style.height=r.height+'px'; }
    function drawGuide(){ const g=overlay.getContext('2d'); if(!g) return; const w=overlay.width,h=overlay.height; g.clearRect(0,0,w,h);
      g.strokeStyle='rgba(255,255,255,.35)'; g.lineWidth=1*devicePixelRatio;
      for(let i=1;i<3;i++){ g.beginPath(); g.moveTo((w/3)*i,0); g.lineTo((w/3)*i,h); g.stroke(); g.beginPath(); g.moveTo(0,(h/3)*i); g.lineTo(w,(h/3)*i); g.stroke(); }
      g.strokeStyle='rgba(14,160,90,.9)'; g.lineWidth=4*devicePixelRatio;
      let rx=w*.08,ry=h*.12,rw=w*.84,rh=h*.76; const a=state.currentAngle;
      if(a==='side'){ rx=w*.05; ry=h*.15; rw=w*.9; rh=h*.7; }
      else if(a==='udder-rear'){ rx=w*.15; ry=h*.12; rw=w*.7; rh=h*.76; g.beginPath(); g.moveTo(w*.4,ry); g.lineTo(w*.4,ry+rh); g.stroke(); g.beginPath(); g.moveTo(w*.6,ry); g.lineTo(w*.6,ry+rh); g.stroke(); }
      else if(a==='teat-close'){ rx=w*.25; ry=h*.25; rw=w*.5; rh=h*.5; }
      else if(a==='front-body'){ rx=w*.12; ry=h*.12; rw=w*.76; rh=h*.76; }
      if(g.roundRect){ g.beginPath(); g.roundRect(rx,ry,rw,rh,20*devicePixelRatio); g.stroke(); } else { g.strokeRect(rx,ry,rw,rh); }
    }
    async function toggleTorch(){ try{ if(!state.track) return; state.torchOn=!state.torchOn; await state.track.applyConstraints({advanced:[{torch:state.torchOn}]}); toggleFlash.setAttribute('aria-pressed',String(state.torchOn)); toggleFlash.textContent=state.torchOn?'الفلاش: يعمل':'الفلاش'; }catch(e){ console.warn('Torch not supported',e); }}
    function dataURLFromVideo(){ const c=document.createElement('canvas'); const w=preview.videoWidth,h=preview.videoHeight; c.width=w; c.height=h; c.getContext('2d').drawImage(preview,0,0,w,h); return c.toDataURL('image/jpeg',0.92); }
    async function loadImageFromDataUrl(dataUrl){
  return await new Promise((resolve, reject)=>{
    const img = new Image();
    img.onload = ()=> resolve(img);
    img.onerror = reject;
    img.src = dataUrl;
  });
}

function imageStatsFromDataUrl(dataUrl){
  return new Promise(async (resolve, reject)=>{
    try{
      const img = await loadImageFromDataUrl(dataUrl);
      const c = document.createElement('canvas');
      const maxSide = 320;
      let w = img.width, h = img.height;
      const scale = Math.min(1, maxSide / Math.max(w, h));
      w = Math.max(1, Math.round(w * scale));
      h = Math.max(1, Math.round(h * scale));
      c.width = w; c.height = h;

      const ctx = c.getContext('2d', { willReadFrequently:true });
      ctx.drawImage(img, 0, 0, w, h);

      const { data } = ctx.getImageData(0, 0, w, h);

      let sumL = 0, sumL2 = 0;
      let edgeSum = 0;
      let subjectCount = 0;

      const lum = new Float32Array(w * h);

      for(let y=0; y<h; y++){
        for(let x=0; x<w; x++){
          const i = (y*w + x) * 4;
          const r = data[i], g = data[i+1], b = data[i+2];
          const L = 0.2126*r + 0.7152*g + 0.0722*b;
          lum[y*w + x] = L;
          sumL += L;
          sumL2 += L * L;
        }
      }

      const mean = sumL / (w*h);
      const variance = Math.max(0, (sumL2 / (w*h)) - (mean * mean));
      const contrast = Math.sqrt(variance);

      // تقدير الحدة: متوسط فرق الجيران
      let sharpness = 0, sharpN = 0;
      for(let y=1; y<h-1; y++){
        for(let x=1; x<w-1; x++){
          const p = lum[y*w + x];
          const dx = Math.abs(p - lum[y*w + (x+1)]);
          const dy = Math.abs(p - lum[(y+1)*w + x]);
          sharpness += dx + dy;
          sharpN += 2;
        }
      }
      sharpness = sharpN ? (sharpness / sharpN) : 0;

      // تقدير بسيط لمساحة الجسم: أي بكسل أغمق من الخلفية العامة قليلًا
      const threshold = mean - 12;
      for(let i=0; i<lum.length; i++){
        if(lum[i] < threshold) subjectCount++;
      }
      const subjectFill = subjectCount / lum.length;

      resolve({
        width: w,
        height: h,
        brightness: mean,   // 0..255
        contrast,           // كلما زاد أفضل
        sharpness,          // كلما زاد أفضل
        subjectFill         // نسبة ملء الجسم التقريبية
      });
    }catch(err){
      reject(err);
    }
  });
}

function qualityThresholds(angle){
  const base = {
    minBrightness: 55,
    maxBrightness: 210,
    minContrast: 18,
    minSharpness: 9,
    minFill: 0.08,
    maxFill: 0.72
  };

  if(angle === 'teat-close'){
    return { ...base, minSharpness: 11, minFill: 0.12, maxFill: 0.85 };
  }
  if(angle === 'side'){
    return { ...base, minFill: 0.12, maxFill: 0.65 };
  }
  if(angle === 'udder-rear'){
    return { ...base, minFill: 0.10, maxFill: 0.60 };
  }
  return base;
}

async function qualityCheck(dataUrl, angle){
  const s = await imageStatsFromDataUrl(dataUrl);
  const th = qualityThresholds(angle);
  const reasons = [];

  if(s.brightness < th.minBrightness) reasons.push('الإضاءة منخفضة');
  if(s.brightness > th.maxBrightness) reasons.push('الإضاءة عالية زيادة');
  if(s.contrast < th.minContrast) reasons.push('الصورة باهتة');
  if(s.sharpness < th.minSharpness) reasons.push('الصورة غير واضحة');
  if(s.subjectFill < th.minFill) reasons.push('اقترب أكثر من الحيوان');
  if(s.subjectFill > th.maxFill) reasons.push('ابتعد قليلًا عن الحيوان');

  const ok = reasons.length === 0;

  return {
    ok,
    stats: s,
    reasons,
    summary: ok
      ? '✅ اللقطة مقبولة للتقييم'
      : `⚠️ اللقطة غير مناسبة: ${reasons.join('، ')}`
  };
}

    async function analyzeSideImage(dataUrl){
  const img = await loadImageFromDataUrl(dataUrl);

  const c = document.createElement('canvas');
  const maxW = 420;
  const scale = Math.min(1, maxW / img.width);
  const w = Math.max(1, Math.round(img.width * scale));
  const h = Math.max(1, Math.round(img.height * scale));
  c.width = w;
  c.height = h;

  const ctx = c.getContext('2d', { willReadFrequently:true });
  ctx.drawImage(img, 0, 0, w, h);

  const { data } = ctx.getImageData(0, 0, w, h);

  const lum = new Float32Array(w * h);
  let sum = 0;

  for(let y=0; y<h; y++){
    for(let x=0; x<w; x++){
      const i = (y * w + x) * 4;
      const r = data[i], g = data[i+1], b = data[i+2];
      const L = 0.2126*r + 0.7152*g + 0.0722*b;
      lum[y*w + x] = L;
      sum += L;
    }
  }

  const mean = sum / (w*h);
  const thr = mean - 10;

  // mask بسيط للجسم
  const mask = new Uint8Array(w * h);
  let count = 0;
  let minX = w, minY = h, maxX = 0, maxY = 0;

  for(let y=0; y<h; y++){
    for(let x=0; x<w; x++){
      const idx = y*w + x;
      if(lum[idx] < thr){
        mask[idx] = 1;
        count++;
        if(x < minX) minX = x;
        if(y < minY) minY = y;
        if(x > maxX) maxX = x;
        if(y > maxY) maxY = y;
      }
    }
  }

  if(count < (w*h*0.05)){
    return {
      ok:false,
      backStraight:0,
      rumpAngle:0,
      bodyDepth:0,
      subjectFill: count/(w*h)
    };
  }

  const bw = Math.max(1, maxX - minX + 1);
  const bh = Math.max(1, maxY - minY + 1);
  const subjectFill = count / (w*h);

  // upper contour
  const topLine = [];
  for(let x=minX; x<=maxX; x++){
    let found = -1;
    for(let y=minY; y<=maxY; y++){
      if(mask[y*w + x]){
        found = y;
        break;
      }
    }
    topLine.push(found);
  }

  // smoothing
  const smooth = topLine.map((_, i)=>{
    let s=0, n=0;
    for(let j=i-2; j<=i+2; j++){
      if(j>=0 && j<topLine.length && topLine[j]>=0){
        s += topLine[j];
        n++;
      }
    }
    return n ? s/n : -1;
  });

  // topline straightness from front 25% to rear 75%
  const a = Math.floor(smooth.length * 0.25);
  const b = Math.floor(smooth.length * 0.75);
  const seg = smooth.slice(a, b).filter(v => v >= 0);

  let meanTop = 0;
  for(const v of seg) meanTop += v;
  meanTop = seg.length ? meanTop / seg.length : 0;

  let varTop = 0;
  for(const v of seg) varTop += (v - meanTop) * (v - meanTop);
  varTop = seg.length ? varTop / seg.length : 999;

  // كلما قل التذبذب زادت الاستقامة
  let backStraight = Math.round(95 - Math.min(35, Math.sqrt(varTop) * 4));
  backStraight = Math.max(50, Math.min(95, backStraight));

  // rump angle: فرق آخر الظهر عن أوله
  const first = smooth[Math.floor(smooth.length * 0.20)];
  const last  = smooth[Math.floor(smooth.length * 0.80)];
  let slope = (last >= 0 && first >= 0) ? (last - first) / Math.max(1, (smooth.length * 0.60)) : 0;
  let rumpAngle = Math.round(88 - Math.min(28, Math.abs(slope) * 220));
  rumpAngle = Math.max(55, Math.min(95, rumpAngle));

  // body depth: عمق الجسم عند منتصف الطول
  const midX = Math.floor((minX + maxX) / 2);
  let topY = -1, botY = -1;
  for(let y=minY; y<=maxY; y++){
    if(mask[y*w + midX]){
      if(topY < 0) topY = y;
      botY = y;
    }
  }
  const depthPx = (topY >= 0 && botY >= 0) ? (botY - topY + 1) : 0;
  const depthRatio = depthPx / Math.max(1, bh);

  let bodyDepth = Math.round(55 + Math.min(40, depthRatio * 55));
  bodyDepth = Math.max(50, Math.min(95, bodyDepth));

  return {
    ok:true,
    backStraight,
    rumpAngle,
    bodyDepth,
    subjectFill,
    bbox:{ minX, minY, maxX, maxY, bw, bh }
  };
}

        if(y < minY) minY = y;
        if(x > maxX) maxX = x;
        if(y > maxY) maxY = y;
      }
    }
  }

    return {
      ok:false,
      udderCleft:0,
      udderBalanceFrontRear:0,
      teatDistribution:0,
      teatSize:0
    };
  }

  const bw = Math.max(1, maxX - minX + 1);
  const bh = Math.max(1, maxY - minY + 1);
  const cx = Math.floor((minX + maxX) / 2);

  // نركز على الجزء السفلي الأوسط حيث الضرع غالبًا
  const y1 = Math.floor(minY + bh * 0.35);
  const y2 = Math.floor(minY + bh * 0.95);
  const x1 = Math.floor(minX + bw * 0.15);
  const x2 = Math.floor(minX + bw * 0.85);

  // balance يمين/يسار
  let leftCount = 0, rightCount = 0;
  for(let y=y1; y<=y2; y++){
    for(let x=x1; x<=x2; x++){
      if(mask[y*w + x]){
        if(x < cx) leftCount++;

  let centerDark = 0, sideDark = 0, n = 0;

  const teatY2 = Math.floor(minY + bh * 0.98);

    for(let y=teatY2; y>=teatY1; y--){

        bottomMost = y;
        break;
      }
    }
    teatCandidates.push(bottomMost);
  }

  const peaks = [];
  for(let i=2; i<teatCandidates.length-2; i++){
    const v = teatCandidates[i];
    if(v < 0) continue;
    if(
      v > teatCandidates[i-1] &&
      v >= teatCandidates[i+1] &&
      v > teatCandidates[i-2] &&
      v >= teatCandidates[i+2]

    }

  for(const p of peaks){
    const last = merged[merged.length - 1];

    let gapVar = 0;
    for(const g of gaps) gapVar += (g - gapMean) * (g - gapMean);

    teatSize,

      balanceRatio,
      cleftContrast,
      teatPeaks: merged.length
    }
  };

const missing = mustHave.filter(a => !window.state?.captures?.[a]);

if(missing.length){
  setMsg('⚠️ يلزم على الأقل لقطة جانبية ولقطة خلفية قبل الحفظ', false);
  return;
}

const res = window.computeOverallFromState();
const overall = res?.overall || 0;
const U = res?.U || 0, B = res?.B || 0, F = res?.F || 0, FE = res?.FE || 0;

if(!overall){
  setMsg('⚠️ لا يمكن حساب النتيجة الآن', false);
  return;
}

        // 1) إعداد فايربيز: نأخذ db و auth من firebase-config.js
        const mod = await import('./js/firebase-config.js');          // يوفّر db, auth, ensureAuth
        const { db, auth, ensureAuth } = mod;

        // 2) دوال Firestore من الـ CDN (firebase-config لا يصدّرها)
        const { addDoc, collection, serverTimestamp } =
          await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');

        // 3) تأكيد الدخول وفق القواعد
        await ensureAuth();
        const userId = auth?.currentUser?.uid;
        if(!userId){
          setMsg('❌ يجب تسجيل الدخول قبل الحفظ', false);
          return;
        }

        // 4) تجهيز الحمولة طبقًا لقواعدك (وجود userId إجباري)
        const payload = {
          type: 'تقييم Milking Traits',
          eventType: 'milking_traits_eval',
          animalId: (animalIdInput?.value||'') || null,
        animalNumber: (animalNumberInput?.value || localStorage.getItem('currentAnimalNumber') || '').trim(),
          eventDate: evalDateInput?.value || todayCairo(),
          overallScore: overall,
          groups: { udder:U, backRumpBody:B, frontLegs:F, femininity:FE },
          kpi: window.state?.k || {},

          // حقول الملكية/التتبّع
          userId,                          // لازم يساوي auth.uid حسب القواعد
          uid: userId,                     // (اختياري) للتوافق مع شاشات تانية
          tenantId: localStorage.getItem('tenantId') || null,

          source: location.pathname,
          createdAt: serverTimestamp()
        };

        // 5) الحفظ
        await addDoc(collection(db,'events'), payload);
      

        setMsg('✅ تم حفظ نتيجة التقييم (بدون صور)', true);
        try{ (window.dataLayer = window.dataLayer || []).push({event:'milking_traits_save', overall}); }catch{}
      }catch(err){
        console.error(err);
        setMsg('❌ تعذّر الحفظ في فايربيز', false);
      }finally{
        if(saveBtn){ saveBtn.disabled=false; saveBtn.textContent=prevTxt; }
      }
    }

    // توفّر الدالة عموميًا + ربط الزر
    window.__handleSave = __handleSave;
    saveBtn && saveBtn.addEventListener('click', __handleSave);
  })();
</script>

<script>
  // إزالة أي طبقة "editor-card" قد تغطي الأزرار
  (function(){
    function nuke(){
      document.querySelectorAll('editor-card,.editor-card').forEach(n=>{ try{ n.remove(); }catch{} });
    }
    new MutationObserver(nuke).observe(document.documentElement,{childList:true,subtree:true});
    document.addEventListener('DOMContentLoaded', nuke);
    nuke();
  })();
</script>
</body>
</html>
