<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
 

  <link rel="stylesheet" href="css/forms.css">
  <title>تقييم حالة الجسم (BCS) بالكاميرا — مُرَبِّك</title>
  <style>
    :root{ --green:#0ea05a; --green-600:#0b7f47; --bg:#f7faf7; --text:#0f172a; --muted:#64748b; --card:#ffffff; --danger:#c2410c; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,'Segoe UI','Cairo',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text)}
    header{position:sticky;top:0;z-index:10;background:var(--card);border-bottom:1px solid #e2e8f0;padding:12px 16px;display:flex;align-items:center;gap:12px}
    .title{font-weight:800;color:var(--green);margin:0}
    .badge{background:#e6f8ef;color:var(--green-600);padding:4px 8px;border-radius:999px;font-size:12px}
    .container{max-width:880px;margin:16px auto;padding:0 16px}
    .card{background:var(--card);border:1px solid #e2e8f0;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.04)}

    .angles{display:flex;gap:8px;padding:12px;border-bottom:1px solid #e2e8f0}
    .angle-tab{padding:10px 12px;border-radius:999px;border:1px solid #cbd5e1;background:#fff;cursor:pointer;font-weight:700;min-height:44px}
    .angle-tab.active{background:var(--green);color:#fff;border-color:var(--green)}

    .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:8px}
    .controls .select,.controls .input{padding:10px 12px;border:1px solid #cbd5e1;border-radius:12px;background:#fff;font-size:16px}
    .controls .btn{padding:12px 14px;border:none;border-radius:12px;cursor:pointer;font-weight:700;min-height:44px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
    .btn-primary{background:var(--green);color:#fff}
    .btn-light{background:#f1f5f9;color:#0f172a;border:1px solid #cbd5e1}
    .btn-danger{background:var(--danger);color:#fff}
    .btn:disabled{opacity:.6;cursor:not-allowed}

    .preview-wrap{position:relative;border-radius:16px;overflow:hidden;background:#000;aspect-ratio:4/3;max-height:56vh}
    .preview-wrap.rear-view{
  aspect-ratio:3/4;
}

.preview-wrap.side-view{
  aspect-ratio:4/3;
}


    video#preview{width:100%;height:100%;display:block;background:#000;object-fit:cover}
    canvas#overlay{position:absolute;inset:0;pointer-events:none}

    .thumbs{display:flex;gap:8px;padding:8px;border-top:1px solid #e2e8f0;flex-wrap:nowrap;overflow-x:auto;scroll-snap-type:x mandatory}
    .thumb{width:56px;height:56px;border-radius:12px;overflow:hidden;border:2px solid #e2e8f0;background:#f8fafc;position:relative;flex:0 0 auto;scroll-snap-align:start}
    .thumb img{width:100%;height:100%;object-fit:cover}
    .thumb .label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.5);color:#fff;font-size:11px;text-align:center}

    .results{padding:12px;border-top:1px solid #e2e8f0;display:grid;gap:10px}
    .upload-preview{
  display:flex;
  gap:12px;
  align-items:center;
  padding:10px;
  background:#fff;
  border:1px solid #e2e8f0;
  border-radius:14px;
}

.upload-preview img{
  width:96px;
  height:96px;
  object-fit:cover;
  border-radius:12px;
  border:1px solid #e5e7eb;
}
    .score{display:grid;gap:8px;padding:8px;border:1px solid #e2e8f0;border-radius:12px;background:#fff}
    .score-badge{display:inline-block;padding:6px 10px;border:1px solid transparent;border-radius:999px;font-weight:800;width:max-content}
    .score-bar{height:10px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:999px;overflow:hidden}
    .score-bar .fill{height:100%}
    .score-note{color:var(--muted);font-weight:700}

    .save-bar{display:flex;gap:8px;align-items:center;padding:12px;border-top:1px solid #e2e8f0}
    .save-bar .input{padding:10px 12px;border:1px solid #cbd5e1;border-radius:12px;background:#fff;font-size:16px}

    #saveBtn{padding:16px 20px;font-size:18px;border-radius:14px;width:100%;max-width:100%}

    .kind-card{padding:8px}
    .kind-grid{display:grid;grid-template-columns:auto 1fr;gap:8px;align-items:center}
    @media(max-width:560px){.kind-grid{grid-template-columns:1fr 1fr}}

    .controls.controls-grid{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
    .controls-grid .left{display:flex;gap:8px;align-items:center}
    .controls-grid .right{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
    @media(min-width:860px){.controls-grid .right{grid-template-columns:repeat(4,minmax(0,1fr))}}
    .btn-lg{padding:14px 18px;font-size:18px}
    @media(max-width:560px){
      .controls.controls-grid{grid-template-columns:1fr}
      .controls-grid .right{justify-content:stretch}
      .controls .btn, .controls .select{width:100%}
      #captureBtn{order:-1}
    }
    #cameraCard .controls{position:sticky;top:56px;z-index:5;background:var(--card);border-bottom:1px solid #e2e8f0}

    .save-bar{display:flex;flex-direction:column;align-items:stretch;gap:8px}
    .save-bar button{width:100% !important;max-width:100%}
    #backBtn{width:100% !important}
    .save-bar label{width:100%;min-width:0}

    @media (min-width: 640px){
      .save-bar{flex-direction:row;align-items:center}
      .save-bar label{flex:1 1 260px}
      .save-bar button,#backBtn{width:auto !important}
    }
  
  </style>
</head>
<body>
  <header>
    <h1 class="title">BCS تقييم حالة الجسم بالكاميرا</h1>
    <span class="badge">مُرَبِّك</span>
    <div style="margin-inline-start:auto;color:var(--muted);font-weight:700">رقم الحيوان: <span class="animal-number">—</span></div>
  </header>

  <div class="container">

    <section class="card" id="cameraCard">
      <div class="angles">
        <button class="angle-tab active" data-angle="rear">لقطة خلفية</button>
        <button class="angle-tab" data-angle="side">لقطة جانبية</button>
      </div>

      <div class="controls controls-grid">
        <div class="left">
          <button id="captureBtn" class="btn btn-primary btn-lg">التقاط</button>
          <button id="retakeBtn" class="btn btn-danger" disabled>إعادة الالتقاط</button>
        </div>
        <div class="right">
  <button id="uploadBtn" type="button" class="btn btn-light">رفع صورة بديلة</button>
  <input id="uploadInput" type="file" accept="image/*" style="display:none" />
</div>
      </div>

     <div class="preview-wrap rear-view" id="previewWrap">
  <video id="preview" playsinline autoplay muted></video>
  <canvas id="overlay"></canvas>
</div>

      <div class="thumbs" id="thumbs"></div>

      <div class="results">
  <h3 style="margin:8px 0;color:var(--green-600)">النتيجة</h3>

  <div class="upload-preview" id="uploadPreviewBox" style="display:none">
    <img id="uploadPreviewImg" alt="المعاينة" />
    <div style="display:grid;gap:6px">
      <div style="font-weight:800;color:#0f172a">الصورة المستخدمة في التقييم</div>
      <div style="color:var(--muted);font-size:14px;line-height:1.6">يتم تحليل هذه الصورة فقط لاستخراج النتيجة، ولا يتم حفظها ضمن بيانات الحيوان.</div>
    </div>
  </div>
        <div id="scoreWidget" class="score">
          <div class="score-badge" id="scoreBadge">—</div>
          <div class="score-bar"><div class="fill" id="scoreFill" style="width:0%"></div></div>
          <div class="score-note" id="scoreNote">المدى يعتمد على النوع.</div>
        </div>
      </div>

      <div class="save-bar">
        <input type="hidden" id="animalId" />
        <label style="display:flex;gap:8px;align-items:center">تاريخ التقييم
          <input type="date" id="eventDate" class="input" />
        </label>
        <input id="commentInput" class="input" placeholder="تعليق (اختياري)" />
        <div style="margin-inline-start:auto"></div>
        <button id="backEventsBtn" class="btn" style="padding:12px 14px;border:1px solid #cbd5e1;border-radius:12px;background:#f1f5f9;color:#0f172a">رجوع للأحداث</button>
        <button id="saveBtn" class="btn btn-primary">حفظ التقييم</button>
      </div>
    </section>
  </div>

 <script>
(function () {
  "use strict";

  const qs = new URLSearchParams(location.search);
  const $ = (s, p = document) => p.querySelector(s);
  const $$ = (s, p = document) => Array.from(p.querySelectorAll(s));

  const preview = $("#preview");
  const overlay = $("#overlay");
  const previewWrap = $("#previewWrap");
  const cameraSelect = null;
  const toggleFlash = null;
  const restartBtn = null;
  const captureBtn = $("#captureBtn");
  const retakeBtn = $("#retakeBtn");
  const uploadBtn = $("#uploadBtn");
  const uploadInput = $("#uploadInput");
  const saveBtn = $("#saveBtn");
  const backEventsBtn = $("#backEventsBtn");
  const eventDateInput = $("#eventDate");
  const animalIdInput = $("#animalId");
  const numberSpan = $(".animal-number");
  const scoreBadge = $("#scoreBadge");
  const scoreFill = $("#scoreFill");
  const scoreNote = $("#scoreNote");
  const thumbs = $("#thumbs");
  const uploadPreviewBox = $("#uploadPreviewBox");
  const uploadPreviewImg = $("#uploadPreviewImg");
  const animalTypeSel = { value: "" };
  const commentInput = $("#commentInput");
  const formBar = $(".save-bar");
  const anglesOrder = ["rear", "side"];
  const angleLabels = { rear: "خلفية", side: "جانبية" };

  const state = {
    currentAngle: "rear",
    stream: null,
    track: null,
    torchOn: false,
    captures: { rear: null, side: null },
    analysis: null
   };

  const msgBox = document.createElement("div");
  Object.assign(msgBox.style, {
    marginTop: "10px",
    padding: "12px",
    borderRadius: "8px",
    textAlign: "center",
    fontWeight: "bold",
    display: "none"
  });
  formBar?.appendChild(msgBox);

  function showMsg(kind, text) {
    msgBox.style.display = "block";
    msgBox.style.background = kind === "ok" ? "#c8e6c9" : "#ffcdd2";
    msgBox.style.color = kind === "ok" ? "#1b5e20" : "#b71c1c";
    msgBox.textContent = text;
    msgBox.scrollIntoView({ behavior: "smooth", block: "center" });
  }

  function todayCairo() {
    const now = new Date(new Date().toLocaleString("en-US", { timeZone: "Africa/Cairo" }));
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, "0");
    const d = String(now.getDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
  }

  function contextFromUrl() {
    return {
      animalId: qs.get("animalId") || "",
      animalNumber: qs.get("number") || qs.get("animalNumber") || "",
      eventDate: qs.get("date") || todayCairo()
    };
  }

function currentKind() {
  const raw = String(
    qs.get("kind") ||
    qs.get("species") ||
    qs.get("animalKind") ||
    qs.get("animalSpecies") ||
    ""
  ).trim().toLowerCase();

  if (raw.includes("buffalo") || raw.includes("جاموس")) return "buffalo";
  return "cow";
}

  function fitOverlay() {
    if (!preview || !overlay) return;

    const r = preview.getBoundingClientRect();
    overlay.width = Math.max(1, Math.floor(r.width * devicePixelRatio));
    overlay.height = Math.max(1, Math.floor(r.height * devicePixelRatio));
    overlay.style.width = r.width + "px";
    overlay.style.height = r.height + "px";
  }

  function drawGuide() {
    if (!overlay) return;

    const g = overlay.getContext("2d");
    if (!g) return;

    const w = overlay.width;
    const h = overlay.height;

    g.clearRect(0, 0, w, h);

    g.strokeStyle = "rgba(255,255,255,.35)";
    g.lineWidth = 1 * devicePixelRatio;

    for (let i = 1; i < 3; i++) {
      g.beginPath();
      g.moveTo((w / 3) * i, 0);
      g.lineTo((w / 3) * i, h);
      g.stroke();

      g.beginPath();
      g.moveTo(0, (h / 3) * i);
      g.lineTo(w, (h / 3) * i);
      g.stroke();
    }

    g.strokeStyle = "rgba(14,160,90,.9)";
    g.lineWidth = 4 * devicePixelRatio;

    let rx, ry, rw, rh;

    if (state.currentAngle === "rear") {
      rx = w * 0.2;
      ry = h * 0.45;
      rw = w * 0.6;
      rh = h * 0.35;

      g.beginPath();
      g.moveTo(w / 2, ry);
      g.lineTo(w / 2, ry + rh);
      g.stroke();
    } else {
      rx = w * 0.15;
      ry = h * 0.35;
      rw = w * 0.7;
      rh = h * 0.4;

      g.beginPath();
      g.moveTo(w * 0.35, ry);
      g.lineTo(w * 0.35, ry + rh);
      g.stroke();

      g.beginPath();
      g.moveTo(w * 0.65, ry);
      g.lineTo(w * 0.65, ry + rh);
      g.stroke();
    }

    if (g.roundRect) {
      g.beginPath();
      g.roundRect(rx, ry, rw, rh, 20 * devicePixelRatio);
      g.stroke();
    } else {
      g.strokeRect(rx, ry, rw, rh);
    }
  }

  async function stopCamera() {
    if (state.stream) {
      state.stream.getTracks().forEach(t => t.stop());
    }

    state.stream = null;
    state.track = null;
  }

  async function startCamera(deviceId) {
    await stopCamera();

    const constraints = {
      video: {
        facingMode: deviceId ? undefined : { ideal: "environment" },
        deviceId: deviceId ? { exact: deviceId } : undefined,
        width: { ideal: 1920 },
        height: { ideal: 1440 }
      },
      audio: false
    };

    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    state.stream = stream;

   preview.srcObject = stream;

await new Promise((resolve) => {
  if (preview.readyState >= 2 && preview.videoWidth) {
    resolve();
    return;
  }

  preview.onloadedmetadata = () => resolve();
});

await preview.play();

await new Promise((resolve) => {
  if (preview.videoWidth && preview.videoHeight) {
    resolve();
    return;
  }

  preview.oncanplay = () => resolve();
});

const tracks = stream.getVideoTracks();
state.track = tracks[0] || null;

fitOverlay();
drawGuide();
updateTorchButton();
await populateCameras();
}
  async function populateCameras() {
    if (!navigator.mediaDevices?.enumerateDevices || !cameraSelect) return;

    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d => d.kind === "videoinput");

    const current = cameraSelect.value;
    cameraSelect.innerHTML = "";

    cams.forEach((cam, idx) => {
      const o = document.createElement("option");
      o.value = cam.deviceId;
      o.textContent = cam.label || `كاميرا ${idx + 1}`;
      cameraSelect.appendChild(o);
    });

    if (current && cams.some(c => c.deviceId === current)) {
      cameraSelect.value = current;
    }
  }

 function updateTorchButton() {
  if (!toggleFlash) return;
  const caps = state.track?.getCapabilities?.() || {};
  const ok = !!caps.torch;
  toggleFlash.disabled = !ok;
}

  async function toggleTorch() {
    try {
      if (!state.track) return;

      state.torchOn = !state.torchOn;

      await state.track.applyConstraints({
        advanced: [{ torch: state.torchOn }]
      });

      toggleFlash.textContent = state.torchOn ? "الفلاش: يعمل" : "الفلاش";
      toggleFlash.setAttribute("aria-pressed", String(state.torchOn));
    } catch (e) {
      console.warn("Torch error:", e);
    }
  }

  function captureFrame() {
    const c = document.createElement("canvas");
    const w = preview.videoWidth || preview.clientWidth;
    const h = preview.videoHeight || preview.clientHeight;

    if (!w || !h) return null;

    c.width = w;
    c.height = h;

    const g = c.getContext("2d");
    g.drawImage(preview, 0, 0, w, h);

    return c.toDataURL("image/jpeg", 0.92);
  }

function applyAngleView() {
  if (!previewWrap) return;

  const isSide = state.currentAngle === "side";

  previewWrap.classList.toggle("rear-view", !isSide);
  previewWrap.classList.toggle("side-view", isSide);

  fitOverlay();
  drawGuide();
}

  function setAngle(angle) {
    state.currentAngle = angle;
  
    $$(".angle-tab").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.angle === angle);
    });

    applyAngleView();
    updateButtons();
  }

function updateKindUI() {
  const kind = currentKind();
  const sideBtn = document.querySelector('[data-angle="side"]');

  if (sideBtn) {
    sideBtn.style.display = kind === "buffalo" ? "none" : "";
  }

  if (kind === "buffalo" && state.currentAngle !== "rear") {
    setAngle("rear");
  }

  scoreNote.textContent = kind === "buffalo"
    ? "الجاموس يحتاج لقطة خلفية فقط."
    : "الأبقار تحتاج لقطة خلفية ولقطة جانبية.";
}
  function renderThumbs() {
    thumbs.innerHTML = "";

    for (const angle of anglesOrder) {
      if (angle === "side" && currentKind() === "buffalo") continue;

      const div = document.createElement("div");
      div.className = "thumb";

      const url = state.captures[angle];

      if (url) {
        const img = document.createElement("img");
        img.src = url;
        div.appendChild(img);
      }

      const label = document.createElement("div");
      label.className = "label";
      label.textContent = angleLabels[angle];
      div.appendChild(label);

      thumbs.appendChild(div);
    }
  }
function showUploadPreview(url) {
  if (!uploadPreviewBox || !uploadPreviewImg) return;
  uploadPreviewImg.src = url;
  uploadPreviewBox.style.display = "flex";
}
  function updateButtons() {
    retakeBtn.disabled = !state.captures[state.currentAngle];
  }

  function showAnalysis(analysis) {
    state.analysis = analysis || null;

    if (!analysis || !analysis.ok) {
      scoreBadge.textContent = "—";
      scoreFill.style.width = "0%";
      scoreNote.textContent = currentKind() === "buffalo"
        ? "التقط اللقطة الخلفية لتحليل حالة الجسم."
        : "التقط الخلفية والجانبية لتحليل حالة الجسم.";
      return;
    }

    const score = Number(analysis.score);
    const min = analysis.kind === "buffalo" ? 1 : 2;
    const max = 5;
    const pct = Math.max(0, Math.min(100, ((score - min) / (max - min)) * 100));

    scoreBadge.textContent = `BCS ${score.toFixed(2)} — ${analysis.label || ""}`;
    scoreFill.style.width = pct + "%";
    scoreFill.style.background = (score >= 2.75 && score <= 3.25) ? "#86efac" : "#fbbf24";
    scoreNote.textContent = analysis.quality?.label
      ? `جودة التحليل: ${analysis.quality.label}`
      : "النتيجة من السيرفر.";
  }

  async function analyzeOnServer() {
    const kind = currentKind();

    if (!state.captures.rear) {
      showAnalysis(null);
      return;
    }

    if (kind === "cow" && !state.captures.side) {
      showAnalysis(null);
      return;
    }

    const r = await fetch("/api/bcs/vision-analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        kind,
        animalType: animalTypeSel.value || "",
        captures: {
          rear: state.captures.rear || null,
          side: state.captures.side || null
        }
      })
    });

    const j = await r.json().catch(() => ({}));

    if (!r.ok || !j.ok) {
      throw new Error(j.message || "تعذّر تحليل حالة الجسم.");
    }

    showAnalysis(j);
  }

  async function captureCurrentAngle() {
    try {
      
      captureBtn.disabled = true;
      captureBtn.textContent = "جاري الالتقاط...";

      const url = captureFrame();

      if (!url) {
        throw new Error("تعذّر التقاط الصورة.");
      }

      state.captures[state.currentAngle] = url;
      state.analysis = null;
      showUploadPreview(url);

      renderThumbs();
      updateButtons();
      showAnalysis(null);

      captureBtn.textContent = "جاري التحليل...";
      await analyzeOnServer();

    } catch (e) {
      console.warn("BCS capture/analyze error:", e);
      showMsg("err", e.message || "تعذّر تحليل حالة الجسم.");
    } finally {
      captureBtn.disabled = false;
      captureBtn.textContent = "التقاط";
    }
  }

  async function uploadImage(file) {
    const url = await new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.onerror = reject;
      r.readAsDataURL(file);
    });

    state.captures[state.currentAngle] = url;
    state.analysis = null;
    showUploadPreview(url);

    renderThumbs();
    updateButtons();
    showAnalysis(null);

    await analyzeOnServer();
  }

  async function saveBCS() {
    msgBox.style.display = "none";

    const ctx = contextFromUrl();
    const analysis = state.analysis;

    if (!analysis || !analysis.ok || !Number.isFinite(Number(analysis.score))) {
      showMsg("err", "⚠️ حلّل الصور أولًا قبل الحفظ.");
      return;
    }

    const payload = {
      eventDate: eventDateInput.value || ctx.eventDate || todayCairo(),
      animalId: ctx.animalId,
      animalNumber: ctx.animalNumber,
      kind: analysis.kind,
      animalType: analysis.animalType || "",
      analysis,
      comment: commentInput?.value || ""
    };

    try {
      saveBtn.disabled = true;

      const r = await fetch("/api/bcs/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const j = await r.json().catch(() => ({}));

      if (!r.ok || !j.ok) {
        throw new Error(j.message || "تعذّر حفظ تقييم حالة الجسم.");
      }

      showMsg("ok", j.message || "✅ تم حفظ تقييم حالة الجسم بنجاح");

      setTimeout(() => {
        const number = j.animalNumber || ctx.animalNumber || ctx.animalId || "";
        const dt = j.eventDate || payload.eventDate;
        location.href = `add-event.html?number=${encodeURIComponent(number)}&date=${encodeURIComponent(dt)}`;
      }, 900);

    } catch (e) {
      console.error("BCS save error:", e);
      showMsg("err", e.message || "تعذّر حفظ تقييم حالة الجسم.");
    } finally {
      saveBtn.disabled = false;
    }
  }

  function initEvents() {

    $$(".angle-tab").forEach(btn => {
      btn.addEventListener("click", () => setAngle(btn.dataset.angle));
    });

    captureBtn?.addEventListener("click", captureCurrentAngle);

    retakeBtn?.addEventListener("click", () => {
      state.captures[state.currentAngle] = null;
      state.analysis = null;

      renderThumbs();
      updateButtons();
      showAnalysis(null);
    });

    restartBtn?.addEventListener("click", () => {
      startCamera(cameraSelect.value).catch(e => {
        console.warn(e);
        showMsg("err", "تعذّر تشغيل الكاميرا.");
      });
    });

    cameraSelect?.addEventListener("change", () => {
      startCamera(cameraSelect.value).catch(e => {
        console.warn(e);
        showMsg("err", "تعذّر تغيير الكاميرا.");
      });
    });

    toggleFlash?.addEventListener("click", toggleTorch);

    uploadBtn?.addEventListener("click", e => {
      e.preventDefault();
      uploadInput.click();
    });

    uploadInput?.addEventListener("change", async e => {
      const file = e.target.files?.[0];
      if (!file) return;

      try {
        await uploadImage(file);
      } catch (err) {
        console.warn(err);
        showMsg("err", err.message || "تعذّر تحليل الصورة.");
      } finally {
        e.target.value = "";
      }
    });

    saveBtn?.addEventListener("click", e => {
      e.preventDefault();
      saveBCS();
    });

    backEventsBtn?.addEventListener("click", e => {
      e.preventDefault();

      const ctx = contextFromUrl();
      const num = ctx.animalNumber || ctx.animalId || "";
      const dt = eventDateInput.value || ctx.eventDate || todayCairo();

      location.href = `add-event.html?number=${encodeURIComponent(num)}&date=${encodeURIComponent(dt)}`;
    });

   window.addEventListener("resize", () => {
   applyAngleView();
    });
  }

  async function init() {
    const ctx = contextFromUrl();

    if (animalIdInput) animalIdInput.value = ctx.animalId || "";
    if (eventDateInput) eventDateInput.value = ctx.eventDate || todayCairo();
    if (numberSpan) numberSpan.textContent = ctx.animalNumber || (ctx.animalId ? `#${ctx.animalId.slice(-5)}` : "—");

    updateKindUI();
    applyAngleView();
    renderThumbs();
    updateButtons();
    showAnalysis(null);
    initEvents();

    if (!navigator.mediaDevices?.getUserMedia) {
      showMsg("err", "متصفحك لا يدعم تشغيل الكاميرا. استخدم رفع صورة بديلة.");
      return;
    }

    try {
      await startCamera();
    } catch (e) {
      console.warn(e);
      showMsg("err", "تعذّر تشغيل الكاميرا. يمكنك استخدام رفع صورة بديلة.");
    }
  }

  init();
})();
</script>
</body>
</html>
