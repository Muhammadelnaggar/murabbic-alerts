<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="stylesheet" href="css/forms.css">
  <title>تسجيل التهاب الضرع — مُرَبِّك</title>
  
</head>
<body>
<header>
  <div class="mbk-head">
    <a class="mbk-back" href="add-event.html">رجوع</a>

    <div class="mbk-center">
      <div class="mbk-page-title">تسجيل التهاب الضرع</div>
      <div class="mbk-app-name">مُرَبِّك</div>
    </div>

    <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّك" />
  </div>
</header>

<div id="sysbar" class="infobar"></div>

<main>
  <section class="card">
    <form id="mastitisForm" novalidate>
      <div class="row">
        <div>
          <label for="animalNumber">رقم الحيوان</label>
          <input id="animalNumber" inputmode="numeric" autocomplete="off" />
        </div>

        <div>
          <label for="eventDate">تاريخ التشخيص</label>
          <input id="eventDate" type="date" />
        </div>
      </div>

      <fieldset>
        <legend>الربع المصاب</legend>
        <div id="quartersBox" class="radio-group"></div>
      </fieldset>

      <div class="row">
        <div>
          <label for="mastitisType">نوع الالتهاب</label>
          <select id="mastitisType">
            <option value="">اختر من السيرفر...</option>
          </select>
        </div>

        <div>
          <label for="notes">ملاحظات اختيارية</label>
          <textarea id="notes" rows="3" placeholder="أي ملاحظة علاجية أو تشخيصية مختصرة"></textarea>
        </div>
      </div>
      <fieldset>
  <legend>صورة اللبن</legend>

  <div class="row">
    <div>
<label>تصوير اللبن من الربع المصاب</label>

<input id="milkUploadImage" type="file" accept="image/*" hidden />

<div class="row">
  <div>
    <button type="button" id="captureMilkBtn" class="secondary-btn">
      📷 التقاط صورة اللبن
    </button>
  </div>

  <div>
    <button type="button" id="uploadMilkBtn" class="secondary-btn">
      🖼️ رفع صورة بديلة
    </button>
  </div>
</div>

<div id="milkFileHint" class="form-hint">
  لم يتم اختيار صورة بعد.
</div>

<div class="form-hint">
  صوّر اللبن على سطح أسود نظيف، بإضاءة قوية، ومن مسافة قريبة. اجعل اللبن واضحًا داخل الكادر وتجنّب الظل والاهتزاز والانعكاس الشديد.
</div>
    </div>

   <div>
  <label>معاينة الصورة</label>
  <div class="mbk-camera-frame">
  <video id="milkCameraVideo" class="mbk-camera-preview" autoplay playsinline muted hidden></video>
  <img id="milkPreview" class="mbk-camera-preview" alt="معاينة صورة اللبن" hidden />
</div>
  <div id="noImageHint" class="form-hint">
    لم يتم التقاط صورة بعد.
  </div>
</div>
  </div>
</fieldset>
    </form>
  </section>
</main>

<div class="actions-bar">
  <button type="button" class="save" id="saveBtn">حفظ التهاب الضرع</button>
</div>

<script>
(function(){
  const API_BASE = "";

  const els = {
    sysbar: document.getElementById("sysbar"),
    animalNumber: document.getElementById("animalNumber"),
    eventDate: document.getElementById("eventDate"),
    quartersBox: document.getElementById("quartersBox"),
    mastitisType: document.getElementById("mastitisType"),
    notes: document.getElementById("notes"),
    milkUploadImage: document.getElementById("milkUploadImage"),
    captureMilkBtn: document.getElementById("captureMilkBtn"),
    uploadMilkBtn: document.getElementById("uploadMilkBtn"),
    milkFileHint: document.getElementById("milkFileHint"),
    milkPreview: document.getElementById("milkPreview"),
    milkCameraVideo: document.getElementById("milkCameraVideo"),
    noImageHint: document.getElementById("noImageHint"),
    saveBtn: document.getElementById("saveBtn")
  };

  function todayLocal(){
    const d = new Date();
    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    return d.toISOString().slice(0, 10);
  }

  function getUserId(){
    const qs = new URLSearchParams(location.search);
    return (
      qs.get("userId") ||
      localStorage.getItem("userId") ||
      localStorage.getItem("uid") ||
      localStorage.getItem("ownerUid") ||
      localStorage.getItem("tenantId") ||
      ""
    ).trim();
  }

  function escapeHtml(v){
    return String(v ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function showMsg(text, type){
    const msg = String(text || "").trim();
    if (!msg) {
      els.sysbar.className = "infobar";
      els.sysbar.textContent = "";
      return;
    }

    els.sysbar.textContent = msg;
    els.sysbar.className = "infobar show " + (type || "info");

    try {
      els.sysbar.scrollIntoView({ behavior:"smooth", block:"center" });
    } catch {}
  }

  async function apiPost(path, body){
    const uid = getUserId();

    if (!uid) {
      throw new Error("يلزم تسجيل الدخول أولًا.");
    }

    const r = await fetch(API_BASE + path, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-User-Id": uid
      },
      body: JSON.stringify(body || {})
    });

    let j = null;
    try {
      j = await r.json();
    } catch {
      j = null;
    }

    if (!r.ok) {
      const msg = j?.message || "تعذّر تنفيذ الطلب من السيرفر.";
      const err = new Error(msg);
      err.response = j;
      err.status = r.status;
      throw err;
    }

    return j || {};
  }

  function hydrateFromQuery(){
    const qs = new URLSearchParams(location.search);

    els.animalNumber.value =
      qs.get("number") ||
      qs.get("animalNumber") ||
      qs.get("animalId") ||
      "";

    els.eventDate.value =
      qs.get("date") ||
      qs.get("eventDate") ||
      todayLocal();
  }

  function collectPayload(){
    return {
      animalNumber: els.animalNumber.value.trim(),
      eventDate: els.eventDate.value,
      mastitisType: els.mastitisType.value,
      quarters: Array.from(
        document.querySelectorAll('input[name="quarters"]:checked')
      ).map(x => x.value),
      notes: els.notes.value.trim()
    };
  }

  function renderOptions(options){
    const quarters = Array.isArray(options?.quarters) ? options.quarters : [];
    const mastitisTypes = Array.isArray(options?.mastitisTypes) ? options.mastitisTypes : [];

    els.quartersBox.innerHTML = quarters.map(q => {
      const safe = escapeHtml(q);
      return `<label><input type="checkbox" name="quarters" value="${safe}"> ${safe}</label>`;
    }).join("");

    const oldType = els.mastitisType.value;

    els.mastitisType.innerHTML =
      `<option value="">-- اختر --</option>` +
      mastitisTypes.map(t => {
        const safe = escapeHtml(t);
        return `<option value="${safe}">${safe}</option>`;
      }).join("");

    if (oldType && mastitisTypes.includes(oldType)) {
      els.mastitisType.value = oldType;
    }
  }

  async function runGate(){
    try {
      const payload = collectPayload();

      const j = await apiPost("/api/mastitis/gate", {
        animalNumber: payload.animalNumber,
        eventDate: payload.eventDate
      });

      renderOptions(j.options || {});

      if (j.message && !j.silent) {
        showMsg(j.message, j.allowed ? "success" : "warning");
      } else if (!payload.animalNumber) {
        showMsg("أدخل رقم الحيوان وتاريخ التشخيص.", "info");
      }

    } catch (e) {
      showMsg(e.message || "تعذّر التحقق من السيرفر.", "error");
    }
  }

  async function save(){
    const prev = els.saveBtn.textContent;

    try {
      els.saveBtn.disabled = true;
      els.saveBtn.textContent = "جارٍ الحفظ...";
      showMsg("جارٍ إرسال البيانات للسيرفر...", "info");

      const j = await apiPost("/api/mastitis/save", collectPayload());

      showMsg(j.message || "✅ تم حفظ التهاب الضرع بنجاح", "success");

      if (j.redirectUrl) {
        setTimeout(() => {
          location.href = j.redirectUrl;
        }, 900);
      }

    } catch (e) {
      showMsg(e.message || "تعذّر حفظ التهاب الضرع.", "error");
    } finally {
      els.saveBtn.disabled = false;
      els.saveBtn.textContent = prev;
    }
  }
let milkCameraStream = null;
let capturedMilkImageDataUrl = "";

function stopMilkCamera(){
  if (milkCameraStream) {
    milkCameraStream.getTracks().forEach(track => track.stop());
    milkCameraStream = null;
  }

  els.milkCameraVideo.srcObject = null;
  els.milkCameraVideo.hidden = true;
  els.captureMilkBtn.textContent = "📷 التقاط صورة اللبن";
}

function showMilkPreview(dataUrl, labelText){
  capturedMilkImageDataUrl = dataUrl || "";

  if (!dataUrl) {
    els.milkPreview.removeAttribute("src");
    els.milkPreview.hidden = true;
    els.noImageHint.hidden = false;
    els.milkFileHint.textContent = "لم يتم اختيار صورة بعد.";
    return;
  }

  els.milkPreview.src = dataUrl;
  els.milkPreview.hidden = false;
  els.noImageHint.hidden = true;
  els.milkFileHint.textContent = labelText || "تم التقاط صورة اللبن.";
}

function previewMilkFile(file){
  stopMilkCamera();

  if (!file) {
    showMilkPreview("", "لم يتم اختيار صورة بعد.");
    return;
  }

  const reader = new FileReader();

  reader.onload = () => {
    showMilkPreview(reader.result, file.name || "تم اختيار صورة اللبن.");
  };

  reader.readAsDataURL(file);
}

async function openMilkCamera(){
  try {
    stopMilkCamera();

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showMsg("متصفحك لا يدعم تشغيل الكاميرا. استخدم رفع صورة بديلة.", "warning");
      els.milkUploadImage.click();
      return;
    }

    milkCameraStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: "environment" },
        width: { ideal: 1280 },
        height: { ideal: 960 }
      },
      audio: false
    });

    els.milkCameraVideo.srcObject = milkCameraStream;
    els.milkCameraVideo.hidden = false;
    els.milkPreview.hidden = true;
    els.noImageHint.hidden = true;
    els.captureMilkBtn.textContent = "✅ التقط الآن";
    els.milkFileHint.textContent = "الكاميرا مفتوحة — ضع اللبن على سطح أسود ثم اضغط التقط الآن.";

    await els.milkCameraVideo.play();

  } catch (e) {
    showMsg("تعذّر فتح الكاميرا. يمكنك استخدام رفع صورة بديلة.", "warning");
    stopMilkCamera();
    els.milkUploadImage.click();
  }
}

function captureMilkFromCamera(){
  const video = els.milkCameraVideo;

  if (!video.videoWidth || !video.videoHeight) {
    showMsg("انتظر لحظة حتى تظهر صورة الكاميرا.", "warning");
    return;
  }

  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const dataUrl = canvas.toDataURL("image/jpeg", 0.88);

  stopMilkCamera();
  showMilkPreview(dataUrl, "تم التقاط صورة اللبن بالكاميرا.");
}

els.captureMilkBtn.addEventListener("click", async () => {
  if (milkCameraStream) {
    captureMilkFromCamera();
    return;
  }

  await openMilkCamera();
});

els.uploadMilkBtn.addEventListener("click", () => {
  stopMilkCamera();
  els.milkUploadImage.click();
});

els.milkUploadImage.addEventListener("change", () => {
  const file = els.milkUploadImage.files && els.milkUploadImage.files[0];
  previewMilkFile(file);
  els.milkUploadImage.value = "";
});

window.addEventListener("pagehide", stopMilkCamera);
window.addEventListener("beforeunload", stopMilkCamera);
  hydrateFromQuery();

  els.animalNumber.addEventListener("blur", runGate);
  els.eventDate.addEventListener("change", runGate);
  els.saveBtn.addEventListener("click", save);

  runGate();
})();
</script>
</body>
</html>
