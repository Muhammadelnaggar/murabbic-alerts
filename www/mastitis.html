<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="stylesheet" href="css/forms.css">
  <title>تسجيل التهاب الضرع — مُرَبِّك</title>
  
</head>
<body>
<header>
  <div class="mbk-head">
    <a class="mbk-back" href="add-event.html">رجوع</a>

    <div class="mbk-center">
      <div class="mbk-page-title">تسجيل التهاب الضرع</div>
      <div class="mbk-app-name">مُرَبِّك</div>
    </div>

    <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّك" />
  </div>
</header>

<div id="sysbar" class="infobar"></div>

<main>
  <section class="card">
    <form id="mastitisForm" novalidate>
      <div class="row">
        <div>
          <label for="animalNumber">رقم الحيوان</label>
          <input id="animalNumber" inputmode="numeric" autocomplete="off" />
        </div>

        <div>
          <label for="eventDate">تاريخ التشخيص</label>
          <input id="eventDate" type="date" />
        </div>
      </div>

      <fieldset>
        <legend>الربع المصاب</legend>
        <div id="quartersBox" class="radio-group"></div>
      </fieldset>

      <div class="row">
       <div>
  <label>وصف التهاب الضرع</label>

  <input id="mastitisType" type="hidden" />

  <details id="mastitisTypeDrop">
    <summary id="mastitisTypeSummary">اختر وصف التهاب الضرع...</summary>
    <div id="mastitisTypeList" class="radio-group"></div>
  </details>
</div>

        <div>
          <label for="notes">ملاحظات اختيارية</label>
          <textarea id="notes" rows="3" placeholder="أي ملاحظة علاجية أو تشخيصية مختصرة"></textarea>
        </div>
      </div>
 
    </form>
  </section>
</main>

<div class="actions-bar">
  <button type="button" class="save" id="saveBtn">حفظ التهاب الضرع</button>
</div>

<script>
(function(){

  const els = {
    sysbar: document.getElementById("sysbar"),
    animalNumber: document.getElementById("animalNumber"),
    eventDate: document.getElementById("eventDate"),
    quartersBox: document.getElementById("quartersBox"),
    mastitisType: document.getElementById("mastitisType"),
    mastitisTypeDrop: document.getElementById("mastitisTypeDrop"),
    mastitisTypeSummary: document.getElementById("mastitisTypeSummary"),
    mastitisTypeList: document.getElementById("mastitisTypeList"),
    notes: document.getElementById("notes"),
    saveBtn: document.getElementById("saveBtn")
  };

  function todayLocal(){
    const d = new Date();
    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    return d.toISOString().slice(0, 10);
  }


  function escapeHtml(v){
    return String(v ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function showMsg(text, type){
    const msg = String(text || "").trim();
    if (!msg) {
      els.sysbar.className = "infobar";
      els.sysbar.textContent = "";
      return;
    }

    els.sysbar.textContent = msg;
    els.sysbar.className = "infobar show " + (type || "info");

    try {
      els.sysbar.scrollIntoView({ behavior:"smooth", block:"center" });
    } catch {}
  }

  async function apiPost(path, body){
    const r = await fetch(path, {
      method: "POST",
      credentials: "same-origin",
      cache: "no-store",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json"
      },
      body: JSON.stringify(body || {})
    });

    const j = await r.json().catch(() => ({
      ok: false,
      message: "❌ رد السيرفر غير صالح."
    }));

    if (r.status === 401 || j?.error === "auth_required") {
      location.href = "login.html?next=mastitis.html";
      throw new Error(j?.message || "سجّل الدخول أولًا.");
    }

    if (!r.ok) {
      const err = new Error(j?.message || "تعذّر تنفيذ الطلب من السيرفر.");
      err.response = j;
      err.status = r.status;
      throw err;
    }

    return j || {};
  }

  function hydrateFromQuery(){
    const qs = new URLSearchParams(location.search);

    els.animalNumber.value =
      qs.get("number") ||
      qs.get("animalNumber") ||
      qs.get("animalId") ||
      "";

    els.eventDate.value =
      qs.get("date") ||
      qs.get("eventDate") ||
      todayLocal();
  }

  function collectPayload(){
    return {
      animalNumber: els.animalNumber.value.trim(),
      eventDate: els.eventDate.value,
      mastitisType: els.mastitisType.value,
      quarters: Array.from(
        document.querySelectorAll('input[name="quarters"]:checked')
      ).map(x => x.value),
      notes: els.notes.value.trim()
    };
  }

  function renderOptions(options){
    const quarters = Array.isArray(options?.quarters) ? options.quarters : [];
    const mastitisTypes = Array.isArray(options?.mastitisTypes) ? options.mastitisTypes : [];

    els.quartersBox.innerHTML = quarters.map(q => {
      const safe = escapeHtml(q);
      return `<label><input type="checkbox" name="quarters" value="${safe}"> ${safe}</label>`;
    }).join("");

const oldType = els.mastitisType.value;

els.mastitisTypeList.innerHTML = mastitisTypes.map(t => {
  const safe = escapeHtml(t);
  const checked = oldType === t ? " checked" : "";
  return `
    <label>
      <input type="radio" name="mastitisTypeChoice" value="${safe}"${checked}>
      ${safe}
    </label>
  `;
}).join("");

if (oldType && mastitisTypes.includes(oldType)) {
  els.mastitisType.value = oldType;
  els.mastitisTypeSummary.textContent = oldType;
} else {
  els.mastitisType.value = "";
  els.mastitisTypeSummary.textContent = "اختر وصف التهاب الضرع...";
}

els.mastitisTypeList
  .querySelectorAll('input[name="mastitisTypeChoice"]')
  .forEach(input => {
    input.addEventListener("change", () => {
      els.mastitisType.value = input.value;
      els.mastitisTypeSummary.textContent = input.value;
      els.mastitisTypeDrop.open = false;
    });
  });
  }

  async function runGate(){
    try {
      const payload = collectPayload();

      const j = await apiPost("/api/mastitis/gate", {
        animalNumber: payload.animalNumber,
        eventDate: payload.eventDate
      });

      renderOptions(j.options || {});

      if (j.message && !j.silent) {
        showMsg(j.message, j.allowed ? "success" : "warning");
      } else if (!payload.animalNumber) {
        showMsg("أدخل رقم الحيوان وتاريخ التشخيص.", "info");
      }

    } catch (e) {
      showMsg(e.message || "تعذّر التحقق من السيرفر.", "error");
    }
  }

  async function save(){
    const prev = els.saveBtn.textContent;

    try {
      els.saveBtn.disabled = true;
      els.saveBtn.textContent = "جارٍ الحفظ...";
      showMsg("جارٍ إرسال البيانات للسيرفر...", "info");

      const j = await apiPost("/api/mastitis/save", collectPayload());

      showMsg(j.message || "✅ تم حفظ التهاب الضرع بنجاح", "success");

      if (j.redirectUrl) {
        setTimeout(() => {
          location.href = j.redirectUrl;
        }, 900);
      }

    } catch (e) {
      showMsg(e.message || "تعذّر حفظ التهاب الضرع.", "error");
    } finally {
      els.saveBtn.disabled = false;
      els.saveBtn.textContent = prev;
    }
  }

  hydrateFromQuery();

  els.animalNumber.addEventListener("blur", runGate);
  els.eventDate.addEventListener("change", runGate);
  els.saveBtn.addEventListener("click", save);

  runGate();
})();
</script>
</body>
</html>
