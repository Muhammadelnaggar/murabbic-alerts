<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>الكاميرا الذكية - مربيك</title>
  <link rel="icon" type="image/svg+xml" href="/images/dashboard.svg">
  <meta name="theme-color" content="#2e7d32" />
  <link rel="stylesheet" href="css/forms.css">
 
 
</head>
<body>
  <header>
  <div class="mbk-head">
    <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">
    <div class="mbk-center">
      <div class="mbk-page-title">الكاميرا الذكية</div>
      <div class="mbk-app-name">مُرَبِّيك</div>
    </div>
    <a class="mbk-back" id="backBtn" href="add-event.html">رجوع</a>
  </div>
</header>
 <main class="mbk-smartcam-wrap">
  <div class="mbk-smartcam-meta">
    <div class="mbk-smartcam-chip" id="chipAnimal">🐄 الحيوان: —</div>
    <div class="mbk-smartcam-chip" id="chipDate">📅 التاريخ: —</div>
  </div>

  <section class="mbk-card mbk-smartcam-section" aria-label="أدوات الكاميرا السريعة">
    <div class="mbk-page-title">🤖 أدوات الكاميرا السريعة</div>
    <div class="form-hint mbk-smartcam-sub">تصوير سريع وتحليل مباشر</div>

    <div class="mbk-smartcam-grid">
      <button class="mbk-smartcam-tool mbk-btn mbk-btn-lg mbk-btn-primary" data-page="visual-eval.html" aria-label="سمات إنتاج اللبن للحيوان">
        <div class="mbk-smartcam-ico">🥛</div>
        <div class="mbk-smartcam-title">سمات إنتاج اللبن للحيوان</div>
        <div class="mbk-smartcam-hint">تقييم الصفات الجسمية المرتبطة بإنتاج اللبن</div>
      </button>
    </div>
  </section>

  <section class="mbk-card mbk-smartcam-section" aria-label="التقييم الذكي للتغذية بالكاميرا">
    <div class="mbk-page-title">🌿 التقييم الذكي للتغذية بالكاميرا</div>
    <div class="form-hint mbk-smartcam-sub">تحليل الحالة الغذائية بصريًا</div>

    <div class="mbk-smartcam-grid">
      <button class="mbk-smartcam-tool mbk-btn mbk-btn-lg mbk-btn-light" data-page="bcs-eval.html" aria-label="تقييم حالة الجسم">
        <div class="mbk-smartcam-ico">📏</div>
        <div class="mbk-smartcam-title">تقييم حالة الجسم</div>
        <div class="mbk-smartcam-hint">تحديد درجة الحالة الجسمية من الصورة</div>
      </button>

      <button class="mbk-smartcam-tool mbk-btn mbk-btn-lg mbk-btn-light" data-page="feces-eval.html" aria-label="تقييم الروث">
        <div class="mbk-smartcam-ico">💩</div>
        <div class="mbk-smartcam-title">تقييم الروث</div>
        <div class="mbk-smartcam-hint">تقييم قوام وشكل الروث بصريًا</div>
      </button>
    </div>
  </section>
</main>
  <script>
  (function(){
    const $ = s=>document.querySelector(s);
    const $$ = s=>document.querySelectorAll(s);
    const norm = v => (v==null||v==='undefined'||v==='null'||v==='NaN')? '' : String(v).trim();
    const todayISO = ()=>{const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,10)};

    // Hydrate context from query or storage
    const qs = new URLSearchParams(location.search);
    const qNum = norm(qs.get('number'));
    const qDate = norm(qs.get('date'));
    const number = qNum || norm(localStorage.getItem('currentAnimalNumber')) || norm(localStorage.getItem('lastAnimalNumber')) || '';
    let date = qDate || norm(localStorage.getItem('lastEventDate')) || todayISO();
    if(!/^\d{4}-\d{2}-\d{2}$/.test(date)) date = todayISO();

    $('#chipAnimal').textContent = `🐄 الحيوان: ${ number || 'غير محدد' }`;
    $('#chipDate').textContent   = `📅 التاريخ: ${ date }`;

    // Back to events page carrying context
    const backUrl = new URL('add-event.html', location.href);
    if(number) backUrl.searchParams.set('number', number);
    if(date)   backUrl.searchParams.set('date', date);
   $('#backBtn').href = backUrl.toString();

    function buildUrl(page){
      const u = new URL(page, location.href);
      if(number) u.searchParams.set('number', number);
      if(date)   u.searchParams.set('date', date);
      return u.toString();
    }

    // Wire tools
   $$('[data-page]').forEach(btn=>{
      btn.addEventListener('click', e=>{
        e.preventDefault();
        if(!number){
       
        }
        const target = btn.getAttribute('data-page');
        if(target){ location.href = buildUrl(target); }
      }, {passive:true});
    });

    // Analytics
    window.dataLayer.push({event:'smartcam_loaded', number: number || null, date});
  })();
  </script>
</body>
</html>
