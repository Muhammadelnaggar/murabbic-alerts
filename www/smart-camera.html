<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>الكاميرا الذكية - مربيك</title>
  <link rel="icon" type="image/svg+xml" href="/images/dashboard.svg">
  <meta name="theme-color" content="#2e7d32" />
  <link rel="stylesheet" href="css/forms.css">
 
 
</head>
<body>
  <header>
  <div class="mbk-head">
    <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">
    <div class="mbk-center">
      <div class="mbk-page-title">الكاميرا الذكية</div>
      <div class="mbk-app-name">مُرَبِّيك</div>
    </div>
    <a class="mbk-back" id="backBtn" href="add-event.html">رجوع</a>
  </div>
</header>
  <div id="sysbar" class="infobar" role="status" aria-live="polite"></div>
<main class="smart-camera-wrap">
  <div class="smart-camera-meta">
    <div class="smart-camera-chip" id="chipAnimal">🐄 الحيوان: —</div>
    <div class="smart-camera-chip" id="chipDate">📅 التاريخ: —</div>
  </div>

  <section class="mbk-card smart-camera-section" aria-label="أدوات الكاميرا السريعة">
    <div class="smart-camera-title">🤖 أدوات الكاميرا السريعة</div>
    <div class="smart-camera-sub">تصوير سريع وتحليل مباشر</div>

    <div class="smart-camera-grid single">
      <button class="mbk-btn mbk-btn-lg mbk-btn-primary smart-camera-tool" data-page="visual-eval.html" aria-label="سمات إنتاج اللبن للحيوان">
        <span class="smart-camera-icon">🥛</span>
        <span class="smart-camera-tool-title">سمات إنتاج اللبن للحيوان</span>
        <span class="smart-camera-tool-hint">تقييم الصفات الجسمية المرتبطة بإنتاج اللبن</span>
      </button>
    </div>
  </section>

  <section class="mbk-card smart-camera-section" aria-label="التقييم الذكي للتغذية بالكاميرا">
    <div class="smart-camera-title">🌿 التقييم الذكي للتغذية بالكاميرا</div>
    <div class="smart-camera-sub">تحليل الحالة الغذائية بصريًا</div>

    <div class="smart-camera-grid">
      <button class="mbk-btn mbk-btn-lg mbk-btn-light smart-camera-tool" data-page="bcs-eval.html" aria-label="تقييم حالة الجسم">
        <span class="smart-camera-icon">📏</span>
        <span class="smart-camera-tool-title">تقييم حالة الجسم</span>
        <span class="smart-camera-tool-hint">تحديد درجة الحالة الجسمية من الصورة</span>
      </button>

      <button class="mbk-btn mbk-btn-lg mbk-btn-light smart-camera-tool" data-page="feces-eval.html" aria-label="تقييم الروث">
        <span class="smart-camera-icon">💩</span>
        <span class="smart-camera-tool-title">تقييم الروث</span>
        <span class="smart-camera-tool-hint">تقييم قوام وشكل الروث بصريًا</span>
      </button>
    </div>
  </section>
</main>
  <script>
  (function(){
    const $ = s=>document.querySelector(s);
    const $$ = s=>document.querySelectorAll(s);
    const norm = v => (v==null||v==='undefined'||v==='null'||v==='NaN')? '' : String(v).trim();
    const todayISO = ()=>{const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,10)};
    const msgBox = $('#sysbar');

function showMsg(text, ok){
  if (!msgBox) return;

  msgBox.textContent = text;
  msgBox.className = 'infobar show ' + (ok ? 'success' : 'error');

  try {
    msgBox.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } catch (_) {}
}

function hideMsg(){
  if (!msgBox) return;
  msgBox.textContent = '';
  msgBox.className = 'infobar';
}

       // Hydrate context from query
    const qs = new URLSearchParams(location.search);

    const mode = norm(qs.get('mode')) === 'group' ? 'group' : 'individual';

    const groupName = norm(qs.get('groupName'));
    const groupId = norm(qs.get('groupId'));
    const groupKey = norm(qs.get('groupKey'));
    const animalType = norm(qs.get('animalType'));

    const hasGroup = mode === 'group' && !!(groupName || groupId || groupKey);

    const qNum = norm(qs.get('number') || qs.get('animalNumber'));
    const qDate = norm(qs.get('date') || qs.get('eventDate'));

      const number = hasGroup
      ? ''
      : qNum;

       let date = qDate || todayISO();
    if(!/^\d{4}-\d{2}-\d{2}$/.test(date)) date = todayISO();

    $('#chipAnimal').textContent = hasGroup
      ? `🐄 المجموعة: ${groupName || groupId || groupKey}`
      : `🐄 الحيوان: ${number || 'غير محدد'}`;

    $('#chipDate').textContent = `📅 التاريخ: ${date}`;

    function carryContext(u){
      u.searchParams.set('mode', hasGroup ? 'group' : 'individual');
      u.searchParams.set('date', date);
      u.searchParams.set('eventDate', date);

      if (hasGroup) {
        if (groupName) u.searchParams.set('groupName', groupName);
        if (groupId) u.searchParams.set('groupId', groupId);
        if (groupKey) u.searchParams.set('groupKey', groupKey);
        if (animalType) u.searchParams.set('animalType', animalType);
      } else if (number) {
        u.searchParams.set('number', number);
      }
    }

    // Back to events page carrying context
    const backUrl = new URL('add-event.html', location.href);
    carryContext(backUrl);
    $('#backBtn').href = backUrl.toString();

    function buildUrl(page){
      const u = new URL(page, location.href);
      carryContext(u);
      return u.toString();
    }
// Wire tools
$$('[data-page]').forEach(btn=>{
  btn.addEventListener('click', e=>{
    e.preventDefault();

    hideMsg();

    const target = btn.getAttribute('data-page') || '';

    if (hasGroup && target !== 'feces-eval.html') {
      showMsg('هذه الأداة تحتاج رقم حيوان واحد. تقييم المجموعة متاح حاليًا في تقييم الروث فقط.', false);
      return;
    }

    if (target) {
      location.href = buildUrl(target);
    }
  }, {passive:false});
});;

  })();
  </script>
</body>
</html>
