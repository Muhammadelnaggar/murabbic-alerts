<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
 
  <link rel="stylesheet" href="css/forms.css">
  
  <title>تقييم الروث بالكاميرا — مُرَبِّك</title>
 <style>
  :root{
    --green:#0ea05a;
    --green-600:#0b7f47;
    --green-700:#0a6a3c;
    --bg:#f7faf7;
    --text:#0f172a;
    --muted:#64748b;
    --card:#ffffff;
    --danger:#c2410c;
    --border:#c5e1a5;
    --cream:#fffdf7;
    --soft:#eefaf3;
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    font-family:system-ui,'Segoe UI','Cairo',Tahoma,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  .mbk-shell{
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    background:transparent;
  }

  header{
    position:sticky;
    top:0;
    z-index:20;
    background:rgba(255,255,255,.96);
    backdrop-filter:blur(8px);
    border-bottom:1px solid #e5efe7;
    padding:10px 12px;
  }

  .mbk-head{
    display:flex;
    align-items:center;
    gap:10px;
    max-width:520px;
    margin:0 auto;
  }

  .mbk-logo{
    width:42px;
    height:42px;
    object-fit:contain;
    opacity:.6;
    flex:0 0 auto;
  }

  .mbk-center{
    min-width:0;
    flex:1 1 auto;
    display:grid;
    gap:2px;
  }

  .mbk-page-title{
    margin:0;
    font-size:18px;
    font-weight:800;
    line-height:1.2;
    color:#0f172a;
  }

  .mbk-app-name{
    font-size:13px;
    font-weight:800;
    color:var(--green);
    line-height:1;
  }

  .mbk-subline{
    font-size:12px;
    color:var(--muted);
    font-weight:700;
    white-space:nowrap;
  }
  .mbk-animal-wrap{
  max-width:520px;
  margin:10px auto 0;
  padding:0 12px;
}

.mbk-field-label{
  display:block;
  margin:0 0 6px;
  font-size:13px;
  font-weight:800;
  color:var(--muted);
}

.mbk-readonly-field{
  min-height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:12px 14px;
  border:1px solid #cbd5e1;
  border-radius:14px;
  background:#fff;
  color:#0f172a;
  font-size:18px;
  font-weight:900;
  box-shadow:0 1px 2px rgba(0,0,0,.04);
} 
.mbk-back{
  flex:0 0 auto;
  min-height:40px;
  padding:8px 12px;
  border:1px solid #dbe5ee;
  border-radius:12px;
  background:#fff;
  color:#0f172a;
  text-decoration:none;
  font-weight:800;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

.mbk-animal-line{
  max-width:520px;
  margin:8px auto 0;
  padding-top:8px;
  border-top:1px solid var(--border);
  text-align:center;
}
 

 .container{
  max-width:520px;
  margin:14px auto 220px;
  padding:0 12px;
}

  .card{
    background:var(--card);
    border:1px solid #e2e8f0;
    border-radius:18px;
    box-shadow:0 2px 10px rgba(0,0,0,.04);
    overflow:hidden;
  }

  .controls{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
    padding:12px;
    background:#fff;
  }

  .controls .select,
  .controls .input,
  .save-bar .input{
    padding:12px 14px;
    border:1px solid #cbd5e1;
    border-radius:14px;
    background:#fff;
    font-size:16px;
    min-height:48px;
  }

  .controls .select{
    min-width:150px;
    flex:1 1 160px;
  }

  .btn{
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-weight:800;
    min-height:50px;
    padding:13px 16px;
    box-shadow:0 1px 2px rgba(0,0,0,.04);
    transition:.18s ease;
  }

  .btn:disabled{
    opacity:.6;
    cursor:not-allowed;
  }

  .btn-primary{
    background:var(--green);
    color:#fff;
  }

  .btn-primary:hover{ background:var(--green-700); }

  .btn-light{
    background:#f8fafc;
    color:#0f172a;
    border:1px solid #dbe5ee;
  }

  .btn-danger{
    background:#fff1f2;
    color:#b42318;
    border:1px solid #fecdd3;
  }

  .preview-wrap{
    position:relative;
    border-top:1px solid #eef2f7;
    border-bottom:1px solid #eef2f7;
    overflow:hidden;
    background:#000;
  }

  video#preview{
    width:100%;
    height:auto;
    display:block;
    background:#000;
  }

  canvas#overlay{
    position:absolute;
    inset:0;
    pointer-events:none;
  }

  .results{
  padding:12px;
  padding-bottom:28px;
  display:grid;
  gap:12px;
  background:#fff;
}
  .section-title{
    margin:0;
    color:var(--green-600);
    font-size:16px;
    font-weight:800;
  }

  .upload-preview{
    display:flex;
    gap:12px;
    align-items:center;
    padding:10px;
    background:#fff;
    border:1px solid #e2e8f0;
    border-radius:14px;
  }

  .upload-preview img{
    width:96px;
    height:96px;
    object-fit:cover;
    border-radius:12px;
    border:1px solid #e5e7eb;
  }

  .score{
    display:grid;
    gap:10px;
    padding:12px;
    border:1px solid #dfe8e2;
    border-radius:16px;
    background:linear-gradient(180deg,#ffffff 0%, #fbfefc 100%);
  }

  .score-badge{
    display:inline-block;
    padding:8px 12px;
    border:1px solid transparent;
    border-radius:999px;
    font-weight:800;
    width:max-content;
    background:#f8fafc;
    color:#0f172a;
  }

  .score-bar{
    height:12px;
    background:#f1f5f9;
    border:1px solid #e2e8f0;
    border-radius:999px;
    overflow:hidden;
  }

  .score-bar .fill{
    height:100%;
    transition:width .22s ease;
  }

  .score-note{
    color:var(--muted);
    font-weight:700;
    line-height:1.7;
    font-size:14px;
  }

  .save-bar{
    position:fixed;
    right:0;
    left:0;
    bottom:0;
    z-index:25;
    background:rgba(255,255,255,.98);
    backdrop-filter:blur(8px);
    border-top:1px solid #e2e8f0;
    padding:10px 12px calc(10px + env(safe-area-inset-bottom));
  }

  .save-bar-inner{
    max-width:520px;
    margin:0 auto;
    display:grid;
    gap:10px;
  }

  .save-top{
    display:grid;
    gap:8px;
  }

  .date-wrap{
    display:flex;
    gap:8px;
    align-items:center;
    color:#0f172a;
    font-weight:800;
    background:#fff;
    border:1px solid #e2e8f0;
    border-radius:14px;
    padding:10px 12px;
  }

  .date-wrap input{
    flex:1 1 auto;
    border:none;
    background:transparent;
    font:inherit;
    color:inherit;
    min-height:32px;
  }

  .save-actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
  }

.save-actions .btn{
  width:100%;
  min-height:56px;
  font-size:16px;
  border-radius:16px;
  font-weight:900;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}

.save-actions #backBtn{
  background:#f0fdf4;
  color:#166534;
  border:1px solid #86efac;
}

.save-actions #saveBtn{
  background:var(--green);
  color:#fff;
  border:1px solid var(--green);
}

  #saveMsg{
    display:none;
    width:100%;
    padding:12px;
    border-radius:14px;
    font-weight:800;
    text-align:center;
    line-height:1.6;
  }

  editor-card,.editor-card{
    pointer-events:none !important;
    opacity:0 !important;
    visibility:hidden !important;
    position:static !important;
    z-index:-1 !important;
  }

@media (max-width:520px){
  .controls{
    display:grid;
    grid-template-columns:1fr 1fr;
  }

 #captureBtn,
#retakeBtn,
#uploadBtn{
  width:100%;
}

  .save-actions{
    grid-template-columns:1fr 1fr;
  }

  .save-actions .btn{
    min-height:56px;
    font-size:16px;
  }
}
</style>
</head>
<body>
 <div class="mbk-shell">
<header>
  <div class="mbk-head">
    <a class="mbk-back" href="add-event.html" id="headBackBtn">رجوع</a>

    <div class="mbk-center">
      <div class="mbk-page-title">تقييم الروث بالكاميرا</div>
      <div class="mbk-app-name">مُرَبِّيك</div>
    </div>

    <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">
   
  </div>
</header>
<div class="mbk-animal-wrap">
  <label class="mbk-field-label">رقم الحيوان</label>
  <div class="mbk-readonly-field">
    <span class="animal-number">—</span>
  </div>
</div>
  <div class="container">
    <section class="card" id="cameraCard">
      <div class="controls">
       
        <div style="margin-inline-start:auto"></div>
        <button id="captureBtn" class="btn btn-primary">التقاط</button>
        <button id="retakeBtn" class="btn btn-danger" disabled>إعادة الالتقاط</button>
        <button id="uploadBtn" class="btn btn-light">رفع صورة بديلة</button>
        <input id="uploadInput" type="file" accept="image/*" style="display:none" />
      </div>

      <div class="preview-wrap">
        <video id="preview" playsinline autoplay muted></video>
        <canvas id="overlay"></canvas>
      </div>

      <div class="results" id="resultsBox">
       <h3 class="section-title">تقييم الحالة</h3>

        <!-- خانة عرض الصورة المرفوعة/المُلتقطة (المطلوب 2) -->
        <div class="upload-preview" id="uploadPreviewBox" style="display:none">
          <img id="uploadPreviewImg" alt="المعاينة" />
          <div style="display:grid;gap:6px">
            <div style="font-weight:800;color:#0f172a">الصورة المستخدمة في التقييم</div>
            <div style="color:var(--muted);font-size:14px;line-height:1.6">يتم تحليل هذه الصورة فقط لاستخراج النتيجة، ولا يتم حفظها ضمن بيانات الحيوان.</div>
          </div>
        </div>

        <div id="scoreWidget" class="score">
         <div class="score-badge" id="scoreBadge">بانتظار التقييم</div>
          <div class="score-bar"><div class="fill" id="scoreFill" style="width:0%"></div></div>
        <div class="score-note" id="scoreNote">
  قرّب الكاميرا من الروث واجعله داخل الإطار بوضوح.<br>
  صوّر من مسافة قريبة مع أقل قدر ممكن من الأرضية حوله.
</div>
        </div>
      </div>

     <div class="save-bar">
  <div class="save-bar-inner">
    <input type="hidden" id="animalId" />

    <div class="save-top">
      <div id="saveMsg"></div>

      <label class="date-wrap">
        <span>تاريخ التقييم</span>
        <input type="date" id="eventDate" class="input" />
      </label>
    </div>

    <div class="save-actions">
     <button id="backBtn" class="btn btn-light" type="button">لوحة التحكم</button>
      <button id="saveBtn" class="btn btn-primary" type="button">حفظ التقييم</button>
    </div>
  </div>
</div>
    </section>
  </div>


<script>
(function () {
  "use strict";

  const qs = new URLSearchParams(location.search);
  const $ = (s, p = document) => p.querySelector(s);

  const preview = $("#preview");
  const overlay = $("#overlay");
  const captureBtn = $("#captureBtn");
  const retakeBtn = $("#retakeBtn");
  const uploadBtn = $("#uploadBtn");
  const uploadInput = $("#uploadInput");
  const saveBtn = $("#saveBtn");
  const backBtn = $("#backBtn");

  const animalIdInput = $("#animalId");
  const eventDateInput = $("#eventDate");
  const numberSpan = $(".animal-number");

  const scoreBadge = $("#scoreBadge");
  const scoreFill = $("#scoreFill");
  const scoreNote = $("#scoreNote");

  const uploadPreviewBox = $("#uploadPreviewBox");
  const uploadPreviewImg = $("#uploadPreviewImg");
  const msgBox = $("#saveMsg");

  const state = {
    stream: null,
    image: null,
    analysis: null
  };

  function todayCairo() {
    const now = new Date(new Date().toLocaleString("en-US", { timeZone: "Africa/Cairo" }));
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, "0");
    const d = String(now.getDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
  }

  function contextFromUrl() {
    return {
      animalId: qs.get("animalId") || "",
      animalNumber: qs.get("number") || qs.get("animalNumber") || "",
      eventDate: qs.get("date") || todayCairo()
    };
  }

  function getTenantUid() {
    return String(
      window.MBK_USER_ID ||
      window.mbkUserId ||
      window.mbk?.userId ||
      localStorage.getItem("userId") ||
      localStorage.getItem("uid") ||
      localStorage.getItem("tenantId") ||
      ""
    ).trim();
  }

  function showMsg(text, ok) {
    if (!msgBox) return;

    msgBox.style.display = "block";
    msgBox.textContent = text;
    msgBox.style.background = ok ? "#dcfce7" : "#fee2e2";
    msgBox.style.color = ok ? "#166534" : "#991b1b";
    msgBox.style.border = ok ? "1px solid #86efac" : "1px solid #fca5a5";
  }

  function hideMsg() {
    if (!msgBox) return;
    msgBox.style.display = "none";
    msgBox.textContent = "";
  }

  function setWaiting() {
    state.analysis = null;

    if (scoreBadge) scoreBadge.textContent = "بانتظار التقييم";

    if (scoreFill) {
      scoreFill.style.width = "0%";
      scoreFill.style.background = "#e5e7eb";
    }

    if (scoreNote) {
      scoreNote.textContent = "وجّه الروث داخل الإطار ثم التقط صورة واضحة للتقييم.";
    }
  }

  function renderAnalysis(result) {
    state.analysis = result;

    const score = Number(result.score);
    const pct = Math.max(0, Math.min(100, ((score - 1) / 4) * 100));

    if (scoreBadge) {
      scoreBadge.textContent = `درجة ${score} — ${result.label || ""}`;
    }

    if (scoreFill) {
      scoreFill.style.width = pct + "%";
      scoreFill.style.background = score === 3 ? "#22c55e" : "#f59e0b";
    }

    if (scoreNote) {
      scoreNote.textContent = [
        result.note || "",
        result.reason ? `السبب: ${result.reason}` : "",
        result.quality?.label ? `جودة التحليل: ${result.quality.label}` : ""
      ].filter(Boolean).join("\n");
    }
  }

  function showPreview(dataUrl) {
    if (!uploadPreviewBox || !uploadPreviewImg) return;

    uploadPreviewImg.src = dataUrl;
    uploadPreviewBox.style.display = "flex";
  }

  function fitOverlay() {
    if (!preview || !overlay) return;

    const r = preview.getBoundingClientRect();

    overlay.width = Math.max(1, Math.floor(r.width * devicePixelRatio));
    overlay.height = Math.max(1, Math.floor(r.height * devicePixelRatio));
    overlay.style.width = r.width + "px";
    overlay.style.height = r.height + "px";
  }

  function drawGuide() {
    if (!overlay) return;

    const g = overlay.getContext("2d");
    if (!g) return;

    const w = overlay.width;
    const h = overlay.height;

    g.clearRect(0, 0, w, h);

    const box = {
      x: Math.round(w * 0.16),
      y: Math.round(h * 0.18),
      w: Math.round(w * 0.68),
      h: Math.round(h * 0.64)
    };

    g.fillStyle = "rgba(0,0,0,.25)";
    g.fillRect(0, 0, w, h);

    g.save();
    g.globalCompositeOperation = "destination-out";
    g.beginPath();

    if (g.roundRect) {
      g.roundRect(box.x, box.y, box.w, box.h, 18 * devicePixelRatio);
    } else {
      g.rect(box.x, box.y, box.w, box.h);
    }

    g.fill();
    g.restore();

    g.strokeStyle = "rgba(14,160,90,.95)";
    g.lineWidth = 4 * devicePixelRatio;
    g.beginPath();

    if (g.roundRect) {
      g.roundRect(box.x, box.y, box.w, box.h, 18 * devicePixelRatio);
    } else {
      g.rect(box.x, box.y, box.w, box.h);
    }

    g.stroke();

    g.fillStyle = "rgba(14,160,90,.95)";
    g.font = `${15 * devicePixelRatio}px Cairo, system-ui, sans-serif`;
    g.textAlign = "center";
    g.fillText(
      "ضع الروث داخل الإطار بالكامل",
      w / 2,
      Math.max(24 * devicePixelRatio, box.y - 10 * devicePixelRatio)
    );
  }

  async function stopCamera() {
    if (state.stream) {
      state.stream.getTracks().forEach(t => t.stop());
    }

    state.stream = null;
  }

  async function startCamera() {
    await stopCamera();

    if (!navigator.mediaDevices?.getUserMedia) {
      throw new Error("متصفحك لا يدعم تشغيل الكاميرا. استخدم رفع صورة بديلة.");
    }

    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: "environment" },
        width: { ideal: 1600 },
        height: { ideal: 1200 }
      },
      audio: false
    });

    state.stream = stream;
    preview.srcObject = stream;

    await preview.play();

    fitOverlay();
    drawGuide();
  }

  function captureFrame() {
    if (!preview) return null;

    const w = preview.videoWidth || preview.clientWidth;
    const h = preview.videoHeight || preview.clientHeight;

    if (!w || !h) return null;

    const canvas = document.createElement("canvas");
    canvas.width = w;
    canvas.height = h;

    const g = canvas.getContext("2d");
    if (!g) return null;

    g.drawImage(preview, 0, 0, w, h);

    return canvas.toDataURL("image/jpeg", 0.92);
  }

  async function analyzeOnServer(image) {
    const r = await fetch("/api/feces/vision-analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ image })
    });

    const j = await r.json().catch(() => ({}));

    if (!r.ok || !j.ok) {
      throw new Error(j.message || "تعذّر تحليل الروث.");
    }

    renderAnalysis(j);
  }

  async function captureAndAnalyze() {
    try {
      hideMsg();
      setWaiting();

      if (captureBtn) {
        captureBtn.disabled = true;
        captureBtn.textContent = "جاري الالتقاط...";
      }

      const image = captureFrame();

      if (!image) {
        throw new Error("تعذّر التقاط الصورة.");
      }

      state.image = image;
      showPreview(image);

      if (captureBtn) captureBtn.textContent = "جاري التحليل...";

      await analyzeOnServer(image);

      if (retakeBtn) retakeBtn.disabled = false;

    } catch (e) {
      console.warn("feces analyze error:", e);
      showMsg(e.message || "تعذّر تحليل الروث.", false);
    } finally {
      if (captureBtn) {
        captureBtn.disabled = false;
        captureBtn.textContent = "التقاط";
      }
    }
  }

  function readFileAsDataUrl(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function uploadAndAnalyze(file) {
    if (!file) return;

    try {
      hideMsg();
      setWaiting();

      if (uploadBtn) {
        uploadBtn.disabled = true;
        uploadBtn.textContent = "جاري التحليل...";
      }

      const image = await readFileAsDataUrl(file);

      state.image = image;
      showPreview(image);

      await analyzeOnServer(image);

      if (retakeBtn) retakeBtn.disabled = false;

    } catch (e) {
      console.warn("feces upload error:", e);
      showMsg(e.message || "تعذّر تحليل الصورة.", false);
    } finally {
      if (uploadBtn) {
        uploadBtn.disabled = false;
        uploadBtn.textContent = "رفع صورة بديلة";
      }

      if (uploadInput) uploadInput.value = "";
    }
  }

  async function saveFeces() {
    const ctx = contextFromUrl();
    const analysis = state.analysis;

    if (!analysis || !analysis.ok || !Number.isFinite(Number(analysis.score))) {
      showMsg("لا يمكن الحفظ قبل تحليل صورة الروث.", false);
      return;
    }

    const uid = getTenantUid();

    try {
      hideMsg();

      if (saveBtn) {
        saveBtn.disabled = true;
        saveBtn.textContent = "جارٍ الحفظ…";
      }

      const r = await fetch("/api/feces/save", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          ...(uid ? { "X-User-Id": uid } : {})
        },
        body: JSON.stringify({
          animalId: ctx.animalId,
          animalNumber: ctx.animalNumber,
          eventDate: eventDateInput?.value || ctx.eventDate || todayCairo(),
          score: analysis.score,
          analysis
        })
      });

      const j = await r.json().catch(() => ({}));

      if (!r.ok || !j.ok) {
        throw new Error(j.message || "تعذّر حفظ تقييم الروث.");
      }

      showMsg(j.message || "✅ تم حفظ تقييم الروث بنجاح", true);

      setTimeout(() => {
        const number = j.animalNumber || ctx.animalNumber || "";
        const dt = j.eventDate || eventDateInput?.value || ctx.eventDate || todayCairo();
        location.href = `add-event.html?number=${encodeURIComponent(number)}&date=${encodeURIComponent(dt)}`;
      }, 900);

    } catch (e) {
      console.error("feces save error:", e);
      showMsg(e.message || "تعذّر حفظ تقييم الروث.", false);
    } finally {
      if (saveBtn) {
        saveBtn.disabled = false;
        saveBtn.textContent = "حفظ التقييم";
      }
    }
  }

  function resetCapture() {
    state.image = null;
    state.analysis = null;

    if (uploadPreviewBox) uploadPreviewBox.style.display = "none";
    if (uploadPreviewImg) uploadPreviewImg.removeAttribute("src");
    if (retakeBtn) retakeBtn.disabled = true;

    setWaiting();
    hideMsg();
  }

  function bindEvents() {
    captureBtn?.addEventListener("click", (e) => {
      e.preventDefault();
      captureAndAnalyze();
    });

    retakeBtn?.addEventListener("click", (e) => {
      e.preventDefault();
      resetCapture();
    });

    uploadBtn?.addEventListener("click", (e) => {
      e.preventDefault();
      uploadInput?.click();
    });

    uploadInput?.addEventListener("change", (e) => {
      uploadAndAnalyze(e.target.files?.[0]);
    });

    saveBtn?.addEventListener("click", (e) => {
      e.preventDefault();
      saveFeces();
    });

    backBtn?.addEventListener("click", (e) => {
      e.preventDefault();

      const ctx = contextFromUrl();
      const number = ctx.animalNumber || "";
      const dt = eventDateInput?.value || ctx.eventDate || todayCairo();

      location.href = `add-event.html?number=${encodeURIComponent(number)}&date=${encodeURIComponent(dt)}`;
    });

    window.addEventListener("resize", () => {
      fitOverlay();
      drawGuide();
    });
  }

  async function init() {
    const ctx = contextFromUrl();

    if (animalIdInput) animalIdInput.value = ctx.animalId || "";
    if (eventDateInput) eventDateInput.value = ctx.eventDate || todayCairo();
    if (numberSpan) numberSpan.textContent = ctx.animalNumber || (ctx.animalId ? `#${ctx.animalId.slice(-5)}` : "—");

    setWaiting();
    bindEvents();

    try {
      await startCamera();
    } catch (e) {
      console.warn("camera error:", e);
      showMsg(e.message || "تعذّر تشغيل الكاميرا. يمكنك استخدام رفع صورة بديلة.", false);
    }
  }

  init();
})();
</script>
</div>
</body>
</html>
