<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/forms.css">
  <title>مربي جديد؟</title>
<style>
:root{
  --mbk-green:#1F5C3A;
  --mbk-green-dark:#184A31;
  --mbk-gold:#B08A2E;
  --mbk-bg:#F6FAF4;
  --mbk-bg2:#EEF6E9;
  --mbk-text:#0F172A;
  --mbk-muted:#64748B;
  --mbk-border:#DCE8D6;
  --mbk-card:#FFFFFF;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  padding:22px 14px;
  direction:rtl;
  font-family:'Cairo',system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--mbk-text);
 background:
  radial-gradient(circle at top center, rgba(176,138,46,.13) 0, transparent 260px),
  linear-gradient(180deg,var(--mbk-bg) 0%,var(--mbk-bg2) 100%);
  display:flex;
  flex-direction:column;
  align-items:center;
}

.reg-header{
  width:100%;
  max-width:460px;
  text-align:center;
  padding:0 8px 16px;
  margin:0 0 8px;
  background:transparent !important;
  border:0 !important;
  border-radius:0 !important;
  box-shadow:none !important;
}
  .reg-header *{
  box-shadow:none !important;
}

.reg-logo{
  width:78px;
  height:78px;
  object-fit:contain;
  display:block;
  margin:0 auto 4px;
}

.reg-app{
  color:var(--mbk-green);
  font-size:28px;
  font-weight:900;
  line-height:1.1;
}

.reg-tagline{
  margin-top:6px;
  color:var(--mbk-gold);
  font-size:14px;
  font-weight:800;
}

.container{
  width:100%;
  max-width:460px;
  background:transparent !important;
  border:0 !important;
  border-radius:0 !important;
  padding:0 12px 18px !important;
  box-shadow:none !important;
}
.hero-text{
  margin:0 0 18px;
  color:#184A31;
  text-align:center;
  font-size:15px;
  line-height:1.8;
  font-weight:800;
}

label{
  display:block;
  margin:12px 2px 6px;
  color:var(--mbk-green-dark);
  font-size:13px;
  font-weight:900;
}

input,
select{
  width:100%;
  min-height:48px;
  border:1px solid var(--mbk-border);
  border-radius:15px;
  padding:11px 13px;
  background:#fff;
  color:var(--mbk-text);
  font-size:15px;
  font-weight:700;
  outline:none;
  box-shadow:0 4px 14px rgba(15,23,42,.035);
}

input:focus,
select:focus{
  border-color:var(--mbk-green);
  box-shadow:0 0 0 3px rgba(31,92,58,.12);
}

input::placeholder{
  color:#94A3B8;
  font-weight:600;
}

input:disabled,
select:disabled{
  background:#F3F7F1;
  color:#64748B;
}

.row-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.hint{
  margin:5px 2px 2px;
  color:var(--mbk-muted);
  font-size:12px;
  line-height:1.6;
  font-weight:700;
}

button{
  width:100%;
  min-height:50px;
  margin-top:18px;
  border:0;
  border-radius:16px;
  background:linear-gradient(135deg,var(--mbk-green),var(--mbk-green-dark));
  color:#fff;
  font-size:16px;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 12px 24px rgba(31,92,58,.22);
}

button:hover{
  filter:brightness(.97);
}

button:disabled{
  opacity:.65;
  cursor:not-allowed;
}

.message{
  display:none;
  padding:12px 14px;
  border-radius:16px;
  font-size:14px;
  font-weight:900;
  text-align:center;
  margin:0 0 12px;
}

.message.success{
  display:block;
  background:#E8F5EE;
  color:#166534;
  border:1px solid #BFE3CC;
}

.message.error{
  display:block;
  background:#FEF2F2;
  color:#991B1B;
  border:1px solid #FECACA;
}

#otpBox{
  padding:12px;
  margin-top:14px !important;
  border-radius:18px;
  background:#F8FBF6;
  border:1px solid #E5EFE0;
}

.link{
  margin-top:14px;
  text-align:center;
  color:var(--mbk-muted);
  font-size:13px;
  font-weight:800;
}

.link a{
  color:var(--mbk-green);
  text-decoration:none;
  font-weight:900;
}

.welcome-overlay{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,var(--mbk-green),var(--mbk-green-dark));
  display:none;
  align-items:center;
  justify-content:center;
  padding:24px;
  z-index:9999;
  color:#fff;
  text-align:center;
}

.welcome-card{
  width:100%;
  max-width:520px;
  background:rgba(255,255,255,.13);
  border:1px solid rgba(255,255,255,.24);
  border-radius:24px;
  padding:24px 18px;
  box-shadow:0 18px 45px rgba(0,0,0,.26);
  backdrop-filter:blur(7px);
}

.welcome-title{
  font-size:23px;
  font-weight:900;
  margin:0 0 12px;
}

.welcome-body{
  font-size:15px;
  line-height:1.9;
  font-weight:800;
  opacity:.98;
  margin:0;
  white-space:pre-line;
}

.welcome-foot{
  margin-top:15px;
  font-size:13px;
  opacity:.92;
  font-weight:800;
  color:#F8E7B0;
}

@media(max-width:430px){
  body{padding:18px 12px}
  .container{padding:18px 14px;border-radius:22px}
  .row-2{grid-template-columns:1fr}
  .reg-logo{width:72px;height:72px}
  .reg-app{font-size:26px}
}
</style>
</head>
<body>
  <!-- ✅ مُرَبِّيك: شاشة ترحيب انتقالية -->
<div id="welcomeOverlay" class="welcome-overlay" role="status" aria-live="polite" aria-hidden="true">
  <div class="welcome-card">
    <div id="welcomeTitle" class="welcome-title">مرحبًا بك</div>
    <p id="welcomeBody" class="welcome-body"></p>
    <div class="welcome-foot">جارٍ تجهيز لوحة مزرعتك…</div>
  </div>
</div>
<header class="reg-header">
  <img class="reg-logo" src="/images/logo.png" alt="مُرَبِّيك">
  <div class="reg-app">مُرَبِّيك</div>
  <div class="reg-tagline">نظام خبير لإدارة القطيع</div>
</header>

  <div class="container">

    <div id="msg" class="message" role="status" aria-live="polite"></div>

    <form id="registerForm" novalidate>
      <label for="name">الاسم الكامل *</label>
      <input id="name" type="text" required />

      <label for="phone">رقم الهاتف *</label>
      <input id="phone" type="tel" required placeholder="مثال (مصر): 01012345678" />
      <div id="phoneHint" class="hint">* سنطبّق نمطًا مناسبًا حسب الدولة المختارة.</div>

      <div class="row-2">
        <div>
          <label for="country">الدولة *</label>
          <select id="country" required>
            <option value="">— اختر الدولة —</option>
            <option>مصر</option>
            <option>السعودية</option>
            <option>الإمارات</option>
            <option>الكويت</option>
            <option>قطر</option>
            <option>البحرين</option>
            <option>عُمان</option>
            <option>الأردن</option>
            <option>لبنان</option>
            <option>سوريا</option>
            <option>فلسطين</option>
            <option>العراق</option>
            <option>اليمن</option>
            <option>ليبيا</option>
            <option>تونس</option>
            <option>الجزائر</option>
            <option>المغرب</option>
            <option>موريتانيا</option>
            <option>السودان</option>
            <option>الصومال</option>
            <option>جيبوتي</option>
            <option>جزر القمر</option>
          </select>
        </div>
        <div>
          <label for="region">المنطقة/المحافظة *</label>
          <select id="region" required disabled>
            <option value="">— اختر الدولة أولاً —</option>
          </select>
        </div>
      </div>

      <label for="role">التسجيل كـ *</label>
      <select id="role" required>
        <option value="">— اختر الدور —</option>
        <option>مربي</option>
        <option>طبيب بيطري</option>
        <option>مهندس إنتاج</option>
        <option>صاحب مزرعة</option>
        <option>مدير مزرعة</option>
        <option>استشاري</option>
      </select>

      <label for="password">كلمة المرور *</label>
      <input id="password" type="password" required minlength="8" />
<div class="hint">٨ أحرف على الأقل، وتحتوي على حرف ورقم.</div>

      <label for="confirmPassword">تأكيد كلمة المرور *</label>
    <input id="confirmPassword" type="password" required minlength="8" />

<div id="otpBox" style="display:none;margin-top:12px;">
  <label for="otpCode">كود التحقق *</label>
  <input id="otpCode" type="text" inputmode="numeric" maxlength="6" placeholder="أدخل كود التحقق" />
  <div class="hint">أدخل الكود المكوّن من ٦ أرقام.</div>
</div>

<button id="submitBtn" type="submit">تسجيل</button>
    </form>

    <div class="link muted">لديك حساب؟ <a href="login.html">ادخل إلى حسابك</a></div>
  </div>
<script>

  // عناصر DOM
  const form = document.getElementById('registerForm');
  const msg  = document.getElementById('msg');
  const btn  = document.getElementById('submitBtn');
  const countrySel = document.getElementById('country');
  const regionSel  = document.getElementById('region');
  const phoneInp   = document.getElementById('phone');
  const otpBox = document.getElementById('otpBox');
  const otpInp = document.getElementById('otpCode');

  let registerOtpRequestId = "";
  let registerOtpPassword = "";
  let registerOtpConfirmPassword = "";
  let registerOtpUser = null;

  function setRegisterFieldsDisabled(disabled){
  ['name','phone','country','region','role','password','confirmPassword'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = disabled;
  });
}

  // المناطق
  const REGIONS = {
    "مصر": ["القاهرة","الجيزة","القليوبية","الشرقية","الدقهلية","البحيرة","الغربية","المنوفية","كفر الشيخ","دمياط","الإسكندرية","المنيا","أسيوط","سوهاج","قنا","الأقصر","أسوان","بني سويف","الفيوم","البحر الأحمر","الوادي الجديد","مطروح","شمال سيناء","جنوب سيناء"],
    "السعودية": ["الرياض","مكة المكرمة","المدينة المنورة","القصيم","الشرقية","عسير","تبوك","حائل","الحدود الشمالية","جازان","نجران","الباحة","الجوف"],
    "الإمارات": ["أبوظبي","دبي","الشارقة","عجمان","أم القيوين","رأس الخيمة","الفجيرة"],
    "الكويت": ["العاصمة","الأحمدي","حولي","الفروانية","الجهراء","مبارك الكبير"],
    "قطر": ["الدوحة","الريان","الوكرة","الخور والذخيرة","الشمال","أم صلال","الظعاين","الشحانية"],
    "البحرين": ["العاصمة","المحرق","الشمالية","الجنوبية"],
    "عُمان": ["مسقط","ظفار","شمال الباطنة","جنوب الباطنة","الداخلية","شمال الشرقية","جنوب الشرقية","الظاهرة","الوسطى","مسندم"],
    "الأردن": ["عمّان","الزرقاء","إربد","البلقاء","المفرق","الكرك","معان","الطفيلة","العقبة","مأدبا","جرش","عجلون"],
    "لبنان": ["بيروت","جبل لبنان","الشمال","البقاع","النبطية","الجنوب","بعلبك-الهرمل","عكار"],
    "سوريا": ["دمشق","ريف دمشق","حلب","حمص","حماة","اللاذقية","طرطوس","إدلب","دير الزور","الرقة","الحسكة","درعا","السويداء","القنيطرة"],
    "فلسطين": ["القدس","رام الله والبيرة","الخليل","بيت لحم","نابلس","طولكرم","قلقيلية","جنين","أريحا والأغوار","سلفيت","غزة","خانيونس","رفح","الشمال","الوسطى"],
    "العراق": ["بغداد","نينوى","البصرة","أربيل","النجف","كربلاء","ذي قار","ديالى","صلاح الدين","كركوك","السليمانية","القادسية","بابل","الأنبار","واسط","المثنى","ميسان","دهوك"],
    "اليمن": ["صنعاء","عدن","تعز","الحديدة","إب","حضرموت","شبوة","مأرب","صعدة","البيضاء","ذمار","المحويت","ريمة","حجة","لحج","أبين","الضالع","المهرة"],
    "ليبيا": ["طرابلس","بنغازي","مصراتة","سبها","درنة","البيضاء","الزاوية","غريان","اجدابيا","الكفرة","الجفرة","مرزق","الواحات","طبرق"],
    "تونس": ["تونس","أريانة","بن عروس","منوبة","نابل","زغوان","بنزرت","باجة","جندوبة","الكاف","سليانة","القيروان","سوسة","المنستير","المهدية","صفاقس","القصرين","قفصة","توزر","قبلي","مدنين","تطاوين"],
    "الجزائر": ["الجزائر","وهران","قسنطينة","سطيف","البليدة","سيدي بلعباس","باتنة","عنابة","جيجل","بجاية","تلمسان","الأغواط","بسكرة","غرداية","ورقلة","تيزي وزو","تيبازة","البويرة"],
    "المغرب": ["الرباط-سلا-القنيطرة","الدار البيضاء-سطات","مراكش-آسفي","فاس-مكناس","طنجة-تطوان-الحسيمة","الشرق","بني ملال-خنيفرة","درعة-تافيلالت","سوس-ماسة","العيون-الساقية الحمراء","كلميم-واد نون","الداخلة-وادي الذهب"],
    "موريتانيا": ["نواكشوط","الحوض الشرقي","الحوض الغربي","لعصابة","كوركول","البراكنة","اترارزة","تكانت","كيدي ماغا","تيرس زمور","داخلت نواذيبو","آدرار"],
    "السودان": ["الخرطوم","الجزيرة","القضارف","سنار","كسلا","البحر الأحمر","نهر النيل","الشمالية","شمال كردفان","جنوب كردفان","شمال دارفور","جنوب دارفور","غرب دارفور","وسط دارفور","شرق دارفور","النيل الأزرق"],
    "الصومال": ["بنادر","بونتلاند","جوبالاند","جنوب غرب","هيرشبيلي","غلمدغ","أرض الصومال"],
    "جيبوتي": ["مدينة جيبوتي","علي صبيح","تاجورة","أوبوك","دهر","أرتا"],
    "جزر القمر": ["نجازيدجا (القمر الكبرى)","أنجوان","موهيلي"]
  };

  function fillRegions(country){
    regionSel.innerHTML=''; regionSel.disabled=true;
    const list = REGIONS[country];
    const def = document.createElement('option');
    def.value=''; def.textContent = list ? '— اختر المنطقة/المحافظة —' : '— غير متاح —';
    regionSel.appendChild(def);
    if (list){ list.forEach(n=>{ const o=document.createElement('option'); o.value=n; o.textContent=n; regionSel.appendChild(o); }); regionSel.disabled=false; }
  }
  function setPhonePlaceholder(country){
    const map = {'مصر':'01012345678','السعودية':'05xxxxxxxx','الإمارات':'05xxxxxxxx','الكويت':'5xxxxxxxx','قطر':'3xxxxxxxx','البحرين':'3xxxxxxx','عُمان':'9xxxxxxxx','الأردن':'07xxxxxxxx','لبنان':'03xxxxxx','سوريا':'09xxxxxxxx','فلسطين':'059xxxxxxx','العراق':'07xxxxxxxx','اليمن':'7xxxxxxxx','ليبيا':'09xxxxxxxx','تونس':'2xxxxxxxx / 9xxxxxxxx','الجزائر':'05xxxxxxxx','المغرب':'06xxxxxxxx','موريتانيا':'22xxxxxxx','السودان':'09xxxxxxxx','الصومال':'+252xxxxxxxx','جيبوتي':'+253xxxxxxxx','جزر القمر':'+269xxxxxxx'};
    phoneInp.placeholder = `مثال (${country||'دولة'}): ${map[country]||'+9715xxxxxxx'}`;
  }
  countrySel.addEventListener('change', ()=>{ fillRegions(countrySel.value); setPhonePlaceholder(countrySel.value); });

  function showMessage(text,type='error'){ msg.textContent=text; msg.className=`message ${type}`; msg.style.display='block'; }
  function clearMessage(){ msg.textContent=''; msg.style.display='none'; }
  function showWelcomeOverlay(fullName, role){
  const ov = document.getElementById('welcomeOverlay');
  const title = document.getElementById('welcomeTitle');
  const body  = document.getElementById('welcomeBody');
  if (!ov || !title || !body) return;

  const roleTitle =
    role === 'طبيب بيطري' ? 'طبيب القطيع الذكي' :
    role === 'مهندس إنتاج' ? 'مهندس الإنتاج الذكي' :
    role === 'مدير مزرعة' ? 'مدير المزرعة الذكي' :
    role === 'صاحب مزرعة' ? 'قائد المزرعة' :
    role === 'استشاري' ? 'مستشار الأداء' :
    'مربي القطيع';

  title.textContent = `مرحبًا بك يا ${fullName}`;
  body.textContent =
`✅ ${roleTitle}… مُرَبِّيك الآن في صفّك.

من هذه اللحظة:
• قرارات التلقيح في وقتها
• تنبيهات الولادة قبل الموعد
• تقارير اللبن واضحة… للأبقار والجاموس

مزرعتك أصبحت تحت السيطرة.`;

  ov.style.display = 'flex';
  ov.setAttribute('aria-hidden','false');
}
 
form.addEventListener('submit', async (e)=>{
  e.preventDefault();
  clearMessage();
  btn.disabled = true;

  const fullName = document.getElementById('name').value.trim();
  const phoneRaw = phoneInp.value.trim();
  const country  = countrySel.value.trim();
  const region   = regionSel.value.trim();
  const role     = document.getElementById('role').value.trim();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  try{
    if (!registerOtpRequestId) {
      const r = await fetch('/api/auth/register/start', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          fullName,
          phone: phoneRaw,
          country,
          region,
          role,
          password,
          confirmPassword
        })
      });

      const data = await r.json().catch(() => ({}));

      if (!r.ok || !data.ok) {
        showMessage(data.message || 'تعذّر إرسال كود التحقق.');
        return;
      }

      registerOtpRequestId = data.requestId || "";
      registerOtpPassword = password;
      registerOtpConfirmPassword = confirmPassword;
      registerOtpUser = { fullName, role };

      otpBox.style.display = 'block';
      otpInp.focus();
      setRegisterFieldsDisabled(true);
      btn.textContent = 'تأكيد الكود';

      showMessage(
        data.devOtp
          ? `تم إرسال كود التحقق. كود التجربة: ${data.devOtp}`
          : 'تم إرسال كود التحقق إلى رقم الهاتف.',
        'success'
      );

      return;
    }

    const otp = otpInp.value.trim();

    if (!otp) {
      showMessage('أدخل كود التحقق.');
      return;
    }

    const r = await fetch('/api/auth/register/verify', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        requestId: registerOtpRequestId,
        otp,
        password: registerOtpPassword,
        confirmPassword: registerOtpConfirmPassword
      })
    });

    const data = await r.json().catch(() => ({}));

    if (!r.ok || !data.ok) {
      showMessage(data.message || 'كود التحقق غير صحيح.');
      return;
    }

    const user = data.user || {};
    showWelcomeOverlay(
      user.name || registerOtpUser?.fullName || fullName,
      user.role || registerOtpUser?.role || role
    );

    setTimeout(() => {
      location.href = data.redirectUrl || 'add-animal.html';
    }, 1800);

  }catch(err){
    showMessage('تعذّر الاتصال بالسيرفر الآن.');
  }finally{
    btn.disabled = false;
  }
});
</script>


</body>
</html>
