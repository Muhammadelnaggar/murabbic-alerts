<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>استيراد القطيع — مؤقت</title>
  <link rel="stylesheet" href="css/forms.css" />
</head>

<body>
<header>
  <div class="header-title">استيراد القطيع — مؤقت</div>
  <button type="button" class="back-btn" onclick="location.href='add-animal.html'">رجوع</button>
</header>

<main class="page">
  <section class="card">
    <h2>رفع ملف القطيع</h2>
    <p class="hint">
      هذه صفحة مؤقتة لا تحفظ إلا بعد المعاينة. الحفظ يتم من السيرفر فقط.
    </p>

    <label>ملف Excel / CSV</label>
    <input id="herdFile" type="file" accept=".xlsx,.xls,.csv,.txt" />
    <label>نوع القطيع إذا كان الملف لا يحتوي على النوع</label>
<select id="defaultAnimalType">
  <option value="">حسب الملف فقط</option>
  <option value="بقرة">أبقار</option>
  <option value="جاموسة">جاموس</option>
</select>
<p class="hint">
  استخدم هذا الاختيار فقط لو الملف لا يحتوي على عمود نوع الحيوان.
</p>

    <div class="actions-bar inline">
      <button id="btnPreview" type="button" class="primary">معاينة</button>
     <button id="btnSave" type="button" class="success" disabled>حفظ القطيع</button>
    </div>
  </section>

  <section id="summaryBox" class="card" style="display:none;">
    <h2>ملخص المعاينة</h2>
    <div class="kpi-grid">
      <div class="kpi-box">
        <div id="totalRows" class="kpi-value">0</div>
        <div class="kpi-label">إجمالي الصفوف</div>
      </div>
      <div class="kpi-box">
        <div id="readyRows" class="kpi-value">0</div>
        <div class="kpi-label">جاهز</div>
      </div>
      <div class="kpi-box">
        <div id="rejectedRows" class="kpi-value">0</div>
        <div class="kpi-label">مرفوض</div>
      </div>
      <div class="kpi-box">
        <div id="archivedRows" class="kpi-value">0</div>
        <div class="kpi-label">مؤرشف</div>
      </div>
    </div>
  </section>

  <section id="messageBox" class="card" style="display:none;"></section>

  <section id="resultsBox" class="card" style="display:none;">
    <h2>نتائج الصفوف</h2>
    <div id="rowsList" class="preview-scroll"></div>
  </section>
</main>

<script>
(function(){
  const API_BASE = "https://murabbic-alerts.onrender.com";

  const $ = id => document.getElementById(id);

  const herdFile = $("herdFile");
  const defaultAnimalType = $("defaultAnimalType");
  const btnPreview = $("btnPreview");
  const btnSave = $("btnSave");

  const summaryBox = $("summaryBox");
  const messageBox = $("messageBox");
  const resultsBox = $("resultsBox");
  const rowsList = $("rowsList");

  let lastFilePayload = null;
  let lastPreviewOk = false;

  function getUid(){
    return (
      localStorage.getItem("murabbik_uid") ||
      localStorage.getItem("uid") ||
      localStorage.getItem("userId") ||
      localStorage.getItem("currentUserId") ||
      ""
    ).trim();
  }

  function showMessage(text, type){
    messageBox.style.display = "block";
    messageBox.className = "card " + (type || "");
    messageBox.textContent = text || "";
  }

  function fileToBase64(file){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(String(reader.result || ""));
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

function setSummary(j){
  const baseline = j.baselineSummary || {};
  const seeds = j.seedEventsSummary || {};

  $("totalRows").textContent = baseline.totalRows ?? j.totalRows ?? 0;
  $("readyRows").textContent = baseline.readyAnimalsCount ?? 0;
  $("rejectedRows").textContent = baseline.needsReviewCount ?? 0;
  $("archivedRows").textContent = baseline.archivedRowsCount ?? 0;

  summaryBox.style.display = "block";

  rowsList.innerHTML = `
    <div class="preview-row ${j.ok ? "status-ok" : "status-error"}">
      <div><b>مصدر الملف:</b> ${j.sourceProfile?.name || "غير محدد"}</div>
      <div><b>الثقة:</b> ${j.sourceProfile?.confidenceLevel || "-"}</div>
      <div><b>حيوانات جاهزة:</b> ${baseline.readyAnimalsCount ?? 0}</div>
      <div><b>تحتاج مراجعة:</b> ${baseline.needsReviewCount ?? 0}</div>
      <div><b>أحداث تأسيسية:</b> ${seeds.totalSeedEventsCount ?? 0}</div>
      <div><b>ولادات:</b> ${seeds.calvingEventsCount ?? 0}</div>
      <div><b>تلقيحات:</b> ${seeds.inseminationEventsCount ?? 0}</div>
      <div><b>تشخيص حمل:</b> ${seeds.pregnancyDiagnosisEventsCount ?? 0}</div>
      <div><b>تجفيف:</b> ${seeds.dryOffEventsCount ?? 0}</div>
      <div><b>شياع:</b> ${seeds.heatEventsCount ?? 0}</div>
    </div>
  `;

  resultsBox.style.display = "block";
}

  function renderRows(rows){
    rowsList.innerHTML = "";

    (rows || []).forEach(r => {
      const item = document.createElement("div");
      item.className = "preview-row " + (r.ok ? "status-ok" : "status-error");

      item.innerHTML = `
        <div><b>السطر:</b> ${r.row || ""}</div>
        <div><b>رقم الحيوان:</b> ${r.animalNumber || ""}</div>
        <div><b>النوع:</b> ${r.recordKind || ""}</div>
        <div><b>الحالة:</b> ${r.ok ? "جاهز" : "مرفوض"}</div>
        <div><b>الحدث:</b> ${r.murabbikEventType || r.originalEventType || "-"}</div>
        <div><b>الأرشفة:</b> ${r.archivedAnimal ? (r.archiveReason || "archived") : "-"}</div>
        <div class="hint">${r.message || ""}</div>
        <div class="hint">${r.expectedAnimalEffect || ""}</div>
      `;

      rowsList.appendChild(item);
    });

    resultsBox.style.display = "block";
  }

  async function callHerdImport(path){
    const uid = getUid();

    if (!uid) {
      throw new Error("لم يتم العثور على X-User-Id في localStorage.");
    }

    const r = await fetch(API_BASE + path, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-User-Id": uid
      },
      body: JSON.stringify(lastFilePayload)
    });

    return r.json();
  }

  btnPreview.addEventListener("click", async () => {
    try {
      btnPreview.disabled = true;
      btnSave.disabled = true;
      lastPreviewOk = false;

      const file = herdFile.files && herdFile.files[0];
      if (!file) {
        showMessage("اختر ملفًا أولًا.", "status-error");
        return;
      }

    lastFilePayload = {
  fileName: file.name,
  fileBase64: await fileToBase64(file)
};

if (defaultAnimalType && defaultAnimalType.value) {
  lastFilePayload.defaultAnimalType = defaultAnimalType.value;
}

      showMessage("جاري المعاينة من السيرفر...", "status-warn");

     const j = await callHerdImport("/api/herd-import-v2/preview");

      console.log("HERD PREVIEW:", j);

      setSummary(j);
     
     lastPreviewOk = !!(
  j.ok &&
  j.baselineSummary &&
  j.baselineSummary.readyForSavePreview &&
  j.seedEventsSummary &&
  j.seedEventsSummary.readyForSavePreview
);

btnSave.disabled = !lastPreviewOk;

      showMessage(j.message || "تمت المعاينة.", j.ok ? "status-ok" : "status-error");

    } catch (e) {
      console.error(e);
      showMessage(e.message || "فشلت المعاينة.", "status-error");
    } finally {
      btnPreview.disabled = false;
    }
  });

  btnSave.addEventListener("click", async () => {
    try {
      if (!lastPreviewOk || !lastFilePayload) {
        showMessage("اعمل معاينة ناجحة أولًا.", "status-error");
        return;
      }

      btnSave.disabled = true;
     showMessage("جاري حفظ القطيع تشغيليًا من السيرفر...", "status-warn");

const j = await callHerdImport("/api/herd-import-v2/save-operational");

      console.log("HERD SAVE:", j);

      showMessage(j.message || "تم الحفظ.", j.ok ? "status-ok" : "status-error");
      if (j.ok) {
  rowsList.innerHTML = `
    <div class="preview-row status-ok">
      <div><b>حيوانات جديدة:</b> ${j.insertedAnimalsCount ?? 0}</div>
      <div><b>حيوانات تم تحديثها:</b> ${j.updatedAnimalsCount ?? 0}</div>
      <div><b>أحداث تأسيسية محفوظة:</b> ${j.savedSeedEventsCount ?? 0}</div>
      <div><b>إجمالي الحيوانات المتأثرة:</b> ${j.totalAnimalsTouched ?? 0}</div>
    </div>
  `;
  resultsBox.style.display = "block";
}

     
    } catch (e) {
      console.error(e);
      showMessage(e.message || "فشل الحفظ.", "status-error");
    } finally {
      btnSave.disabled = false;
    }
  });
})();
</script>
</body>
</html>
