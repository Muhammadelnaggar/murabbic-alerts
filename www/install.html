<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>تثبيت مُرَبِّيك</title>
  <link rel="stylesheet" href="css/forms.css" />
  <meta name="theme-color" content="#0ea05a" />
  <style>
    :root{
      --green:#0ea05a;
      --green-dark:#0b7f47;
      --bg:#f7faf7;
      --card:#ffffff;
      --text:#102217;
      --muted:#64748b;
      --line:#dbe7df;
      --soft:#eef7f0;
      --warn:#fff8e6;
      --warn-border:#f2d58a;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Cairo","Tahoma","Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .page{
      width:min(100%,560px);
      margin:0 auto;
      padding:14px 12px 30px;
    }
    .hero{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      padding:22px 16px 18px;
      box-shadow:0 10px 28px rgba(0,0,0,.05);
      text-align:center;
    }
    .logo{
      width:88px;
      height:88px;
      object-fit:contain;
      margin:0 auto 12px;
      display:block;
    }
    .title{
      margin:0;
      font-size:28px;
      font-weight:900;
      color:var(--green-dark);
      line-height:1.3;
    }
    .sub{
      margin:8px auto 0;
      max-width:380px;
      font-size:15px;
      line-height:1.8;
      color:#355;
    }
    .card{
      margin-top:14px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:22px;
      padding:16px;
      box-shadow:0 8px 24px rgba(0,0,0,.04);
    }
    .cta{
      width:100%;
      height:54px;
      border:none;
      border-radius:16px;
      background:var(--green);
      color:#fff;
      font:inherit;
      font-size:18px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 8px 18px rgba(14,160,90,.22);
    }
    .cta:active{transform:translateY(1px)}
    .cta[disabled]{opacity:.55;cursor:not-allowed;box-shadow:none}
    .small-btn{
      width:100%;
      height:48px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      color:var(--green-dark);
      font:inherit;
      font-weight:800;
      cursor:pointer;
      margin-top:10px;
    }
    .sysbox{
      margin-top:12px;
      border-radius:16px;
      padding:12px 14px;
      line-height:1.8;
      font-size:14px;
      font-weight:700;
      display:none;
    }
    .sysbox.show{display:block}
    .sysbox.info{background:var(--soft);border:1px solid var(--line);color:var(--green-dark)}
    .sysbox.warn{background:var(--warn);border:1px solid var(--warn-border);color:#7a5200}
    .steps{
      display:grid;
      gap:10px;
      margin-top:12px;
    }
    .step{
      border:1px solid var(--line);
      border-radius:16px;
      background:#fcfffd;
      padding:12px;
      display:grid;
      grid-template-columns:38px 1fr;
      gap:10px;
      align-items:start;
    }
    .n{
      width:38px;height:38px;border-radius:999px;background:var(--green);color:#fff;
      display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;
    }
    .step b{display:block;color:var(--green-dark);margin-bottom:4px;font-size:15px}
    .step div{font-size:14px;line-height:1.8;color:#355}
    .hint{
      margin-top:10px;
      font-size:13px;
      color:var(--muted);
      text-align:center;
      line-height:1.8;
    }
    .done{
      text-align:center;
      color:var(--green-dark);
      font-weight:900;
      font-size:17px;
      line-height:1.8;
    }
    .footer-link{
      display:block;
      text-align:center;
      margin-top:12px;
      color:var(--green-dark);
      font-weight:800;
      text-decoration:none;
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <img class="logo" src="/images/logo.png" alt="مُرَبِّيك">
      <h1 class="title">ثبّت مُرَبِّيك على هاتفك</h1>
      <p class="sub">دقيقة واحدة فقط، وبعدها سيفتح مُرَبِّيك من أيقونة مستقلة على شاشة هاتفك مثل أي تطبيق.</p>
    </section>

    <section class="card" id="installCard">
      <button id="installBtn" class="cta" type="button">تثبيت مُرَبِّيك الآن</button>
      <button id="openAppBtn" class="small-btn" type="button" hidden>فتح مُرَبِّيك</button>
      <div id="msg" class="sysbox info"></div>
      <div id="steps" class="steps"></div>
      <a class="footer-link" href="/login.html">الدخول إلى مُرَبِّيك</a>
    </section>
  </div>

  <script>
    let deferredPrompt = null;
    const installBtn = document.getElementById('installBtn');
    const openAppBtn = document.getElementById('openAppBtn');
    const msg = document.getElementById('msg');
    const steps = document.getElementById('steps');

    const ua = navigator.userAgent || '';
    const isIOS = /iphone|ipad|ipod/i.test(ua);
    const isAndroid = /android/i.test(ua);
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

    function setMsg(text, type='info'){
      msg.className = `sysbox show ${type}`;
      msg.textContent = text;
    }

    function clearMsg(){
      msg.className = 'sysbox info';
      msg.textContent = '';
    }

    function renderSteps(items){
      steps.innerHTML = '';
      items.forEach((item, i) => {
        const el = document.createElement('div');
        el.className = 'step';
        el.innerHTML = `<div class="n">${i+1}</div><div><b>${item.title}</b><div>${item.text}</div></div>`;
        steps.appendChild(el);
      });
    }

    function renderInstalled(){
      installBtn.hidden = true;
      openAppBtn.hidden = false;
      steps.innerHTML = `<div class="done">مُرَبِّيك مثبت بالفعل على هذا الهاتف.</div>`;
      clearMsg();
    }

    function renderIOSGuide(){
      installBtn.textContent = 'شاهد خطوات التثبيت';
      renderSteps([
        { title:'افتح المشاركة', text:'اضغط زر المشاركة في Safari أسفل أو أعلى الشاشة.' },
        { title:'اختر إضافة إلى الشاشة الرئيسية', text:'ابحث عن خيار: إضافة إلى الشاشة الرئيسية.' },
        { title:'اضغط إضافة', text:'سيظهر مُرَبِّيك على شاشة هاتفك كتطبيق مستقل.' }
      ]);
      setMsg('على iPhone يتم التثبيت من Safari عبر خيار: إضافة إلى الشاشة الرئيسية.', 'info');
    }

    function renderAndroidGuide(waitingPrompt){
      if (waitingPrompt) {
        renderSteps([
          { title:'اضغط الزر الأخضر', text:'اضغط: تثبيت مُرَبِّيك الآن.' },
          { title:'وافق على التثبيت', text:'اختر تثبيت عندما تظهر النافذة.' },
          { title:'افتح التطبيق', text:'بعدها سيظهر مُرَبِّيك على شاشة الهاتف كتطبيق مستقل.' }
        ]);
        setMsg('التثبيت جاهز الآن. اضغط الزر الأخضر لإكمال التثبيت.', 'info');
      } else {
        renderSteps([
          { title:'افتح الرابط من Chrome', text:'لو كنت داخل واتساب أو فيسبوك، افتح مُرَبِّيك في متصفح Chrome مباشرة.' },
          { title:'انتظر ثوانٍ قليلة', text:'بعد اكتمال تحميل الصفحة سيظهر التثبيت إذا كان الهاتف يدعمه الآن.' },
          { title:'لو لم يظهر الزر', text:'افتح قائمة Chrome ثم اختر: تثبيت التطبيق.' }
        ]);
        setMsg('إذا لم يظهر التثبيت فورًا، افتح الرابط من Chrome مباشرة ثم أعد المحاولة.', 'warn');
      }
    }

    if (isStandalone) {
      renderInstalled();
    } else if (isIOS) {
      renderIOSGuide();
    } else {
      renderAndroidGuide(false);
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (!isStandalone && !isIOS) {
        installBtn.hidden = false;
        installBtn.disabled = false;
        renderAndroidGuide(true);
      }
    });

    window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
      renderInstalled();
    });

    installBtn.addEventListener('click', async () => {
      if (isIOS) {
        setMsg('من Safari: اضغط مشاركة ثم اختر إضافة إلى الشاشة الرئيسية.', 'info');
        return;
      }

      if (!deferredPrompt) {
        setMsg('افتح مُرَبِّيك من Chrome مباشرة، ثم اضغط 3 نقاط واختر: تثبيت التطبيق.', 'warn');
        return;
      }

      deferredPrompt.prompt();
      const choice = await deferredPrompt.userChoice;
      if (choice && choice.outcome === 'accepted') {
        setMsg('جاري تثبيت مُرَبِّيك...', 'info');
      } else {
        setMsg('لم يكتمل التثبيت. يمكنك المحاولة مرة أخرى.', 'warn');
      }
      deferredPrompt = null;
    });

    openAppBtn.addEventListener('click', () => {
      location.href = '/login.html';
    });
  </script>
</body>
</html>
