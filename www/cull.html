<!DOCTYPE html>
<html lang="ar" dir="rtl" data-page="cull">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>تسجيل استبعاد — مُرَبِّك</title>
  <link rel="stylesheet" href="css/forms.css" />

</head>
<body>
<header>
  <div class="mbk-head">
    <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">
    <div class="mbk-center">
      <div class="mbk-page-title">تسجيل الاستبعاد</div>
      <div class="mbk-app-name">مُرَبِّيك</div>
    </div>
    <a class="mbk-back" href="add-event.html">رجوع</a>
  </div>
</header>


 <main class="mbk-form">
  <form id="cullForm" data-event="استبعاد" novalidate>
    <div id="info" class="infobar"></div>
    <section class="mbk-card">
    <label>رقم الحيوان</label>
   <input id="animalNumber" data-field="animalNumber" readonly />

    <label>تاريخ الاستبعاد</label>
   <input id="eventDate" data-field="eventDate" type="date" />

    <label>سبب الاستبعاد (رئيسي)</label>
    <select id="cullMain" data-field="cullMain">
      <option value="">— اختر —</option>
      <option value="انتاجي">إنتاجي</option>
      <option value="تناسلي">تناسلي</option>
      <option value="صحي">صحي</option>
    </select>

    <label>تفصيل السبب</label>
<select id="cullDetail" data-field="cullDetail" disabled>    
  <option value="">— اختر السبب الرئيسي أولاً —</option>
    </select>

    <label>ملاحظات</label>
   <textarea id="notes" data-field="notes" rows="3" placeholder="اختياري"></textarea>
    </section>
<div class="actions-bar">
  <button class="save" id="saveBtn" type="submit">تسجيل الاستبعاد</button>
  <button class="ghost" type="button" id="openCardBtn">بطاقة الحيوان</button>
</div>
</form>
  </main>

 <script>
  const $ = (id) => document.getElementById(id);

  const form = $("cullForm");
  const info = $("info");
  const btn = $("saveBtn");
  const openBtn = $("openCardBtn");
  const mainEl = $("cullMain");
  const detailEl = $("cullDetail");

  let cullGateAllowed = false;
  let cullOptions = {};

 

  function msg(text, type = "info") {
    if (!info) return;

    const cls =
      type === "success" ? "success" :
      type === "error" ? "error" :
      type === "warning" ? "warning" :
      "info";

    info.className = `infobar mbk-infobar show ${cls}`;
    info.style.display = "block";
    info.textContent = text;

    try { info.scrollIntoView({ behavior: "smooth", block: "start" }); } catch (_) {}
  }
async function sessionFetchJson(path, options = {}) {
  const r = await fetch(path, {
    method: options.method || "GET",
    credentials: "same-origin",
    cache: "no-store",
    headers: {
      "Accept": "application/json",
      ...(options.body ? { "Content-Type": "application/json" } : {}),
      ...(options.headers || {})
    },
    body: options.body ? JSON.stringify(options.body) : undefined
  });

  const data = await r.json().catch(() => null);

  if (r.status === 401 || data?.error === "auth_required") {
    msg(data?.message || "❌ سجّل الدخول أولًا.", "error");
    return { r, data, authRequired: true };
  }

  return { r, data, authRequired: false };
}
  function initFromUrl() {
    const p = new URLSearchParams(location.search);

   const num =
  p.get("number") ||
  p.get("animalNumber") ||
  "";

   const dt =
  p.get("date") ||
  p.get("eventDate") ||
  new Date().toISOString().slice(0, 10);

    $("animalNumber").value = String(num || "").trim();
    $("eventDate").value = String(dt || "").slice(0, 10);
  }

  function fillMainOptions() {
    const current = String(mainEl?.value || "").trim();

    mainEl.innerHTML = `<option value="">— اختر —</option>`;

    Object.keys(cullOptions || {}).forEach((key) => {
      const opt = document.createElement("option");
      opt.value = key;
      opt.textContent = key;
      mainEl.appendChild(opt);
    });

    if (current && cullOptions[current]) {
      mainEl.value = current;
    }
  }

  function fillDetails() {
    const m = String(mainEl?.value || "").trim();

    if (!m || !Array.isArray(cullOptions[m])) {
      detailEl.innerHTML = `<option value="">— اختر السبب الرئيسي أولاً —</option>`;
      detailEl.value = "";
      detailEl.disabled = true;
      return;
    }

    detailEl.disabled = false;
    detailEl.innerHTML = `<option value="">— اختر —</option>`;

    cullOptions[m].forEach((label) => {
      const opt = document.createElement("option");
      opt.value = String(label || "").trim();
      opt.textContent = String(label || "").trim();
      detailEl.appendChild(opt);
    });
  }

async function loadCullOptions() {
  try {
    const { r, data, authRequired } = await sessionFetchJson("/api/cull/options");

    if (authRequired) return false;

    if (!r.ok || data?.ok !== true || !data?.options) {
      msg(data?.message || "❌ تعذّر تحميل أسباب الاستبعاد.", "error");
      return false;
    }

    cullOptions = data.options || {};
    fillMainOptions();
    fillDetails();
    return true;

  } catch (e) {
    console.error("load cull options failed", e);
    msg("❌ فشل الاتصال بالسيرفر أثناء تحميل أسباب الاستبعاد.", "error");
    return false;
  }
}

async function runCullGate() {
  const animalNumber = String($("animalNumber")?.value || "").trim();

  cullGateAllowed = false;
  if (btn) btn.disabled = true;

  if (!animalNumber) {
    msg("❌ رقم الحيوان مطلوب.", "error");
    return false;
  }

  try {
    msg("جارِ التحقق من الحيوان...", "info");

    const { r, data, authRequired } = await sessionFetchJson("/api/cull/gate", {
      method: "POST",
      body: { animalNumber }
    });

    if (authRequired) return false;

    if (!r.ok || data?.allowed !== true) {
      cullGateAllowed = false;
      if (btn) btn.disabled = true;
      msg(data?.message || "❌ لا يمكن تسجيل استبعاد لهذا الحيوان.", "error");
      return false;
    }

    cullGateAllowed = true;
    if (btn) btn.disabled = false;

    msg(data.message || "✅ الحيوان مؤهل لتسجيل الاستبعاد.", "success");
    return true;

  } catch (e) {
    console.error("cull gate failed", e);
    cullGateAllowed = false;
    if (btn) btn.disabled = true;
    msg("❌ فشل الاتصال بالسيرفر أثناء التحقق من الحيوان.", "error");
    return false;
  }
}

  async function saveCull() {

    if (!cullGateAllowed) {
      msg("❌ لا يمكن الحفظ قبل نجاح التحقق من الحيوان.", "error");
      return;
    }

    const payload = {
      animalNumber: String($("animalNumber")?.value || "").trim(),
      eventDate: String($("eventDate")?.value || "").slice(0, 10),
      cullMain: String(mainEl?.value || "").trim(),
      cullDetail: String(detailEl?.value || "").trim(),
      notes: String($("notes")?.value || "").trim()
    };

    if (!payload.cullMain) {
      msg("⚠️ اختر سبب الاستبعاد الرئيسي.", "warning");
      return;
    }

    if (!payload.cullDetail) {
      msg("⚠️ اختر تفصيل سبب الاستبعاد.", "warning");
      return;
    }

    try {

      if (btn) {
        btn.disabled = true;
        btn.textContent = "جارِ الحفظ...";
      }

      msg("جارِ حفظ الاستبعاد...", "info");

     const { r, data, authRequired } = await sessionFetchJson("/api/cull/save", {
  method: "POST",
  body: payload
});

if (authRequired) return;

      if (!r.ok || data?.ok !== true) {
        msg(data?.message || "❌ فشل حفظ الاستبعاد.", "error");
        if (btn) {
          btn.disabled = false;
          btn.textContent = "تسجيل الاستبعاد";
        }
        return;
      }


      msg(data.message || "✅ تم حفظ الاستبعاد بنجاح", "success");

      setTimeout(() => {
        location.href = data.redirectUrl || `cow-card.html?number=${encodeURIComponent(payload.animalNumber)}`;
      }, 900);

    } catch (e) {
      console.error("save cull failed", e);
      msg("❌ فشل الاتصال بالسيرفر أثناء حفظ الاستبعاد.", "error");
      if (btn) {
        btn.disabled = false;
        btn.textContent = "تسجيل الاستبعاد";
      }
    }
  }

  mainEl?.addEventListener("change", fillDetails);

  openBtn?.addEventListener("click", () => {
    const n = String($("animalNumber")?.value || "").trim();
    if (!n) return;
    location.href = `cow-card.html?number=${encodeURIComponent(n)}`;
  });

  form?.addEventListener("submit", (e) => {
    e.preventDefault();
    saveCull();
  });

  initFromUrl();
  loadCullOptions();
  runCullGate();
</script>
</body>
</html>
