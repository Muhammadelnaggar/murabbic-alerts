<!DOCTYPE html>
<html lang="ar" dir="rtl" data-page="cull">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>تسجيل استبعاد — مُرَبِّك</title>
  <link rel="stylesheet" href="css/forms.css" />
  <script type="module" src="js/forms-init.js"></script>

</head>
<body>
<header>
  <div class="mbk-head">
    <img class="mbk-logo" src="/images/logo.png" alt="مُرَبِّيك">
    <div class="mbk-center">
      <div class="mbk-page-title">تسجيل الاستبعاد</div>
      <div class="mbk-app-name">مُرَبِّيك</div>
    </div>
    <a class="mbk-back" href="add-event.html">رجوع</a>
  </div>
</header>


 <main class="mbk-form">
  <form id="cullForm" data-event="استبعاد" novalidate>
    <div id="info" class="infobar"></div>
    <section class="mbk-card">
    <label>رقم الحيوان</label>
   <input id="animalNumber" data-field="animalNumber" readonly />

    <label>تاريخ الاستبعاد</label>
   <input id="eventDate" data-field="eventDate" type="date" />

    <label>سبب الاستبعاد (رئيسي)</label>
    <select id="cullMain" data-field="cullMain">
      <option value="">— اختر —</option>
      <option value="انتاجي">إنتاجي</option>
      <option value="تناسلي">تناسلي</option>
      <option value="صحي">صحي</option>
    </select>

    <label>تفصيل السبب</label>
<select id="cullDetail" data-field="cullDetail" disabled>    
  <option value="">— اختر السبب الرئيسي أولاً —</option>
    </select>

    <label>ملاحظات</label>
   <textarea id="notes" data-field="notes" rows="3" placeholder="اختياري"></textarea>
    </section>
  <div class="btn-row">
<button class="save-btn" id="saveBtn" data-validate="true" type="submit">تسجيل الحدث</button>
  <button class="open-card" type="button" id="openCardBtn">بطاقة الحيوان</button>
</div>
</form>
  </main>

  <script type="module">
    import { db, auth, ensureAuth } from "/js/firebase-config.js";
    import { updateAnimalByEvent } from "/js/animal-update.js";
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const $ = (id) => document.getElementById(id);
    const info = $("info");
const btn = $("saveBtn");

const openBtn = $("openCardBtn");

openBtn.onclick = () => {
  const n = String($("animalNumber").value || "").trim();
  if (!n) return;
  location.href = `cow-card.html?number=${encodeURIComponent(n)}`;
};

   function msg(t, ok=false){
  info.className = "infobar mbk-infobar show " + (ok ? "success" : "error");
  info.style.display = "block";
  info.textContent = t;
}

    const p = new URLSearchParams(location.search);
    const num = p.get("number") || p.get("animalNumber") || localStorage.getItem("lastAnimalNumber") || "";
    const dt  = p.get("date") || p.get("eventDate") || localStorage.getItem("lastEventDate") || new Date().toISOString().slice(0,10);

    $("animalNumber").value = String(num || "").trim();
    $("eventDate").value = String(dt || "").slice(0,10);

    // ✅ قوائم التفاصيل
    const DETAILS = {
      "انتاجي": [
        "انخفاض إنتاج اللبن",
        "موسم ضعيف متكرر",
        "جودة لبن ضعيفة / SCC مرتفع",
        "عمر إنتاجي كبير",
        "مشاكل حليب متكررة"
      ],
      "تناسلي": [
        "تكرار تلقيح بدون حمل",
        "تأخر عشار / طول فترة مفتوحة",
        "التهاب رحم مزمن",
        "تكرار إجهاض",
        "مشاكل ولادة متكررة"
      ],
      "صحي": [
        "التهاب ضرع مزمن",
        "عرج مزمن",
        "هزال شديد / BCS منخفض",
        "أمراض متكررة (تنفسي/هضمي)",
        "إصابة/كسر",
        "اضطرابات أيضية متكررة"
      ]
    };

    const mainEl = $("cullMain");
    const detailEl = $("cullDetail");

   function fillDetails(){
  const m = (mainEl.value || "").trim();

  if (!m) {
    detailEl.innerHTML = `<option value="">— اختر السبب الرئيسي أولاً —</option>`;
    detailEl.value = "";
    detailEl.disabled = true;
    return;
  }

  const arr = DETAILS[m] || [];
  detailEl.disabled = false;
  detailEl.innerHTML =
    `<option value="">— اختر —</option>` +
    arr.map(x => `<option value="${x}">${x}</option>`).join("");
}

    mainEl.addEventListener("change", fillDetails);
    fillDetails();

   window.addEventListener("mbk:valid", async (ev) => {
      try {
        await ensureAuth();
        const uid = auth.currentUser?.uid;
        if (!uid) throw new Error("NO_AUTH");
        const formData = (ev && ev.detail && ev.detail.formData) ? ev.detail.formData : {};

        const n = String(num || "").trim();
        if (!n) { msg("⚠️ لم يتم تمرير رقم الحيوان.", false); return; }

const eventDate = String(formData.eventDate || dt || "").slice(0,10);

const cullMain = String(formData.cullMain || "").trim();
const cullDetail = String(formData.cullDetail || "").trim();
        if (!cullMain) { msg("⚠️ اختر سبب الاستبعاد (رئيسي).", false); return; }
        if (!cullDetail) { msg("⚠️ اختر تفصيل السبب.", false); return; }

        const payload = {
          animalNumber: n,
          animalId: n,
          type: "استبعاد",
          eventType: "استبعاد",
          eventDate,

          // ✅ السبب من القائمتين
          cullMain,
          cullDetail,
          reason: `${cullMain} — ${cullDetail}`,

          notes: String(formData.notes || "").trim(),
          userId: uid,
          source: "/cull.html",
          createdAt: serverTimestamp()
        };

        await addDoc(collection(db, "events"), payload);
        await updateAnimalByEvent(payload);

        msg("تم تسجيل الاستبعاد بنجاح ✅", true);
        localStorage.setItem("lastAnimalNumber", n);
        localStorage.setItem("lastEventDate", eventDate);
        setTimeout(()=>location.href=`cow-card.html?number=${encodeURIComponent(n)}`, 900);

      } catch (e) {
        console.error(e);
        msg("❌ فشل في الحفظ.", false);
      }
    });
  </script>
</body>
</html>
